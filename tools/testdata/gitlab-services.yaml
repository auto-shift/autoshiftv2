# Stub Services for gitlab-system used by policy-gitlab-monitoring.
# The policy iterates all Services in gitlab-system looking for ports named
# *metrics* and generates a ServiceMonitor for each one found.
# These stubs represent the real GitLab services with their metrics ports.

---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-gitlab-exporter
  namespace: gitlab-system
  labels:
    app: gitlab-exporter
    app.kubernetes.io/component: gitlab-exporter
    app.kubernetes.io/name: gitlab
spec:
  ports:
    - name: http-metrics
      port: 9168
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-webservice-default
  namespace: gitlab-system
  labels:
    app: webservice
    app.kubernetes.io/component: webservice
    app.kubernetes.io/name: gitlab
spec:
  ports:
    - name: http-webservice
      port: 8080
    - name: http-workhorse
      port: 8181
    - name: http-metrics-ws
      port: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-gitaly-default
  namespace: gitlab-system
  labels:
    app: gitaly
    app.kubernetes.io/component: gitaly
    app.kubernetes.io/name: gitlab
spec:
  ports:
    - name: tcp-gitaly
      port: 8075
    - name: http-metrics
      port: 9236
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-kas
  namespace: gitlab-system
  labels:
    app: kas
    app.kubernetes.io/component: kas
    app.kubernetes.io/name: gitlab
spec:
  ports:
    - name: tcp-kas-external-api
      port: 8154
    - name: http-metrics
      port: 8151
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-praefect
  namespace: gitlab-system
  labels:
    app: praefect
    app.kubernetes.io/name: gitlab
spec:
  ports:
    - name: grpc-praefect
      port: 2305
    - name: http-metrics
      port: 9236
