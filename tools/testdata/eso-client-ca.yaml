# caSource -> hub fromConfigMap -> target ConfigMap).
apiVersion: v1
kind: ConfigMap
metadata:
  name: eso-client-ca
  namespace: eso-trust
data:
  ca-bundle.crt: |
    -----BEGIN CERTIFICATE-----
    MIIBpTCCAUugAwIBAgIUfakecert001000000000000010fakeclientcaFAKE0001
    Mao0GCCqGSM49BAMCMA0xCzAJBgNVBAYTAlVTMB4XDTIwMDQxNjAwMDAwMFoXDDI1
    fakeclientcadatafakeclientcadatafakeclientcadatafakeclientcadata00
    -----END CERTIFICATE-----
