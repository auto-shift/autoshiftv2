# ManagedClusterSet stubs — register cluster.open-cluster-management.io/v1beta2
# so the gitops-dev policy's `lookup "...v1beta2" "ManagedClusterSet" "" ""`
# (used to enumerate clustersets for per-team ManagedClusterSetBindings and the
# GitOpsCluster Placement) resolves instead of erroring with "API resources are
# not installed". Names mirror the e2e's synthetic hub/managed clustersets.
---
apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSet
metadata:
  name: hub
spec: {}
---
apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSet
metadata:
  name: managed
spec: {}
