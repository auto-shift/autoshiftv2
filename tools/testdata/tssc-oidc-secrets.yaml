---
# Stubs for TSSC OIDC client Secrets created by policy-keycloak-config on the
# managed cluster. The realm import spoke template lookups these to embed
# client secrets. Values are low-entropy fakes for test purposes only.
apiVersion: v1
kind: Secret
metadata:
  name: trusted-artifact-signer-clients
  namespace: keycloak-system
type: Opaque
data:
  trustedArtifactSigner: dGVzdC10YXMtc2VjcmV0
---
apiVersion: v1
kind: Secret
metadata:
  name: tpa-realm-clients
  namespace: keycloak-system
type: Opaque
data:
  cli: dGVzdC10cGEtY2xpLXNlY3JldA==
  frontend: dGVzdC10cGEtZnJvbnRlbmQ=
---
apiVersion: v1
kind: Secret
metadata:
  name: rhdh-realm-clients
  namespace: keycloak-system
type: Opaque
data:
  rhdh: dGVzdC1yaGRoLXNlY3JldA==
