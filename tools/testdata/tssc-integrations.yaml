# Fake GitHub credentials — admin creates this Secret in github-system on the hub.
# ACM hub templates read it to populate GITHUB_HOST/TOKEN/ORG in the Developer Hub env secret.
apiVersion: v1
kind: Secret
metadata:
  name: tssc-github-credentials
  namespace: github-system
type: Opaque
data:
  # host: github.com
  host: Z2l0aHViLmNvbQ==
  # token: fake-github-api-token-not-real
  token: ZmFrZS1naXRodWItYXBpLXRva2VuLW5vdC1yZWFs
  # org: my-org
  org: bXktb3Jn
---
# Fake GitLab credentials — admin creates this Secret in gitlab-system on the hub.
# No Job needed: ACM reads it via spoke lookup (Developer Hub) and hub template
# lookup (tssc-app-namespaces propagation to managed cluster -ci namespaces).
apiVersion: v1
kind: Secret
metadata:
  name: tssc-gitlab-credentials
  namespace: gitlab-system
type: Opaque
data:
  # host: gitlab.apps.test-cluster.test.example.com
  host: Z2l0bGFiLmFwcHMudGVzdC1jbHVzdGVyLnRlc3QuZXhhbXBsZS5jb20=
  # token: fake-gitlab-api-token-not-real
  token: ZmFrZS1naXRsYWItYXBpLXRva2VuLW5vdC1yZWFs
  # username: tssc-service-account
  username: dHNzYy1zZXJ2aWNlLWFjY291bnQ=
---
# Fake cosign signing-secrets (openshift-pipelines) — admin pre-creates on hub,
# ACM hub templates propagate to all pipelines-enabled clusters. All three fields
# required: Tekton Chains reads cosign.key+password for signing, cosign.pub for verification.
apiVersion: v1
kind: Secret
metadata:
  name: signing-secrets
  namespace: openshift-pipelines
type: Opaque
data:
  # cosign.pub: -----BEGIN PUBLIC KEY-----\nfake-test-public-key-not-real\n-----END PUBLIC KEY-----
  cosign.pub: LS0tLS1CRUdJTiBQVUJMSUMgS0VZLS0tLS0KZmFrZS10ZXN0LXB1YmxpYy1rZXktbm90LXJlYWwKLS0tLS1FTkQgUFVCTElDIEtFWS0tLS0tCg==
  # cosign.key: -----BEGIN ENCRYPTED SIGSTORE PRIVATE KEY-----\nfake-test-private-key-not-real\n-----END ENCRYPTED SIGSTORE PRIVATE KEY-----
  cosign.key: LS0tLS1CRUdJTiBFTkNSWVBURUQgU0lHU1RPUkUgUFJJVkFURSBLRVktLS0tLQpmYWtlLXRlc3QtcHJpdmF0ZS1rZXktbm90LXJlYWwKLS0tLS1FTkQgRU5DUllQVEVEIFNJR1NUT1JFIFBSSVZBVEUgS0VZLS0tLS0K
  # cosign.password: (empty — no passphrase for Tekton Chains compatibility)
  cosign.password: ""
---
# ArgoCD Route and admin secret stubs — hub templates read these to build
# tssc-argocd-integration without a Job. Admin password is the initial ArgoCD
# admin credential; ACM propagates updates on every evaluation cycle.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: argocd-dev-server
  namespace: openshift-gitops-dev
spec:
  # host: argocd-dev-server.apps.test-cluster.test.example.com
  host: argocd-dev-server.apps.test-cluster.test.example.com
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-dev-cluster
  namespace: openshift-gitops-dev
type: Opaque
data:
  # admin.password: test-argocd-admin-password
  admin.password: dGVzdC1hcmdvY2QtYWRtaW4tcGFzc3dvcmQ=
