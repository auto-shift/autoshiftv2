---
apiVersion: config.openshift.io/v1
kind: Infrastructure
metadata:
  name: cluster
spec:
  cloudConfig:
    key: config
    name: cloud-provider-config
  platformSpec:
    aws: {}
    type: AWS
status:
  apiServerInternalURI: https://api-int.test-cluster.test.example.com:6443
  apiServerURL: https://api.test-cluster.test.example.com:6443
  controlPlaneTopology: HighlyAvailable
  cpuPartitioning: None
  etcdDiscoveryDomain: ""
  infrastructureName: test-cluster-abc12
  infrastructureTopology: HighlyAvailable
  platform: AWS
  platformStatus:
    aws:
      region: us-east-2
    type: AWS
---
apiVersion: config.openshift.io/v1
kind: DNS
metadata:
  name: cluster
spec:
  baseDomain: test-cluster.test.example.com
  platform:
    type: ""
  privateZone:
    tags:
      Name: test-cluster-abc12-int
      kubernetes.io/cluster/test-cluster-abc12: owned
  publicZone:
    id: ZFAKE12345EXAMPLE
status: {}
---
apiVersion: config.openshift.io/v1
kind: Ingress
metadata:
  name: cluster
spec:
  domain: apps.test-cluster.test.example.com
status:
  componentRoutes:
    - defaultHostname: console-openshift-console.apps.test-cluster.test.example.com
      name: console
      namespace: openshift-console
---
# The apiserver URL is read from this ClusterClaim (spec.value), not config.openshift.io/Infrastructure
# — the ESO hub-bootstrap policies look it up via `lookup ClusterClaim apiserverurl.openshift.io` on the
# cluster the template runs on. Value mirrors Infrastructure.status.apiServerURL above so the host/URL
# assertions (deriveHubUrl, externalCAReuseServingCert, serving-ca named-cert match) are unchanged.
apiVersion: cluster.open-cluster-management.io/v1alpha1
kind: ClusterClaim
metadata:
  name: apiserverurl.openshift.io
spec:
  value: https://api.test-cluster.test.example.com:6443
