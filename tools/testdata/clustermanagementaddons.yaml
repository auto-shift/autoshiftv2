# ClusterManagementAddOn stubs — register addon.open-cluster-management.io/v1alpha1 so the
# advanced-cluster-management addon-tuning policy's
#   lookup "addon.open-cluster-management.io/v1alpha1" "ClusterManagementAddOn" "" "<name>"
# resolves instead of erroring with "API resources are not installed". The policy copies the live
# spec and replaces only supportedConfigs, so the stubs include the addon-manager's real shape
# (addOnMeta + installStrategy + the __reserved_no_default__ placeholder config) to exercise it.
---
apiVersion: addon.open-cluster-management.io/v1alpha1
kind: ClusterManagementAddOn
metadata:
  name: config-policy-controller
spec:
  addOnMeta:
    displayName: Config Policy Addon
    description: Audits k8s resources and remediates violation based on configuration policies.
  installStrategy:
    type: Manual
  supportedConfigs:
    - group: addon.open-cluster-management.io
      resource: addondeploymentconfigs
      defaultConfig:
        name: __reserved_no_default__
---
apiVersion: addon.open-cluster-management.io/v1alpha1
kind: ClusterManagementAddOn
metadata:
  name: governance-policy-framework
spec:
  addOnMeta:
    displayName: Governance Policy Framework Addon
    description: Distributes policies and collects policy evaluation results.
  installStrategy:
    type: Manual
  supportedConfigs:
    - group: addon.open-cluster-management.io
      resource: addondeploymentconfigs
      defaultConfig:
        name: __reserved_no_default__
