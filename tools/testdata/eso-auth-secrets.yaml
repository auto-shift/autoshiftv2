---
# Fake hub-side Vault token secret used by the external-secrets-operator stores
# policy. policy-external-secrets-operator-stores copies this to managed clusters
# via authSecretConfig (hub fromSecret -> target Secret).
apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: eso-auth-secrets
type: Opaque
data:
  # token: fake-vault-token-not-real
  token: ZmFrZS12YXVsdC10b2tlbi1ub3QtcmVhbA==
---
# Fake hub-side Vault AppRole SecretID, injected into spec.provider.vault.auth.appRole.secretRef
apiVersion: v1
kind: Secret
metadata:
  name: approle-creds
  namespace: eso-auth-secrets
type: Opaque
data:
  # secret-id: fake-approle-secret-id-not-real
  secret-id: ZmFrZS1hcHByb2xlLXNlY3JldC1pZC1ub3QtcmVhbA==
---
# Fake hub-side AWS IAM creds (vault iam auth). Both refs nest under auth.iam.secretRef;
# each authSecretConfig component path is [secretRef, <ref>]. Mirrored into one Secret.
apiVersion: v1
kind: Secret
metadata:
  name: aws-iam-creds
  namespace: eso-auth-secrets
type: Opaque
data:
  # access-key-id: fake-access-key-not-real
  access-key-id: ZmFrZS1hY2Nlc3Mta2V5LW5vdC1yZWFs
  # secret-access-key: fake-secret-key-not-real
  secret-access-key: ZmFrZS1zZWNyZXQta2V5LW5vdC1yZWFs
---
# Fake hub-side client cert/key pair. Both keys are mirrored (via a list-form
# authSecretConfig) into one managed-cluster Secret for kubernetes cert auth.
apiVersion: v1
kind: Secret
metadata:
  name: eso-ns-cert-src
  namespace: eso-auth-secrets
type: Opaque
data:
  # tls.crt: fake-client-cert-not-real
  tls.crt: ZmFrZS1jbGllbnQtY2VydC1ub3QtcmVhbA==
  # tls.key: fake-client-key-not-real
  tls.key: ZmFrZS1jbGllbnQta2V5LW5vdC1yZWFs
