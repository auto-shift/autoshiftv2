---
# Fake hub secret for the keycloak realm config (read via fromSecret from the policy namespace by
# policies/stable/keycloak realm-secrets + simple-mode database). Low-entropy fakes (gitleaks).
apiVersion: v1
kind: Secret
metadata:
  name: tssc-keycloak-config
  namespace: policies-autoshift
type: Opaque
data:
  # admin-password: fake-admin-pw
  admin-password: ZmFrZS1hZG1pbi1wdw==
  # tas-client-secret: fake-tas-secret
  tas-client-secret: ZmFrZS10YXMtc2VjcmV0
  # tpa-cli-secret: fake-tpa-cli
  tpa-cli-secret: ZmFrZS10cGEtY2xp
  # tpa-frontend-secret: fake-tpa-frontend
  tpa-frontend-secret: ZmFrZS10cGEtZnJvbnRlbmQ=
  # rhdh-client-secret: fake-rhdh-secret
  rhdh-client-secret: ZmFrZS1yaGRoLXNlY3JldA==
  # quay-client-secret: fake-quay-secret
  quay-client-secret: ZmFrZS1xdWF5LXNlY3JldA==
  # gitlab-client-secret: fake-gitlab-secret
  gitlab-client-secret: ZmFrZS1naXRsYWItc2VjcmV0
  # argocd-client-secret: fake-argocd-secret
  argocd-client-secret: ZmFrZS1hcmdvY2Qtc2VjcmV0
  # db-password: fake-db-pw
  db-password: ZmFrZS1kYi1wdw==
---
# Fake propagated ArgoCD Keycloak client secret (realm-secrets creates argocd-realm-clients in keycloak-system
# from tssc-keycloak-config argocd-client-secret). Read spoke-side by realm-import + the gitops charts to gate
# and wire ArgoCD Dex SSO. Fake value, testing only.
apiVersion: v1
kind: Secret
metadata:
  name: argocd-realm-clients
  namespace: keycloak-system
type: Opaque
data:
  # argocd: fake-argocd-secret
  argocd: ZmFrZS1hcmdvY2Qtc2VjcmV0
---
# Fake propagated RHDH Keycloak client secret (realm-secrets creates rhdh-realm-clients in keycloak-system).
# Read spoke-side by the gitlab keycloak-group-sync CronJob (rhdh service account). Fake value, testing only.
apiVersion: v1
kind: Secret
metadata:
  name: rhdh-realm-clients
  namespace: keycloak-system
type: Opaque
data:
  # rhdh: fake-rhdh-secret
  rhdh: ZmFrZS1yaGRoLXNlY3JldA==
---
# Fake in-cluster API CA (kube-root-ca.crt exists in every namespace) — read spoke-side by developer-hub
# backstage.yaml and appended to the RHDH trusted-ca bundle so the Kubernetes plugin trusts
# kubernetes.default.svc. ConfigMap data is plaintext PEM (not base64). Fake cert, testing only.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-root-ca.crt
  namespace: tssc-dh
data:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    MIIBFakeKubeRootCAForTestingOnly1234567890AbCdEfGhIjKlMnOpQrStUvWx
    YzFakeFakeFakeFakeFakeFakeFakeFakeFakeFakeFakeFakeFakeFakeFakeFake
    -----END CERTIFICATE-----
---
# kube-system namespace — its UID seeds the deterministic RHDH backend signing secret
# (developer-hub backend-secret.yaml). Also registers the Namespace type for the e2e lookup.
apiVersion: v1
kind: Namespace
metadata:
  name: kube-system
  uid: 00000000-0000-0000-0000-00000000kube
---
# Fake pre-created ACS API token (admin bootstraps this on the hub; propagated to tssc-acs-integration
# on managed clusters by advanced-cluster-security tssc-integration.yaml). ACS can't mint tokens declaratively.
apiVersion: v1
kind: Secret
metadata:
  name: tssc-acs-integration
  namespace: policies-autoshift
type: Opaque
data:
  # token: fake-acs-token
  token: ZmFrZS1hY3MtdG9rZW4=
---
# Fake hub secret for TPA simple-mode DB password (read via fromSecret by tpa database.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: tssc-tpa-config
  namespace: policies-autoshift
type: Opaque
data:
  # db-password: fake-db-pw
  db-password: ZmFrZS1kYi1wdw==
