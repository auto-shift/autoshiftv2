# Default values for the autoshift
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global autoshift configuration
autoshift:
  # Set to true to deploy all policies in inform mode (dry run)
  # When false, policies use their defined remediationAction
  dryRun: false

autoshiftGitRepo: https://github.com/auto-shift/autoshiftv2.git
autoshiftGitBranchTag: main
# Tell autoshfit to source values files from a different repo (must share directory structure)
#autoshiftValues: 
#  repoUrl: https://github.com/auto-shift/autoshiftv2.git
#  targetRevision: main

# ArgoCD namespace — single source of truth for all policy charts
# Per-cluster overrides use the autoshift.io/gitops-namespace label
gitopsNamespace: openshift-gitops

# Optional: Config template variables — anchors substituted per cluster into the
# rendered configs by policy-cluster-configs. Defaults ship in
# policies/stable/cluster-config-maps/values.yaml:
#   %CLUSTER_NAME% -> ManagedCluster name
#   %CLUSTER_SET%  -> clusterset label value
#   plus the universal clusterclaims of the cluster itself: %CLUSTER_API_URL%,
#   %CLUSTER_CONSOLE_URL%, %CLUSTER_ID%, %CLUSTER_OCP_ID%, %CLUSTER_OCP_VERSION%,
#   %CLUSTER_KUBE_VERSION%, %CLUSTER_PLATFORM%, %CLUSTER_PRODUCT%, %CLUSTER_REGION%,
#   %CLUSTER_CP_TOPOLOGY%
#   plus the rendering hub's own values (talk-back addresses): %HUB_API_URL%,
#   %HUB_CONSOLE_URL%, %HUB_NAME%
# Anchors are usable in any config value (default/clusterSet/cluster level).
# Extend or override here (deep-merged over the chart defaults), e.g.:
# configVariables:
#   region:
#     anchor: '%REGION%'
#     expr: 'index ($cluster.metadata.labels | default dict) "topology.kubernetes.io/region" | default ""'
#   environment:
#     anchor: '%ENV%'
#     value: 'production'

# Optional: Enable versioned ClusterSet names for gradual rollout
# When true, appends version/branch to all clusterset names
# - OCI mode: uses autoshiftOciVersion (defaults to "latest", e.g., "hub" -> "hub-0-0-1")
# - Git mode: uses autoshiftGitBranchTag (e.g., "hub" -> "hub-main" or "hub-feature-xyz")
# Use this when deploying multiple AutoShift versions side-by-side
# versionedClusterSets: false

# Optional: Policies excluded from the ApplicationSet. cluster-labels and cluster-config-maps are deployed
# as dedicated Applications with full label/config data to avoid sizing issues and are excluded already
# excludePolicies:
#   - infra-nodes
#   - worker-nodes

# Optional: Limit the number of history revisions kept for each application inside of gitops directly
# Defaults to 3
# revisionHistoryLimit: 3
