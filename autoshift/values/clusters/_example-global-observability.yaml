# ==============================================================================
# Per-Cluster Override Example - ALL Available Options
# ==============================================================================
# Copy this file and rename it after your cluster (e.g., my-cluster.yaml).
# Labels defined here override clusterset labels for the named cluster.
# Precedence: cluster > clusterset > helm defaults
#
# Usage in ArgoCD Application:
#   valueFiles:
#     - values/global.yaml
#     - values/clustersets/hub.yaml
#     - values/clustersets/managed.yaml
#     - values/clusters/my-cluster.yaml    # <-- this file
#
# Notes:
#   - Only include labels you want to CHANGE from the clusterset defaults
#   - Create one file per cluster for clarity
#   - The most common per-cluster overrides are NMState network configuration
#     and cluster sizing (infra/worker/storage nodes)
# ==============================================================================

clusters:
  my-cluster-name:    # <-- Must match the cluster name in ACM
    config:
      # =======================================================================
      # ACM Observability — base MCO CR, secrets, thanos storage, retention
      # Consumed by: policies/advanced-cluster-management policy-acm-observability
      # =======================================================================
      # acm:
      #   observability:
      #     useODF: false                       # Provision ObjectBucketClaim on NooBaa (ODF) for S3
      #     useAlternateCA: false               # Swap default serviceaccount CA for user-supplied bundle
      #     storageClass: 'gp3-csi'             # StorageClass for Thanos PVs (optional)
      #     retentionResolutionRaw: '5d'        # Retention for raw metrics
      #     retentionResolution5m: '14d'        # Retention for 5m metrics
      #     retentionResolution1h: '30d'        # Retention for 1h metrics
      #     enableDownsampling: true
      #     interval: 300                       # ObservabilityAddon scrape interval (seconds)
      #     scrapeSizeLimitBytes: '1073741824'  # Max scrape size in bytes
      #     workers: 1                          # Scrape workers
      #     alertmanagerStorageSize: '10Gi'
      #     compactStorageSize: '10Gi'
      #     receiveStorageSize: '10Gi'
      #     ruleStorageSize: '10Gi'
      #     storeStorageSize: '10Gi'
      #     thanosStorage:
      #       bucket: 'acm-dr'                  # S3 bucket name
      #       host: 's3.example.com'            # S3 endpoint hostname
      #       port: '443'                       # S3 endpoint port
      #       insecure: false
      #       secretNamespace: 'policies-autoshift'
      #       secretName: 'thanos-s3-bucket'
      #       accessKeyField: 'access-key'
      #       secretKeyField: 'secret-key'
      #       caBundle:
      #         sourceName: 'user-ca-bundle'    # ConfigMap with CA (used when useAlternateCA=true)
      #         sourceKey: 'ca-bundle.crt'
      #         sourceNamespace: 'openshift-config'
      # =======================================================================
      # Global Observability — MCOA capabilities + spoke PrometheusAgent config
      # Consumed by: policies/global-observability policy-global-observability-*
      # =======================================================================
      # globalObservability:
      #   scrapeInterval: '300s'              # Spoke PrometheusAgent scrape interval
      #   logLevel: 'warn'                    # Spoke PrometheusAgent log level
      #   capabilities:
      #     platformAnalytics: 'true'         # incident detection, rightsizing
      #     platformLogs: 'true'              # platform log collection
      #     platformMetrics: 'true'           # platform metrics collection
      #     userWorkloadLogs: 'true'          # user workload log collection
      #     userWorkloadMetrics: 'true'       # user workload metrics collection
      #     userWorkloadTraces: 'true'        # user workload trace collection
      #   additionalRemoteWrites:
      #     - name: external-monitoring
      #       onSelfManagedHub: true          # include on self-managed hub
      #       url: https://external.example.com/api/v1/receive
      #       remoteTimeout: 30s
      #       caFile:   /etc/prometheus/secrets/external-certs/ca.crt
      #       certFile: /etc/prometheus/secrets/external-certs/tls.crt
      #       keyFile:  /etc/prometheus/secrets/external-certs/tls.key
      #       secretRef:
      #         name: external-certs
      #         namespace: some-ns
      # =======================================================================
      # Managed AutoShift (config section - read via rendered-config)
      # =======================================================================
      # autoshift:
      #   appName: 'managed-autoshift'         # ArgoCD Application name
      #   repoUrl: 'https://github.com/auto-shift/autoshiftv2.git'  # Git repo URL
      #   targetRevision: 'main'               # Git branch or tag
      #   gitopsNamespace: 'openshift-gitops'  # ArgoCD namespace on downstream hub
      #   argoProject: 'default'               # ArgoCD project
      #   argoServer: 'https://kubernetes.default.svc'  # ArgoCD server URL
      #   valuesFiles:                         # Helm values files (default: values.<clustername>.yaml)
      #     - 'values/global.yaml'
      #     - 'values/clustersets/hub.yaml'
      #   useRepoSecret: false                 # Use a git repo secret for ArgoCD
      #   repoSecretRef:
      #     name: 'autoshift-repo-secret'      # Secret name for git credentials
      #     namespace: 'open-cluster-policies'  # Secret namespace
