# ==============================================================================
# Per-Cluster Override Example - ALL Available Options
# ==============================================================================
# Copy this file and rename it after your cluster (e.g., my-cluster.yaml).
# Labels defined here override clusterset labels for the named cluster.
# Precedence: cluster > clusterset > helm defaults
#
# Usage in ArgoCD Application:
#   valueFiles:
#     - values/global.yaml
#     - values/clustersets/hub.yaml
#     - values/clustersets/managed.yaml
#     - values/clusters/my-cluster.yaml    # <-- this file
#
# Notes:
#   - Only include labels you want to CHANGE from the clusterset defaults
#   - Create one file per cluster for clarity
#   - The most common per-cluster overrides are NMState network configuration
#     and cluster sizing (infra/worker/storage nodes)
# ==============================================================================

clusters:
  my-cluster-name:    # <-- Must match the cluster name in ACM
    config:
      # =======================================================================
      # Global Observability (config section - read via rendered-config)
      # =======================================================================
      # globalObservability:
      #   useClusterCA: false                  # Use cluster CA for Thanos S3 TLS verification
      #   storageClass: 'gp3-csi'             # StorageClass for all Thanos PVs
      #   retentionResolutionRaw: '5d'        # Retention for raw resolution metrics
      #   retentionResolution5m: '14d'        # Retention for 5-minute resolution metrics
      #   retentionResolution1h: '30d'        # Retention for 1-hour resolution metrics
      #   enableDownSampling: true            # Enable Thanos downsampling
      #   interval: 300                       # Observability addon scrape interval (seconds)
      #   scrapeSizeLimitBytes: 1073741824    # Max scrape size in bytes
      #   scrapeWorkers: 1                    # Number of scrape workers
      #   scrapeInterval: '300s'              # Spoke PrometheusAgent scrape interval
      #   logLevel: 'warn'                    # Spoke PrometheusAgent log level
      #   alertmanagerStorageSize: '10Gi'     # Alertmanager PVC size
      #   compactStorageSize: '10Gi'          # Compactor PVC size
      #   receiveStorageSize: '10Gi'          # Receiver PVC size
      #   ruleStorageSize: '10Gi'             # Rule PVC size
      #   storeStorageSize: '10Gi'            # Store PVC size
      #   capabilities:
      #     platformAnalytics: 'true'         # Enable platform analytics
      #     platformLogs: 'true'              # Enable platform log collection
      #     platformMetrics: 'true'           # Enable platform metrics collection
      #     userWorkloadLogs: 'true'          # Enable user workload log collection
      #     userWorkloadMetrics: 'true'       # Enable user workload metrics collection
      #     userWorkloadTraces: 'true'        # Enable user workload trace collection
      #   thanosStorage:
      #     bucket: 'acm-dr'                  # S3 bucket name
      #     endpoint: 's3.example.com'        # S3 endpoint hostname
      #     insecure: false                   # Allow insecure S3 connections
      #     caBundle:
      #       sourceName: 'user-ca-bundle'    # ConfigMap name in openshift-config for CA
      #       sourceKey: 'ca-bundle.crt'      # Key within the ConfigMap
      #     source:
      #       namespace: ''                   # Namespace of source secret with S3 credentials
      #       secretName: ''                  # Secret name with S3 credentials
      #       accessKeyField: 'AWS_ACCESS_KEY_ID'
      #       secretKeyField: 'AWS_SECRET_ACCESS_KEY'
      # =======================================================================
      # Managed AutoShift (config section - read via rendered-config)
      # =======================================================================
      # autoshift:
      #   appName: 'managed-autoshift'         # ArgoCD Application name
      #   repoUrl: 'https://github.com/auto-shift/autoshiftv2.git'  # Git repo URL
      #   targetRevision: 'main'               # Git branch or tag
      #   gitopsNamespace: 'openshift-gitops'  # ArgoCD namespace on downstream hub
      #   argoProject: 'default'               # ArgoCD project
      #   argoServer: 'https://kubernetes.default.svc'  # ArgoCD server URL
      #   valuesFiles:                         # Helm values files (default: values.<clustername>.yaml)
      #     - 'values/global.yaml'
      #     - 'values/clustersets/hub.yaml'
      #   useRepoSecret: false                 # Use a git repo secret for ArgoCD
      #   repoSecretRef:
      #     name: 'autoshift-repo-secret'      # Secret name for git credentials
      #     namespace: 'open-cluster-policies'  # Secret namespace
