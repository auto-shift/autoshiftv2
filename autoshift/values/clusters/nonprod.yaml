clusters:
  nonprod:
    config:
      clusterSet: managed
      networking:
        clusterNetwork:
          cidr: 10.128.0.0/14
          hostPrefix: 23
        machineNetwork:
          cidr: 10.0.0.0/16
        serviceNetwork:
          - 172.30.0.0/16
      clusterInstall:
        createCluster: 'true'
        platform: aws
        baseDomain: sandbox2071.opentlc.com
        openshiftVersion: '4.20.16'
        pullSecretRef:
          name: 'aws-creds'
          key: 'pullSecret'
          namespace: 'cluster-install-secrets'
        secretSourceNamespace: 'cluster-install-secrets'
      aws:
        region: us-east-1
        credentialRef: 'aws-creds'
        sshPrivateKeyRef: 'aws-creds'
        sshKeyRef:
          name: 'aws-creds'
          key: 'ssh-publickey'
          namespace: 'cluster-install-secrets'
        fips: true
        networkType: OVNKubernetes
        controlPlane:
          instanceType: m5.xlarge
          rootVolume:
            iops: 4000
            size: 100
            type: io1
        workers:
          replicas: 3
          instanceType: m5.xlarge
          rootVolume:
            iops: 2000
            size: 100
            type: io1
