# ==============================================================================
# AWS Cluster Install Example — Single Secret Pattern
# ==============================================================================
# This example uses a single Secret per cluster containing all credentials,
# matching the ACM GUI pattern.
#
# Create the secret:
#   oc create secret generic aws-creds \
#     -n cluster-install-secrets \
#     --from-literal=aws_access_key_id=<key> \
#     --from-literal=aws_secret_access_key=<secret> \
#     --from-file=ssh-privatekey=$HOME/.ssh/ocp-cluster \
#     --from-file=ssh-publickey=$HOME/.ssh/ocp-cluster.pub \
#     --from-file=pullSecret=~/pull-secret.json \
#     --from-literal=baseDomain=example.com \
#     --from-literal=httpProxy='' \
#     --from-literal=httpsProxy='' \
#     --from-literal=noProxy='' \
#     --from-literal=additionalTrustBundle=''
# ==============================================================================

clusters:
  nonprod:
    config:
      clusterSet: managed

      networking:
        clusterNetwork:
          cidr: 10.128.0.0/14
          hostPrefix: 23
        machineNetwork:
          cidr: 10.0.0.0/16
        serviceNetwork:
          - 172.30.0.0/16

      clusterInstall:
        createCluster: 'true'
        platform: aws
        baseDomain: sandbox1987.opentlc.com
        openshiftVersion: '4.20.16'
        pullSecretRef:                                  # reference to pull secret
          name: 'aws-creds'                           # secret name
          key: 'pullSecret'                            # key in the secret (default: .dockerconfigjson)
          namespace: 'cluster-install-secrets'         # optional, defaults to secretSourceNamespace
        secretSourceNamespace: 'cluster-install-secrets'

      aws:
        region: us-east-1
        credentialRef: 'aws-creds'                    # same secret, aws_access_key_id + aws_secret_access_key keys
        sshPrivateKeyRef: 'aws-creds'                 # same secret, ssh-privatekey key
        sshKeyRef:                                     # reads ssh-publickey from the same secret
          name: 'aws-creds'
          key: 'ssh-publickey'
          namespace: 'cluster-install-secrets'
        fips: true
        networkType: OVNKubernetes

        controlPlane:
          instanceType: m5.xlarge
          rootVolume:
            iops: 4000
            size: 100
            type: io1

        workers:
          replicas: 3
          instanceType: m5.xlarge
          rootVolume:
            iops: 2000
            size: 100
            type: io1
