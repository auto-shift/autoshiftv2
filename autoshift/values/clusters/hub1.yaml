clusters:
  hub1:
    config:
      clusterSet: hub1

      # =====================================================================
      # Networking
      # =====================================================================
      networking:
        clusterNetwork:
          cidr: 10.128.0.0/14
          hostPrefix: 23
        machineNetwork:
          cidr: 10.0.0.0/16
        serviceNetwork:
          - 172.30.0.0/16

      # =====================================================================
      # Cluster Install
      # =====================================================================
      clusterInstall:
        createCluster: 'true'
        platform: aws
        baseDomain: sandbox1781.opentlc.com    # TODO: update base domain
        openshiftVersion: '4.20.22'
        pullSecretRef:
          name: 'aws-creds'
          key: 'pullSecret'
          namespace: 'cluster-install-secrets'
        secretSourceNamespace: 'cluster-install-secrets'

      # =====================================================================
      # AWS
      # =====================================================================
      aws:
        region: us-east-2
        credentialRef: 'aws-creds'
        sshPrivateKeyRef: 'aws-creds'
        sshKeyRef:
          name: 'aws-creds'
          key: 'ssh-publickey'
          namespace: 'cluster-install-secrets'
        fips: false
        networkType: OVNKubernetes
        # Single-node OpenShift (SNO): 1 control-plane node, 0 workers.
        controlPlane:
          replicas: 1
          instanceType: m5.8xlarge
          rootVolume:
            iops: 4000
            size: 200
            type: io1
        workers:
          replicas: 0
          instanceType: m5.4xlarge
          rootVolume:
            iops: 2000
            size: 100
            type: io1
