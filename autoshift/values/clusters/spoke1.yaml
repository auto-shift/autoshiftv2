clusters:
  spoke1:
    config:
      clusterSet: managed

      # =====================================================================
      # Networking
      # =====================================================================
      networking:
        clusterNetwork:
          cidr: 10.132.0.0/14
          hostPrefix: 23
        machineNetwork:
          cidr: 10.1.0.0/16
        serviceNetwork:
          - 172.31.0.0/16

      # =====================================================================
      # Cluster Install
      # =====================================================================
      clusterInstall:
        createCluster: 'true'
        platform: aws
        baseDomain: sandbox1781.opentlc.com    # TODO: update base domain
        openshiftVersion: '4.20.22'
        pullSecretRef:
          name: 'aws-creds'
          key: 'pullSecret'
          namespace: 'cluster-install-secrets'
        secretSourceNamespace: 'cluster-install-secrets'

      # =====================================================================
      # AWS
      # =====================================================================
      aws:
        region: us-east-2
        credentialRef: 'aws-creds'
        sshPrivateKeyRef: 'aws-creds'
        sshKeyRef:
          name: 'aws-creds'
          key: 'ssh-publickey'
          namespace: 'cluster-install-secrets'
        fips: false
        networkType: OVNKubernetes
        controlPlane:
          instanceType: m5.xlarge
          rootVolume:
            iops: 4000
            size: 100
            type: io1
        workers:
          replicas: 3
          instanceType: m5.xlarge
          rootVolume:
            iops: 2000
            size: 100
            type: io1
