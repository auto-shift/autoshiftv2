# Test MAC-identified dual-bond per-host overrides on local-cluster
clusters:
  local-cluster:
    config:
      hosts:
        master-0:
          networking:
            interfaces:
              mgmt-port1:
                mac: '00:1a:2b:3c:40:01'
              mgmt-port2:
                mac: '00:1a:2b:3c:40:02'
              stor-port1:
                mac: '00:1a:2b:3c:41:01'
              stor-port2:
                mac: '00:1a:2b:3c:41:02'
              mgmt:
                ports: [mgmt-port1, mgmt-port2]
              storage:
                ports: [stor-port1, stor-port2]
              mgmt-vlan:
                ipv4:
                  addresses:
                    - ip: 10.0.0.10
                      prefixLength: 25
              storage-vlan:
                ipv4:
                  addresses:
                    - ip: 10.100.0.10
                      prefixLength: 24
        master-1:
          networking:
            interfaces:
              mgmt-port1:
                mac: '00:1a:2b:3c:50:01'
              mgmt-port2:
                mac: '00:1a:2b:3c:50:02'
              stor-port1:
                mac: '00:1a:2b:3c:51:01'
              stor-port2:
                mac: '00:1a:2b:3c:51:02'
              mgmt:
                ports: [mgmt-port1, mgmt-port2]
              storage:
                ports: [stor-port1, stor-port2]
              mgmt-vlan:
                ipv4:
                  addresses:
                    - ip: 10.0.0.11
                      prefixLength: 25
              storage-vlan:
                ipv4:
                  addresses:
                    - ip: 10.100.0.11
                      prefixLength: 24
