---
# Shared variables used across multiple roles.
# Included by playbooks via vars_files.

# GitLab
gitlab_group: autoshift
gitlab_project: site-config
gitlab_namespace: gitlab-system
gitlab_visibility: internal

# ArgoCD
argocd_app_name: autoshift
argocd_namespace: openshift-gitops

# OCI
oci_registry: "oci://quay.io/autoshift"

# Site config
site_config_repo: ""
site_config_branch: main
