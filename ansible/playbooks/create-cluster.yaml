---
# ==============================================================================
# Create Cluster — Generate values, push to git, update ArgoCD
# ==============================================================================
# Generates a cluster values file for baremetal provisioning via SiteConfig,
# pushes it to the site config git repo, and patches the ArgoCD Application.
#
# Interactive:
#   ansible-playbook ansible/playbooks/create-cluster.yaml
#
# From inventory:
#   ansible-playbook ansible/playbooks/create-cluster.yaml -i ansible/inventory/my-cluster.yaml
#
# From AAP:
#   Configure as Job Template with survey mapping to variables.
#   Set git_push=true, update_argocd=true.
#
# Variables:
#   site_config_dir       Path to local checkout of site config repo
#   git_push              Push to git after generating (default: true)
#   update_argocd         Patch ArgoCD Application (default: true)
#   argocd_app_name       ArgoCD Application name (default: autoshift)
#   argocd_namespace      ArgoCD namespace (default: openshift-gitops)
#   git_email             Git commit email (default: autoshift@localhost)
#   git_user              Git commit username (default: AutoShift)
# ==============================================================================

- name: Create cluster
  hosts: localhost
  connection: local
  gather_facts: false

  roles:
    - create-cluster
