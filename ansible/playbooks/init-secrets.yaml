---
# ==============================================================================
# Initialize Cluster Install Secrets
# ==============================================================================
# Creates the secrets namespace and required secrets for cluster provisioning:
#   - BMC credentials (for iDRAC/Redfish access)
#   - Pull secret (for container image registry)
#   - SSH keypair (generated or provided — ECDSA for FIPS compliance)
#
# Interactive:
#   ansible-playbook ansible/playbooks/init-secrets.yaml
#
# From vault (non-interactive):
#   ansible-playbook ansible/playbooks/init-secrets.yaml \
#     -e @ansible/vault.yaml --ask-vault-pass
#
# The vault.yaml can contain:
#   init_secrets_bmc_username: admin
#   init_secrets_bmc_password: changeme
#   init_secrets_pull_secret_file: /path/to/pull-secret.json
# ==============================================================================

- name: Initialize cluster install secrets
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../vars/shared.yaml"

  roles:
    - init-secrets
