---
# ==============================================================================
# Initialize Site Config Repo
# ==============================================================================
# Creates the site config repo structure with base values files.
# Run once per site to set up the repo that ArgoCD will watch.
#
# Usage:
#   ansible-playbook ansible/playbooks/init-site-config.yaml \
#     -e site_config_dir=/path/to/site-config \
#     -e gitlab_url=https://gitlab.apps.cluster.example.com
#
# This playbook:
#   1. Creates the directory structure
#   2. Copies base values files from the autoshift chart
#   3. Initializes git and pushes to GitLab
# ==============================================================================

- name: Initialize site config repo
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    site_config_dir: "{{ playbook_dir }}/../../site-config"
    autoshift_values_dir: "{{ playbook_dir }}/../../autoshift/values"
    gitlab_url: ""
    gitlab_project: "autoshift/site-config"
    git_branch: main

  tasks:
    - name: Prompt for site config directory
      ansible.builtin.pause:
        prompt: "Site config directory (default: {{ site_config_dir }})"
      register: _p
      when: site_config_dir == ''
    - name: Set site config dir
      ansible.builtin.set_fact:
        site_config_dir: "{{ _p.user_input | default(site_config_dir, true) }}"
      when: _p is not skipped

    - name: Create directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ site_config_dir }}"
        - "{{ site_config_dir }}/clustersets"
        - "{{ site_config_dir }}/clusters"

    - name: Copy global values
      ansible.builtin.copy:
        src: "{{ autoshift_values_dir }}/global.yaml"
        dest: "{{ site_config_dir }}/global.yaml"
        mode: '0644'
        force: false

    - name: Find clusterset values files
      ansible.builtin.find:
        paths: "{{ autoshift_values_dir }}/clustersets"
        patterns: "*.yaml"
        excludes: "_example*"
      register: _clusterset_files

    - name: Copy clusterset values
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ site_config_dir }}/clustersets/{{ item.path | basename }}"
        mode: '0644'
        force: false
      loop: "{{ _clusterset_files.files }}"

    - name: Create .gitignore
      ansible.builtin.copy:
        content: |
          # Ansible temp files
          *.retry
          # OS files
          .DS_Store
          # Editor files
          *.swp
          *~
          .idea/
          .vscode/
        dest: "{{ site_config_dir }}/.gitignore"
        mode: '0644'
        force: false

    - name: Initialize git repo # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git init -b {{ git_branch }}
        chdir: "{{ site_config_dir }}"
        creates: "{{ site_config_dir }}/.git"

    - name: Git add all files # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git add -A
        chdir: "{{ site_config_dir }}"
      changed_when: true

    - name: Git initial commit # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: "git commit -m 'Initial site config'"
        chdir: "{{ site_config_dir }}"
      register: _commit
      changed_when: _commit.rc == 0
      failed_when: _commit.rc != 0 and 'nothing to commit' not in _commit.stdout

    - name: Add GitLab remote # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: "git remote add origin {{ gitlab_url }}/{{ gitlab_project }}.git"
        chdir: "{{ site_config_dir }}"
      register: _remote
      changed_when: _remote.rc == 0
      failed_when: _remote.rc != 0 and 'already exists' not in _remote.stderr
      when: gitlab_url != ''

    - name: Push to GitLab # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: "git push -u origin {{ git_branch }}"
        chdir: "{{ site_config_dir }}"
      changed_when: true
      when: gitlab_url != '' and _commit is changed

    - name: Site config initialized
      ansible.builtin.debug:
        msg: |
          Site config repo initialized at: {{ site_config_dir }}

          Structure:
            {{ site_config_dir }}/
              global.yaml
              clustersets/
                hub.yaml
                managed.yaml
                ...
              clusters/
                (generated by create-cluster playbook)

          Next steps:
            1. Edit clustersets/*.yaml for your site-specific values
            2. Run bootstrap-autoshift.yaml to create the ArgoCD Application
            3. Run create-cluster.yaml to add clusters
