---
# ==============================================================================
# Initialize GitLab — One-time hub setup
# ==============================================================================
# Creates the site-config project in the on-cluster GitLab.
# Run once after GitLab is deployed on the hub.
#
# Prerequisites:
#   - GitLab running on the hub (deployed by policy or manually)
#
# Usage:
#   ansible-playbook ansible/playbooks/init-gitlab.yaml
# ==============================================================================

- name: Initialize GitLab site-config repo
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../vars/shared.yaml"

  roles:
    - init-gitlab
