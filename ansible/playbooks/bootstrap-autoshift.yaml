---
# ==============================================================================
# Bootstrap AutoShift — One-time setup
# ==============================================================================
# Creates the multi-source ArgoCD Application that connects:
#   - AutoShift chart from OCI registry
#   - Site-specific values from a git repo (GitLab on-cluster)
#
# Usage:
#   ansible-playbook ansible/playbooks/bootstrap-autoshift.yaml \
#     -e oci_chart_version=1.0.0 \
#     -e site_config_repo=https://gitlab.apps.cluster.example.com/autoshift/site-config.git
#
# From AAP:
#   Set variables via survey or inventory.
#
# Prerequisites:
#   - OpenShift GitOps installed (ArgoCD 2.8+)
#   - AutoShift chart published to OCI registry
#   - Site config repo created with initial values files
#   - kubernetes.core collection installed
# ==============================================================================

- name: Bootstrap AutoShift
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    argocd_app_name: autoshift
    argocd_namespace: openshift-gitops
    oci_registry: "oci://quay.io/autoshift"
    oci_chart_version: ""
    site_config_repo: ""
    site_config_branch: main
    site_config_dir: "{{ playbook_dir }}/../../site-config"

    # Base values files that always get included (paths relative to site config repo root)
    base_value_files:
      - global.yaml
      - clustersets/hub.yaml
      - clustersets/managed.yaml

  tasks:
    - name: Prompt for OCI chart version
      ansible.builtin.pause:
        prompt: "AutoShift OCI chart version (e.g., 1.0.0)"
      register: _p
      when: oci_chart_version == ''
    - name: Set chart version
      ansible.builtin.set_fact:
        oci_chart_version: "{{ _p.user_input }}"
      when: _p is not skipped

    - name: Prompt for site config repo URL
      ansible.builtin.pause:
        prompt: "Site config git repo URL (e.g., https://gitlab.apps.cluster.example.com/autoshift/site-config.git)"
      register: _p
      when: site_config_repo == ''
    - name: Set site config repo
      ansible.builtin.set_fact:
        site_config_repo: "{{ _p.user_input }}"
      when: _p is not skipped

    - name: Validate required fields
      ansible.builtin.assert:
        that:
          - oci_chart_version != ''
          - site_config_repo != ''
        fail_msg: "oci_chart_version and site_config_repo are required"

    - name: Run bootstrap role
      ansible.builtin.include_role:
        name: bootstrap-autoshift
