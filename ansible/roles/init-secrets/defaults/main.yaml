---
# init-secrets role defaults

# Namespace for cluster install secrets
init_secrets_namespace: cluster-install-secrets

# BMC credentials — reuses idrac_user/idrac_pass from vault if set
init_secrets_bmc_secret_name: default-bmc-cred
init_secrets_bmc_username: "{{ idrac_user | default('') }}"
init_secrets_bmc_password: "{{ idrac_pass | default('') }}"

# Registry credentials (generates dockerconfigjson pull secret)
init_secrets_pull_secret_name: default-pull-secret
init_secrets_registry: ""
init_secrets_registry_user: ""
init_secrets_registry_pass: ""

# SSH key
init_secrets_ssh_per_cluster: false
init_secrets_ssh_generate: true
init_secrets_ssh_key_type: ecdsa
init_secrets_ssh_key_bits: 521
init_secrets_ssh_private_key: ""
init_secrets_ssh_public_key: ""

# JFrog Artifactory keys
init_secrets_jfrog_keys: false
init_secrets_jfrog_namespace: jfrog-system
