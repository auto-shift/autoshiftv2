---
# discover-hardware role defaults

# List of iDRAC IPs to discover
idrac_hosts: []

# iDRAC credentials — set these in an ansible-vault encrypted file
# Create: ansible-vault create ansible/vault.yaml
# Contents:
#   idrac_user: admin
#   idrac_pass: changeme
idrac_user: ''
idrac_pass: ''

# Redfish connection settings
redfish_verify_ssl: false
redfish_timeout: 30

# BMC prefix for generated config
default_bmc_prefix: redfish-virtualmedia
default_bmc_endpoint: '/redfish/v1/Systems/1'

# Filter NICs — skip iDRAC management interfaces
skip_nic_patterns:
  - 'iDRAC'
  - 'USB'
