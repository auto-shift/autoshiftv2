---
- name: Verify DHCP + MAC output
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    site_config_dir: "{{ molecule_ephemeral_directory }}/site-config"
    values_file: "{{ site_config_dir }}/clusters/dhcp-cluster.yaml"

  tasks:
    - name: Load generated values
      ansible.builtin.slurp:
        src: "{{ values_file }}"
      register: _raw

    - name: Parse YAML
      ansible.builtin.set_fact:
        cfg: "{{ (_raw.content | b64decode | from_yaml).clusters['dhcp-cluster'].config }}"

    # --- DHCP mode ---
    - name: Cluster VLAN is DHCP
      ansible.builtin.assert:
        that:
          - cfg.networking.interfaces['cluster-vlan'].ipv4 == 'dhcp'

    - name: Storage VLAN is DHCP
      ansible.builtin.assert:
        that:
          - cfg.networking.interfaces['storage-vlan'].ipv4 == 'dhcp'

    - name: No per-host networking block when DHCP
      ansible.builtin.assert:
        that:
          - cfg.hosts['master-0'].networking is not defined
        fail_msg: "Hosts should not have networking.interfaces when both VLANs are DHCP"

    # --- MAC-based port selection ---
    - name: NIC 1 has MAC set
      ansible.builtin.assert:
        that:
          - cfg.networking.interfaces.nic1.mac == 'aa:bb:cc:00:00:01'

    - name: NIC 2 has MAC set
      ansible.builtin.assert:
        that:
          - cfg.networking.interfaces.nic2.mac == 'aa:bb:cc:00:00:02'

    # --- Bond mode ---
    - name: Bond mode is active-backup
      ansible.builtin.assert:
        that:
          - cfg.networking.interfaces['cluster-bond'].mode == 'active-backup'

    # --- Validate YAML structure ---
    - name: Values file is valid YAML
      ansible.builtin.assert:
        that:
          - cfg is mapping
          - cfg.clusterInstall.platform == 'baremetal'
          - cfg.networking.interfaces | length > 0
          - cfg.hosts | length == 3

    - name: Each host has required fields
      ansible.builtin.assert:
        that:
          - item.value.bmcIP is string
          - item.value.bootMACAddress is string
          - item.value.interfaces | length > 0
      loop: "{{ cfg.hosts | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
