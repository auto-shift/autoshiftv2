---
# Bootstrap AutoShift — creates the multi-source ArgoCD Application
# Run once per site to connect the OCI chart to the site config repo.

- name: Discover existing cluster value files
  ansible.builtin.find:
    paths: "{{ site_config_dir }}/clusters"
    patterns: "*.yaml"
  register: _cluster_files

- name: Build cluster value files list
  ansible.builtin.set_fact:
    cluster_value_files: "{{ _cluster_files.files | map(attribute='path') | map('basename') | map('regex_replace', '^', 'clusters/') | list }}"

- name: Render ArgoCD Application manifest
  ansible.builtin.template:
    src: argocd-application.yaml.j2
    dest: "{{ site_config_dir }}/application.yaml"
    mode: '0644'

- name: Apply ArgoCD Application
  kubernetes.core.k8s:
    state: present
    src: "{{ site_config_dir }}/application.yaml"
  when: apply_to_cluster | default(true) | bool

- name: Display Application manifest
  ansible.builtin.debug:
    msg: "{{ lookup('file', site_config_dir ~ '/application.yaml') }}"
