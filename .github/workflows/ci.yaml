name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Dry-run packaging
        run: |
          echo "=== Dry-run chart packaging ==="
          make package-only VERSION=0.0.0-ci
          echo ""
          echo "Packaged charts:"
          find .helm-charts -name "*.tgz" | sort

      - name: Verify dynamic chart discovery
        run: |
          echo "=== Verifying Makefile dynamic discovery ==="

          # Count bootstrap charts (root-level Chart.yaml excluding policies/ and autoshift/)
          # This matches the Makefile's BOOTSTRAP_CHARTS discovery
          BOOTSTRAP_DIRS=$(find . -maxdepth 2 -name Chart.yaml -not -path "./policies/*" -not -path "./autoshift/*" | wc -l | tr -d ' ')
          # Policy charts live at policies/<category>/<chart>/Chart.yaml (depth 3)
          POLICY_DIRS=$(find policies -maxdepth 3 -name Chart.yaml | wc -l | tr -d ' ')

          BOOTSTRAP_CHARTS=$(ls .helm-charts/bootstrap/*.tgz 2>/dev/null | wc -l | tr -d ' ')
          POLICY_CHARTS=$(ls .helm-charts/policies/*.tgz 2>/dev/null | wc -l | tr -d ' ')

          echo "Bootstrap: $BOOTSTRAP_DIRS source charts -> $BOOTSTRAP_CHARTS packaged"
          echo "Policies: $POLICY_DIRS source charts -> $POLICY_CHARTS packaged"

          # Verify all charts were packaged
          if [ "$BOOTSTRAP_DIRS" != "$BOOTSTRAP_CHARTS" ]; then
            echo "::error::Bootstrap chart count mismatch! Expected $BOOTSTRAP_DIRS, got $BOOTSTRAP_CHARTS"
            echo "Source charts:"
            find . -maxdepth 2 -name Chart.yaml -not -path "./policies/*" -not -path "./autoshift/*"
            echo "Packaged charts:"
            ls .helm-charts/bootstrap/*.tgz 2>/dev/null || echo "(none)"
            exit 1
          fi

          if [ "$POLICY_DIRS" != "$POLICY_CHARTS" ]; then
            echo "::error::Policy chart count mismatch! Expected $POLICY_DIRS, got $POLICY_CHARTS"
            exit 1
          fi

          echo "All charts discovered and packaged correctly"

      - name: Verify policy-list.txt generation
        run: |
          echo "=== Verifying policy-list.txt ==="

          if [ ! -f autoshift/files/policy-list.txt ]; then
            echo "::error::policy-list.txt not generated!"
            exit 1
          fi

          POLICY_COUNT=$(wc -l < autoshift/files/policy-list.txt | tr -d ' ')
          EXPECTED=$(find policies -maxdepth 3 -name Chart.yaml | wc -l | tr -d ' ')

          echo "policy-list.txt contains $POLICY_COUNT entries"
          echo "Expected $EXPECTED policies"

          if [ "$POLICY_COUNT" != "$EXPECTED" ]; then
            echo "::error::policy-list.txt count mismatch!"
            echo "Contents:"
            cat autoshift/files/policy-list.txt
            exit 1
          fi

          echo "policy-list.txt generated correctly"
          echo "Policies:"
          cat autoshift/files/policy-list.txt

  validate-policies:
    name: Validate policy rendering and config (ACM resolver)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/go.mod
          cache: true
          cache-dependency-path: tools/go.sum

      - name: Validate policy name lengths
        run: |
          echo "=== Validating policy name lengths (max 40 chars) ==="
          FAILED=0
          while IFS= read -r file; do
            while IFS= read -r name; do
              len=${#name}
              if [ "$len" -gt 40 ]; then
                echo "::error file=$file::Policy name '$name' is $len chars (max 40). Combined with a 20-char namespace this exceeds ACM's 62-char limit."
                FAILED=1
              fi
            done < <(grep -oP '(?<=\$policyName := ")[^"]+' "$file" 2>/dev/null || true)
          done < <(find policies -name "*.yaml")
          [ "$FAILED" -eq 0 ] && echo "All policy names within limit" || exit 1

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Run govulncheck
        working-directory: tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Validate policies (render, hub/spoke resolution, config coverage, label contract)
        working-directory: tools
        run: go test -tags integration ./... -v -count=1
        env:
          LABEL_REPORT_OUTPUT: ${{ github.workspace }}/label-contract-report.md

      - name: Upload label contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: label-contract-report
          path: label-contract-report.md
          if-no-files-found: warn
