{{- $labels := (include "bootstrap.hubLabels" .) | fromYaml }}
apiVersion: operator.open-cluster-management.io/v1
kind: MultiClusterHub
metadata:
  name: multiclusterhub
  namespace: {{ include "bootstrap.acm.namespace" . }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "25"
spec:
  availabilityConfig: {{ index $labels "acm-availability-config" | default "High" }}
