site_name: AutoShift Documentation
site_description: Infrastructure as Code for OpenShift using GitOps and ACM

repo_name: auto-shift/autoshiftv2
repo_url: https://github.com/auto-shift/autoshiftv2
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mike:
      version_selector: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/auto-shift/autoshiftv2

nav:
  - Home: README.md
  - Quick Start: quickstart.md
  - Configuration:
    - Values Reference: values-reference.md
  - Operations:
    - Releases & OCI: releases.md
    - Gradual Rollout: gradual-rollout.md
  - Development:
    - Developer Guide: developer-guide.md
