# =============================================================================
# Bootstrap values for the initial ACM install (hand-maintained)
# =============================================================================
# The ACM policy is a PolicyGenerator dir (policies/stable/advanced-cluster-management/),
# which carries its acm.* config as baked-in literals. This bootstrap chart is therefore
# NOT auto-generated — it is the source of truth for the one-time helm install of ACM.
# Keep the values below aligned with the PG manifests' literals when bumping channels/versions.
# =============================================================================

# Bootstrap-specific settings
ignoreHelmHooks: false

# Job image for waiting for CRD
# Use internal registry for disconnected environments
image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest

acm:
  namespace: open-cluster-management
  channel: release-2.15
  sourceNamespace: openshift-marketplace
  source: redhat-operators
  name: advanced-cluster-management
  disable_hub_self_management: false
  availabilityConfig: High
  enable_backup: false
  gitops_namespace: openshift-gitops
  provisioning:
    # storage_class:
    database_size: 10Gi
    filesystem_storage_size: 100Gi
    image_storage_size: 50Gi
    # hubClusterSets:
    #   hub:
    #     labels:
    #       test1: 'test'
    # managedClusterSets:
    #   sandbox:
    #     labels:
    #       test3: 'test'
    #   managed:
    #     labels:
    #       test4: 'test'
  installPlanApproval: Automatic
