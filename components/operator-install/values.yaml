# Shared operator-install: the OperatorPolicy STRUCTURE lives here — change it once and every operator
# that uses this chart changes. Each VALUE is supplied by the caller and may be an ACM lookup
# ({{hub}} / {{ }}) OR a plain literal. The chart quotes and passes values through verbatim (it never
# `tpl`s them), so ACM template functions survive untouched and hardcoded values work the same way.
name: ""                       # operator short name (install-operator-<name>)
namespace: ""                  # install namespace
namespaces: []                 # extra namespaces to create; the install namespace is always created
remediation: enforce           # OperatorPolicy remediationAction
operatorGroupName: ""          # OperatorGroup name (defaults to namespace)
subscription:
  name: ""
  channel: ""
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  startingCSV: ""
# versions is intentionally NOT defaulted: it may be a list (hardcoded) OR a string (an ACM template
# that resolves to a list). A default would force a type and break the kustomize value merge.
