# Creates the MultiClusterObservability CR on the global hub.
#
# The capabilities block and storage/retention settings are driven by the
# rendered-config ConfigMap (<clustername>.rendered-config) under the
# "globalObservability" key. Helm values provide defaults when the ConfigMap
# key is absent.
#
# Placement: via policyset-global-observability
# Depends on: policy-global-observability-config
#
{{- $policyName := "policy-global-observability-instance" }}
{{- $policyNamespace := .Values.policy_namespace }}

{{- if .Values.hubClusterSets }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management, CA Security Assessment and Authorization
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration, CA-7 Continuous Monitoring
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-global-observability-config
      namespace: {{ $policyNamespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: global-observability-instance
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{/* Look up the rendered-config ConfigMap for this cluster */}}
            {{ "{{hub-" }} $obsConfig := index (index (fromConfigMap "{{ $policyNamespace }}" (print .ManagedClusterName ".rendered-config") "config" | default "{}") | fromYaml) "globalObservability" | default dict {{ "hub}}" }}
            {{/* Retention */}}
            {{ "{{hub-" }} $useClusterCA := ($obsConfig).useClusterCA | default false {{ "hub}}" }}
            {{ "{{hub-" }} $retentionRaw := index $obsConfig "retentionResolutionRaw" | default "{{ .Values.globalObservability.retentionResolutionRaw }}" {{ "hub}}" }}
            {{ "{{hub-" }} $retention5m := index $obsConfig "retentionResolution5m" | default "{{ .Values.globalObservability.retentionResolution5m }}" {{ "hub}}" }}
            {{ "{{hub-" }} $retention1h := index $obsConfig "retentionResolution1h" | default "{{ .Values.globalObservability.retentionResolution1h }}" {{ "hub}}" }}
            {{/* Storage sizes */}}
            {{ "{{hub-" }} $alertmanagerSize := index $obsConfig "alertmanagerStorageSize" | default "{{ .Values.globalObservability.alertmanagerStorageSize }}" {{ "hub}}" }}
            {{ "{{hub-" }} $compactSize := index $obsConfig "compactStorageSize" | default "{{ .Values.globalObservability.compactStorageSize }}" {{ "hub}}" }}
            {{ "{{hub-" }} $receiveSize := index $obsConfig "receiveStorageSize" | default "{{ .Values.globalObservability.receiveStorageSize }}" {{ "hub}}" }}
            {{ "{{hub-" }} $ruleSize := index $obsConfig "ruleStorageSize" | default "{{ .Values.globalObservability.ruleStorageSize }}" {{ "hub}}" }}
            {{ "{{hub-" }} $storeSize := index $obsConfig "storeStorageSize" | default "{{ .Values.globalObservability.storeStorageSize }}" {{ "hub}}" }}
            {{ "{{hub-" }} $storageClass := index $obsConfig "storageClass" | default "" {{ "hub}}" }}
            {{ "{{hub-" }} $enableDownSampling := index $obsConfig "enableDownSampling" | default "{{ .Values.globalObservability.enableDownSampling }}" {{ "hub}}" }}
            {{ "{{hub-" }} $interval := index $obsConfig "interval" | default {{ ((.Values).globalObservability).interval | default 300 }}  {{ "hub}}" }}
            {{ "{{hub-" }} $scrapeSizeLimitBytes := index $obsConfig "scrapeSizeLImitbytes" | default {{ .Values.globalObservability.scrapeSizeLimitBytes }} {{ "hub}}" }}
            {{ "{{hub-" }} $scrapeWorkers := index $obsConfig "scrapeWorkers" | default {{ .Values.globalObservability.workers }} {{ "hub}}" }}
            {{/* Capabilities toggles — each defaults to true unless overridden in rendered-config */}}
            {{ "{{hub-" }} $capabilities := index $obsConfig "capabilities" | default dict {{ "hub}}" }}
            {{ "{{hub-" }} $platformAnalytics := index $capabilities "platformAnalytics" | default "true" {{ "hub}}" }}
            {{ "{{hub-" }} $platformLogs := index $capabilities "platformLogs" | default "true" {{ "hub}}" }}
            {{ "{{hub-" }} $platformMetrics := index $capabilities "platformMetrics" | default "true" {{ "hub}}" }}
            {{ "{{hub-" }} $userWorkloadLogs := index $capabilities "userWorkloadLogs" | default "true" {{ "hub}}" }}
            {{ "{{hub-" }} $userWorkloadMetrics := index $capabilities "userWorkloadMetrics" | default "true" {{ "hub}}" }}
            {{ "{{hub-" }} $userWorkloadTraces := index $capabilities "userWorkloadTraces" | default "true" {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: observability.open-cluster-management.io/v1beta2
                kind: MultiClusterObservability
                metadata:
                  name: observability
                spec:
                  advanced:
                    retentionConfig:
                      retentionResolution1h: {{ "{{hub" }} $retention1h {{ "hub}}" }}
                      retentionResolution5m: {{ "{{hub" }} $retention5m {{ "hub}}" }}
                      retentionResolutionRaw: {{ "{{hub" }} $retentionRaw {{ "hub}}" }}
                  {{ "{{hub-" }} if or (eq $platformAnalytics "true") (eq $platformLogs "true") (eq $platformMetrics "true") (eq $userWorkloadLogs "true") (eq $userWorkloadMetrics "true") (eq $userWorkloadTraces "true") {{ "hub}}" }}
                  capabilities:
                    {{ "{{hub-" }} if or (eq $platformAnalytics "true") (eq $platformLogs "true") (eq $platformMetrics "true") {{ "hub}}" }}
                    platform:
                      {{ "{{hub" }} if eq $platformAnalytics "true" {{ "hub}}" }}
                      analytics:
                        incidentDetection: {}
                        namespaceRightSizingRecommendation: {}
                        virtualizationRightSizingRecommendation: {}
                      {{ "{{hub" }} end {{ "hub}}" }}
                      {{ "{{hub" }} if eq $platformLogs "true" {{ "hub}}" }}
                      logs:
                        collection: {}
                      {{ "{{hub" }} end {{ "hub}}" }}
                      {{ "{{hub" }} if eq $platformMetrics "true" {{ "hub}}" }}
                      metrics:
                        default:
                          enabled: true
                        ui: {}
                      {{ "{{hub" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} if or (eq $userWorkloadLogs "true") (eq $userWorkloadMetrics "true") (eq $userWorkloadTraces "true") {{ "hub}}" }}
                    userWorkloads:
                      {{ "{{hub" }} if eq $userWorkloadLogs "true" {{ "hub}}" }}
                      logs:
                        collection:
                          clusterLogForwarder: {}
                      {{ "{{hub" }} end {{ "hub}}" }}
                      {{ "{{hub" }} if eq $userWorkloadMetrics "true" {{ "hub}}" }}
                      metrics:
                        default:
                          enabled: true
                      {{ "{{hub" }} end {{ "hub}}" }}
                      {{ "{{hub" }} if eq $userWorkloadTraces "true" {{ "hub}}" }}
                      traces:
                        collection:
                          collector: {}
                          instrumentation: {}
                      {{ "{{hub" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  enableDownsampling: {{ "{{hub" }} $enableDownSampling {{ "hub}}" }}
                  imagePullPolicy: IfNotPresent
                  imagePullSecret: multiclusterhub-operator-pull-secret
                  observabilityAddonSpec:
                    enableMetrics: true
                    interval: {{ "{{hub" }} $interval {{ "hub}}" }}
                    scrapeSizeLimitBytes: {{ "{{hub" }} $scrapeSizeLimitBytes {{ "hub}}" }}
                    workers: {{ "{{hub" }} $scrapeWorkers {{ "hub}}" }}
                  storageConfig:
                    alertmanagerStorageSize: {{ "{{hub" }} $alertmanagerSize {{ "hub}}" }}
                    compactStorageSize: {{ "{{hub" }} $compactSize {{ "hub}}" }}
                    metricObjectStorage:
                      key: thanos.yaml
                      name: thanos-object-storage
                    {{ "{{hub-" }} if $useClusterCA {{ "hub}}" }}
                      tlsSecretMountPath: /var/run/secrets/kubernetes.io/serviceaccount
                      tlsSecretName: ca-bundle
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    receiveStorageSize: {{ "{{hub" }} $receiveSize {{ "hub}}" }}
                    ruleStorageSize: {{ "{{hub" }} $ruleSize {{ "hub}}" }}
                    {{ "{{hub-" }} if $storageClass {{ "hub}}" }}
                    storageClass: {{ "{{hub" }} $storageClass {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    storeStorageSize: {{ "{{hub" }} $storeSize {{ "hub}}" }}
{{- end }}
