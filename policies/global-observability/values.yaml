### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# global-observability<bool>: 'true' or 'false' - Enable MultiCluster Observability on the hub (default: 'false')
#
# Configuration:
# global-observability-storage-class<String>: Storage class for Thanos persistent volumes (optional, uses cluster default if unset)
# global-observability-retention-raw<String>: Retention for raw resolution metrics (default: '5d')
# global-observability-retention-5m<String>: Retention for 5m resolution metrics (default: '14d')
# global-observability-retention-1h<String>: Retention for 1h resolution metrics (default: '30d')
# global-observability-alertmanager-storage-size<String>: Alertmanager PVC size (default: '10Gi')
# global-observability-compact-storage-size<String>: Compactor PVC size (default: '10Gi')
# global-observability-receive-storage-size<String>: Receiver PVC size (default: '10Gi')
# global-observability-rule-storage-size<String>: Rule PVC size (default: '10Gi')
# global-observability-store-storage-size<String>: Store PVC size (default: '10Gi')
#
# Spoke Agent (placed on regional hubs):
# global-observability-spoke-agent<bool>: 'true' or 'false' - Patch PrometheusAgent on this hub to forward metrics to global hub
# global-observability-remote-write-url<String>: Global hub observatorium API URL for remote-write (required when spoke-agent is enabled)
#
# Prerequisites:
# - Cluster Observability Operator must be installed on reporting clusters
# - The MultiClusterHub must have multicluster-observability enabled
# - A thanos-object-storage secret must exist in open-cluster-management-observability namespace
# - A ca-bundle secret must exist in open-cluster-management-observability namespace
#
# Examples:
# autoshift.io/global-observability: 'true'
# autoshift.io/global-observability-storage-class: 'gp3-csi'
# autoshift.io/global-observability-retention-raw: '7d'
