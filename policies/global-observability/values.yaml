# Default values for global-observability.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
globalObservability:
    namespace: open-cluster-management-observability
    # CA bundle source — copied into a Secret for Thanos S3 TLS verification
    caBundle:
      sourceName: user-ca-bundle        # ConfigMap name in openshift-config
      sourceKey: ca-bundle.crt           # key within the ConfigMap
    # Thanos object storage — S3 credentials copied from a source secret
    thanosStorage:
      source:
        namespace: ""                    # namespace of the source secret containing S3 credentials
        secretName: ""                   # name of the source secret
        accessKeyField: AWS_ACCESS_KEY_ID
        secretKeyField: AWS_SECRET_ACCESS_KEY
      bucket: acm-dr
      endpoint: ""                       # s3 endpoint hostname (e.g. s3.example.com)
      insecure: false
    retentionResolutionRaw: 5d
    retentionResolution5m: 14d
    retentionResolution1h: 30d
    enableDownsampling: true
    scrapeInterval: 300s
    scrapeSizeLimitBytes: "1073741824"
    workers: 1
    alertmanagerStorageSize: 10Gi
    compactStorageSize: 10Gi
    receiveStorageSize: 10Gi
    ruleStorageSize: 10Gi
    storeStorageSize: 10Gi
    # Spoke agent — patches regional hub PrometheusAgent to add global hub remote-write
    spokeAgent:
      # Name of the MCOA PrometheusAgent on regional hubs to patch
      prometheusAgentName: mcoa-default-platform-metrics-collector-global
      # Secrets to mount on the PrometheusAgent for global hub mTLS
      # These must be pre-replicated to each regional hub's MCO namespace
      secrets:
        - global-observability-secrets
        - observability-managed-cluster-certs
        - observability-controller-open-cluster-management.io-observability-signer-client-cert
      remoteWrite:
        name: acm-global-observability
        remoteTimeout: 30s
        caFile: /etc/prometheus/secrets/global-observability-secrets/ca.crt
        certFile: /etc/prometheus/secrets/global-observability-secrets/tls.crt
        keyFile: /etc/prometheus/secrets/global-observability-secrets/tls.key
