{{- $policyNamespace := $.Values.policy_namespace }}
{{- $policyName := "policy-gitlab-argocd-config" }}
{{- $placementName := (printf "placement-%s" $policyName) }}
{{- $gitopsNamespace := $.Values.gitopsNamespace | default "openshift-gitops" }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
      name: policy-gitlab-instance
      namespace: '{{ $policyNamespace }}'
  policy-templates:
    {{- /* ===== ArgoCD repo secret for the autoshiftv2 repo ===== */}}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: gitlab-argocd-repo-autoshift
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{-" }} $ingressDomain := (lookup "config.openshift.io/v1" "Ingress" "" "cluster").spec.domain {{ "}}" }}
            {{ "{{-" }} $gitlabUrl := (printf "https://gitlab.%s" $ingressDomain) {{ "}}" }}
            {{ "{{-" }} $repoUrl := (printf "%s/autoshift/autoshiftv2.git" $gitlabUrl) {{ "}}" }}
            {{ "{{-" }} $password := (fromSecret "{{ .Values.gitlab.namespace }}" "gitlab-gitlab-initial-root-password" "password" | base64dec) {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: gitlab-repo-autoshift
                  namespace: {{ $gitopsNamespace }}
                  labels:
                    argocd.argoproj.io/secret-type: repository
                type: Opaque
                stringData:
                  url: {{ "{{" }} $repoUrl {{ "}}" }}
                  username: root
                  password: {{ "{{" }} $password {{ "}}" }}
                  insecure: "true"
                  type: git
    {{- /* ===== ArgoCD repo secret for the site-config repo ===== */}}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: gitlab-argocd-repo-site-config
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{-" }} $ingressDomain := (lookup "config.openshift.io/v1" "Ingress" "" "cluster").spec.domain {{ "}}" }}
            {{ "{{-" }} $gitlabUrl := (printf "https://gitlab.%s" $ingressDomain) {{ "}}" }}
            {{ "{{-" }} $repoUrl := (printf "%s/autoshift/site-config.git" $gitlabUrl) {{ "}}" }}
            {{ "{{-" }} $password := (fromSecret "{{ .Values.gitlab.namespace }}" "gitlab-gitlab-initial-root-password" "password" | base64dec) {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: gitlab-repo-site-config
                  namespace: {{ $gitopsNamespace }}
                  labels:
                    argocd.argoproj.io/secret-type: repository
                type: Opaque
                stringData:
                  url: {{ "{{" }} $repoUrl {{ "}}" }}
                  username: root
                  password: {{ "{{" }} $password {{ "}}" }}
                  insecure: "true"
                  type: git
    {{- /* ===== ArgoCD TLS cert for GitLab ===== */}}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: gitlab-argocd-tls-cert
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{-" }} $ingressDomain := (lookup "config.openshift.io/v1" "Ingress" "" "cluster").spec.domain {{ "}}" }}
            {{ "{{-" }} $gitlabHost := (printf "gitlab.%s" $ingressDomain) {{ "}}" }}
            {{ "{{-" }} $tlsCert := (fromSecret "{{ .Values.gitlab.namespace }}" "gitlab-wildcard-tls" "tls.crt" | base64dec) {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: argocd-tls-certs-cm
                  namespace: {{ $gitopsNamespace }}
                data:
                  {{ "{{" }} $gitlabHost {{ "}}" }}: |
                    {{ "{{" }} $tlsCert | autoindent {{ "}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ $placementName }}
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/gitlab'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ $placementName }}
  namespace: {{ $policyNamespace }}
placementRef:
  name: {{ $placementName }}
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: {{ $policyName }}
    apiGroup: policy.open-cluster-management.io
    kind: Policy
