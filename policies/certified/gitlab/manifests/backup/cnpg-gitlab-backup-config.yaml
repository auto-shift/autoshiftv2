apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: cnpg-gitlab-backup-config
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates-raw: |
    {{hub- $rcm := (lookup "v1" "ConfigMap" .PolicyMetadata.namespace (printf "%s.rendered-config" .ManagedClusterName)) | default dict hub}}
    {{hub- $rcmConfig := (index ($rcm.data | default dict) "config" | default "" | fromYaml | default dict) hub}}
    {{hub- $gitlabCfg := (index $rcmConfig "gitlab" | default dict) hub}}
    # Read OBC credentials for the backup bucket
    {{- $obcSecret := (lookup "v1" "Secret" "gitlab-system" "gitlab-db-backup") | default dict }}
    {{- $obcData := ($obcSecret.data | default dict) }}
    {{- $accessKey := (index $obcData "AWS_ACCESS_KEY_ID" | default "") }}
    {{- $secretKey := (index $obcData "AWS_SECRET_ACCESS_KEY" | default "") }}
    {{- $obcCM := (lookup "v1" "ConfigMap" "gitlab-system" "gitlab-db-backup") | default dict }}
    {{- $obcCMData := ($obcCM.data | default dict) }}
    {{- $bucketName := (index $obcCMData "BUCKET_NAME" | default "") }}
    {{- $bucketHost := (index $obcCMData "BUCKET_HOST" | default "") }}
    {{- $bucketPort := (index $obcCMData "BUCKET_PORT" | default "443") }}
    {{- $retention := "{{hub index $gitlabCfg "dbBackupRetention" | default "30d" hub}}" }}
    {{- $schedule := "{{hub index $gitlabCfg "dbBackupSchedule" | default "0 2 * * *" hub}}" }}
    {{- $caCM := (lookup "v1" "ConfigMap" "gitlab-system" "openshift-service-ca") | default dict }}
    {{- $caCert := (index ($caCM.data | default dict) "service-ca.crt" | default "") }}
    {{- if and (not (empty $accessKey)) (not (empty $bucketName)) }}
    # Create S3 endpoint CA secret for barman (CNPG endpointCA requires a Secret)
    - complianceType: musthave
      objectDefinition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: gitlab-db-backup-ca
          namespace: gitlab-system
        type: Opaque
        stringData:
          ca.crt: |
            {{ $caCert | autoindent }}
    # Create S3 credentials secret for barman
    - complianceType: musthave
      objectDefinition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: gitlab-db-backup-s3-creds
          namespace: gitlab-system
        type: Opaque
        data:
          ACCESS_KEY_ID: {{ $accessKey }}
          ACCESS_SECRET_KEY: {{ $secretKey }}
    # Patch the CNPG Cluster with backup configuration
    - complianceType: musthave
      objectDefinition:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: gitlab-db
          namespace: gitlab-system
        spec:
          backup:
            retentionPolicy: {{ $retention }}
            barmanObjectStore:
              destinationPath: s3://{{ $bucketName }}/
              endpointURL: https://{{ $bucketHost }}:{{ $bucketPort }}
              endpointCA:
                name: gitlab-db-backup-ca
                key: ca.crt
              s3Credentials:
                accessKeyId:
                  name: gitlab-db-backup-s3-creds
                  key: ACCESS_KEY_ID
                secretAccessKey:
                  name: gitlab-db-backup-s3-creds
                  key: ACCESS_SECRET_KEY
              wal:
                compression: gzip
              data:
                compression: gzip
    # Scheduled base backup
    - complianceType: musthave
      objectDefinition:
        apiVersion: postgresql.cnpg.io/v1
        kind: ScheduledBackup
        metadata:
          name: gitlab-db-scheduled-backup
          namespace: gitlab-system
        spec:
          schedule: {{ $schedule }}
          backupOwnerReference: cluster
          cluster:
            name: gitlab-db
          method: barmanObjectStore
          target: prefer-standby
          immediate: true
    {{- end }}
