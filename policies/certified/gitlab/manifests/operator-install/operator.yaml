apiVersion: policy.open-cluster-management.io/v1beta1
kind: OperatorPolicy
metadata:
  name: install-operator-gitlab
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  complianceType: musthave
  operatorGroup:
    # if operator group exists in namespace use that, otherwise use namespace name as default
    name: '{{ with (lookup "operators.coreos.com/v1" "OperatorGroup" "gitlab-system" "").items }}{{ (index . 0).metadata.name }}{{ else }}gitlab-system{{ end }}'
    namespace: gitlab-system
    targetNamespaces:
      - gitlab-system
  subscription:
    name: '{{hub index .ManagedClusterLabels "autoshift.io/gitlab-subscription-name" | default "gitlab-operator-kubernetes" hub}}'
    namespace: gitlab-system
    # Source: base from label or helm default; if disconnected-mirror is true, appends -<suffix>
    source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/gitlab-source" | default "certified-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
    sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/gitlab-source-namespace" | default "openshift-marketplace" hub}}'
    channel: '{{hub index .ManagedClusterLabels "autoshift.io/gitlab-channel" | default "stable" hub}}'
    startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/gitlab-version" | default "" hub}}'
  # Upgrade approval for subscription will be set based on if version is set not this flag
  # If version is set install plan is set to manual and only the version specified will be installed
  upgradeApproval: Automatic
  versions:
    - '{{hub index .ManagedClusterLabels "autoshift.io/gitlab-version" | default "" hub}}'
