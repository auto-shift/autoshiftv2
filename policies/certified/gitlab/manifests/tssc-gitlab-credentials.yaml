# tssc-gitlab-credentials secret (host + a root PAT) for the RHADS/TSSC flow — consumed by RHDH (the
# backstage gitlab integration) and the golden-path pipelines. A GitLab PAT can't be created declaratively,
# so — exactly like the ACS token Job — an in-cluster Job runs `gitlab-rails runner` inside the toolbox pod
# to mint a root PAT, then writes the secret. The token value never leaves the cluster and is captured by
# command substitution (never echoed to the Job log). Idempotent at the SECRET level: GitLab only exposes a
# PAT's plaintext at creation time, so if the secret is missing we revoke any stale tssc-rhads tokens and
# mint a fresh one. Only runs when dev-hub is enabled.
object-templates-raw: |
  {{hub- if eq (index .ManagedClusterLabels "autoshift.io/dev-hub" | default "false") "true" hub}}
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: create-gitlab-token
        namespace: gitlab-system
        annotations:
          argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  - complianceType: musthave
    objectDefinition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: create-gitlab-token
        namespace: gitlab-system
      rules:
        - apiGroups: ['']
          resources: [secrets]
          verbs: [get, list, create, patch, update]
        - apiGroups: ['']
          resources: [pods]
          verbs: [get, list, watch]
        - apiGroups: ['']
          resources: [pods/exec]
          verbs: [create]
        - apiGroups: [route.openshift.io]
          resources: [routes]
          verbs: [get, list]
  - complianceType: musthave
    objectDefinition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: create-gitlab-token
        namespace: gitlab-system
        annotations:
          argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: Role
        name: create-gitlab-token
      subjects:
        - kind: ServiceAccount
          name: create-gitlab-token
          namespace: gitlab-system
  # recreateOption: IfRequired — a completed Job's spec.template is immutable, so if the Job template ever
  # drifts from the live (already-finished) Job, ACM can't update it and the policy goes NonCompliant
  # (dragging the app to Degraded). Let ACM delete+recreate instead; the script is idempotent (it exits when
  # the secret already has a token), so a recreate re-runs harmlessly without rotating the PAT.
  - complianceType: musthave
    recreateOption: IfRequired
    objectDefinition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: create-gitlab-token
        namespace: gitlab-system
      spec:
        backoffLimit: 6
        template:
          metadata:
            annotations:
              argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
          spec:
            restartPolicy: Never
            serviceAccountName: create-gitlab-token
            containers:
              - name: create-gitlab-token
                image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
                imagePullPolicy: Always
                command:
                  - /bin/bash
                  - -c
                  - |
                    set -eu
                    if oc get secret tssc-gitlab-credentials -n gitlab-system -o jsonpath='{.data.token}' 2>/dev/null | grep -q .; then
                      echo "tssc-gitlab-credentials already has a token, nothing to do"; exit 0
                    fi
                    echo "Waiting for the GitLab toolbox pod..."
                    oc wait --for=condition=Ready pod -l app=toolbox -n gitlab-system --timeout=600s
                    POD=$(oc get pods -n gitlab-system -l app=toolbox -o jsonpath='{.items[0].metadata.name}')
                    HOST=$(oc get route -n gitlab-system -o jsonpath='{range .items[*]}{.spec.host}{"\n"}{end}' | grep '^gitlab\.' | head -1)
                    [ -n "$HOST" ] || { echo "no gitlab route found"; exit 1; }
                    echo "Minting root PAT via ${POD} for host ${HOST}..."
                    TOKEN=$(oc exec "$POD" -c toolbox -- gitlab-rails runner '
                      u = User.find_by_username("root")
                      u.personal_access_tokens.where(name: "tssc-rhads").update_all(revoked: true)
                      t = u.personal_access_tokens.create!(scopes: ["api", "write_repository", "read_repository"], name: "tssc-rhads", expires_at: 365.days.from_now)
                      puts "PATVALUE:#{t.token}"
                    ' | grep '^PATVALUE:' | cut -d: -f2)
                    [ -n "$TOKEN" ] || { echo "failed to mint token"; exit 1; }
                    oc create secret generic tssc-gitlab-credentials -n gitlab-system \
                      --from-literal=host="${HOST}" --from-literal=token="${TOKEN}" --from-literal=username=root \
                      --dry-run=client -o yaml | oc apply -f -
                    echo "tssc-gitlab-credentials created for ${HOST}"
  {{hub- end hub}}
