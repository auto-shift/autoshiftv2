object-templates-raw: |
  # Read the auto-generated OBC credentials and bucket info
  {{- $obcSecret := (lookup "v1" "Secret" "gitlab-system" "gitlab-objectstorage") | default dict }}
  {{- $obcData := ($obcSecret.data | default dict) }}
  {{- $accessKey := (index $obcData "AWS_ACCESS_KEY_ID" | default "" | base64dec) }}
  {{- $secretKey := (index $obcData "AWS_SECRET_ACCESS_KEY" | default "" | base64dec) }}
  {{- $obcCM := (lookup "v1" "ConfigMap" "gitlab-system" "gitlab-objectstorage") | default dict }}
  {{- $obcCMData := ($obcCM.data | default dict) }}
  {{- $bucketName := (index $obcCMData "BUCKET_NAME" | default "") }}
  {{- $bucketHost := (index $obcCMData "BUCKET_HOST" | default "") }}
  {{- $bucketPort := (index $obcCMData "BUCKET_PORT" | default "443") }}
  {{- if and (not (empty $accessKey)) (not (empty $bucketName)) }}
  # Create the GitLab object storage connection secret
  # GitLab expects this format for S3-compatible storage
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gitlab-object-storage-connection
        namespace: gitlab-system
      type: Opaque
      stringData:
        connection: |
          provider: AWS
          region: us-east-1
          aws_access_key_id: {{ $accessKey }}
          aws_secret_access_key: {{ $secretKey }}
          aws_signature_version: 4
          host: {{ $bucketHost }}
          endpoint: https://{{ $bucketHost }}:{{ $bucketPort }}
          path_style: true
  # Registry uses a separate config format
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gitlab-registry-storage
        namespace: gitlab-system
      type: Opaque
      stringData:
        config: |
          s3:
            v4auth: true
            regionendpoint: https://{{ $bucketHost }}:{{ $bucketPort }}
            pathstyle: true
            region: us-east-1
            bucket: {{ $bucketName }}
            accesskey: {{ $accessKey }}
            secretkey: {{ $secretKey }}
  # Toolbox backup/restore uses s3cmd, which needs an .s3cfg INI (not the Rails/registry formats above).
  # GitLab's chart hard-fails the CR render (checkConfig.objectStorage.backup) unless
  # gitlab.toolbox.backups.objectStorage.config points at a secret like this. Path-style + self-signed
  # NooBaa endpoint, so host_bucket omits %(bucket)s and SSL verification is disabled.
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gitlab-s3cmd-config
        namespace: gitlab-system
      type: Opaque
      stringData:
        config: |
          [default]
          access_key = {{ $accessKey }}
          secret_key = {{ $secretKey }}
          bucket_location = us-east-1
          host_base = {{ $bucketHost }}:{{ $bucketPort }}
          host_bucket = {{ $bucketHost }}:{{ $bucketPort }}
          use_https = True
          check_ssl_certificate = False
          check_ssl_hostname = False
          signature_v2 = False
  {{- end }}
