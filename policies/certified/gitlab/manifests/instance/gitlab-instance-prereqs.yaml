object-templates-raw: |
  {{- $ns := "gitlab-system" }}
  {{- $dbMode := "{{hub index .ManagedClusterLabels "autoshift.io/gitlab-db-mode" | default "managed" hub}}" }}
  {{- $redisMode := "{{hub index .ManagedClusterLabels "autoshift.io/gitlab-redis-mode" | default "managed" hub}}" }}
  {{- $objStoreMode := "{{hub index .ManagedClusterLabels "autoshift.io/gitlab-object-storage-mode" | default "managed" hub}}" }}
  {{ if eq $dbMode "external" }}
  {{/* Only pre-create gitlab-db-app for an EXTERNAL db the admin supplies. For managed (CNPG) mode
       CloudNativePG auto-generates <cluster>-app with username/password — pre-creating it empty makes
       CNPG treat it as user-supplied and leave it empty, so initdb fails "couldn't find key username". */}}
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gitlab-db-app
        namespace: {{ $ns }}
  {{ end }}
  {{ if ne $redisMode "bundled" }}
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gitlab-redis-password
        namespace: {{ $ns }}
  {{ end }}
  {{ if ne $objStoreMode "bundled" }}
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: gitlab-objectstorage
        namespace: {{ $ns }}
  {{ end }}
