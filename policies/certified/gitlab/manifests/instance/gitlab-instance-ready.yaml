apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: gitlab-instance-ready
spec:
  remediationAction: inform
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates:
    - complianceType: musthave
      objectDefinition:
        apiVersion: apps.gitlab.com/v1beta1
        kind: GitLab
        metadata:
          name: gitlab
          namespace: gitlab-system
        status:
          phase: Running
