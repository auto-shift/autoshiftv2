apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-gitlab-redis
  namespace: ${POLICY_NAMESPACE}
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/gitlab'
              operator: In
              values:
                - 'true'
            - key: 'autoshift.io/gitlab-redis-mode'
              operator: NotIn
              values:
                - 'bundled'
                - 'external'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
