apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Renders the shared components/operator-install chart. Visible per-operator ACM lookups below.
helmGlobals:
  chartHome: ../../../../components/
helmCharts:
  - name: operator-install
    releaseName: cloudnative-pg
    valuesInline:
      name: cloudnative-pg
      namespace: openshift-operators
      remediation: ${REMEDIATION}
      subscription:
        name: '{{hub index .ManagedClusterLabels "autoshift.io/cloudnative-pg-subscription-name" | default "cloudnative-pg" hub}}'
        channel: '{{hub index .ManagedClusterLabels "autoshift.io/cloudnative-pg-channel" | default "stable-v1" hub}}'
        source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/cloudnative-pg-source" | default "certified-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
        sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/cloudnative-pg-source-namespace" | default "openshift-marketplace" hub}}'
        startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/cloudnative-pg-version" | default "" hub}}'
      versions: '{{hub compact (list (index .ManagedClusterLabels "autoshift.io/cloudnative-pg-version" | default "")) | toRawJson | toLiteral hub}}'
