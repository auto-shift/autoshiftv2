{{- $policyName := "policy-nvidia-cluster-policy-deploy" }}
{{- $placementName := "placement-policy-nvidia-cluster-policy-deploy" }}

apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ .Values.policy_namespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-nvidia-gpu-license-secret
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: nvidia-cluster-policy-deploy
        spec:
          remediationAction: enforce
          severity: high
          object-templates-raw: |
            {{ "{{hub-" }} $configs := index (index (fromConfigMap "{{ $.Values.policy_namespace }}" (print .ManagedClusterName ".rendered-config") "config" | default "" | fromYaml) "nvidiaGPU" | default list) {{ "hub}}" }}
            {{ "{{hub-" }} range $nvidia := $configs {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                kind: ClusterPolicy
                apiVersion: nvidia.com/v1
                metadata:
                  name: gpu-cluster-policy
                spec:
                  operator:
                    use_ocp_driver_toolkit: true
                  cdi:
                    enabled: {{ "{{hub"}} $nvidia.cdi | default "true" {{ "hub}}" }}
                    nriPluginEnabled: false
                  sandboxWorkloads:
                    enabled: {{ "{{hub"}} $nvidia.sandboxWorkloads | default "false" {{ "hub}}" }}
                    defaultWorkload: container
                    mode: kubevirt
                  driver:
                    enabled: {{ "{{hub"}} $nvidia.driver | default "true" {{ "hub}}" }}
                    useNvidiaDriverCRD: false
                    kernelModuleType: auto
                    upgradePolicy:
                      autoUpgrade: true
                      drain:
                        deleteEmptyDir: false
                        enable: false
                        force: false
                        timeoutSeconds: 300
                      maxParallelUpgrades: 1
                      maxUnavailable: 25%
                      podDeletion:
                        deleteEmptyDir: false
                        force: false
                        timeoutSeconds: 300
                      waitForCompletion:
                        timeoutSeconds: 0
                    repoConfig:
                      configMapName: ''
                    certConfig:
                      name: ''
                  {{ "{{hub-" }} if not (empty $.nvidia.licenseSecretName {{ "hub}}" }}
                    licensingConfig:
                      nlsEnabled: true
                      secretName: {{ "{{hub"}} $nvidia.licenseSecretName {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                    virtualTopology:
                      config: ''
                    kernelModuleConfig:
                      name: ''
                  dcgmExporter:
                    enabled: {{ "{{hub"}} $nvidia.dcgmExporter | default "true" {{ "hub}}" }}
                    config:
                      name: ''
                    serviceMonitor:
                      enabled: {{ "{{hub"}} $nvidia.dcgmExporterServiceMonitor | default "true" {{ "hub}}" }}
                  dcgm:
                    enabled: {{ "{{hub"}} $nvidia.dcgm | default "true" {{ "hub}}" }}
                  daemonsets:
                    updateStrategy: RollingUpdate
                    rollingUpdate:
                      maxUnavailable: '1'
                  devicePlugin:
                    enabled: {{ "{{hub"}} $nvidia.devicePlugin | default "true" {{ "hub}}" }}
                    config:
                      name: ''
                      default: ''
                    mps:
                      root: /run/nvidia/mps
                  gfd:
                    enabled: {{ "{{hub"}} $nvidia.gfd | default "true" {{ "hub}}" }}
                  migManager:
                    enabled: {{ "{{hub"}} $nvidia.migManager | default "true" {{ "hub}}" }}
                  nodeStatusExporter:
                    enabled: {{ "{{hub"}} $nvidia.nodeStatusExporter | default "true" {{ "hub}}" }}
                  mig:
                    strategy: {{ "{{hub"}} $nvidia.migsStrategy | default "single" {{ "hub}}" }}
                  toolkit:
                    enabled: {{ "{{hub"}} $nvidia.toolkit | default "true" {{ "hub}}" }}
                  validator:
                    plugin:
                      env: []
                  vgpuManager:
                    enabled: {{ "{{hub"}} $nvidia.vgpuManager | default "false" {{ "hub}}" }}
                  vgpuDeviceManager:
                    enabled: {{ "{{hub"}} $nvidia.vgpuDeviceManager | default "true" {{ "hub}}" }}
                  sandboxDevicePlugin:
                    enabled: {{ "{{hub"}} $nvidia.sandboxDevicePlugin | default "true" {{ "hub}}" }}
                  kataSandboxDevicePlugin:
                    enabled: {{ "{{hub"}} $nvidia.kataSandboxDevicePlugin | default "true" {{ "hub}}" }}
                  vfioManager:
                    enabled: {{ "{{hub"}} $nvidia.vfioManager | default "true" {{ "hub}}" }}
                  ccManager:
                    enabled: {{ "{{hub"}} $nvidia.ccManager | default "true" {{ "hub}}" }}
                  gds:
                    enabled: {{ "{{hub"}} $nvidia.gds | default "false" {{ "hub}}" }}
                  gdrcopy:
                    enabled: {{ "{{hub"}} $nvidia.gdrcopy | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: nvidia-gpu-deploy-test
          namespace: {{ .Values.policy_namespace }}
        spec:
          remediationAction: inform # will be overridden by remediationAction in parent policy
          severity: high
          object-templates-raw: |
            - complianceType: musthave
              objectDefinition:
                apiVersion: nvidia.com/v1
                kind: ClusterPolicy
                metadata:
                  name: gpu-cluster-policy
                status:
                  state: ready
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ $placementName }}
  namespace: {{ .Values.policy_namespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/nvidia-gpu'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ $placementName }}
  namespace: {{ .Values.policy_namespace }}
placementRef:
  name: {{ $placementName }}
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: {{ $policyName }}
    apiGroup: policy.open-cluster-management.io
    kind: Policy
