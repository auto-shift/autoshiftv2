apiVersion: policy.open-cluster-management.io/v1beta1
kind: OperatorPolicy
metadata:
  name: install-operator-jfrog
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  complianceType: musthave
  operatorGroup:
    # if operator group exists in namespace use that, otherwise use namespace name as default
    name: '{{ with (lookup "operators.coreos.com/v1" "OperatorGroup" "jfrog-system" "").items }}{{ (index . 0).metadata.name }}{{ else }}jfrog-system{{ end }}'
    namespace: jfrog-system
    targetNamespaces:
      - jfrog-system
  subscription:
    name: '{{hub index .ManagedClusterLabels "autoshift.io/jfrog-subscription-name" | default "openshiftartifactoryha-operator" hub}}'
    namespace: jfrog-system
    # Source: base from label or default; if disconnected-mirror is true, append -<mirror suffix>.
    source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/jfrog-source" | default "certified-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
    sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/jfrog-source-namespace" | default "openshift-marketplace" hub}}'
    channel: '{{hub index .ManagedClusterLabels "autoshift.io/jfrog-channel" | default "alpha" hub}}'
    startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/jfrog-version" | default "" hub}}'
  # Version drives upgrade approval: if a version is set the install plan is manual and pinned.
  upgradeApproval: Automatic
  versions:
    - '{{hub index .ManagedClusterLabels "autoshift.io/jfrog-version" | default "" hub}}'
