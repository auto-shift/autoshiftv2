
# Example cluster config for the networking template
# clusterName: "name for the cluster, sans basedomain: example 'vacle-clu-ocpv-1l, refer to: " 
# baseDomain: "base domain for the cluster, example: 'va.gov'"
# openshiftVersion: "The version of openshift to install, example: '4.19.9'"
# apiVip: "the VIP representing the api.<clusterName>.<baseDomain> dns entry"
# ingressVip: "the VIP representing the *.apps.<clusterName>.<baseDomain> dns entry"
# pullSecretRef: "the name of an existing secret to copy the pull secret from"
# bmcCredentialRef: "the name of an existing secret to copy the bmc credentials from, will be overridden by any individual host configuation"
# cpuArch: "cpu architecture for the target cluster, example: 'x86_64'"
# clusterImageSet: "The name of the existing cluster image set to use, will suppress values for openshiftVersion and cpuArch"
# managedClusterSet: "The name of the clusterset to add the cluster to, example: 'default'"
# ntpSources: "a list of ips that represent ntp sources"
#   - 10.236.6.40
#   - 10.237.6.40
#   - 10.238.6.41
#   - 10.239.6.40
#   - 10.238.6.40
#   - 10.236.6.41
# networking: "holds all the cluster-level networking configuration"
#   vlan: "the integer VLAN to use for this cluster's primary machineNetwork interface(s)"
#   machinePrefixLength: "the integer prefix for machine IPs that represent their subnet designation, example: 25"
#   defaultGateway: "the default gateway IP for all the nodes in the cluster, typically the lowest ip in the machine subnet, example: 10.1.1.1"
#   clusterNetwork:
#     cidr: "CIDR notation for the internal cluster network, example: 10.128.0.0/14"
#     hostPrefix: "the subnet prefix for hosts in the cluster network, example: 23"
#   machineNetwork: 
#     cidr: "The CIDR definition for the physical network underlay that the hosts physically communicate on, example: '10.84.41.0/25'"
#   serviceNetwork: "A list of CIDR networks that cluster services live on"
#     - 172.30.0.0/16
#   dnsServers: "A list of DNS servers that the hosts will be configured to use"
#     - 10.83.1.56
#     - 10.83.1.57
#     - 10.229.103.12
# controlPlaneAgents: "The nubmer of control plane nodes that the cluster will have: example 3"
# sshPublicKey: 'The ssh public key that hosts will be configured to accept the private key for'
# hosts:  "The list of hosts from hostnames in the allHosts.yaml file that the cluster will be installed on"
