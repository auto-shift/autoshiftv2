
# Example cluster config for the networking template
clusterName: "my-cluster"
baseDomain: "example.com"
openshiftVersion: '4.19.9'
#apiVip: '10.0.0.1'
#ingressVip: '10.0.0.2'
# optional, defaults to false everywhere
pullSecretRef: "cluster-install-pull-secret"
bmcCredentialRef: "cisco-bmc-credential"
cpuArch: 'x86_64'
clusterImageSet: img4.20.2-multi-appsub
managedClusterSet: "default"
ntpSources: 
  - 192.168.86.6
networking:
  vlan: 111
  machinePrefixLength: 25
  defaultGateway: "10.10.10.1"
  clusterNetwork:
    cidr: 10.128.0.0/14
    hostPrefix: 23
  machineNetwork:
    cidr: '10.10.10.0/25'
  serviceNetwork:
    - 172.30.0.0/16
  dnsServers:
    - 192.168.86.5
controlPlaneAgents: 1
sshPublicKey: ''
hosts:
  - host1
  - host2
