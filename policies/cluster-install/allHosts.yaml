#  <hostname>: "The name of the host sans its base domain"
#    bmcCredentialRef: "Name + Namespace reference for the existing secret to copy into the cluster namespace"
#      name: "cisco-bmc-credential"
#      namespace: "cluster-installs"
#    bmcIP: "Ip address of the BMC interface/API"
#    bmcPrefix: "prefix for the bmc address, either 'redfish-virtualmedia' or 'idrac-virtualmedia'"
#    bmcEndpoint: "The endpoint that the computer system information lives in the BMC api, likely something like: '/redfish/v1/Systems/1'"
#    bootMACAddress: "The mac accress to boot from (generally just the primary mac)"
#    interfaces:  "List of interfaces that accepts a 'macAddress' field and 'name' field (name is optional and will be inferred if not provided)"
#      - macAddress: "00:25:B5:00:1A:07"
#      - macAddress: "00:25:B5:00:1B:07"
#    primaryMac: "primary mac address for this host, usually the same as bootMacAddress"
#    IP: "routable, non-OOB ip for this node, will the the IP it uses to communicate with other nodes along with infra services like DNS, NTP, etc"

all_hosts:
  host1:
    bmcCredentialRef:
      name: "cisco-bmc-credential"
      namespace: "cluster-install-secrets"
    bmcIP: '192.168.86.10'
    bmcEndpoint: "/redfish/v1/Systems/SERIALNUMBER"
    bmcPrefix: 'redfish-virtualmedia'
    bootMACAddress: '00:00:00:00:00:01'
    interfaces: 
      - macAddress: "00:00:00:00:00:01"
      - macAddress: "00:00:00:00:00:02"
    primaryMac: "00:00:00:00:00:02"
    IP: 10.10.10.10
  host2:
    bmcCredentialRef:
      name: "cisco-bmc-credential"
      namespace: "cluster-install-secrets"
    bmcIP: '192.168.85.11'
    bmcPrefix: 'redfish-virtualmedia'
    bmcEndpoint: "/redfish/v1/Systems/SERIALNUMBER"
    bootMACAddress: '00:00:00:00:00:03'
    interfaces:
      - macAddress: "00:00:00:00:00:03"
      - macAddress: "00:00:00:00:00:04"
    primaryMac: "00:00:00:00:00:03"
    IP: 10.10.10.11
