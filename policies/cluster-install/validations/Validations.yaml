{{/* 
This template is for running logical validations on all provided values

{{- $validationFailures := (dict) }}
{{- $_ := set $validationFailures "mustFail" false }}
{{- $derivedVars := (dict) }}
## Total host count (provided host list)
{{- $hostCount := length($.Values.hosts) }}
## Cluster Name
{{- $clusterName := $.Values.clusterName | default $.Release.Name }}
{{- $_ := set $derivedVars "cluserName" (dict) }}
{{- $_ := set $derivedVars.clusterName "set" ($.Values.clusterName | default "") }}
{{- $_ := set $derivedVars.clusterName "derived" ($clusterName) }}
## Pull Secret Name
{{- $pullSecretName := printf "pullsecret-%s" $.Values.clusterName }}
{{- $_ := set $derivedVars "pullSecretName" (dict) }}
{{- $_ := set $derivedVars.pullSecretName "set" ("") }}
{{- $_ := set $derivedVars.clusterName "derived" ($pullSecretName) }}
## Image Set
{{- $imageSet := ($.Values.clusterImageSet | default (printf "%s-%s" "openshift-image-set" $.Values.openshiftVersion)) }}
{{- $_ := set $derivedVars "imageSet" (dict) }}
{{- $_ := set $derivedVars.imageSet "set" ($.Values.clusterImageSet | default ""))
{{- $_ := set $derivedVars.imageSet "derived" $imageSet }}
## Control Plane Agents
{{- $controlPlaneAgents := $.Values.controlPlaneAgents | default 3 | atoi }}
{{- $_ := set $derivedVars "controlPlaneAgents" (dict) }}
{{- $_ := set $derivedVars.controlPlaneAgents "set" ($.Values.controlPlaneAgents | default ""))
{{- $_ := set $derivedVars.controlPlaneAgents "derived" $controlPlaneAgents }}
## Worker Agents
{{- $workerCount := $.Values.workerAgents | default (sub $hostCount  $controlPlaneCount) | atoi }}
{{- $_ := set $derivedVars "workerAgents" (dict) }}
{{- $_ := set $derivedVars.workerAgents "set" ($.Values.workerAgents | default 0))
{{- $_ := set $derivedVars.workerAgents "derived" $workerAgents }}
## API and Ingress VIP
{{- $apiVIP := $.Values.apiVIP | default "" }}
{{- $ingressVIP := $.Values.ingressVIP | default "" }}
## Credential secret refs
{{- $bmcCredentialSecret := printf "bmc-credentials-" $clusterName }}


## VALIDATIONS
## Validate combination of control pland and worker agent count
{{- $requiredHosts := add $controlPlaneCount $workerCount }}
{{- if gt $requiredHosts $hostCount }}
  {{- $message := printf "Invalid host count, the total number of hosts in the host list (%d) must be greater or equal to the combined number of controlPlaneAgents and workerAgents (%d + %d)" $hostCount, $controlPlaneAgents, $workerAgents }}
  {{- $_ := set $validationFailures "mustFail" true }}
  {{- $_ := set $validationFailures "hostCount" (dict) }}
  {{- $_ := set $validationFailures.hostCount "reason" $message }}
{{- end }}

## Validations for non-sno clusters
{{- if gt $controlPlaneAgents 1 }} 
  ## Validate that apiVIP and ingressVIP were provided if we are NOT a SNO cluster
  {{- if eq $apiVIP "" }}
    {{- $message := printf "The API VIP must be set if the number of control plane agents is greater than 1" }}
    {{- $_ := set $validationFailures "mustFail" true }}
    {{- $_ := set $validationFailures "apiVIP" (dict) }}
    {{- $_ := set $validationFailures.apiVIP "reason" $message }}
  {{- end }}
  {{- if eq $ingressVIP "" }}
    {{- $message := printf "The Ingress VIP must be set if the number of control plane agents is greater than 1" }}
    {{- $_ := set $validationFailures "mustFail" true }}
    {{- $_ := set $validationFailures "ingressVIP" (dict) }}
    {{- $_ := set $validationFailures.ingressVIP "reason" $message }}
  {{- end }}
  ## Validate that API and Ingress VIPs do not share IPs with any of the hosts
  {{- range $idx, $hostKey := $.Values.hosts }}
    {{- $host := index $allHosts $hostKey | default (dict) }}
    {{- if empty $host }}
      {{- if empty (index $validationFailures "unknownHost" | default dict) }}
        {{- $_ := set $validationFailures "unknownHost" (dict) }}
      {{- end }}
      {{- $message := printf "Unknown Host encountered in list: %s\n" $hostKey }}
      {{- $_ := set $validationFailures "mustFail" true }}
      {{- $hostMessage := (index $validationFailures.unknownHost "reason" | default "")
      {{- $_ := set $validationFailures.unknownHost "reason" (printf "%s%s" $hostMessage $message) }}
    {{- end }}
      
{{- end }}
  
*/}}
