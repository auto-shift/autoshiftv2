{{- $policyNamespace := $.Values.policy_namespace }}
{{- $policyName := "policy-gitlab-redis" }}
{{- $placementName := (printf "placement-%s" $policyName) }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
      name: policy-gitlab-operator-install
      namespace: '{{ $policyNamespace }}'
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: gitlab-redis
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{-" }} $existingSecret := (lookup "v1" "Secret" "gitlab-system" "gitlab-redis-password") | default dict {{ "}}" }}
            {{ "{{-" }} $existingData := ($existingSecret.data | default dict) {{ "}}" }}
            {{ "{{-" }} $existingPass := (index $existingData "redis-password" | default "") {{ "}}" }}
            {{ "{{-" }} if (empty $existingPass) {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: gitlab-redis-password
                  namespace: gitlab-system
                type: Opaque
                stringData:
                  redis-password: {{ "{{" }} printf "gitlabRedis%s" "{{ "{{hub" }} .ManagedClusterName {{ "hub}}" }}" {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: gitlab-redis
                  namespace: {{ .Values.gitlab.namespace }}
                  labels:
                    app: gitlab-redis
                spec:
                  replicas: 1
                  selector:
                    matchLabels:
                      app: gitlab-redis
                  template:
                    metadata:
                      labels:
                        app: gitlab-redis
                    spec:
                      containers:
                        - name: redis
                          image: registry.redhat.io/rhel9/redis-7:latest
                          ports:
                            - containerPort: 6379
                          env:
                            - name: REDIS_PASSWORD
                              valueFrom:
                                secretKeyRef:
                                  name: gitlab-redis-password
                                  key: redis-password
                          resources:
                            requests:
                              cpu: 100m
                              memory: 256Mi
                            limits:
                              cpu: 500m
                              memory: 512Mi
                          readinessProbe:
                            exec:
                              command:
                                - redis-cli
                                - ping
                            initialDelaySeconds: 5
                            periodSeconds: 10
                          livenessProbe:
                            exec:
                              command:
                                - redis-cli
                                - ping
                            initialDelaySeconds: 15
                            periodSeconds: 20
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Service
                metadata:
                  name: gitlab-redis
                  namespace: {{ .Values.gitlab.namespace }}
                  labels:
                    app: gitlab-redis
                spec:
                  selector:
                    app: gitlab-redis
                  ports:
                    - port: 6379
                      targetPort: 6379
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ $placementName }}
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/gitlab'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ $placementName }}
  namespace: {{ $policyNamespace }}
placementRef:
  name: {{ $placementName }}
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: {{ $policyName }}
    apiGroup: policy.open-cluster-management.io
    kind: Policy
