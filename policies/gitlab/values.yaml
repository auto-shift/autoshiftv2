### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# gitlab<bool>: 'true' or 'false' - Controls whether gitlab is managed
#
# Configuration:
# gitlab-subscription-name<string>: Operator subscription name (default: 'gitlab-operator-kubernetes')
# gitlab-channel<string>: Operator channel (default: 'stable')
# gitlab-version<string>: Specific operator version (CSV) to install (optional)
# gitlab-source<string>: Operator catalog source (default: 'certified-operators')
# gitlab-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
# gitlab-chart-version<string>: GitLab Helm chart version used by the operator (default: '9.10.1')
#
# External Services (all default to 'false' — uses bundled components):
# gitlab-external-db<bool>: Use CloudNativePG instead of bundled PostgreSQL (requires cloudnative-pg: 'true')
# gitlab-external-redis<bool>: Use Redis Sentinel HA instead of bundled Bitnami Redis (image from GitOps operator)
# gitlab-external-object-storage<bool>: Use NooBaa/ODF instead of bundled MinIO (requires odf: 'true')
#
# Database Backups (requires gitlab-external-db and odf):
# gitlab-db-backups<bool>: Enable scheduled CNPG backups to NooBaa
# gitlab-db-backup-retention<string>: Backup retention period (default: '30d')
# gitlab-db-backup-schedule<string>: Cron schedule for base backups (default: '0 2 * * *')
#
# Examples:
# autoshift.io/gitlab: 'true'
# autoshift.io/gitlab-subscription-name: 'gitlab-operator-kubernetes'
# autoshift.io/gitlab-channel: 'stable'
# autoshift.io/gitlab-version: 'gitlab-operator-kubernetes.v2.10.1'
# autoshift.io/gitlab-chart-version: '9.10.1'
# autoshift.io/gitlab-source: 'certified-operators'
# autoshift.io/gitlab-source-namespace: 'openshift-marketplace'
# autoshift.io/gitlab-external-db: 'true'
# autoshift.io/gitlab-external-redis: 'true'
# autoshift.io/gitlab-external-object-storage: 'true'
# autoshift.io/gitlab-db-backups: 'true'
# autoshift.io/gitlab-db-backup-retention: '30d'
# autoshift.io/gitlab-db-backup-schedule: '0 2 * * *'