# Installs and configures ACM MultiClusterObservability on the hub.
#
# This policy owns the base MCO lifecycle:
#   * Namespace creation
#   * MCH patch to enable the multicluster-observability component
#   * Optional ODF ObjectBucketClaim (useODF)
#   * Optional alternate-ca Secret for Thanos S3 TLS (useAlternateCA)
#   * thanos-object-storage Secret, multiclusterhub-operator-pull-secret, and
#     the MultiClusterObservability CR itself (retention, storage, addon spec)
#
# MCOA capability toggles, PrometheusAgent patching, and hub-to-hub rollup
# secrets are owned by the global-observability policy chart and patch the
# MCO CR this policy creates.
#
{{- $policyNamespace := .Values.policy_namespace }}
{{- if .Values.hubClusterSets }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-acm-observability
  namespace: {{ .Values.policy_namespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-acm-mch-install
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
    - name: policy-storage-cluster-test
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: acm-observability-ns
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: open-cluster-management-observability
                  labels:
                    openshift.io/cluster-monitoring: "true"
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: acm-observability-mch-component
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operator.open-cluster-management.io/v1
                kind: MultiClusterHub
                metadata:
                  name: multiclusterhub
                  namespace: {{ .Values.acm.namespace | default "open-cluster-management" }}
                spec:
                  overrides:
                    components:
                      - configOverrides: {}
                        enabled: true
                        name: multicluster-observability
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: acm-observability-bucket
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub" }} $acmConfig := index (index (fromConfigMap "{{ $policyNamespace }}" (print .ManagedClusterName ".rendered-config") "config" | default "{}") | fromYaml) "acm" | default dict {{ "hub}}" }}
            {{ "{{hub-" }} $obsConfig := (index $acmConfig "observability" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} if ($obsConfig).useODF {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: objectbucket.io/v1alpha1
                kind: ObjectBucketClaim
                metadata:
                  name: acm-observability
                  namespace: open-cluster-management-observability
                spec:
                  storageClassName: openshift-storage.noobaa.io
                  generateBucketName: acm-observability
            {{ "{{hub-" }} end {{ "hub}}" }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: acm-observability-thanos-ca
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub-" }} $acmConfig := index (index (fromConfigMap "{{ $policyNamespace }}" (print .ManagedClusterName ".rendered-config") "config" | default "{}") | fromYaml) "acm" | default dict {{ "hub}}" }}
            {{ "{{hub-" }} $obsConfig := index $acmConfig "observability" | default dict {{ "hub}}" }}
            {{ "{{hub-" }} $useAlternateCA := ($obsConfig).useAlternateCA | default false {{ "hub}}" }}
            {{ "{{hub-" }} if $useAlternateCA {{ "hub}}" }}
              {{ "{{hub-" }} $thanosConfig := index $obsConfig "thanosStorage" | default dict {{ "hub}}" }}
              {{ "{{hub-" }} $caBundle := index $thanosConfig "caBundle" | default dict {{ "hub}}" }}
              {{ "{{hub-" }} $caSourceName := index $caBundle "sourceName" | default "{{ .Values.acm.observability.thanosStorage.caBundle.sourceName }}" {{ "hub}}" }}
              {{ "{{hub-" }} $caSourceNamespace := index $caBundle "sourceNamespace" | default "{{ .Values.acm.observability.thanosStorage.caBundle.sourceNamespace }}" {{ "hub}}" }}
              {{ "{{hub-" }} $caSourceKey := index $caBundle "sourceKey" | default "{{ .Values.acm.observability.thanosStorage.caBundle.sourceKey }}" {{ "hub}}" }}
              - complianceType: musthave
                objectDefinition:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: alternate-ca
                    namespace: {{ .Values.acm.observability.namespace | default "open-cluster-management-observability" }}
                  type: Opaque
                  stringData:
                    ca.crt: '{{ "{{" }} fromConfigMap "{{ "{{hub" }} $caSourceNamespace {{ "hub}}" }}" "{{ "{{hub" }} $caSourceName {{ "hub}}" }}" "{{ "{{hub" }} $caSourceKey {{ "hub}}" }}" {{ "}}" }}'
            {{ "{{hub-" }} end {{ "hub}}" }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: acm-observability
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub" }} $acmConfig := index (index (fromConfigMap "{{ $policyNamespace }}" (print .ManagedClusterName ".rendered-config") "config" | default "{}") | fromYaml) "acm" | default dict {{ "hub}}" }}
            {{ "{{hub-" }} $obsConfig := index $acmConfig "observability" | default dict {{ "hub}}" }}
            {{ "{{hub-" }} $useAlternateCA := ($obsConfig).useAlternateCA | default false {{ "hub}}" }}
            {{ "{{hub-" }} $useODF := ($obsConfig).useODF | default false {{ "hub}}" }}
            {{/* Retention, storage, and addon-spec vars for the MCO CR */}}
            {{ "{{hub-" }} $retentionRaw := index $obsConfig "retentionResolutionRaw" | default "{{ .Values.acm.observability.retentionResolutionRaw }}" {{ "hub}}" }}
            {{ "{{hub-" }} $retention5m := index $obsConfig "retentionResolution5m" | default "{{ .Values.acm.observability.retentionResolution5m }}" {{ "hub}}" }}
            {{ "{{hub-" }} $retention1h := index $obsConfig "retentionResolution1h" | default "{{ .Values.acm.observability.retentionResolution1h }}" {{ "hub}}" }}
            {{ "{{hub-" }} $alertmanagerSize := index $obsConfig "alertmanagerStorageSize" | default "{{ .Values.acm.observability.alertmanagerStorageSize }}" {{ "hub}}" }}
            {{ "{{hub-" }} $compactSize := index $obsConfig "compactStorageSize" | default "{{ .Values.acm.observability.compactStorageSize }}" {{ "hub}}" }}
            {{ "{{hub-" }} $receiveSize := index $obsConfig "receiveStorageSize" | default "{{ .Values.acm.observability.receiveStorageSize }}" {{ "hub}}" }}
            {{ "{{hub-" }} $ruleSize := index $obsConfig "ruleStorageSize" | default "{{ .Values.acm.observability.ruleStorageSize }}" {{ "hub}}" }}
            {{ "{{hub-" }} $storeSize := index $obsConfig "storeStorageSize" | default "{{ .Values.acm.observability.storeStorageSize }}" {{ "hub}}" }}
            {{ "{{hub-" }} $storageClass := index $obsConfig "storageClass" | default "" {{ "hub}}" }}
            {{ "{{hub-" }} $enableDownsampling := index $obsConfig "enableDownsampling" | default "{{ .Values.acm.observability.enableDownsampling }}" {{ "hub}}" }}
            {{ "{{hub-" }} $interval := index $obsConfig "interval" | default {{ .Values.acm.observability.interval | default 300 }} {{ "hub}}" }}
            {{ "{{hub-" }} $scrapeSizeLimitBytes := index $obsConfig "scrapeSizeLimitBytes" | default {{ .Values.acm.observability.scrapeSizeLimitBytes }} {{ "hub}}" }}
            {{ "{{hub-" }} $workers := index $obsConfig "workers" | default {{ .Values.acm.observability.workers | default 1 }} {{ "hub}}" }}
            {{ "{{-" }} $thanosVars := (dict) {{ "}}" }}
              ############# NON-ODF EXTERNAL BUCKET #############
            {{ "{{hub-" }} if not $useODF {{ "hub}}" }}
              {{ "{{-" }} $_ := set $thanosVars "bucket" {{ "{{hub" }}(($obsConfig).thanosStorage).bucket | default "{{ $.Values.acm.observability.thanosStorage.bucket }}" {{ "hub}}" }} {{ "}}" }}
              {{ "{{-" }} $_ := set $thanosVars "host" {{ "{{hub" }}(($obsConfig).thanosStorage).host | default "{{ $.Values.acm.observability.thanosStorage.host }}" {{ "hub}}" }} {{ "}}" }}
              {{ "{{-" }} $_ := set $thanosVars "port" {{ "{{hub" }}(($obsConfig).thanosStorage).port | default "{{ $.Values.acm.observability.thanosStorage.port | default "443" }}" {{ "hub}}" }} {{ "}}" }}
              {{ "{{-" }} $_ := set $thanosVars "secretNamespace" {{ "{{hub" }}(($obsConfig).thanosStorage).secretNamespace | default "{{ $.Values.acm.observability.thanosStorage.secretNamespace }}" {{ "hub}}" }} {{ "}}" }}
              {{ "{{-" }} $_ := set $thanosVars "secretName" {{ "{{hub" }}(($obsConfig).thanosStorage).secretName | default "{{ $.Values.acm.observability.thanosStorage.secretName }}" {{ "hub}}" }} {{ "}}" }}
              {{ "{{-" }} $_ := set $thanosVars "secretKeyField" {{ "{{hub" }}(($obsConfig).thanosStorage).secretKeyField | default "{{ $.Values.acm.observability.thanosStorage.secretKeyField }}" {{ "hub}}" }} {{ "}}" }}
              {{ "{{-" }} $_ := set $thanosVars "accessKeyField" {{ "{{hub" }}(($obsConfig).thanosStorage).accessKeyField | default "{{ $.Values.acm.observability.thanosStorage.accessKeyField }}" {{ "hub}}" }} {{ "}}" }}
              {{ "{{-" }} $_ := set $thanosVars "accessKey" (fromSecret $thanosVars.secretNamespace $thanosVars.secretName $thanosVars.accessKeyField | default "" | base64dec) {{ "}}" }}
              {{ "{{-" }} $_ := set $thanosVars "secretKey" (fromSecret $thanosVars.secretNamespace $thanosVars.secretName $thanosVars.secretKeyField | default "" | base64dec) {{ "}}" }}
            {{ "{{hub-" }} else {{ "hub}}" }}
              {{ `{{- $_ := set $thanosVars "bucket" (fromConfigMap "open-cluster-management-observability" "acm-observability" "BUCKET_NAME") }}` }}
              {{ `{{- $_ := set $thanosVars "host" (fromConfigMap "open-cluster-management-observability" "acm-observability" "HOST_NAME") }}` }}
              {{ `{{- $_ := set $thanosVars "port" (fromConfigMap "open-cluster-management-observability" "acm-observability" "PORT") }}` }}
              {{ `{{- $_ := set $thanosVars "secretKey" (fromSecret "open-cluster-management-observability" "acm-observability" "AWS_SECRET_KEY" | base64dec) }}` }}
              {{ `{{- $_ := set $thanosVars "accessKey" (fromSecret "open-cluster-management-observability" "acm-observability" "AWS_ACCESS_KEY" | base64dec) }}` }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{" }} if or (empty $thanosVars.accessKey) (empty $thanosVars.secretKey) {{ "}}" }}
              {{ "{{" }} fail (printf "the access key (%s) or secret key (%s) could not be pulled from the secret \"%s\" in the \"%s\"" $thanosVars.accessKeyField $thanosVars.secretKeyField $thanosVars.secretName $thanosVars.secretNamespace) {{ "}}" }}
            {{ "{{" }} end {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: thanos-object-storage
                  namespace: {{ .Values.acm.observability.namespace | default "open-cluster-management-observability" }}
                type: Opaque
                stringData:
                  thanos.yaml: |
                    type: s3
                    config:
                      bucket: {{ "{{" }} $thanosVars.bucket {{ "}}" }}
                      endpoint: {{ "{{" }} printf "%s:%s" $thanosVars.host $thanosVars.port {{ "}}" }}
                      insecure: {{ "{{" }} ($thanosVars).insecure | default false {{ "}}" }}
                      access_key: '{{ "{{" }} $thanosVars.accessKey {{ "}}" }}'
                      secret_key: '{{ "{{" }} $thanosVars.secretKey {{ "}}" }}'
                      http_config:
                        tls_config:
                          {{ "{{hub-" }} if $useAlternateCA {{ "hub}}" }}
                          ca_file: /var/run/secrets/kubernetes.io/alternate-ca/ca.crt
                          {{ "{{hub-" }} else {{ "hub}}" }}
                          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                          {{ "{{hub-" }} end {{ "hub}}" }}
                          insecure_skip_verify: {{ "{{" }} ($thanosVars).insecure | default false {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: multiclusterhub-operator-pull-secret
                  namespace: open-cluster-management-observability
                type: kubernetes.io/dockerconfigjson
                data:
                  .dockerconfigjson: '{{`{{ fromSecret "openshift-config" "pull-secret" ".dockerconfigjson" }}`}}'
            - complianceType: musthave
              objectDefinition:
                apiVersion: observability.open-cluster-management.io/v1beta2
                kind: MultiClusterObservability
                metadata:
                  name: observability
                spec:
                  advanced:
                    retentionConfig:
                      retentionResolution1h: {{ "{{hub" }} $retention1h {{ "hub}}" }}
                      retentionResolution5m: {{ "{{hub" }} $retention5m {{ "hub}}" }}
                      retentionResolutionRaw: {{ "{{hub" }} $retentionRaw {{ "hub}}" }}
                  enableDownsampling: {{ "{{hub" }} $enableDownsampling {{ "hub}}" }}
                  imagePullPolicy: IfNotPresent
                  imagePullSecret: multiclusterhub-operator-pull-secret
                  observabilityAddonSpec:
                    enableMetrics: true
                    interval: {{ "{{hub" }} $interval {{ "hub}}" }}
                    scrapeSizeLimitBytes: {{ "{{hub" }} $scrapeSizeLimitBytes {{ "hub}}" }}
                    workers: {{ "{{hub" }} $workers {{ "hub}}" }}
                  storageConfig:
                    alertmanagerStorageSize: {{ "{{hub" }} $alertmanagerSize {{ "hub}}" }}
                    compactStorageSize: {{ "{{hub" }} $compactSize {{ "hub}}" }}
                    metricObjectStorage:
                      name: thanos-object-storage
                      key: thanos.yaml
                    {{ "{{hub-" }} if $useAlternateCA {{ "hub}}" }}
                      tlsSecretMountPath: /var/run/secrets/kubernetes.io/alternate-ca
                      tlsSecretName: alternate-ca
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    receiveStorageSize: {{ "{{hub" }} $receiveSize {{ "hub}}" }}
                    ruleStorageSize: {{ "{{hub" }} $ruleSize {{ "hub}}" }}
                    {{ "{{hub-" }} if $storageClass {{ "hub}}" }}
                    storageClass: {{ "{{hub" }} $storageClass {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    storeStorageSize: {{ "{{hub" }} $storeSize {{ "hub}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-acm-observability
  namespace: {{ .Values.policy_namespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := .Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/acm-observability'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-acm-observability
  namespace: {{ .Values.policy_namespace }}
placementRef:
  name: placement-policy-acm-observability
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-acm-observability
    apiGroup: policy.open-cluster-management.io
    kind: Policy
{{- end }}
