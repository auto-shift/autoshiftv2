# Default values for advanced-cluster-management.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
acm:
  namespace: open-cluster-management
  channel: release-2.15
  sourceNamespace: openshift-marketplace
  source: redhat-operators
  name: advanced-cluster-management
  disable_hub_self_management: false
  availabilityConfig: High
  enable_backup: false
  provisioning:
  # storage_class:
    database_size: 10Gi
    filesystem_storage_size: 100Gi
    image_storage_size: 50Gi
  # Base MultiClusterObservability configuration — consumed by policy-acm-observability.
  # Per-cluster overrides live in the rendered-config ConfigMap under the
  # "acm.observability" key. MCOA capability toggles and spoke-agent / remote-write
  # configuration live in the global-observability chart.
  observability:
    namespace: open-cluster-management-observability
    # useODF: true provisions an ObjectBucketClaim against NooBaa for Thanos S3.
    # useAlternateCA: true swaps the Thanos S3 TLS CA for a user-supplied bundle.
    thanosStorage:
      bucket: acm-dr
      host: ""
      port: "443"
      secretNamespace: policies-autoshift
      secretName: thanos-s3-bucket
      accessKeyField: access-key
      secretKeyField: secret-key
      insecure: false
      caBundle:
        sourceName: user-ca-bundle
        sourceKey: ca-bundle.crt
        sourceNamespace: openshift-config
    retentionResolutionRaw: 5d
    retentionResolution5m: 14d
    retentionResolution1h: 30d
    enableDownsampling: true
    interval: 300
    scrapeSizeLimitBytes: "1073741824"
    workers: 1
    alertmanagerStorageSize: 10Gi
    compactStorageSize: 10Gi
    receiveStorageSize: 10Gi
    ruleStorageSize: 10Gi
    storeStorageSize: 10Gi
    # storageClass: gp3-csi  # optional; defaults to cluster default if unset
  # Addon tuning for governance controllers at scale
  # Activated by label: acm-addon-tuning: 'true'
  #
  # ACM Default vs AutoShift Tuned Values:
  #
  # config-policy-controller:
  #   Parameter                  ACM Default    AutoShift Tuned
  #   evaluation-concurrency     2              5
  #   client-qps                 30             75
  #   client-burst               45             100
  #   memory request             (unset)        256Mi
  #   cpu request                (unset)        150m
  #   memory limit               512Mi          1Gi
  #
  # governance-policy-framework:
  #   Parameter                  ACM Default    AutoShift Tuned
  #   evaluation-concurrency     2              5
  #   client-qps                 30             75
  #   client-burst               45             100
  #   memory request             (unset)        128Mi
  #   cpu request                (unset)        100m
  #   memory limit               256Mi          512Mi
  #
  # Sizing Guidelines:
  #   - Small (< 50 clusters): ACM defaults are sufficient, tuning not needed
  #   - Medium (50-200 clusters): Enable tuning with AutoShift defaults
  #   - Large (200-500 clusters): Consider eval-concurrency=10, mem-limit=2Gi for cpc
  #   - Very Large (500+ clusters): eval-concurrency=15, client-qps=150, mem-limit=4Gi for cpc
  #
  # Note: Increased concurrency/QPS increases CPU and memory on the controller pods,
  # the Kubernetes API server, and the OpenShift API server.
  addonTuning:
    configPolicyController:
      evaluationConcurrency: '5'
      clientQPS: '75'
      clientBurst: '100'
      resources:
        requests:
          memory: 256Mi
          cpu: 150m
        limits:
          memory: 1Gi
    governancePolicyFramework:
      evaluationConcurrency: '5'
      clientQPS: '75'
      clientBurst: '100'
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 512Mi
