apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Production HashiCorp Vault: HA (raft, 3 nodes) + persistence + TLS (cert-manager) + injector.
# Per-cluster values (version, storage size/class) are visible ACM lookups.
# NOTE: Vault must be one-time initialized + unsealed after first deploy — an imperative op that
# declarative policy can't express (see README). With Shamir (default) that is manual; configure a
# KMS `seal` stanza in the raft config below for auto-unseal.
helmCharts:
  - name: vault
    repo: https://helm.releases.hashicorp.com
    version: 0.28.1
    releaseName: vault
    namespace: vault
    skipTests: true
    valuesInline:
      global:
        tlsDisable: false
      injector:
        enabled: true
        resources:
          requests: {memory: 128Mi, cpu: 100m}
          limits: {memory: 256Mi, cpu: 250m}
      server:
        image:
          tag: '{{hub index .ManagedClusterLabels "autoshift.io/vault-version" | default "1.17.2" hub}}'
        resources:
          requests: {memory: 256Mi, cpu: 250m}
          limits: {memory: 1Gi, cpu: 1}
        dataStorage:
          enabled: true
          # size is set below via a `patches:` block, not here: the upstream chart emits size UNQUOTED
          # (an ACM {{hub}} value would break the YAML), but a kustomize patch on the rendered PVC
          # serializes the value QUOTED, so the hub lookup is valid. storageClass stays cluster-default
          # (omit) — patch it the same way if you need a per-cluster class.
          size: 10Gi
# Patch the rendered PVC's storage with a per-cluster ACM lookup (kustomize quotes it -> valid YAML).
patches:
  - target:
      kind: StatefulSet
      name: vault
    patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: '{{hub index .ManagedClusterLabels "autoshift.io/vault-storage-size" | default "10Gi" hub}}'
        extraVolumes:
          - type: secret
            name: vault-tls
        ha:
          enabled: true
          replicas: 3
          raft:
            enabled: true
            setNodeId: true
            config: |
              ui = true
              listener "tcp" {
                address = "[::]:8200"
                cluster_address = "[::]:8201"
                tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
                tls_key_file  = "/vault/userconfig/vault-tls/tls.key"
                tls_client_ca_file = "/vault/userconfig/vault-tls/ca.crt"
              }
              storage "raft" {
                path = "/vault/data"
                retry_join { leader_api_addr = "https://vault-0.vault-internal:8200" leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt" }
                retry_join { leader_api_addr = "https://vault-1.vault-internal:8200" leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt" }
                retry_join { leader_api_addr = "https://vault-2.vault-internal:8200" leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt" }
              }
              service_registration "kubernetes" {}
