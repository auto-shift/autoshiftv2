# Default values for crunchy-postgres
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
crunchyPostgres:
  name: postgresoperator
  namespace: openshift-operators
  channel: v5
  source: certified-operators
  sourceNamespace: openshift-marketplace
  operatorGroupName: crunchy-postgres-operator-group
  # targetNamespaces: # Optional: specify target namespaces for namespace-scoped operators
  #   - openshift-operators
  
