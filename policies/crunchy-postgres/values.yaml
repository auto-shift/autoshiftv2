### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# crunchy-postgres<bool>: 'true' or 'false' - Controls whether crunchy-postgres is managed
#
# Configuration:
# crunchy-postgres-subscription-name<string>: Operator subscription name (default: 'postgresoperator')
# crunchy-postgres-channel<string>: Operator channel (default: 'v5')
# crunchy-postgres-version<string>: Specific operator version (CSV) to install (optional)
# crunchy-postgres-source<string>: Operator catalog source (default: 'certified-operators')
# crunchy-postgres-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
#
# Examples:
# autoshift.io/crunchy-postgres: 'true'
# autoshift.io/crunchy-postgres-subscription-name: 'postgresoperator'
# autoshift.io/crunchy-postgres-channel: 'v5'
# autoshift.io/crunchy-postgres-version: 'operator-name.v1.x.x'
# autoshift.io/crunchy-postgres-source: 'certified-operators'
# autoshift.io/crunchy-postgres-source-namespace: 'openshift-marketplace'