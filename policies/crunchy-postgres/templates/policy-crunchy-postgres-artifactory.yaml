{{- $policyNamespace := $.Values.policy_namespace }}
{{- $policyName := "policy-crunchy-postgres-artifactory" }}
{{- $placementName := (printf "placement-%s" $policyName) }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
      name: policy-crunchy-postgres-operator-install
      namespace: '{{ $policyNamespace }}'
    - apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
      name: policy-jfrog-operator-install
      namespace: '{{ $policyNamespace }}'
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: crunchy-postgres-artifactory-ns
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: jfrog-system
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: crunchy-postgres-artifactory
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: postgres-operator.crunchydata.com/v1beta1
                kind: PostgresCluster
                metadata:
                  name: artifactory-db
                  namespace: jfrog-system
                spec:
                  postgresVersion: 16
                  instances:
                    - name: pgha
                      replicas: 2
                      resources:
                        requests:
                          cpu: "2"
                          memory: 4Gi
                        limits:
                          cpu: "4"
                          memory: 8Gi
                      dataVolumeClaimSpec:
                        accessModes:
                          - ReadWriteOnce
                        resources:
                          requests:
                            storage: 50Gi
                      affinity:
                        podAntiAffinity:
                          preferredDuringSchedulingIgnoredDuringExecution:
                            - weight: 1
                              podAffinityTerm:
                                topologyKey: kubernetes.io/hostname
                                labelSelector:
                                  matchLabels:
                                    postgres-operator.crunchydata.com/cluster: artifactory-db
                  patroni:
                    dynamicConfiguration:
                      postgresql:
                        parameters:
                          max_connections: "400"
                          shared_buffers: 1GB
                          effective_cache_size: 3GB
                          work_mem: 16MB
                  proxy:
                    pgBouncer:
                      replicas: 2
                      affinity:
                        podAntiAffinity:
                          preferredDuringSchedulingIgnoredDuringExecution:
                            - weight: 1
                              podAffinityTerm:
                                topologyKey: kubernetes.io/hostname
                                labelSelector:
                                  matchLabels:
                                    postgres-operator.crunchydata.com/cluster: artifactory-db
                                    postgres-operator.crunchydata.com/role: pgbouncer
                  backups:
                    pgbackrest:
                      repos:
                        - name: repo1
                          volume:
                            volumeClaimSpec:
                              accessModes:
                                - ReadWriteOnce
                              resources:
                                requests:
                                  storage: 50Gi
                  users:
                    - name: artifactory
                      databases:
                        - artifactory
                      options: "SUPERUSER"
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ $placementName }}
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/jfrog'
              operator: In
              values:
              - 'true'
            - key: 'autoshift.io/crunchy-postgres'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ $placementName }}
  namespace: {{ $policyNamespace }}
placementRef:
  name: {{ $placementName }}
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: {{ $policyName }}
    apiGroup: policy.open-cluster-management.io
    kind: Policy
