# Default values for servicemesh3operator
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
servicemesh3operator:
  name: servicemeshoperator3
  namespace: openshift-operators
  channel: stable
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  operatorGroupName: global-operators
  # Istio ambient mode configuration
  istioNamespace: istio-system
  istioCNINamespace: istio-cni
  ztunnelNamespace: ztunnel
  istioVersion: v1.28.4
  updateStrategy: InPlace
  tempoNamespace: tracing-system
  pilot:
    cpuRequest: "100m"
    memoryRequest: "256Mi"
  tempo:
    storageSize: 10Gi
  # targetNamespaces: # Optional: specify target namespaces for namespace-scoped operators
  #   - openshift-operators

# hubClusterSets:
#   hub:
#     labels:
#       test1: 'test'
# managedClusterSets:
#   managed:
#     labels:
#       test4: 'test'

### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# servicemesh3operator<bool>: 'true' or 'false' - Controls whether servicemesh3operator is managed
#
# Operator Configuration:
# servicemesh3operator-subscription-name<string>: Operator subscription name (default: 'servicemeshoperator3')
# servicemesh3operator-channel<string>: Operator channel (default: 'stable')
# servicemesh3operator-version<string>: Specific operator version (CSV) to install (optional)
# servicemesh3operator-source<string>: Operator catalog source (default: 'redhat-operators')
# servicemesh3operator-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
#
# Control Plane Profile:
# servicemesh3operator-profile<string>: Which configuration profile to apply to the cluster (optional).
#   If not set, the operator is installed but no control plane resources are created.
#   Available profiles:
#     'ambient' - Istio ambient mode with IstioCNI, ZTunnel, Kiali, and Tempo
#     'default' - Istio sidecar mode with IstioCNI (required on OpenShift), Kiali, and Tempo
#
# Tracing Integration:
# servicemesh3operator-tempo<bool>: 'true' or 'false' - Wires Kiali to the TempoStack (default: 'false')
#
# Istio Version Override:
# servicemesh3operator-istio-version<string>: Istio/IstioCNI/ZTunnel version (default: 'v1.24.3')
#
# Examples:
# autoshift.io/servicemesh3operator: 'true'
# autoshift.io/servicemesh3operator-subscription-name: 'servicemeshoperator3'
# autoshift.io/servicemesh3operator-channel: 'stable-3.2'
# autoshift.io/servicemesh3operator-version: 'operator-name.v1.x.x'
# autoshift.io/servicemesh3operator-source: 'redhat-operators'
# autoshift.io/servicemesh3operator-source-namespace: 'openshift-marketplace'
# autoshift.io/servicemesh3operator-profile: 'ambient'
# autoshift.io/servicemesh3operator-istio-version: 'v1.24.3'
