apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-acs-managed
  namespace: ${POLICY_NAMESPACE}
spec:
  # Managed-cluster ACS (SecuredCluster sensor + cert sync). Restores the old
  # clusterSets: managedClusterSets scope: managed-clusterset members do NOT carry
  # autoshift.io/self-managed, so DoesNotExist selects them and excludes hubs/spoke-hubs.
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/acs'
              operator: In
              values:
                - 'true'
            - key: 'autoshift.io/self-managed'
              operator: DoesNotExist
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
