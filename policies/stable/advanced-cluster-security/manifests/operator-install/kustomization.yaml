apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Renders the shared components/operator-install chart. ACS installs into rhacs-operator and also needs
# the stackrox namespace (Central/SecuredCluster live there) — both created with the monitoring label.
helmGlobals:
  chartHome: ../../../../../components/
helmCharts:
  - name: operator-install
    releaseName: acs
    valuesInline:
      name: acs
      namespace: rhacs-operator
      namespaces:
        - stackrox
      remediation: ${REMEDIATION}
      subscription:
        name: '{{hub index .ManagedClusterLabels "autoshift.io/acs-subscription-name" | default "rhacs-operator" hub}}'
        channel: '{{hub index .ManagedClusterLabels "autoshift.io/acs-channel" | default "stable" hub}}'
        source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/acs-source" | default "redhat-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
        sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/acs-source-namespace" | default "openshift-marketplace" hub}}'
        startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/acs-version" | default "" hub}}'
      versions: '{{hub compact (list (index .ManagedClusterLabels "autoshift.io/acs-version" | default "")) | toRawJson | toLiteral hub}}'
