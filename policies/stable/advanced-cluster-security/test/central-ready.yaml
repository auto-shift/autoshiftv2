apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: acs-central-test
spec:
  remediationAction: inform
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates:
    - complianceType: musthave
      objectDefinition:
        apiVersion: platform.stackrox.io/v1alpha1
        kind: Central
        metadata:
          namespace: stackrox
          name: stackrox-central-services
        status:
          conditions:
            - status: 'True'
              type: Deployed
            - status: 'True'
              type: Initialized
            - status: 'False'
              type: ReleaseFailed
