apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: managed-cluster-security-endpoints-test
spec:
  remediationAction: inform
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates:
    - complianceType: musthave
      objectDefinition:
        apiVersion: platform.stackrox.io/v1alpha1
        kind: SecuredCluster
        metadata:
          namespace: stackrox
          name: stackrox-secured-cluster-services
        status:
          conditions:
            - status: 'True'
              type: Deployed
            - status: 'True'
              type: Initialized
            - status: 'False'
              type: Irreconcilable
            - status: 'False'
              type: ProxyConfigFailed
            - status: 'False'
              type: ReleaseFailed
