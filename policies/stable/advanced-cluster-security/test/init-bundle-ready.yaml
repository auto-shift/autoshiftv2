apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: check-cluster-init-bundle
spec:
  remediationAction: inform
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates:
    - complianceType: musthave
      objectDefinition:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: create-cluster-init-bundle-v2
          namespace: stackrox
        status:
          succeeded: 1
