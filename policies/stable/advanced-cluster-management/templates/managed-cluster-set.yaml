{{- /* cluster-set-type is not stamped here: it rides in the cluster-labels chart's
       cluster-set.<name> ConfigMaps, which the cluster-labels policy looks up at runtime. */}}
{{- range $clusterSet, $value := merge (dict) (deepCopy (.Values.hubClusterSets | default dict)) (deepCopy (.Values.managedClusterSets | default dict)) (deepCopy (.Values.clusterSets | default dict)) }}
---
apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSet
metadata:
  name: {{ $clusterSet }}
spec:
  clusterSelector:
    selectorType: ExclusiveClusterSetLabel
{{- end }}
