apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: advanced-cluster-management
# ACM install + config policies (the raw hub-foundation objects — policy Namespace,
# service account, ManagedClusterSet/Binding — live in the Helm `policy-foundation` dir).
#
# Per-deployment scalars (${...}) are substituted by the repo-server CMP before kustomize runs;
# they live here and in the placement-*.yaml files only — never in manifests/, whose hub templates
# contain $vars that substitution would clobber. acm.* knobs are baked as literals (they were Helm
# chart defaults; per-cluster overrides still flow through the label-driven `| default` in the hub
# templates).
#
# Hub-only targeting: these policies configure ACM ON THE HUB. The old chart scoped them with
# `clusterSets: <hubClusterSets>`; PG placements can't list per-deployment clustersets, so the
# hand-authored placements select hubs via `autoshift.io/self-managed: Exists` (a hub-only label
# cluster-labels propagates to hub-clusterset members; managed clusters never carry it).
#
# remediationAction is NOT set in policyDefaults: provisioning mixes an enforce config with an
# inform readiness check in one Policy, so it omits the root action (children stand). The other
# five set it at the policy level. Every manifest also bakes remediationAction: ${REMEDIATION}
# (or inform for the check), so the dry-run toggle drives the controlling template directly.
placementBindingDefaults:
  name: binding-policy-acm
policyDefaults:
  namespace: ${POLICY_NAMESPACE}
  severity: high
  consolidateManifests: true
  evaluationInterval:
    compliant: ${EVAL_COMPLIANT}
    noncompliant: ${EVAL_NONCOMPLIANT}
  standards:
    - NIST SP 800-53
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  # Default placement: hub-only (self-managed Exists). Feature-gated policies override below.
  placement:
    placementPath: placement-hub.yaml
policies:
  # 1) ACM operator install: Namespaces (ConfigurationPolicy) + first-class OperatorPolicy.
  - name: policy-acm-operator-install
    remediationAction: ${REMEDIATION}
    manifests:
      - path: manifests/operator-install
  # 2) MultiClusterHub. Branches on autoshift.io/self-managed (disableHubSelfManagement).
  - name: policy-acm-mch-install
    remediationAction: ${REMEDIATION}
    manifests:
      - path: manifests/mch-install
  # 3) ACM Observability (MCO + object bucket). Needs the SA for fromSecret/fromConfigMap.
  - name: policy-acm-observability
    remediationAction: ${REMEDIATION}
    placement:
      placementPath: placement-observability.yaml
    hubTemplateOptions:
      serviceAccountName: autoshift-policy-service-account
    dependencies:
      - name: policy-acm-mch-install
      - name: policy-storage-cluster-test
    manifests:
      - path: manifests/observability
  # 4) ACM Search persistent storage.
  - name: policy-acm-search-storage
    remediationAction: ${REMEDIATION}
    placement:
      placementPath: placement-search-storage.yaml
    dependencies:
      - name: policy-acm-mch-install
    manifests:
      - path: manifests/search-storage
  # 5) Governance-controller addon tuning at scale.
  - name: policy-acm-addon-tuning
    remediationAction: ${REMEDIATION}
    placement:
      placementPath: placement-addon-tuning.yaml
    dependencies:
      - name: policy-acm-mch-install
    manifests:
      - path: manifests/addon-tuning
  # 6) CIM/bare-metal provisioning. MIXED: Provisioning/AgentServiceConfig enforce, readiness informs
  #    -> omit the policy-level remediationAction so the inform check isn't clobbered by a root action.
  - name: policy-acm-provisioning
    placement:
      placementPath: placement-provisioning.yaml
    hubTemplateOptions:
      serviceAccountName: autoshift-policy-service-account
    dependencies:
      - name: policy-acm-mch-install
    manifests:
      - path: manifests/provisioning
