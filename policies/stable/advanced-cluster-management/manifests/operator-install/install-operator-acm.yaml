apiVersion: policy.open-cluster-management.io/v1beta1
kind: OperatorPolicy
metadata:
  name: install-operator-acm
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  complianceType: musthave
  operatorGroup:
    name: '{{ with (lookup "operators.coreos.com/v1" "OperatorGroup" "open-cluster-management" "").items }}{{ (index . 0).metadata.name }}{{ else }}open-cluster-management{{ end }}'
    namespace: open-cluster-management
    targetNamespaces:
    - open-cluster-management
  subscription:
    name: '{{hub index .ManagedClusterLabels "autoshift.io/acm-subscription-name" | default "advanced-cluster-management" hub}}'
    namespace: open-cluster-management
    source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/acm-source" | default "redhat-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
    sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/acm-source-namespace" | default "openshift-marketplace" hub}}'
    channel: '{{hub index .ManagedClusterLabels "autoshift.io/acm-channel" | default "release-2.16" hub}}'
    startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/acm-version" | default "" hub}}'
  upgradeApproval: Automatic
  versions:
  - '{{hub index .ManagedClusterLabels "autoshift.io/acm-version" | default "" hub}}'
