apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-cluster-install
  namespace: ${POLICY_NAMESPACE}
spec:
  # cluster-install runs ON the hub (it creates Hive/SiteConfig resources that provision spoke
  # clusters). No spec.clusterSets: the namespace bindings scope it; self-managed Exists is the
  # hub-only marker (PG equivalent of the old clusterSets: hubClusterSets), plus cluster-install: true.
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/self-managed'
              operator: Exists
            - key: 'autoshift.io/cluster-install'
              operator: In
              values:
                - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
