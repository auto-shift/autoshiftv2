{{- $policyNamespace := $.Values.policy_namespace }}
{{- $policyName := "policy-cluster-install-vmware" }}
{{- $placementName := (printf "placement-%s" $policyName) }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
    policy.open-cluster-management.io/standards: NIST SP 800-53
spec:
  disabled: false
{{- if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{- end }}
  dependencies:
    - name: policy-cluster-install-prereqs
      namespace: {{ $policyNamespace }}
      compliance: Compliant
      apiVersion: policy.open-cluster-management.io/v1
      kind: Policy
    - name: policy-cluster-install-secrets
      namespace: {{ $policyNamespace }}
      compliance: Compliant
      apiVersion: policy.open-cluster-management.io/v1
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: {{ $policyName }}
        spec:
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          remediationAction: enforce
          severity: high
          object-templates-raw: |
            {{ "{{" }} $policyNamespace := "{{ "{{hub" }} (index .ManagedClusterLabels "{{ $.Values.autoshiftLabelPrefix | default "autoshift.io/" }}policy-namespace") | default "{{ $policyNamespace }}" {{ "hub}}" }}" {{ "}}" }}
            {{ "{{-" }} $configMaps := (lookup "v1" "ConfigMap" $policyNamespace "" "autoshift.io/rendered-config-map") | default dict {{ "}}" }}
            {{ "{{-" }} range $_, $cm := ($configMaps.items | default list) {{ "}}" }}
            {{ "{{-" }} $clusterName := (replace ".rendered-config" "" $cm.metadata.name) {{ "}}" }}
            {{ "{{-" }} $config := ($cm.data.config | fromYaml) {{ "}}" }}
            {{ "{{-" }} $ci := (index $config "clusterInstall" | default dict) {{ "}}" }}
            {{ "{{-" }} $platform := (index $ci "platform" | default "baremetal") {{ "}}" }}
            {{ "{{-" }} if and (eq (index $ci "createCluster" | default "") "true") (eq $platform "vmware") (not (empty (index $config "vsphere"))) {{ "}}" }}
            {{ "{{-" }} $baseDomain := (index $ci "baseDomain") {{ "}}" }}
            {{ "{{-" }} $openshiftVersion := (index $ci "openshiftVersion") {{ "}}" }}
            {{ "{{-" }} $cpuArch := (index $ci "cpuArch" | default "x86_64") {{ "}}" }}
            {{ "{{-" }} $imageSet := (index $ci "clusterImageSet" | default (printf "openshift-image-set-%s" $openshiftVersion)) {{ "}}" }}
            {{ "{{-" }} $secretSourceNs := (index $ci "secretSourceNamespace" | default "cluster-install-secrets") {{ "}}" }}
            {{ "{{-" }} $pullSecretRef := (index $ci "pullSecretRef") {{ "}}" }}
            {{ "{{-" }} $managedClusterSet := (printf "%s{{ $.Values.clusterSetSuffix | default "" }}" (index $config "clusterSet" | default "default")) {{ "}}" }}
            {{ "{{-" }} $vsphere := (index $config "vsphere" | default dict) {{ "}}" }}
            {{ "{{-" }} $credentialRef := (index $vsphere "credentialRef") {{ "}}" }}
            {{ "{{-" }} $certRef := (index $vsphere "certificatesRef" | default dict) {{ "}}" }}
            {{ "{{-" }} $certRefName := (index $certRef "name" | default $credentialRef) {{ "}}" }}
            {{ "{{-" }} $certRefKey := (index $certRef "key" | default "cacert") {{ "}}" }}
            {{ "{{-" }} $certRefNs := (index $certRef "namespace" | default $secretSourceNs) {{ "}}" }}
            {{ "{{-" }} $sshPublicKey := (index $vsphere "sshPublicKey" | default "") {{ "}}" }}
            {{ "{{-" }} $sshKeyRef := (index $vsphere "sshKeyRef" | default dict) {{ "}}" }}
            {{ "{{-" }} if not (empty $sshKeyRef) {{ "}}" }}
            {{ "{{-" }} $refName := (index $sshKeyRef "name") {{ "}}" }}
            {{ "{{-" }} $refKey := (index $sshKeyRef "key" | default "ssh-publickey") {{ "}}" }}
            {{ "{{-" }} $refNs := (index $sshKeyRef "namespace" | default $secretSourceNs) {{ "}}" }}
            {{ "{{-" }} $sshPublicKey = (fromSecret $refNs $refName $refKey | base64dec) {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{- /* quoted 'false' would be truthy as a string, so normalize to a real bool */ -}}
            {{ "{{-" }} $fips := (eq (printf "%v" (index $vsphere "fips" | default false)) "true") {{ "}}" }}
            {{ "{{-" }} $networkType := (index $vsphere "networkType" | default "OVNKubernetes") {{ "}}" }}
            {{ "{{-" }} $apiVIPs := (index $vsphere "apiVIPs" | default list) {{ "}}" }}
            {{ "{{-" }} $ingressVIPs := (index $vsphere "ingressVIPs" | default list) {{ "}}" }}
            {{ "{{-" }} $vcenter := (index $vsphere "vcenter" | default dict) {{ "}}" }}
            {{ "{{-" }} $vcServer := (index $vcenter "server") {{ "}}" }}
            {{ "{{-" }} $vcPort := (index $vcenter "port" | default 443 | toInt) {{ "}}" }}
            {{ "{{-" }} $datacenters := (index $vcenter "datacenters" | default list) {{ "}}" }}
            {{ "{{-" }} $failureDomains := (index $vsphere "failureDomains" | default list) {{ "}}" }}
            {{ "{{-" }} $controlPlane := (index $vsphere "controlPlane" | default dict) {{ "}}" }}
            {{ "{{-" }} $cpReplicas := (index $controlPlane "replicas" | default 3 | toInt) {{ "}}" }}
            {{ "{{-" }} $cpCores := (index $controlPlane "coresPerSocket" | default 2 | toInt) {{ "}}" }}
            {{ "{{-" }} $cpCpus := (index $controlPlane "cpus" | default 4 | toInt) {{ "}}" }}
            {{ "{{-" }} $cpMem := (index $controlPlane "memoryMB" | default 16384 | toInt) {{ "}}" }}
            {{ "{{-" }} $cpDisk := (index (index $controlPlane "osDisk" | default dict) "diskSizeGB" | default 120 | toInt) {{ "}}" }}
            {{ "{{-" }} $workers := (index $vsphere "workers" | default dict) {{ "}}" }}
            {{ "{{-" }} $wkReplicas := (index $workers "replicas" | default 3 | toInt) {{ "}}" }}
            {{ "{{-" }} $wkCores := (index $workers "coresPerSocket" | default 2 | toInt) {{ "}}" }}
            {{ "{{-" }} $wkCpus := (index $workers "cpus" | default 8 | toInt) {{ "}}" }}
            {{ "{{-" }} $wkMem := (index $workers "memoryMB" | default 24576 | toInt) {{ "}}" }}
            {{ "{{-" }} $wkDisk := (index (index $workers "osDisk" | default dict) "diskSizeGB" | default 120 | toInt) {{ "}}" }}
            {{ "{{-" }} $hosts := (index $vsphere "hosts" | default list) {{ "}}" }}
            {{ "{{-" }} $networking := (index $config "networking") {{ "}}" }}
            {{ "{{-" }} $clusterNetwork := (index $networking "clusterNetwork") {{ "}}" }}
            {{ "{{-" }} $machineNetwork := (index $networking "machineNetwork") {{ "}}" }}
            {{ "{{-" }} $serviceNetwork := (index $networking "serviceNetwork") {{ "}}" }}
            {{ "{{-" }} $disconnected := (index $config "disconnected" | default dict) {{ "}}" }}
            {{ "{{-" }} $mirrorReg := (index $disconnected "mirrorRegistry" | default dict) {{ "}}" }}
            {{ "{{-" }} $mirrorHost := (index $mirrorReg "host" | default "") {{ "}}" }}
            {{ "{{-" }} $mirrorPath := (index $mirrorReg "path" | default "") {{ "}}" }}
            {{ "{{-" }} $mirrorUrl := $mirrorHost {{ "}}" }}
            {{ "{{-" }} if $mirrorPath {{ "}}" }}
            {{ "{{-" }} $mirrorUrl = (printf "%s/%s" $mirrorHost $mirrorPath) {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} $mirrors := (index $mirrorReg "mirrors" | default list) {{ "}}" }}
            {{ "{{-" }} $caTrustBundle := (index $mirrorReg "ca" | default "") {{ "}}" }}
            {{ "{{-" }} $caRef := (index $mirrorReg "caRef" | default dict) {{ "}}" }}
            {{ "{{-" }} if not (empty $caRef) {{ "}}" }}
            {{ "{{-" }} $caRefNs := (index $caRef "namespace" | default $secretSourceNs) {{ "}}" }}
            {{ "{{-" }} $caRefCM := (lookup "v1" "ConfigMap" $caRefNs (index $caRef "name")) | default dict {{ "}}" }}
            {{ "{{-" }} $caRefData := (index $caRefCM "data" | default dict) {{ "}}" }}
            {{ "{{-" }} $caTrustBundle = (index $caRefData (index $caRef "key") | default $caTrustBundle) {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{- /* ===== Build failureDomains list for install-config ===== */ -}}
            {{ "{{-" }} $fdList := list {{ "}}" }}
            {{ "{{-" }} range $_, $fd := $failureDomains {{ "}}" }}
            {{ "{{-" }} $topo := (index $fd "topology" | default dict) {{ "}}" }}
            {{ "{{-" }} $fdTopo := (dict
                "computeCluster" (index $topo "computeCluster")
                "datacenter" (index $topo "datacenter")
                "datastore" (index $topo "datastore")
                "networks" (index $topo "networks")
                "resourcePool" (index $topo "resourcePool")
            ) {{ "}}" }}
            {{ "{{-" }} if (index $topo "folder") {{ "}}" }}
            {{ "{{-" }} $_ := set $fdTopo "folder" (index $topo "folder") {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} $fdList = append $fdList (dict
                "name" (index $fd "name")
                "region" (index $fd "region")
                "zone" (index $fd "zone")
                "server" (index $fd "server" | default $vcServer)
                "topology" $fdTopo
            ) {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{- /* ===== vCenters — Hive does NOT inject vSphere credentials into install-config (credentialsSecretRef is for deprovision/day-2), so render them from the source secret ===== */ -}}
            {{ "{{-" }} $vcenters := (list (dict
                "server" $vcServer
                "port" $vcPort
                "user" (fromSecret $secretSourceNs $credentialRef "username" | base64dec)
                "password" (fromSecret $secretSourceNs $credentialRef "password" | base64dec)
                "datacenters" $datacenters
            )) {{ "}}" }}
            {{ "{{-" }} $vspherePlatform := (dict
                "apiVIPs" $apiVIPs
                "ingressVIPs" $ingressVIPs
                "failureDomains" $fdList
                "vcenters" $vcenters
            ) {{ "}}" }}
            {{- /* ===== Optional static-IP hosts (omit for DHCP) ===== */ -}}
            {{ "{{-" }} if (gt (len $hosts) 0) {{ "}}" }}
            {{ "{{-" }} $hostList := list {{ "}}" }}
            {{ "{{-" }} range $_, $h := $hosts {{ "}}" }}
            {{ "{{-" }} $nd := (index $h "networkDevice" | default dict) {{ "}}" }}
            {{ "{{-" }} $hostList = append $hostList (dict
                "role" (index $h "role")
                "failureDomain" (index $h "failureDomain" | default "")
                "networkDevice" (dict
                    "gateway" (index $nd "gateway")
                    "ipAddrs" (index $nd "ipAddrs")
                    "nameservers" (index $nd "nameservers")
                )
            ) {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} $_ := set $vspherePlatform "hosts" $hostList {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{- /* ===== Assemble install-config ===== */ -}}
            {{ "{{-" }} $installConfig := (dict
                "apiVersion" "v1"
                "metadata" (dict "name" $clusterName)
                "baseDomain" $baseDomain
                "networking" (dict
                    "networkType" $networkType
                    "clusterNetwork" (list (dict "cidr" (index $clusterNetwork "cidr") "hostPrefix" (index $clusterNetwork "hostPrefix" | toInt)))
                    "machineNetwork" (list (dict "cidr" (index $machineNetwork "cidr")))
                    "serviceNetwork" $serviceNetwork
                )
                "controlPlane" (dict
                    "name" "master"
                    "replicas" $cpReplicas
                    "platform" (dict "vsphere" (dict
                        "coresPerSocket" $cpCores
                        "cpus" $cpCpus
                        "memoryMB" $cpMem
                        "osDisk" (dict "diskSizeGB" $cpDisk)
                    ))
                )
                "compute" (list (dict
                    "name" "worker"
                    "replicas" $wkReplicas
                    "platform" (dict "vsphere" (dict
                        "coresPerSocket" $wkCores
                        "cpus" $wkCpus
                        "memoryMB" $wkMem
                        "osDisk" (dict "diskSizeGB" $wkDisk)
                    ))
                ))
                "platform" (dict "vsphere" $vspherePlatform)
                "pullSecret" ""
                "sshKey" $sshPublicKey
            ) {{ "}}" }}
            {{ "{{-" }} if $fips {{ "}}" }}
            {{ "{{-" }} $_ := set $installConfig "fips" true {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} if (gt (len $mirrors) 0) {{ "}}" }}
            {{ "{{-" }} $imageSources := list {{ "}}" }}
            {{ "{{-" }} range $_, $entry := $mirrors {{ "}}" }}
            {{ "{{-" }} $source := (index $entry "source") {{ "}}" }}
            {{ "{{-" }} $mirrorLoc := (index $entry "mirror" | default "") {{ "}}" }}
            {{ "{{-" }} if $mirrorLoc {{ "}}" }}
            {{ "{{-" }} $mirrorLoc = (printf "%s/%s" $mirrorHost $mirrorLoc) {{ "}}" }}
            {{ "{{-" }} else {{ "}}" }}
            {{ "{{-" }} $mirrorLoc = $mirrorUrl {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} $imageSources = append $imageSources (dict "source" $source "mirrors" (list $mirrorLoc)) {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} $_ := set $installConfig "imageDigestSources" $imageSources {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} if $caTrustBundle {{ "}}" }}
            {{ "{{-" }} $_ := set $installConfig "additionalTrustBundle" $caTrustBundle {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{- /* ===== Derive ClusterDeployment platform fields from first failure domain ===== */ -}}
            {{- /* index errors on an empty list before default can apply, so guard with len */ -}}
            {{ "{{-" }} $fd0 := dict {{ "}}" }}
            {{ "{{-" }} if (gt (len $failureDomains) 0) {{ "}}" }}
            {{ "{{-" }} $fd0 = (index $failureDomains 0) {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} $topo0 := (index $fd0 "topology" | default dict) {{ "}}" }}
            {{ "{{-" }} $cdDatacenter := (index $topo0 "datacenter") {{ "}}" }}
            {{ "{{-" }} $cdDatastore := (index $topo0 "datastore") {{ "}}" }}
            {{ "{{-" }} $cdCluster := (index $topo0 "computeCluster") {{ "}}" }}
            {{ "{{-" }} $networks0 := (index $topo0 "networks" | default list) {{ "}}" }}
            {{ "{{-" }} $cdNetwork := "" {{ "}}" }}
            {{ "{{-" }} if (gt (len $networks0) 0) {{ "}}" }}
            {{ "{{-" }} $cdNetwork = (index $networks0 0) {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} $cdFolder := (index $topo0 "folder" | default "") {{ "}}" }}
            {{/* ===== vSphere Credentials Secret (username/password) ===== */}}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                type: kubernetes.io/basic-auth
                metadata:
                  name: {{ "{{" }} $clusterName {{ "}}" }}-vsphere-creds
                  namespace: {{ "{{" }} $clusterName {{ "}}" }}
                data:
                  username: {{ "{{" }} fromSecret $secretSourceNs $credentialRef "username" {{ "}}" }}
                  password: {{ "{{" }} fromSecret $secretSourceNs $credentialRef "password" {{ "}}" }}
            {{/* ===== vCenter CA Certificates Secret ===== */}}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                type: Opaque
                metadata:
                  name: {{ "{{" }} $clusterName {{ "}}" }}-vsphere-certs
                  namespace: {{ "{{" }} $clusterName {{ "}}" }}
                data:
                  .cacert: {{ "{{" }} fromSecret $certRefNs $certRefName $certRefKey {{ "}}" }}
            {{/* ===== Pull Secret (pullSecretRef may be a string secret name or a {name,key,namespace} dict) ===== */}}
            {{ "{{-" }} $psName := "" {{ "}}" }}
            {{ "{{-" }} $psKey := ".dockerconfigjson" {{ "}}" }}
            {{ "{{-" }} $psNs := $secretSourceNs {{ "}}" }}
            {{ "{{-" }} if kindIs "string" $pullSecretRef {{ "}}" }}
            {{ "{{-" }} $psName = $pullSecretRef {{ "}}" }}
            {{ "{{-" }} else {{ "}}" }}
            {{ "{{-" }} $psName = (index $pullSecretRef "name" | default "") {{ "}}" }}
            {{ "{{-" }} $psKey = (index $pullSecretRef "key" | default ".dockerconfigjson") {{ "}}" }}
            {{ "{{-" }} $psNs = (index $pullSecretRef "namespace" | default $secretSourceNs) {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                type: kubernetes.io/dockerconfigjson
                metadata:
                  name: {{ "{{" }} $clusterName {{ "}}" }}-pull-secret
                  namespace: {{ "{{" }} $clusterName {{ "}}" }}
                data:
                  .dockerconfigjson: {{ "{{" }} fromSecret $psNs $psName $psKey {{ "}}" }}
            {{/* ===== install-config Secret ===== */}}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                type: Opaque
                metadata:
                  name: {{ "{{" }} $clusterName {{ "}}" }}-install-config
                  namespace: {{ "{{" }} $clusterName {{ "}}" }}
                data:
                  install-config.yaml: '{{ "{{" }} $installConfig | toYaml | base64enc {{ "}}" }}'
            {{/* ===== ClusterDeployment ===== */}}
            - complianceType: musthave
              objectDefinition:
                apiVersion: hive.openshift.io/v1
                kind: ClusterDeployment
                metadata:
                  name: {{ "{{" }} $clusterName {{ "}}" }}
                  namespace: {{ "{{" }} $clusterName {{ "}}" }}
                  labels:
                    cloud: vSphere
                    vendor: OpenShift
                    cluster.open-cluster-management.io/clusterset: {{ "{{" }} $managedClusterSet {{ "}}" }}
                spec:
                  baseDomain: {{ "{{" }} $baseDomain {{ "}}" }}
                  clusterName: {{ "{{" }} $clusterName {{ "}}" }}
                  controlPlaneConfig:
                    servingCertificates: {}
                  installAttemptsLimit: 1
                  installed: false
                  platform:
                    vsphere:
                      vCenter: {{ "{{" }} $vcServer {{ "}}" }}
                      datacenter: {{ "{{" }} $cdDatacenter {{ "}}" }}
                      defaultDatastore: {{ "{{" }} $cdDatastore {{ "}}" }}
                      cluster: {{ "{{" }} $cdCluster {{ "}}" }}
                      network: {{ "{{" }} $cdNetwork {{ "}}" }}
                    {{ "{{-" }} if $cdFolder {{ "}}" }}
                      folder: {{ "{{" }} $cdFolder {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                      credentialsSecretRef:
                        name: {{ "{{" }} $clusterName {{ "}}" }}-vsphere-creds
                      certificatesSecretRef:
                        name: {{ "{{" }} $clusterName {{ "}}" }}-vsphere-certs
                  provisioning:
                    installConfigSecretRef:
                      name: {{ "{{" }} $clusterName {{ "}}" }}-install-config
                    imageSetRef:
                      name: {{ "{{" }} $imageSet {{ "}}" }}
                  pullSecretRef:
                    name: {{ "{{" }} $clusterName {{ "}}" }}-pull-secret
            {{/* ===== MachinePool (workers) ===== */}}
            - complianceType: musthave
              objectDefinition:
                apiVersion: hive.openshift.io/v1
                kind: MachinePool
                metadata:
                  name: {{ "{{" }} $clusterName {{ "}}" }}-worker
                  namespace: {{ "{{" }} $clusterName {{ "}}" }}
                spec:
                  clusterDeploymentRef:
                    name: {{ "{{" }} $clusterName {{ "}}" }}
                  name: worker
                  replicas: {{ "{{" }} $wkReplicas {{ "}}" }}
                  platform:
                    vsphere:
                      coresPerSocket: {{ "{{" }} $wkCores {{ "}}" }}
                      cpus: {{ "{{" }} $wkCpus {{ "}}" }}
                      memoryMB: {{ "{{" }} $wkMem {{ "}}" }}
                      osDisk:
                        diskSizeGB: {{ "{{" }} $wkDisk {{ "}}" }}
            {{/* ===== ManagedCluster ===== */}}
            - complianceType: musthave
              objectDefinition:
                apiVersion: cluster.open-cluster-management.io/v1
                kind: ManagedCluster
                metadata:
                  name: {{ "{{" }} $clusterName {{ "}}" }}
                  labels:
                    cloud: vSphere
                    vendor: OpenShift
                    cluster.open-cluster-management.io/clusterset: {{ "{{" }} $managedClusterSet {{ "}}" }}
                spec:
                  hubAcceptsClient: true
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ $placementName }}
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/cluster-install'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ $placementName }}
  namespace: {{ $policyNamespace }}
placementRef:
  name: {{ $placementName }}
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: {{ $policyName }}
    apiGroup: policy.open-cluster-management.io
    kind: Policy
