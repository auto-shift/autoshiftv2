apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: openshift-pipelines
# Layout convention:
#   manifests/ — desired state to APPLY; respects dry-run via remediationAction: ${REMEDIATION}
# The operator installs cluster-wide (openshift-operators). The tssc-config policy layers Tekton
# Chains signing onto the singleton TektonConfig, but only when TAS is enabled (see tssc-config.yaml).
placementBindingDefaults:
  name: binding-policy-pipelines
policyDefaults:
  namespace: ${POLICY_NAMESPACE}
  # ${REMEDIATION} = inform when autoshift.dryRun, else enforce.
  remediationAction: ${REMEDIATION}
  severity: high
  consolidateManifests: false
  evaluationInterval:
    compliant: ${EVAL_COMPLIANT}
    noncompliant: ${EVAL_NONCOMPLIANT}
  standards:
    - NIST SP 800-53
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  placement:
    placementPath: placement.yaml
policies:
  # Operator install: raw Namespace (PG wraps -> ConfigurationPolicy) + first-class OperatorPolicy.
  - name: policy-pipelines-operator-install
    manifests:
      - path: manifests/operator-install
  # Tekton Chains signing + Rekor transparency on the TektonConfig (only when TAS is enabled).
  - name: policy-pipelines-tssc-config
    dependencies:
      - name: policy-pipelines-operator-install
    manifests:
      - path: manifests/tssc-config.yaml
