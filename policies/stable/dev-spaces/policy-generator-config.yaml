apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: dev-spaces
# Per-deployment scalars (${...}) are substituted by the repo-server CMP (envsubst/sed) BEFORE
# `kustomize build` runs. They live here and in placement.yaml — never in manifests/, whose hub
# templates contain `$vars` that substitution would clobber.
#
# The operator installs cluster-wide (openshift-operators-redhat); the CheCluster instance lives in
# openshift-devspaces. Instance config comes from config.devSpaces (rendered-config). RHDH surfaces
# "Open in Dev Spaces" automatically via its topology plugin once the CheCluster exists.
placementBindingDefaults:
  name: binding-policy-devspaces
policyDefaults:
  namespace: ${POLICY_NAMESPACE}
  # ${REMEDIATION} = inform when autoshift.dryRun, else enforce.
  remediationAction: ${REMEDIATION}
  severity: high
  consolidateManifests: false
  evaluationInterval:
    compliant: ${EVAL_COMPLIANT}
    noncompliant: ${EVAL_NONCOMPLIANT}
  standards:
    - NIST SP 800-53
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  # Placement authored by us (placement.yaml at the dir root, full fidelity); PG includes it and
  # generates only the PlacementBinding.
  placement:
    placementPath: placement.yaml
policies:
  # Operator install: raw Namespace (PG wraps -> ConfigurationPolicy) + first-class OperatorPolicy.
  - name: policy-devspaces-operator-install
    manifests:
      - path: manifests/operator-install
  # CheCluster instance.
  - name: policy-devspaces-instance
    dependencies:
      - name: policy-devspaces-operator-install
    manifests:
      - path: manifests/checluster.yaml
  # Readiness gate (inform): CheCluster reports chePhase Active.
  - name: policy-devspaces-instance-test
    remediationAction: inform
    manifests:
      - path: test/checluster-ready.yaml
