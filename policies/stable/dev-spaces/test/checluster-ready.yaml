# Readiness gate (inform-only): the CheCluster reports chePhase Active.
object-templates-raw: |
  - complianceType: musthave
    objectDefinition:
      apiVersion: org.eclipse.che/v2
      kind: CheCluster
      metadata:
        name: devspaces
        namespace: openshift-devspaces
      status:
        chePhase: Active
