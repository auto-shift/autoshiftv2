apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: compliance-stig-scan
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates:
    - complianceType: musthave # this template creates role for compliance-operator error
      objectDefinition:
        kind: Role
        apiVersion: rbac.authorization.k8s.io/v1
        metadata:
          name: compliance-operator-agg-patch-role
          namespace: openshift-compliance
        rules:
          - verbs:
              - create
              - get
              - update
              - patch
              - delete
            apiGroups:
              - compliance.openshift.io
            resources:
              - complianceremediations
              - complianceremediations/status
    - complianceType: musthave # this template creates role binding for compliance-operator error
      objectDefinition:
        kind: RoleBinding
        apiVersion: rbac.authorization.k8s.io/v1
        metadata:
          name: compliance-operator-agg-patch-rolebinding
          namespace: openshift-compliance
        subjects:
          - kind: ServiceAccount
            name: remediation-aggregator
            namespace: openshift-compliance
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: compliance-operator-agg-patch-role

    - complianceType: musthave # this template creates ScanSettingBinding:stig
      objectDefinition:
        apiVersion: compliance.openshift.io/v1alpha1
        kind: ScanSettingBinding
        metadata:
          name: stig
          namespace: openshift-compliance
        profiles:
          - apiGroup: compliance.openshift.io/v1alpha1
            kind: Profile
            name: ocp4-stig
          - apiGroup: compliance.openshift.io/v1alpha1
            kind: Profile
            name: ocp4-stig-node
          - apiGroup: compliance.openshift.io/v1alpha1
            kind: Profile
            name: rhcos4-stig
        settingsRef:
          apiGroup: compliance.openshift.io/v1alpha1
          kind: ScanSetting
          name: default
