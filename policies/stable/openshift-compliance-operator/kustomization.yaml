apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generators:
  - policy-generator-config.yaml
# The stig-remediation ConfigMap lives on the hub in the policy namespace; the auto-remediate
# policy reads it via fromConfigMap at hub-template resolution time. It is emitted directly (not
# wrapped in a Policy), so it is a plain kustomize resource, not a generated policy.
resources:
  - stig-remediation-configmap.yaml
