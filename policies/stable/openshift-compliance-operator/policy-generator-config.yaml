apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: openshift-compliance-operator
# Layout convention:
#   manifests/ — desired state to APPLY; respects dry-run via remediationAction: ${REMEDIATION}
# A policy's path points at a single FILE, or a DIRECTORY when it has 2+ manifests (a dir is a
# wildcard). Keep placement*.yaml at the dir root, NOT inside a wildcarded manifests dir.
# Per-deployment scalars (${...}) live here and in placement*.yaml only — never in manifests/,
# whose hub templates contain $vars that substitution would clobber.
#
# remediationAction: ${REMEDIATION} is set once in policyDefaults (dry-run aware). Readiness/status
# checks are their own policies[] entry (remediationAction: inform, manifest under test/) — a separate
# Policy so the enforce root of a config policy can't clobber the inform check.
placementBindingDefaults:
  name: binding-policy-compliance
policyDefaults:
  namespace: ${POLICY_NAMESPACE}
  # ${REMEDIATION} = inform when autoshift.dryRun, else enforce.
  remediationAction: ${REMEDIATION}
  severity: high
  consolidateManifests: true
  evaluationInterval:
    compliant: ${EVAL_COMPLIANT}
    noncompliant: ${EVAL_NONCOMPLIANT}
  standards:
    - NIST SP 800-53
  categories:
    - CM Configuration Management
    - CA Security Assessment and Authorization
  controls:
    - CM-2 Baseline Configuration
    - CA-2 Security Assessments
  placement:
    placementPath: placement.yaml
policies:
  # Operator install: raw Namespace (PG wraps -> ConfigurationPolicy) + first-class OperatorPolicy.
  - name: policy-compliance-operator-install
    manifests:
      - path: manifests/operator-install
  # STIG scan setup: ScanSetting + scan Role (enforce, from policyDefaults).
  - name: policy-stig-scan
    dependencies:
      - name: policy-compliance-operator-install
    manifests:
      - path: manifests/stig-scan
  # STIG suite status gate (ComplianceSuite status observation → inform, its own Policy in test/).
  - name: policy-stig-scan-test
    remediationAction: inform
    dependencies:
      - name: policy-compliance-operator-install
    manifests:
      - path: test/suite-stig-test.yaml
  # Apply the selected STIG remediations. Own placement predicate (excludes auto-remediate=false).
  - name: policy-auto-remediate
    pruneObjectBehavior: None
    dependencies:
      - name: policy-stig-scan
    placement:
      placementPath: placement-auto-remediate.yaml
    manifests:
      - path: manifests/auto-remediate.yaml
