apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Renders the shared components/operator-install chart. Visible per-operator ACM lookups below.
helmGlobals:
  chartHome: ../../../../../components/
helmCharts:
  - name: operator-install
    releaseName: local-storage
    valuesInline:
      name: local-storage
      namespace: openshift-local-storage
      remediation: ${REMEDIATION}
      subscription:
        name: '{{hub index .ManagedClusterLabels "autoshift.io/local-storage-subscription-name" | default "local-storage-operator" hub}}'
        channel: '{{hub index .ManagedClusterLabels "autoshift.io/local-storage-channel" | default "stable" hub}}'
        source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/local-storage-source" | default "redhat-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
        sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/local-storage-source-namespace" | default "openshift-marketplace" hub}}'
        startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/local-storage-version" | default "" hub}}'
      versions: '{{hub compact (list (index .ManagedClusterLabels "autoshift.io/local-storage-version" | default "")) | toRawJson | toLiteral hub}}'
