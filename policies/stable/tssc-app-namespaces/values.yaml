### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# tssc-app-namespaces<bool>: 'true' or 'false' - Enable TSSC app namespace provisioning (default: 'false')
#
# App namespace configuration is driven by config.tssc-apps in the cluster's rendered-config,
# not by labels. The config structure (in values/clusters/<cluster>.yaml or a team values file):
#
#   config:
#     tssc-apps:
#       {team}:               # team name → ArgoCD NS = openshift-gitops-{team}
#         {app}:              # app name → namespace prefix = {team}-{app}
#           environments: [ci, dev, stage, prod]  # controls which namespaces are created
#
# Namespace mapping:
#   ci    → {team}-{app}-ci            (full CI secrets: cosign, acs, tas, tpa, argocd, registry)
#   dev   → {team}-{app}-development   (registry auth + pipeline SA)
#   stage → {team}-{app}-stage         (registry auth + pipeline SA)
#   prod  → {team}-{app}-prod          (registry auth + pipeline SA)
#
# Multiple teams on the same cluster use different team keys — Helm deep-merges them
# without conflict. See docs/multi-source.md for the recommended two-repo setup.
#
# Example:
# autoshift.io/tssc-app-namespaces: 'true'
