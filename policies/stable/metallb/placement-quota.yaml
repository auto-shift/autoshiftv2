apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-metallb-quota
  namespace: ${POLICY_NAMESPACE}
spec:
  # No spec.clusterSets: selected via ManagedClusterSetBindings in this namespace + the predicate.
  # The quota is a ResourceQuota on metallb's namespace — meaningless without metallb — so it must
  # AND-in the base metallb predicate (a per-entry placementPath REPLACES the default placement, it
  # does NOT inherit its predicate). Target: clusters with metallb: true AND metallb-quota: true.
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/metallb'
              operator: In
              values:
                - 'true'
            - key: 'autoshift.io/metallb-quota'
              operator: In
              values:
                - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
