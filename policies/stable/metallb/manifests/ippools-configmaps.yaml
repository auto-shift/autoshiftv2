apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: ippools-configmap
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates:
    - complianceType: mustonlyhave
      objectDefinition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ippool-internal
          namespace: '{{hub $.PolicyMetadata.namespace hub}}'
        data:
          adv: 
