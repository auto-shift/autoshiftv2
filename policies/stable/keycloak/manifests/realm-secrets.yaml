# Realm client secrets propagated from the hub Secret tssc-keycloak-config (in the policy namespace —
# admin creates it before enabling keycloak). Keys consumed: admin-password, tas-client-secret,
# tpa-cli-secret, tpa-frontend-secret, rhdh-client-secret. Each downstream client Secret is created
# only when its component is enabled by the operator label (tas / trusted-profile-analyzer / dev-hub).
# The hub fromSecret needs the elevated policy service account (set in policy-generator-config).
object-templates-raw: |
  {{hub- $ns := "keycloak-system" hub}}
  {{hub- $adminPass := fromSecret .PolicyMetadata.namespace "tssc-keycloak-config" "admin-password" hub}}
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: tssc-realms-admin-user
        namespace: '{{hub $ns hub}}'
      type: Opaque
      data:
        username: '{{hub "admin" | b64enc hub}}'
        password: '{{hub $adminPass | b64enc hub}}'
  {{hub- if eq (index .ManagedClusterLabels "autoshift.io/tas" | default "false") "true" hub}}
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: trusted-artifact-signer-clients
        namespace: '{{hub $ns hub}}'
      type: Opaque
      data:
        trustedArtifactSigner: '{{hub fromSecret .PolicyMetadata.namespace "tssc-keycloak-config" "tas-client-secret" | b64enc hub}}'
  {{hub- end hub}}
  {{hub- if eq (index .ManagedClusterLabels "autoshift.io/trusted-profile-analyzer" | default "false") "true" hub}}
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: tpa-realm-clients
        namespace: '{{hub $ns hub}}'
      type: Opaque
      data:
        cli: '{{hub fromSecret .PolicyMetadata.namespace "tssc-keycloak-config" "tpa-cli-secret" | b64enc hub}}'
        frontend: '{{hub fromSecret .PolicyMetadata.namespace "tssc-keycloak-config" "tpa-frontend-secret" | b64enc hub}}'
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: tssc-trustificationauth-integration
        namespace: '{{hub $ns hub}}'
      type: Opaque
      stringData:
        oidc_client_id: cli
        oidc_client_secret: '{{hub fromSecret .PolicyMetadata.namespace "tssc-keycloak-config" "tpa-cli-secret" hub}}'
  {{hub- end hub}}
  {{hub- if eq (index .ManagedClusterLabels "autoshift.io/dev-hub" | default "false") "true" hub}}
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: rhdh-realm-clients
        namespace: '{{hub $ns hub}}'
      type: Opaque
      data:
        rhdh: '{{hub fromSecret .PolicyMetadata.namespace "tssc-keycloak-config" "rhdh-client-secret" | b64enc hub}}'
  {{hub- end hub}}
