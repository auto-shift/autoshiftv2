# Readiness gate (inform-only): the Keycloak CR reports Ready.
object-templates-raw: |
  - complianceType: musthave
    objectDefinition:
      apiVersion: k8s.keycloak.org/v2alpha1
      kind: Keycloak
      metadata:
        name: keycloak
        namespace: keycloak-system
      status:
        conditions:
          - type: Ready
            status: "True"
