# Default values for keycloak
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
keycloak:
  name: rhbk-operator
  namespace: keycloak-system
  channel: stable-v26.4
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  operatorGroupName: keycloak-operator-group
  # targetNamespaces: # Optional: specify target namespaces for namespace-scoped operators
  #   - keycloak-system
  
# hubClusterSets:
#   hub:
#     labels:
#       test1: 'test'
# managedClusterSets:
#   managed:
#     labels:
#       test4: 'test'

### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# keycloak<bool>: 'true' or 'false' - Controls whether keycloak is managed
#
# Operator configuration:
# keycloak-subscription-name<string>: Operator subscription name (default: 'rhbk-operator')
# keycloak-channel<string>: Operator channel (default: 'stable-v26.4')
# keycloak-version<string>: Specific operator version (CSV) to install (optional)
# keycloak-source<string>: Operator catalog source (default: 'redhat-operators')
# keycloak-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
#
# Instance configuration:
# keycloak-namespace<string>: Namespace for Keycloak CR (default: 'keycloak-system')
# keycloak-realm-name<string>: Keycloak realm name (default: 'tssc-iam')
#
# CNPG PostgreSQL (internal DB, ignored when keycloak-db-external is 'true'):
# keycloak-db-external<bool>: Use external PostgreSQL instead of CNPG (default: 'false')
# keycloak-db-cluster-name<string>: CNPG Cluster name (default: 'keycloak-pgsql')
# keycloak-db-instances<string>: CNPG primary replica count (default: '1')
# keycloak-db-storage<string>: CNPG storage size (default: '10Gi')
# keycloak-db-pooler-instances<string>: PgBouncer Pooler replica count (default: '2')
# keycloak-db-pool-size<string>: PgBouncer default_pool_size (default: '20')
# keycloak-db-pool-min-size<string>: PgBouncer min_pool_size (default: '5')
# keycloak-db-pool-reserve-size<string>: PgBouncer reserve_pool_size (default: '5')
# keycloak-db-pool-max-client-conn<string>: PgBouncer max_client_conn (default: '200')
#
# External DB (used when keycloak-db-external is 'true'):
# keycloak-db-host<string>: PostgreSQL host (default: 'keycloak-pgsql-pooler-rw.keycloak-system.svc')
# keycloak-db-secret<string>: Secret name for DB credentials (default: 'keycloak-pgsql-user')
# keycloak-db-name<string>: PostgreSQL database name (default: 'keycloak')
#
# TSSC component integration (enables the matching client in the realm):
# tas<bool>: Set 'true' to create TAS OIDC client in realm
# trusted-profile-analyzer<bool>: Set 'true' to create TPA OIDC clients in realm
# dev-hub<bool>: Set 'true' to create RHDH OIDC client in realm
#
# Examples:
# autoshift.io/keycloak: 'true'
# autoshift.io/keycloak-subscription-name: 'rhbk-operator'
# autoshift.io/keycloak-channel: 'stable-v26.4'
# autoshift.io/keycloak-version: 'operator-name.v1.x.x'
# autoshift.io/keycloak-source: 'redhat-operators'
# autoshift.io/keycloak-source-namespace: 'openshift-marketplace'
# autoshift.io/keycloak-namespace: 'keycloak-system'
# autoshift.io/keycloak-db-host: 'keycloak-pgsql-rw.keycloak-system.svc'
# autoshift.io/keycloak-db-secret: 'keycloak-pgsql-user'
# autoshift.io/keycloak-db-name: 'keycloak'
# autoshift.io/keycloak-realm-name: 'tssc-iam'