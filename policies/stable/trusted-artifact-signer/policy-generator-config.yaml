apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: trusted-artifact-signer
# Layout convention:
#   manifests/ — desired state to APPLY; respects dry-run via remediationAction: ${REMEDIATION}
#   test/      — assertions to OBSERVE (readiness/status); ALWAYS remediationAction: inform
# The operator installs cluster-wide (openshift-operators); the Securesign instance + integration
# secret live in the tssc-tas namespace. Instance config comes from config.tas (rendered-config).
placementBindingDefaults:
  name: binding-policy-tas
policyDefaults:
  namespace: ${POLICY_NAMESPACE}
  # ${REMEDIATION} = inform when autoshift.dryRun, else enforce.
  remediationAction: ${REMEDIATION}
  severity: high
  consolidateManifests: false
  evaluationInterval:
    compliant: ${EVAL_COMPLIANT}
    noncompliant: ${EVAL_NONCOMPLIANT}
  standards:
    - NIST SP 800-53
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  placement:
    placementPath: placement.yaml
policies:
  # Operator install: raw Namespace (PG wraps -> ConfigurationPolicy) + first-class OperatorPolicy.
  - name: policy-rhtas-operator-install
    manifests:
      - path: manifests/operator-install
  # Securesign instance (Fulcio/Rekor/Trillian/CTlog/TUF/TSA) + tssc-tas-integration secret.
  - name: policy-tas-securesign
    dependencies:
      - name: policy-rhtas-operator-install
    manifests:
      - path: manifests/securesign.yaml
  # Readiness gate (inform): Securesign CR reports Ready.
  - name: policy-tas-securesign-test
    remediationAction: inform
    manifests:
      - path: test/securesign-ready.yaml
