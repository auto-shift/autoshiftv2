# Readiness gate (inform-only): the Securesign CR reports Ready.
object-templates-raw: |
  - complianceType: musthave
    objectDefinition:
      apiVersion: rhtas.redhat.com/v1alpha1
      kind: Securesign
      metadata:
        name: trusted-artifact-signer
        namespace: tssc-tas
      status:
        conditions:
          - type: Ready
            status: "True"
