apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Renders the shared components/operator-install chart. Visible per-operator ACM lookups below.
helmGlobals:
  chartHome: ../../../../components/
helmCharts:
  - name: operator-install
    releaseName: rhtas
    valuesInline:
      name: rhtas
      namespace: openshift-operators
      remediation: ${REMEDIATION}
      subscription:
        name: '{{hub index .ManagedClusterLabels "autoshift.io/tas-subscription-name" | default "rhtas-operator" hub}}'
        channel: '{{hub index .ManagedClusterLabels "autoshift.io/tas-channel" | default "stable" hub}}'
        source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/tas-source" | default "redhat-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
        sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/tas-source-namespace" | default "openshift-marketplace" hub}}'
        startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/tas-version" | default "" hub}}'
      versions: '{{hub compact (list (index .ManagedClusterLabels "autoshift.io/tas-version" | default "")) | toRawJson | toLiteral hub}}'
