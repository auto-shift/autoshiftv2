apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: image-registry-config
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  # First-class ConfigurationPolicy: PG passes it through unmodified, so evaluationInterval
  # is baked here (PG only injects it into raw manifests it wraps itself).
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates-raw: |
            {{- $noobaaRoute := (lookup "route.openshift.io/v1" "Route" "openshift-storage" "s3") | default dict }}
            {{- $noobaaHost := (index ($noobaaRoute.spec | default dict) "host" | default "") }}
            {{- $caBundleCert := fromConfigMap "openshift-image-registry" "openshift-service-ca.crt" "service-ca.crt" }}
            {{- if not (empty $noobaaHost) }}
            {{- $routerCA := (lookup "v1" "Secret" "openshift-ingress-operator" "router-ca") | default dict }}
            {{- $caBundleCert = (index ($routerCA.data | default dict) "tls.crt" | default "" | base64dec) }}
            {{- end }}
            {{hub- if eq (index .ManagedClusterLabels "autoshift.io/imageregistry-storage-type" | default "") "s3" hub}}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: image-registry-private-configuration-user
                  namespace: openshift-image-registry
                type: Opaque
                data:
                  REGISTRY_STORAGE_S3_ACCESSKEY: {{ fromSecret "openshift-image-registry" "image-registry-storage" "AWS_ACCESS_KEY_ID" }}
                  REGISTRY_STORAGE_S3_SECRETKEY: {{ fromSecret "openshift-image-registry" "image-registry-storage" "AWS_SECRET_ACCESS_KEY" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: image-registry-s3-bundle
                  namespace: openshift-config
                data:
                  ca-bundle.crt: |
                    {{ $caBundleCert | autoindent }}
            {{hub- end hub}}
            - complianceType: musthave
              objectDefinition:
                apiVersion: imageregistry.operator.openshift.io/v1
                kind: Config
                metadata:
                  name: cluster
                spec:
                  logLevel: Normal
                  rolloutStrategy: {{hub index .ManagedClusterLabels "autoshift.io/imageregistry-rollout-strategy" | default "Recreate" hub}}
                  operatorLogLevel: Normal
                  requests:
                    read:
                      maxWaitInQueue: 0s
                    write:
                      maxWaitInQueue: 0s
                  replicas: {{hub index .ManagedClusterLabels "autoshift.io/imageregistry-replicas" | default "1" hub}}
                  managementState: {{hub index .ManagedClusterLabels "autoshift.io/imageregistry-management-state" | default "Managed" hub}}
                  storage:
                    {{hub- if eq (index .ManagedClusterLabels "autoshift.io/imageregistry-storage-type" | default "") "pvc" hub}}
                    managementState: Managed
                    pvc:
                      claim: image-registry-storage
                    {{hub- else if eq (index .ManagedClusterLabels "autoshift.io/imageregistry-storage-type" | default "") "s3" hub}}
                    managementState: Unmanaged
                    s3:
                      region: {{hub index .ManagedClusterLabels "autoshift.io/imageregistry-s3-region" | default "us-east-1" hub}}
                      bucket: {{ fromConfigMap "openshift-image-registry" "image-registry-storage" "BUCKET_NAME" }}
                      regionEndpoint: '{{ if not (empty $noobaaHost) }}https://{{ $noobaaHost }}{{ else }}https://{{ fromConfigMap "openshift-image-registry" "image-registry-storage" "BUCKET_HOST" }}:{{ fromConfigMap "openshift-image-registry" "image-registry-storage" "BUCKET_PORT" }}{{ end }}'
                      virtualHostedStyle: false
                      encrypt: false
                      trustedCA:
                        name: image-registry-s3-bundle
                    {{hub- end hub}}
