apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: openshift-image-registry
# Per-deployment scalars (${...}) are substituted by the repo-server CMP (envsubst/sed) BEFORE
# `kustomize build` runs. They live here and in placement.yaml — never in manifests/, whose hub
# templates contain `$vars` that substitution would clobber.
#
# remediationAction is intentionally NOT set at the policy level. Every manifest is a first-class
# ConfigurationPolicy carrying its own remediationAction, so the status/readiness check
# (image-registry-storage-bound) stays at inform while the config policies follow ${REMEDIATION}.
# A Policy-level remediationAction would override the children and force the inform check to enforce.
placementBindingDefaults:
  name: binding-policy-image-registry
policyDefaults:
  namespace: ${POLICY_NAMESPACE}
  severity: high
  consolidateManifests: true
  evaluationInterval:
    compliant: ${EVAL_COMPLIANT}
    noncompliant: ${EVAL_NONCOMPLIANT}
  standards:
    - NIST SP 800-53
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  # Both policies share one hand-authored Placement (predicate autoshift.io/imageregistry).
  placement:
    placementPath: placement.yaml
policies:
  # Storage backing (PVC or NooBaa ObjectBucketClaim) + a Bound readiness check.
  - name: policy-image-registry-storage
    manifests:
      - path: manifests/image-registry-storage.yaml
  # Enables the image registry Config; waits on storage to be provisioned.
  - name: policy-enable-image-registry
    dependencies:
      - name: policy-image-registry-storage
    manifests:
      - path: manifests/enable-image-registry.yaml
