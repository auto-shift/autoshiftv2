apiVersion: v2
name: policy-foundation
description: >-
  Foundation objects the AutoShift policy system depends on, applied directly to
  the hub (not ACM Policies, so they cannot be PolicyGenerator-wrapped): the policy
  Namespace, the shared autoshift-policy-service-account, and the per-clusterset
  ManagedClusterSet + ManagedClusterSetBinding objects that back every PG placement.
type: application
version: 0.0.1
appVersion: 0.0.1
