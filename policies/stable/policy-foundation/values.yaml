# Default values for policy-foundation.
# This chart renders raw hub objects (not ACM Policies): the policy Namespace, the
# shared autoshift-policy-service-account (+ ClusterRoleBinding), and one
# ManagedClusterSet + ManagedClusterSetBinding per clusterset. The clusterset maps
# are supplied by the top autoshift chart via the ApplicationSet valuesObject.
policy_namespace: open-cluster-policies

# hubClusterSets / managedClusterSets are injected by the ApplicationSet
# (autoshift.policyValuesObject) — one ManagedClusterSet + binding is created per
# entry. Left unset here; populated at deploy time.
# hubClusterSets:
#   hub:
#     labels:
#       self-managed: 'true'
# managedClusterSets:
#   managed:
#     labels: {}
