apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-cluster-set-assignment
  namespace: ${POLICY_NAMESPACE}
spec:
  # Runs on the hub (autoshift.io/self-managed is a hub-only label). The policy reads rendered-config
  # ConfigMaps and stamps ManagedCluster clusterset labels — hub-side work, like cluster-install /
  # cluster-labels. It is a no-op for clusters without config.clusterSet.
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/self-managed'
              operator: Exists
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
