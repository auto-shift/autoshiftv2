### AutoShift Labels Documentation
# This policy manages the AutoShift label system itself.
# It automatically applies labels from cluster sets to individual clusters.
#
# System Configuration:
# This policy is always enabled and manages all autoshift.io/* labels
# Label precedence: cluster labels > clusterset labels > helm values
#
# Derived system labels (set by this policy, never from values):
# - autoshift.io/owning-namespace / autoshift.io/owning-deployment: the deployment that owns
#   the cluster's clusterset config.
# - autoshift.io/cluster-type: selfManagedHub | managedHub | spoke. Derived at runtime from the
#   cluster's ManagedClusterSet: the advanced-cluster-management policy labels every set it
#   creates with autoshift.io/cluster-set-type (hub for hubClusterSets, spoke for
#   managedClusterSets); hub-set members split into selfManagedHub/managedHub on the set's
#   self-managed label. Works across deployments because ManagedClusterSets are cluster-scoped
#   hub objects every deployment's policy can look up.
#
# Note: This policy references various labels in debug template but doesn't 
# directly consume them - it manages the label propagation system.
#
# The policy ensures labels defined at clusterset level are propagated to
# member clusters, while allowing cluster-specific overrides.
