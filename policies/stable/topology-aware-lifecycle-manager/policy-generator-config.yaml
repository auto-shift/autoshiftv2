apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: topology-aware-lifecycle-manager
# Per-deployment scalars (${...}) are substituted by the repo-server CMP (envsubst/sed) BEFORE
# `kustomize build` runs. They live here and in placement-hub.yaml — never in manifests/, whose hub
# templates contain `$vars` that substitution would clobber.
#
# TALM installs into the pre-existing openshift-operators namespace (global OperatorGroup already
# present) so there is no Namespace/OperatorGroup manifest. Hub-scoped: TALM runs on hubs to manage
# their clusters. Propagation across hub-of-hubs is per-layer self-install (each layer installs TALM
# on its own hub via autoshift.io/talm), not detection or cross-layer propagation.
policyDefaults:
  namespace: ${POLICY_NAMESPACE}
  remediationAction: ${REMEDIATION}
  severity: high
  consolidateManifests: true
  evaluationInterval:
    compliant: ${EVAL_COMPLIANT}
    noncompliant: ${EVAL_NONCOMPLIANT}
  standards:
    - NIST SP 800-53
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  # Placement authored by us (placement-hub.yaml, hub-scoped); PG generates only the PlacementBinding.
  placement:
    placementPath: placement-hub.yaml
policies:
  - name: policy-talm-operator-install
    manifests:
      - path: manifests
