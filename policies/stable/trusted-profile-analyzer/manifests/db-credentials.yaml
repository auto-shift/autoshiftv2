# Unified DB connection secret (tssc-tpa-db-config) the TrustedProfileAnalyzer CR reads. Host/dbname
# come from config.tpa.db (hub); username/password are looked up spoke-side from the mode's DB secret:
#   cnpg   -> <cluster>-app (CNPG-generated)   host <cluster>-pooler-rw.tssc-tpa.svc
#   simple -> <cluster> (database.yaml)         host <cluster>.tssc-tpa.svc
#   external -> config.tpa.db.external.secret    host config.tpa.db.external.host
object-templates-raw: |
  {{hub- $cm := (lookup "v1" "ConfigMap" .PolicyMetadata.namespace (printf "%s.rendered-config" .ManagedClusterName)) | default dict hub}}
  {{hub- $cfg := (index ($cm.data | default dict) "config" | default "" | fromYaml | default dict) hub}}
  {{hub- $db := (index (index $cfg "tpa" | default dict) "db" | default dict) hub}}
  {{hub- $mode := (index $db "mode" | default "cnpg") hub}}
  {{hub- $cluster := (index $db "clusterName" | default "tpa-pgsql") hub}}
  {{hub- $ext := (index $db "external" | default dict) hub}}
  {{hub- $ns := "tssc-tpa" hub}}
  {{hub- $dbHost := printf "%s-pooler-rw.%s.svc" $cluster $ns hub}}
  {{hub- $dbSecret := printf "%s-app" $cluster hub}}
  {{hub- $dbName := "tpa" hub}}
  {{hub- if eq $mode "simple" hub}}
  {{hub- $dbHost = printf "%s.%s.svc" $cluster $ns hub}}
  {{hub- $dbSecret = $cluster hub}}
  {{hub- else if eq $mode "external" hub}}
  {{hub- $dbHost = (index $ext "host" | default "") hub}}
  {{hub- $dbSecret = (index $ext "secret" | default "") hub}}
  {{hub- $dbName = (index $ext "name" | default "tpa") hub}}
  {{hub- end hub}}
  {{- $dbData := (lookup "v1" "Secret" "{{hub $ns hub}}" "{{hub $dbSecret hub}}" | default dict).data | default dict }}
  {{- $dbUser := index $dbData "username" | default "" | b64dec }}
  {{- $dbPass := index $dbData "password" | default "" | b64dec }}
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: tssc-tpa-db-config
        namespace: '{{hub $ns hub}}'
      type: Opaque
      stringData:
        host: '{{hub $dbHost hub}}'
        port: "5432"
        dbname: '{{hub $dbName hub}}'
        user: '{{ $dbUser }}'
        password: '{{ $dbPass }}'
