# TPA integration secret — advertises the TPA API endpoints to other TSSC components (RHDH, pipelines).
object-templates-raw: |
  {{hub- $ns := "tssc-tpa" hub}}
  {{- $dnsObj := lookup "config.openshift.io/v1" "DNS" "" "cluster" | default dict }}
  {{- $baseDomain := ($dnsObj.spec | default dict).baseDomain | default "cluster.local" }}
  {{- $appsDomain := printf "apps.%s" $baseDomain }}
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: tssc-tpa-integration
        namespace: '{{hub $ns hub}}'
      type: Opaque
      stringData:
        bombastic_api_url: 'https://sbom.{{ $appsDomain }}'
        vexination_api_url: 'https://vex.{{ $appsDomain }}'
        collectorist_api_url: 'https://collectorist.{{ $appsDomain }}'
