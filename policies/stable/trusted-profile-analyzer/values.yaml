# Default values for trusted-profile-analyzer
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
trustedProfileAnalyzer:
  name: rhtpa-operator
  namespace: trusted-profile-analyzer
  channel: stable-v1.1
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  operatorGroupName: trusted-profile-analyzer-operator-group
  # targetNamespaces: # Optional: specify target namespaces for namespace-scoped operators
  #   - trusted-profile-analyzer
  
# hubClusterSets:
