#       test4: 'test'

### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# trusted-profile-analyzer<bool>: 'true' or 'false' - Controls whether trusted-profile-analyzer is managed
#
# Configuration:
# trusted-profile-analyzer-subscription-name<string>: Operator subscription name (default: 'rhtpa-operator')
# trusted-profile-analyzer-channel<string>: Operator channel (default: 'stable-v1.1')
# trusted-profile-analyzer-version<string>: Specific operator version (CSV) to install (optional)
# trusted-profile-analyzer-source<string>: Operator catalog source (default: 'redhat-operators')
# trusted-profile-analyzer-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
# trusted-profile-analyzer-namespace<string>: Namespace for TPA CR (default: 'trusted-profile-analyzer')
#
# CNPG PostgreSQL (internal DB, ignored when trusted-profile-analyzer-db-external is 'true'):
# trusted-profile-analyzer-db-external<bool>: Use external PostgreSQL instead of CNPG (default: 'false')
# trusted-profile-analyzer-db-cluster-name<string>: CNPG Cluster name (default: 'tpa-pgsql')
# trusted-profile-analyzer-db-instances<string>: CNPG primary replica count (default: '2')
# trusted-profile-analyzer-db-storage<string>: CNPG storage size (default: '32Gi')
# trusted-profile-analyzer-db-pooler-instances<string>: PgBouncer Pooler replica count (default: '2')
# trusted-profile-analyzer-db-pool-size<string>: PgBouncer default_pool_size (default: '40')
# trusted-profile-analyzer-db-pool-min-size<string>: PgBouncer min_pool_size (default: '5')
# trusted-profile-analyzer-db-pool-reserve-size<string>: PgBouncer reserve_pool_size (default: '10')
# trusted-profile-analyzer-db-pool-max-client-conn<string>: PgBouncer max_client_conn (default: '400')
#
# External DB (used when trusted-profile-analyzer-db-external is 'true'):
# trusted-profile-analyzer-db-host<string>: PostgreSQL host
# trusted-profile-analyzer-db-secret<string>: Secret name for DB credentials
# trusted-profile-analyzer-db-name<string>: PostgreSQL database name (default: 'tpa')
#
# Examples:
# autoshift.io/trusted-profile-analyzer: 'true'
# autoshift.io/trusted-profile-analyzer-subscription-name: 'rhtpa-operator'
# autoshift.io/trusted-profile-analyzer-channel: 'stable-v1.1'
# autoshift.io/trusted-profile-analyzer-version: 'operator-name.v1.x.x'
# autoshift.io/trusted-profile-analyzer-source: 'redhat-operators'
# autoshift.io/trusted-profile-analyzer-source-namespace: 'openshift-marketplace'