# Readiness gate (inform-only): the TrustedProfileAnalyzer CR reports Successful/Ready.
object-templates-raw: |
  - complianceType: musthave
    objectDefinition:
      apiVersion: rhtpa.io/v1
      kind: TrustedProfileAnalyzer
      metadata:
        name: trustedprofileanalyzer
        namespace: tssc-tpa
      status:
        conditions:
          - type: Successful
            status: "True"
