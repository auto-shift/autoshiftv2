# This policy verifies the installation of the official & supported version of
# the GitOps Operator.
#
{{- if .Values.hubClusterSets }}
{{- /* The CMP init/sidecar images are resolved at policy-enforcement time via hub-template lookups in
       object-templates-raw below — a helm lookup here would not work, because ArgoCD's repo-server does
       not execute helm lookups during rendering. The PolicyGenerator CMP is unconditional: the repo-server
       cannot render any of the kustomize/PolicyGenerator policies without it. */}}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-gitops-systems-argocd
  namespace: {{ .Values.policy_namespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-gitops-operator-install
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: gitops-systems-argocd
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub" }} $gitopsNamespace := index .ManagedClusterLabels "autoshift.io/gitops-namespace" | default "{{ .Values.gitopsNamespace | default .Values.gitops.argoNamespace }}" {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: {{ "{{hub" }} $gitopsNamespace {{ "hub}}" }}
                  labels:
                    openshift.io/cluster-monitoring: "true"
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRoleBinding
                metadata:
                  name: cluster-admin-{{ .Values.gitops.argoName }}-argocd-application-controller
                  annotations:
                    helm.sh/hook-weight: "3"
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: ClusterRole
                  name: cluster-admin
                subjects:
                - kind: ServiceAccount
                  name: {{ .Values.gitops.argoName }}-argocd-application-controller
                  namespace: {{ "{{hub" }} $gitopsNamespace {{ "hub}}" }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: gitops-systems-argocd-instance
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub" }} $gitopsNamespace := index .ManagedClusterLabels "autoshift.io/gitops-namespace" | default "{{ .Values.gitopsNamespace | default .Values.gitops.argoNamespace }}" {{ "hub}}" }}
            {{/* The CMP sidecar image is the SAME image as the running argocd-repo-server (operator-set),
                 resolved via a SPOKE-side lookup ({{ }}) — config-policy-controller runs it on the managed
                 cluster (this self-managed hub), where the repo-server actually lives. A hub-side lookup
                 ({{hub}}) is namespace-restricted to the policy namespace and would fail; a helm lookup
                 returns nothing in ArgoCD's repo-server. No value fallback: if the repo-server isn't found
                 the image resolves empty and the ArgoCD CR fails loudly rather than retrying a bad pinned
                 tag. The repo-server always exists by the time this day-2 policy runs. */}}
            {{ "{{" }} $argoRepoDep := (lookup "apps/v1" "Deployment" "{{ .Values.gitops.argoNamespace }}" "{{ .Values.gitops.argoName }}-repo-server") {{ "}}" }}
            {{ "{{" }} $argoImageLive := "" {{ "}}" }}
            {{ "{{" }} if $argoRepoDep {{ "}}" }}{{ "{{" }} $argoImageLive = (index $argoRepoDep.spec.template.spec.containers 0).image {{ "}}" }}{{ "{{" }} end {{ "}}" }}
            {{/* Same for the ACM subscription image (ships the PolicyGenerator binary): spoke-side lookup of
                 the running multicluster-operators-hub-subscription so it matches the hub's ACM version.
                 No value fallback — the lookup is the source of truth. */}}
            {{ "{{" }} $acmSubDep := (lookup "apps/v1" "Deployment" "open-cluster-management" "multicluster-operators-hub-subscription") {{ "}}" }}
            {{ "{{" }} $acmImageLive := "" {{ "}}" }}
            {{ "{{" }} if $acmSubDep {{ "}}" }}{{ "{{" }} $acmImageLive = (index $acmSubDep.spec.template.spec.containers 0).image {{ "}}" }}{{ "{{" }} end {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: argoproj.io/v1beta1
                kind: ArgoCD
                metadata:
                  name: {{ .Values.gitops.argoName }}
                  namespace: {{ "{{hub" }} $gitopsNamespace {{ "hub}}" }}
                spec:
                  server:
                    {{- if ((($.Values.gitops.server).autoscale).enabled | default false) }}
                    autoscale:
                      enabled: true
                      hpa:
                        maxReplicas: {{ ($.Values.gitops.server.autoscale).maxReplicas | default 10 }}
                        scaleTargetRef:
                          apiVersion: "apps/v1"
                          kind: deployment
                          name: {{ $.Values.gitops.argoName }}-server
                        targetCPUUtilizationPercentage: {{ ($.Values.gitops.server.autoscale).targetCPUUtilizationPercentage | default 50 }}
                    {{- end }}
                    resources:
                      limits:
                        cpu: {{ ((.Values.gitops.server).limits).cpu | default "500m" }}
                        memory: {{ ((.Values.gitops.server).limits).memory | default "256Mi" }}
                      requests:
                        cpu: {{ ((.Values.gitops.server).requests).cpu | default "125m" }}
                        memory: {{ ((.Values.gitops.server).requests).memory | default "128Mi" }}
                    route:
                      enabled: true
                  monitoring:
                    enabled: false
                  kustomizeBuildOptions: --enable-helm --helm-command /usr/local/bin/helm --enable-alpha-plugins --load-restrictor LoadRestrictionsNone
                  applicationInstanceLabelKey: argocd.argoproj.io/instance
                  resourceTrackingMethod: annotation+label
                  sso:
                    dex:
                      resources:
                        limits:
                          cpu: {{ ((.Values.gitops.dex).limits).cpu | default "500m" }}
                          memory: {{ ((.Values.gitops.dex).limits).memory | default "256Mi" }}
                        requests:
                          cpu: {{ ((.Values.gitops.dex).requests).cpu | default "125m" }}
                          memory: {{ ((.Values.gitops.dex).requests).memory | default "128Mi" }}
                      openShiftOAuth: true
                    provider: dex
                  rbac:
                    defaultPolicy: ''
                    policy: |
                      g, cluster-admins, role:admin
                    {{- range .Values.gitops.rbac_policies}}
                      {{ . }}
                    {{- end }}
                    scopes: '[groups]'
                  repo:
                    resources:
                      limits:
                        cpu: {{ ((.Values.gitops.repo).limits).cpu | default "1000m" }}
                        memory: {{ ((.Values.gitops.repo).limits).memory | default "1024Mi" }}
                      requests:
                        cpu: {{ ((.Values.gitops.repo).requests).cpu | default "250m" }}
                        memory: {{ ((.Values.gitops.repo).requests).memory | default "256Mi" }}
                    env:
                      - name: POLICY_GEN_ENABLE_HELM
                        value: "true"
                      - name: KUSTOMIZE_PLUGIN_HOME
                        value: /etc/kustomize/plugin
                    initContainers:
                      # Binary path inside the ACM image varies by version; search known locations.
                      - name: policy-generator-install
                        image: {{ "{{" }} $acmImageLive {{ "}}" }}
                        command: [/bin/sh, -c]
                        args:
                          - |
                            set -e
                            for src in \
                              /etc/kustomize/plugin/policy.open-cluster-management.io/v1/policygenerator/PolicyGenerator \
                              /policy-generator/PolicyGenerator \
                              /policy-generator/PolicyGenerator-rhel8 \
                              /policy-generator/PolicyGenerator-not-fips-compliant; do
                              if [ -f "$src" ]; then
                                cp "$src" /policy-generator-tmp/PolicyGenerator
                                chmod +x /policy-generator-tmp/PolicyGenerator
                                exit 0
                              fi
                            done
                            echo "PolicyGenerator binary not found in ACM image" >&2
                            exit 1
                        volumeMounts:
                          - name: policy-generator
                            mountPath: /policy-generator-tmp
                    sidecarContainers:
                      - name: policy-generator
                        command: [/var/run/argocd/argocd-cmp-server]
                        image: {{ "{{" }} $argoImageLive {{ "}}" }}
                        securityContext:
                          runAsNonRoot: true
                        env:
                          - name: KUSTOMIZE_PLUGIN_HOME
                            value: /etc/kustomize/plugin
                        volumeMounts:
                          - name: var-files
                            mountPath: /var/run/argocd
                          - name: plugins
                            mountPath: /home/argocd/cmp-server/plugins
                          - name: policy-generator-cmp-config
                            mountPath: /home/argocd/cmp-server/config/plugin.yaml
                            subPath: plugin.yaml
                          - name: cmp-tmp
                            mountPath: /tmp
                          - name: policy-generator
                            mountPath: /etc/kustomize/plugin/policy.open-cluster-management.io/v1/policygenerator
                    volumeMounts:
                      - name: policy-generator
                        mountPath: /etc/kustomize/plugin/policy.open-cluster-management.io/v1/policygenerator
                      {{ "{{hub-" }} if eq (index .ManagedClusterLabels "autoshift.io/gitops-cluster-ca-bundle" | default "{{ .Values.gitops.repo.cluster_ca_bundle }}") "true" {{ "hub}}" }}
                      - name: user-ca-bundle
                        mountPath: /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem
                        subPath: ca-bundle.crt
                      {{ "{{hub-" }} end {{ "hub}}" }}
                    volumes:
                      - name: policy-generator
                        emptyDir: {}
                      - name: policy-generator-cmp-config
                        configMap:
                          name: policy-generator-cmp-plugin
                      - name: cmp-tmp
                        emptyDir: {}
                      {{ "{{hub-" }} if eq (index .ManagedClusterLabels "autoshift.io/gitops-cluster-ca-bundle" | default "{{ .Values.gitops.repo.cluster_ca_bundle }}") "true" {{ "hub}}" }}
                      - name: user-ca-bundle
                        configMap:
                          name: user-ca-bundle
                      {{ "{{hub-" }} end {{ "hub}}" }}
                  ha:
                    resources:
                      limits:
                        cpu: {{ ((.Values.gitops.ha).limits).cpu | default "500m" }}
                        memory: {{ ((.Values.gitops.ha).limits).memory | default "256Mi" }}
                      requests:
                        cpu: {{ ((.Values.gitops.ha).requests).cpu | default "125m" }}
                        memory: {{ ((.Values.gitops.ha).requests).memory | default "128Mi" }}
                    enabled: {{ (.Values.gitops.ha).enabled | default "false" }}
                  redis:
                    resources:
                      limits:
                        cpu: {{ ((.Values.gitops.redis).limits).cpu | default "500m" }}
                        memory: {{ ((.Values.gitops.redis).limits).memory | default "256Mi" }}
                      requests:
                        cpu: {{ ((.Values.gitops.redis).requests).cpu | default "125m" }}
                        memory: {{ ((.Values.gitops.redis).requests).memory | default "128Mi" }}
                  controller:
                    processors:
                      status: {{ ((.Values.gitops.controller).statusProcessors) | default 20 }}
                      operation: {{ ((.Values.gitops.controller).operationProcessors) | default 10 }}
                    resources:
                      limits:
                        cpu: {{ ((.Values.gitops.controller).limits).cpu | default "2000m" }}
                        memory: {{ ((.Values.gitops.controller).limits).memory | default "2048Mi" }}
                      requests:
                        cpu: {{ ((.Values.gitops.controller).requests).cpu | default "250m" }}
                        memory: {{ ((.Values.gitops.controller).requests).memory | default "1024Mi" }}
                  applicationSet:
                    resources:
                      limits:
                        cpu: {{ ((.Values.gitops.applicationSet).limits).cpu | default "2" }}
                        memory: {{ ((.Values.gitops.applicationSet).limits).memory | default "1Gi" }}
                      requests:
                        cpu: {{ ((.Values.gitops.applicationSet).requests).cpu | default "250m" }}
                        memory: {{ ((.Values.gitops.applicationSet).requests).memory | default "512Mi" }}
                  resourceHealthChecks:
                    - group: policy.open-cluster-management.io
                      kind: Policy
                      check: |
                        hs = {}
                        if obj.metadata.labels ~= nil and obj.metadata.labels["policy.open-cluster-management.io/root-policy"] ~= nil then
                          hs.status = "Healthy"
                          hs.message = "Replicated policy managed by ACM"
                          return hs
                        end
                        if obj.status == nil or obj.status.compliant == nil then
                          hs.status = "Healthy"
                          hs.message = "No clusters matched by placement"
                          return hs
                        end
                        if obj.status.compliant == "Compliant" then
                          hs.status = "Healthy"
                        elseif obj.status.compliant == "Pending" then
                          hs.status = "Progressing"
                        else
                          hs.status = "Degraded"
                        end
                        hs.message = obj.status.compliant
                        return hs
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: gitops-systems-argocd-cluster-config
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub" }} $gitopsNamespace := index .ManagedClusterLabels "autoshift.io/gitops-namespace" | default "{{ .Values.gitopsNamespace | default .Values.gitops.argoNamespace }}" {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: cluster.open-cluster-management.io/v1beta1
                kind: Placement
                metadata:
                  name: systems-argocd-cluster-placement
                  namespace: {{ "{{hub" }} $gitopsNamespace {{ "hub}}" }}
                spec:
                  clusterSets:
                  {{- range $clusterSet, $value := .Values.hubClusterSets }}
                    - {{ $clusterSet }}
                  {{- end }}
                  {{- range $clusterSet, $value := .Values.managedClusterSets }}
                    - {{ $clusterSet }}
                  {{- end }}
                  tolerations:
                    - key: cluster.open-cluster-management.io/unreachable
                      operator: Exists
                    - key: cluster.open-cluster-management.io/unavailable
                      operator: Exists
            - complianceType: musthave
              objectDefinition:
                apiVersion: apps.open-cluster-management.io/v1beta1
                kind: GitOpsCluster
                metadata:
                  name: argo-acm-importer
                  namespace: {{ "{{hub" }} $gitopsNamespace {{ "hub}}" }}
                spec:
                  argoServer:
                    cluster: notused
                    argoNamespace: {{ "{{hub" }} $gitopsNamespace {{ "hub}}" }}
                  placementRef:
                    kind: Placement
                    apiVersion: cluster.open-cluster-management.io/v1beta1
                    name: systems-argocd-cluster-placement
                    namespace: {{ "{{hub" }} $gitopsNamespace {{ "hub}}" }}
            {{- range $clusterSet, $value := .Values.managedClusterSets }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: cluster.open-cluster-management.io/v1beta2
                kind: ManagedClusterSetBinding
                metadata:
                  name: {{ $clusterSet }}
                  namespace: {{ "{{hub" }} $gitopsNamespace {{ "hub}}" }}
                spec:
                  clusterSet: {{ $clusterSet }}
            {{- end }}
            {{- range $clusterSet, $value := .Values.hubClusterSets }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: cluster.open-cluster-management.io/v1beta2
                kind: ManagedClusterSetBinding
                metadata:
                  name: {{ $clusterSet }}
                  namespace: {{ "{{hub" }} $gitopsNamespace {{ "hub}}" }}
                spec:
                  clusterSet: {{ $clusterSet }}
            {{- end }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-gitops-systems-argocd
  namespace: {{ .Values.policy_namespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-gitops-systems-argocd
  namespace: {{ .Values.policy_namespace }}
placementRef:
  name: placement-policy-gitops-systems-argocd
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-gitops-systems-argocd
    apiGroup: policy.open-cluster-management.io
    kind: Policy
{{- end }}
