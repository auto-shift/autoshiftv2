apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: node-feature-discovery
# Per-deployment scalars (${...}) are substituted by the repo-server CMP BEFORE `kustomize build`
# runs. They live here and in placement.yaml — never in manifests/, whose hub templates contain
# `$vars` that substitution would clobber.
placementBindingDefaults:
  name: binding-policy-node-feature-discovery
policyDefaults:
  namespace: ${POLICY_NAMESPACE}
  remediationAction: ${REMEDIATION}
  severity: high
  consolidateManifests: true
  evaluationInterval:
    compliant: ${EVAL_COMPLIANT}
    noncompliant: ${EVAL_NONCOMPLIANT}
  standards:
    - NIST SP 800-53
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  # All policies share one hand-authored Placement (predicate autoshift.io/node-feature-discovery).
  placement:
    placementPath: placement.yaml
policies:
  # 1) Operator install: raw Namespace (PG wraps -> ConfigurationPolicy) + first-class OperatorPolicy.
  - name: policy-nfd-operator-install
    manifests:
      - path: manifests/operator-install
  # 2) NodeFeatureDiscovery CR (first-class ConfigurationPolicy). Waits on the operator install.
  - name: policy-nfd-instance-deploy
    dependencies:
      - name: policy-nfd-operator-install
    manifests:
      - path: manifests/node-feature-discovery-instance.yaml
