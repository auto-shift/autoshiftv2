apiVersion: policy.open-cluster-management.io/v1beta1
kind: OperatorPolicy
metadata:
  name: install-operator-gpu
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  complianceType: musthave
  operatorGroup:
    name: '{{ with (lookup "operators.coreos.com/v1" "OperatorGroup" "nvidia-gpu-operator" "").items }}{{ (index . 0).metadata.name }}{{ else }}nvidia-gpu-operator-group{{ end }}'
    namespace: nvidia-gpu-operator
    targetNamespaces:
      - nvidia-gpu-operator
  subscription:
    name: '{{hub index .ManagedClusterLabels "autoshift.io/gpu-operator-subscription-name" | default "gpu-operator-certified" hub}}'
    namespace: nvidia-gpu-operator
    # NVIDIA GPU operator ships in the certified-operators catalog.
    source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/gpu-operator-source" | default "certified-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
    sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/gpu-operator-source-namespace" | default "openshift-marketplace" hub}}'
    channel: '{{hub index .ManagedClusterLabels "autoshift.io/gpu-operator-channel" | default "stable" hub}}'
    startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/gpu-operator-version" | default "" hub}}'
  upgradeApproval: Automatic
  versions:
    - '{{hub index .ManagedClusterLabels "autoshift.io/gpu-operator-version" | default "" hub}}'
