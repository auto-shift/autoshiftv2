apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: gpu-operator
# NVIDIA GPU Operator — part of the RHOAI hardware floor (with node-feature-discovery). Installs the
# operator and delivers a ClusterPolicy (sourced from ai-accelerator, patched with labels). Enable on a
# RHOAI clusterset that has GPU nodes alongside autoshift.io/openshift-ai and autoshift.io/nfd.
placementBindingDefaults:
  name: binding-policy-gpu-operator
policyDefaults:
  namespace: ${POLICY_NAMESPACE}
  remediationAction: ${REMEDIATION}
  severity: high
  consolidateManifests: true
  evaluationInterval:
    compliant: ${EVAL_COMPLIANT}
    noncompliant: ${EVAL_NONCOMPLIANT}
  standards:
    - NIST SP 800-53
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  placement:
    placementPath: placement.yaml
policies:
  # 1) GPU operator install (Namespace + OperatorPolicy). Certified-operators catalog.
  - name: policy-gpu-operator-install
    manifests:
      - path: manifests/operator-install
  # 2) ClusterPolicy (GPU operator instance), sourced from ai-accelerator + mig-strategy label patch.
  #    Depends on the operator so the nvidia.com CRDs exist first.
  - name: policy-gpu-cluster-policy
    dependencies:
      - name: policy-gpu-operator-install
    manifests:
      - path: manifests/cluster-policy
