apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Renders the shared components/operator-install chart. Visible per-operator ACM lookups below.
helmGlobals:
  chartHome: ../../../../components/
helmCharts:
  - name: operator-install
    releaseName: cert-manager
    valuesInline:
      name: cert-manager
      namespace: cert-manager-operator
      remediation: ${REMEDIATION}
      subscription:
        name: '{{hub index .ManagedClusterLabels "autoshift.io/cert-manager-subscription-name" | default "openshift-cert-manager-operator" hub}}'
        channel: '{{hub index .ManagedClusterLabels "autoshift.io/cert-manager-channel" | default "stable-v1" hub}}'
        source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/cert-manager-source" | default "redhat-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
        sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/cert-manager-source-namespace" | default "openshift-marketplace" hub}}'
        startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/cert-manager-version" | default "" hub}}'
      versions: '{{hub compact (list (index .ManagedClusterLabels "autoshift.io/cert-manager-version" | default "")) | toRawJson | toLiteral hub}}'
