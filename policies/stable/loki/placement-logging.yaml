apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-loki-logging
  namespace: ${POLICY_NAMESPACE}
spec:
  # The forwarder ships logs INTO the Loki stack (depends on policy-loki-stack-install), so it needs
  # both loki and logging. A per-entry placementPath REPLACES the default placement (it does NOT
  # inherit its predicate), so AND-in the base loki predicate here. Target: loki: true AND logging: true.
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/loki'
              operator: In
              values:
                - 'true'
            - key: 'autoshift.io/logging'
              operator: In
              values:
                - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
