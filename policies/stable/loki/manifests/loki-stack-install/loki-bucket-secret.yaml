apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: openshift-loki-bucket-secret
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates:
    - complianceType: mustonlyhave
      objectDefinition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: logging-loki-odf
          namespace: openshift-logging
        type: Opaque
        stringData:
          access_key_id: '{{ fromSecret "openshift-logging" "loki-bucket-odf" "AWS_ACCESS_KEY_ID" | base64dec }}'
          access_key_secret: '{{ fromSecret "openshift-logging" "loki-bucket-odf" "AWS_SECRET_ACCESS_KEY" | base64dec }}'
          bucketnames: '{{ fromConfigMap "openshift-logging" "loki-bucket-odf" "BUCKET_NAME" }}'
          endpoint: 'https://{{ fromConfigMap "openshift-logging" "loki-bucket-odf" "BUCKET_HOST" }}:{{ fromConfigMap "openshift-logging" "loki-bucket-odf" "BUCKET_PORT" }}'
          region: '{{ fromConfigMap "openshift-logging" "loki-bucket-odf" "BUCKET_REGION" }}'
