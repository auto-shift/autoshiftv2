apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Renders the shared components/operator-install chart. Visible per-operator ACM lookups below.
helmGlobals:
  chartHome: ../../../../../components/
helmCharts:
  - name: operator-install
    releaseName: loki
    valuesInline:
      name: loki
      namespace: openshift-operators-redhat
      remediation: ${REMEDIATION}
      subscription:
        name: '{{hub index .ManagedClusterLabels "autoshift.io/loki-subscription-name" | default "loki-operator" hub}}'
        channel: '{{hub index .ManagedClusterLabels "autoshift.io/loki-channel" | default "stable-6.5" hub}}'
        source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/loki-source" | default "redhat-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
        sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/loki-source-namespace" | default "openshift-marketplace" hub}}'
        startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/loki-version" | default "" hub}}'
      versions: '{{hub compact (list (index .ManagedClusterLabels "autoshift.io/loki-version" | default "")) | toRawJson | toLiteral hub}}'
