apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-loki-coo
  namespace: ${POLICY_NAMESPACE}
spec:
  # The Cluster Observability logging UI plugs into the Loki stack (its dependency chain runs back to
  # policy-loki-stack-install), so it needs loki too. A per-entry placementPath REPLACES the default
  # placement (it does NOT inherit its predicate), so AND-in the base loki predicate here.
  # Target: loki: true AND coo: true.
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/loki'
              operator: In
              values:
                - 'true'
            - key: 'autoshift.io/coo'
              operator: In
              values:
                - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
