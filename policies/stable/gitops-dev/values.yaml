### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# gitops-dev<bool>: 'true' or 'false' - Enable developer OpenShift GitOps instances (default: 'false')
# gitops-dev-team-<team>-cluster-scoped<bool>: 'true' - Add openshift-gitops-<team> to ARGOCD_CLUSTER_CONFIG_NAMESPACES
#   Auto-discovered from labels via prefix matching by the openshift-gitops policy.
#
# Team Configuration:
# gitops-dev-team-<team><String>: 'standalone' or 'hub' - Deploy ArgoCD for this team
#   Auto-discovered from labels via prefix matching. No values list needed.
# gitops-dev-team-<team>-tssc<bool>: 'true' - Enable TSSC integration for this team's ArgoCD
#   Requires config.gitops-dev.<team>.disableAdmin: 'false'
#
# Per-team RBAC and sizing live in the config section (read via rendered-config ConfigMap):
#   config.gitops-dev.<team>.rbac_policies: list of 'g, <group>, role:<role>' entries
#   config.gitops-dev.<team>.disableAdmin: 'true'|'false' (default: 'true')
#   config.gitops-dev.<team>.controller/server/redis/repo/ha/dex/applicationSet:
#     limits/requests: cpu/memory
#                                     - 'standalone': Deploy ArgoCD instance on the cluster
#                                     - 'hub': Use shared ArgoCD instance from hub cluster
#
# Note: Creates dedicated GitOps instances for development teams
# Teams defined in values.yaml (dev, test) with RBAC policies and resource limits
# Supports both standalone instances per cluster and shared hub-based deployments
#
# Examples:
# autoshift.io/gitops-dev: 'true'
# autoshift.io/gitops-dev-team-dev: 'standalone'
# autoshift.io/gitops-dev-team-test: 'hub'