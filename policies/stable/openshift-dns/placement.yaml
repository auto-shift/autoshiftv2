apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-dns-tolerations
  namespace: ${POLICY_NAMESPACE}
spec:
  # The original Helm placement had NO predicate / label selector: DNS tolerations are applied
  # to ALL clusters in the bound ManagedClusterSets. An empty labelSelector preserves that.
  # No spec.clusterSets: selects across all ManagedClusterSetBindings in this namespace.
  predicates:
    - requiredClusterSelector:
        labelSelector: {}
