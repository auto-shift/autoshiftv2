# Imports managed hub clusters into Multicluster Global Hub by stamping the
# global-hub.open-cluster-management.io/deploy-mode label onto every ManagedCluster
# (as seen by the global hub) that carries autoshift.io/global-hub-deploy-mode.
#
# This runs ON the global hub cluster (where the managed hubs are ManagedClusters)
# and translates the AutoShift label set by cluster-labels into the real
# global-hub label the operator watches for.
{{- $policyName := "policy-global-hub-managed-hubs" }}
{{- $placementName := "placement-policy-global-hub-managed-hubs" }}

apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ .Values.policy_namespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
  dependencies:
    - name: policy-global-hub-instance
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: global-hub-managed-hubs
        spec:
          remediationAction: enforce # will be overridden by remediationAction in parent policy
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ `{{- range (lookup "cluster.open-cluster-management.io/v1" "ManagedCluster" "" "").items }}` }}
            {{ `{{- $mode := index (.metadata.labels | default dict) "autoshift.io/global-hub-deploy-mode" }}` }}
            {{ `{{- if $mode }}` }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: cluster.open-cluster-management.io/v1
                kind: ManagedCluster
                metadata:
                  name: {{ `{{ .metadata.name }}` }}
                  labels:
                    global-hub.open-cluster-management.io/deploy-mode: {{ `{{ $mode }}` }}
            {{ `{{- end }}` }}
            {{ `{{- end }}` }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ $placementName }}
  namespace: {{ .Values.policy_namespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/global-hub'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ $placementName }}
  namespace: {{ .Values.policy_namespace }}
placementRef:
  name: {{ $placementName }}
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: {{ $policyName }}
    apiGroup: policy.open-cluster-management.io
    kind: Policy
