# Default values for global-hub
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
globalHub:
  name: multicluster-global-hub-operator-rh
  namespace: multicluster-global-hub
  channel: release-1.8
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  operatorGroupName: global-hub-operator-group
  targetNamespaces: # Target namespaces for namespace-scoped operators
    - multicluster-global-hub
  # MulticlusterGlobalHub operand (CR) defaults
  availabilityConfig: High           # High (default) or Basic
  enableMetrics: 'true'              # enable metrics for built-in kafka/postgres
  installAgentOnLocal: 'true'        # install the Global Hub Agent on the local hub
  postgresRetention: 18m            # built-in postgres data retention
  kafkaSpecTopic: gh-spec
  kafkaStatusTopic: 'gh-status.*'
  consumerGroupPrefix: ''           # optional Kafka consumer group prefix (empty = operator default)
  # AMQ Streams (Kafka) is installed and managed by the global hub operator itself.
  # In disconnected environments the operator needs to be told which mirrored catalog
  # to pull it from — these drive the strimzi-* annotations on the CR (disconnected only).
  amqStreamsChannel: amq-streams-3.1.x

