# Readiness gate: the nmstate-webhook Deployment must report Available before the NNCP
# policy applies. Wrapped by PG into a musthave ConfigurationPolicy; its PG policy entry
# is remediationAction: inform (a status can only be observed, never enforced).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nmstate-webhook
  namespace: openshift-nmstate
status:
  conditions:
    - type: Available
      status: 'True'
