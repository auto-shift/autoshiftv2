apiVersion: policy.open-cluster-management.io/v1beta1
kind: OperatorPolicy
metadata:
  name: install-operator-nmstate
spec:
  remediationAction: enforce
  severity: high
  complianceType: musthave
  operatorGroup:
    name: '{{ with (lookup "operators.coreos.com/v1" "OperatorGroup" "openshift-nmstate" "").items }}{{ (index . 0).metadata.name }}{{ else }}openshift-nmstate{{ end }}'
    namespace: openshift-nmstate
    targetNamespaces:
      - openshift-nmstate
  subscription:
    name: '{{hub index .ManagedClusterLabels "autoshift.io/nmstate-subscription-name" | default "kubernetes-nmstate-operator" hub}}'
    namespace: openshift-nmstate
    source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/nmstate-source" | default "redhat-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
    sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/nmstate-source-namespace" | default "openshift-marketplace" hub}}'
    channel: '{{hub index .ManagedClusterLabels "autoshift.io/nmstate-channel" | default "stable" hub}}'
    startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/nmstate-version" | default "" hub}}'
  upgradeApproval: Automatic
  versions:
    - '{{hub index .ManagedClusterLabels "autoshift.io/nmstate-version" | default "" hub}}'
