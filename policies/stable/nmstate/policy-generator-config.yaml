apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: nmstate
# Each policy's manifests[].path is a DIRECTORY (manifests/<policy>/): drop a new manifest into
# the right subdir and it is picked up automatically — no edit to this file needed. Only edit
# this file to change the policy graph (names, dependencies, per-policy remediation). Keep
# placement.yaml at the dir root, NOT inside manifests/ (a Placement in a wildcarded dir would be
# wrapped into the Policy as a managed object).
placementBindingDefaults:
  name: binding-policy-nmstate
policyDefaults:
  namespace: ${POLICY_NAMESPACE}
  remediationAction: ${REMEDIATION}
  severity: high
  consolidateManifests: true
  evaluationInterval:
    compliant: ${EVAL_COMPLIANT}
    noncompliant: ${EVAL_NONCOMPLIANT}
  standards:
    - NIST SP 800-53
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  # All policies share one hand-authored Placement (predicate autoshift.io/nmstate).
  placement:
    placementPath: placement.yaml
policies:
  # 1) Operator install: raw Namespace (PG wraps -> ConfigurationPolicy) + first-class OperatorPolicy.
  - name: policy-nmstate-operator-install
    manifests:
      - path: manifests/operator-install
  # 2) NMState CR (raw -> wrapped). Waits on the operator install.
  - name: policy-nmstate
    dependencies:
      - name: policy-nmstate-operator-install
    manifests:
      - path: manifests/nmstate
  # 3) Webhook readiness gate — its own always-inform policy. A status can only be observed,
  #    so it must NOT inherit an enforce root (PG's root remediationAction overrides inner templates).
  - name: policy-nmstate-webhook
    remediationAction: inform
    dependencies:
      - name: policy-nmstate-operator-install
    manifests:
      - path: manifests/webhook
  # 4) NNCP generation. Waits on both the CR and the webhook being ready.
  - name: policy-nmstate-nncp
    dependencies:
      - name: policy-nmstate
      - name: policy-nmstate-webhook
    manifests:
      - path: manifests/nncp
