apiVersion: policy.open-cluster-management.io/v1beta1
kind: OperatorPolicy
metadata:
  name: install-operator-virt
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  complianceType: musthave
  operatorGroup:
    # Spoke-side template ({{ }}): if an OperatorGroup already exists in the namespace use it,
    # otherwise fall back to the namespace name. Resolves on the managed cluster.
    name: '{{ with (lookup "operators.coreos.com/v1" "OperatorGroup" "openshift-cnv" "").items }}{{ (index . 0).metadata.name }}{{ else }}openshift-cnv{{ end }}'
    namespace: openshift-cnv
    targetNamespaces:
      - openshift-cnv
  subscription:
    name: '{{hub index .ManagedClusterLabels "autoshift.io/virt-subscription-name" | default "kubevirt-hyperconverged" hub}}'
    namespace: openshift-cnv
    # Source: base from label or default; if disconnected-mirror is true, append -<mirror suffix>.
    source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/virt-source" | default "redhat-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
    sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/virt-source-namespace" | default "openshift-marketplace" hub}}'
    channel: '{{hub index .ManagedClusterLabels "autoshift.io/virt-channel" | default "stable" hub}}'
    startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/virt-version" | default "" hub}}'
  # Version drives upgrade approval: if a version is set the install plan is manual and pinned.
  upgradeApproval: Automatic
  versions:
    - '{{hub index .ManagedClusterLabels "autoshift.io/virt-version" | default "" hub}}'
