apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: worker-node-config
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates-raw: |
            {{- $cores := 0 }}
            {{- range (lookup "v1" "Node" "" "").items }}
              {{- if and (hasKey .metadata.labels "node-role.kubernetes.io/worker") (not (hasKey .metadata.labels "node-role.kubernetes.io/master")) (not (hasKey .metadata.labels "node-role.kubernetes.io/infra")) }}
                {{- if eq $cores 0 }}
                  {{- $cores = (.status.capacity.cpu | toInt) }}
                {{- end }}
              {{- end }}
            {{- end }}
            {{- $maxPods := ("{{hub index .ManagedClusterLabels "autoshift.io/worker-max-pods" | default 250 hub}}" | toInt) }}
            {{- $systemReservedMemory := "{{hub index .ManagedClusterLabels "autoshift.io/worker-system-reserved-memory" | default "1Gi" hub}}" }}
            {{- $systemReservedCpu := "{{hub index .ManagedClusterLabels "autoshift.io/worker-system-reserved-cpu" | default "250m" hub}}" }}
            {{- $kubeReservedMemory := "{{hub index .ManagedClusterLabels "autoshift.io/worker-kube-reserved-memory" | default "512Mi" hub}}" }}
            {{- $kubeReservedCpu := "{{hub index .ManagedClusterLabels "autoshift.io/worker-kube-reserved-cpu" | default "250m" hub}}" }}
            {{- $evictionMemory := "{{hub index .ManagedClusterLabels "autoshift.io/worker-eviction-memory" | default "500Mi" hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: machineconfiguration.openshift.io/v1
                kind: KubeletConfig
                metadata:
                  name: worker-node-config
                spec:
                  machineConfigPoolSelector:
                    matchLabels:
                      pools.operator.machineconfiguration.openshift.io/worker: ""
                  kubeletConfig:
                    podsPerCore: {{ add 1 (div $maxPods $cores) }}
                    maxPods: {{ $maxPods }}
                    systemReserved:
                      memory: {{ $systemReservedMemory }}
                      cpu: {{ $systemReservedCpu }}
                    kubeReserved:
                      memory: {{ $kubeReservedMemory }}
                      cpu: {{ $kubeReservedCpu }}
                    evictionHard:
                      memory.available: {{ $evictionMemory }}
