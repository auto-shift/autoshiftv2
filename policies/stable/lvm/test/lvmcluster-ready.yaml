# Readiness gate: the LVMCluster must report Ready before dependents proceed. Wrapped by PG
# into a musthave ConfigurationPolicy; its PG policy entry is remediationAction: inform
# (a status can only be observed, never enforced).
apiVersion: lvm.topolvm.io/v1alpha1
kind: LVMCluster
metadata:
  name: lvmcluster
  namespace: openshift-storage
status:
  ready: true
  state: Ready
  deviceClassStatuses:
    - name: vg1
      nodeStatus:
        - name: vg1
          status: Ready
