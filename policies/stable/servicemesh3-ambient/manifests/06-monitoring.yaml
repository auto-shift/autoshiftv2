# OpenShift monitoring — Telemetry, istiod ServiceMonitor, ztunnel PodMonitor
apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: servicemesh3-ambient-monitoring
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates:
    - complianceType: musthave
      objectDefinition:
        apiVersion: telemetry.istio.io/v1
        kind: Telemetry
        metadata:
          name: enable-prometheus-metrics
          namespace: istio-system
        spec:
          metrics:
          - providers:
            - name: prometheus
    - complianceType: musthave
      objectDefinition:
        apiVersion: opentelemetry.io/v1beta1
        kind: OpenTelemetryCollector
        metadata:
          name: otel
          namespace: istio-system
        spec:
          mode: deployment
          observability:
            metrics: {}
          deploymentUpdateStrategy: {}
          config:
            exporters:
              otlp:
                endpoint: 'tempo-servicemesh-distributor.tracing-system.svc.cluster.local:4317'
                tls:
                  insecure: true
            receivers:
              otlp:
                protocols:
                  grpc:
                    endpoint: '0.0.0.0:4317'
                  http: {}
            service:
              pipelines:
                traces:
                  exporters:
                  - otlp
                  receivers:
                  - otlp
    - complianceType: musthave
      objectDefinition:
        apiVersion: monitoring.coreos.com/v1
        kind: ServiceMonitor
        metadata:
          name: istiod-monitor
          namespace: istio-system
        spec:
          targetLabels:
          - app
          selector:
            matchLabels:
              istio: pilot
          endpoints:
          - port: http-monitoring
            interval: 30s
    - complianceType: musthave
      objectDefinition:
        apiVersion: monitoring.coreos.com/v1
        kind: PodMonitor
        metadata:
          name: istio-ztunnel-monitor
          namespace: ztunnel
        spec:
          selector:
            matchExpressions:
            - key: istio-prometheus-ignore
              operator: DoesNotExist
          podMetricsEndpoints:
          - path: /stats/prometheus
            interval: 30s
            relabelings:
            - action: keep
              sourceLabels: [__meta_kubernetes_pod_container_name]
              regex: 'istio-proxy'
            - action: keep
              sourceLabels: [__meta_kubernetes_pod_annotationpresent_prometheus_io_scrape]
            - action: replace
              regex: '(\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})'
              replacement: '[$2]:$1'
              sourceLabels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
              targetLabel: __address__
            - action: replace
              regex: '(\d+);((([0-9]+?)(\.|$)){4})'
              replacement: '$2:$1'
              sourceLabels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
              targetLabel: __address__
            - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name, __meta_kubernetes_pod_label_app]
              separator: ';'
              targetLabel: app
              action: replace
              regex: '(.+);.*|.*;(.+)'
              replacement: '${1}${2}'
            - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_version, __meta_kubernetes_pod_label_version]
              separator: ';'
              targetLabel: version
              action: replace
              regex: '(.+);.*|.*;(.+)'
              replacement: '${1}${2}'
            - sourceLabels: [__meta_kubernetes_namespace]
              action: replace
              targetLabel: namespace
            - action: replace
              replacement: mesh_id
              targetLabel: mesh_id
