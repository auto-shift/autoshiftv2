# ZTunnel — per-node L4 proxy DaemonSet for ambient mode
apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: servicemesh3-ambient-ztunnel
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates:
    - complianceType: musthave
      objectDefinition:
        apiVersion: sailoperator.io/v1alpha1
        kind: ZTunnel
        metadata:
          name: default
        spec:
          profile: ambient
          namespace: ztunnel
