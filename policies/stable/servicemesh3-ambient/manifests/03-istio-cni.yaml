# IstioCNI — manages the CNI DaemonSet for traffic redirection
apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: servicemesh3-ambient-istio-cni
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates:
    - complianceType: musthave
      objectDefinition:
        apiVersion: sailoperator.io/v1
        kind: IstioCNI
        metadata:
          name: default
        spec:
          version: '{{hub index .ManagedClusterLabels "autoshift.io/servicemesh3operator-istio-version" | default "v1.28-latest" hub}}'
          profile: ambient
          namespace: istio-cni
          values:
            cni:
              ambient:
                reconcileIptablesOnStartup: true
