apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: quay-registry
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates:
    - complianceType: musthave
      objectDefinition:
        apiVersion: quay.redhat.com/v1
        kind: QuayRegistry
        metadata:
          name: registry
          namespace: quay-enterprise
        spec:
          components:
            - kind: clair
              managed: true
            - kind: postgres
              managed: true
            - kind: objectstorage
              managed: true
            - kind: redis
              managed: true
            - kind: horizontalpodautoscaler
              managed: true
            - kind: route
              managed: true
            - kind: mirror
              managed: true
            - kind: monitoring
              managed: true
            - kind: tls
              managed: true
            - kind: quay
              managed: true
            - kind: clairpostgres
              managed: true
          configBundleSecret: quay-registry-config-bundle
