object-templates-raw: |
  - complianceType: mustnothave
    objectDefinition:
      apiVersion: config.openshift.io/v1
      kind: ClusterVersion
      metadata:
        name: version
      status:
        desired:
          version: '{{hub index .ManagedClusterLabels "autoshift.io/openshift-version" | default "" hub}}'
        conditions:
          - type: Failing
            status: "True"
