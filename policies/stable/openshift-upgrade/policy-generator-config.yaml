apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: openshift-upgrade
# Per-deployment scalars (${...}) are substituted by the repo-server CMP (envsubst/sed) BEFORE
# `kustomize build` runs. They live here and in placement.yaml — never in manifests/, whose hub
# templates contain `$vars` that substitution would clobber.
#
# Drives the ClusterVersion to a target OpenShift version. A cluster upgrades when it lands in a
# clusterset whose deployment targets a higher version (the version comes from the
# openshift-upgrade-* labels). The manifest's semver guard only asserts when target > current, so
# already-at/above clusters are a Compliant no-op and downgrades are never attempted. Blast radius
# is controlled by clusterset membership — move clusters into the target clusterset in waves; do NOT
# enable this on an already-populated clusterset. See docs/ocp-upgrade.md.
policyDefaults:
  namespace: ${POLICY_NAMESPACE}
  remediationAction: ${REMEDIATION}
  severity: high
  consolidateManifests: true
  evaluationInterval:
    compliant: ${EVAL_COMPLIANT}
    noncompliant: ${EVAL_NONCOMPLIANT}
  standards:
    - NIST SP 800-53
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  placement:
    placementPath: placement.yaml
policies:
  - name: policy-openshift-upgrade
    manifests:
      - path: manifests/clusterversion.yaml
