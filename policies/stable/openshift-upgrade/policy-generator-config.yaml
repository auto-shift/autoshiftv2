apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: openshift-upgrade
# Per-deployment scalars (${...}) are substituted by the repo-server CMP (envsubst/sed) BEFORE
# `kustomize build` runs. They live here and in placement.yaml — never in manifests/, whose hub
# templates contain `$vars` that substitution would clobber.
#
# DELIBERATE EXCEPTION to the ${REMEDIATION} convention: this policy is remediationAction: inform
# and NEVER enforces on its own. An OpenShift platform upgrade must never blanket-enforce under
# GitOps (a single label bump would trigger a fleet-wide simultaneous upgrade). The desired
# ClusterVersion is asserted as inform for fleet-wide validation (Compliant only once the upgrade
# has FINISHED), and TALM drives the actual rollout by flipping the PlacementBinding to enforce in
# canaried batches (bindingOverrides.remediationAction) — the Policy object itself stays inform.
policyDefaults:
  namespace: ${POLICY_NAMESPACE}
  remediationAction: inform
  severity: high
  consolidateManifests: true
  evaluationInterval:
    compliant: ${EVAL_COMPLIANT}
    noncompliant: ${EVAL_NONCOMPLIANT}
  standards:
    - NIST SP 800-53
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  # Placement authored by us (placement.yaml at the dir root, full fidelity); PG includes it and
  # generates only the PlacementBinding.
  placement:
    placementPath: placement.yaml
policies:
  # Single ClusterVersion policy (docs §13.6 shape, required by TALM): spec carries the upgrade
  # coordinates (upstream/channel/version); status.history Completed is the completion gate so the
  # policy is Compliant only once the upgrade has FINISHED. status is a subresource (clusterversions/
  # status) so enforce cannot write it — it stays compare-only even when TALM flips the binding.
  - name: policy-openshift-upgrade
    manifests:
      - path: manifests/clusterversion.yaml
