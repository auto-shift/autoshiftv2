### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# external-secrets-operator<bool>: 'true' or 'false' - Controls whether external-secrets-operator is managed
#
# Configuration:
# external-secrets-operator-subscription-name<string>: Operator subscription name (default: 'openshift-external-secrets-operator')
# external-secrets-operator-channel<string>: Operator channel (default: 'stable-v1')
# external-secrets-operator-version<string>: Specific operator version (CSV) to install (optional)
# external-secrets-operator-source<string>: Operator catalog source (default: 'redhat-operators')
# external-secrets-operator-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
#
# Examples:
# autoshift.io/external-secrets-operator: 'true'
# autoshift.io/external-secrets-operator-subscription-name: 'openshift-external-secrets-operator'
# autoshift.io/external-secrets-operator-channel: 'stable-v1'
# autoshift.io/external-secrets-operator-version: 'operator-name.v1.x.x'
# autoshift.io/external-secrets-operator-source: 'redhat-operators'
# autoshift.io/external-secrets-operator-source-namespace: 'openshift-marketplace'