# Default values for external-secrets-operator
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
externalSecretsOperator:
  name: openshift-external-secrets-operator
  namespace: external-secrets-operator
  channel: stable-v1
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  operatorGroupName: external-secrets-operator-operator-group
  # targetNamespaces: # Optional: specify target namespaces for namespace-scoped operators
  #   - external-secrets-operator
  # secret-reader ServiceAccount (created by policy-eso-secret-reader.yaml):
  # a read-only identity other AutoShift components use to consume the Secrets ESO
  # provisions. Created in `namespace` above; granted read on Secrets in the namespaces
  # from config.externalSecretsOperator.secretReaderNamespaces + config.defaultSecretsNamespace.
  secretReaderName: secret-reader

  # ---- ExternalSecretsConfig (singleton CR, name: cluster) -------------------------------------
  # The operator installs but deploys NO external-secrets pods until this CR exists. The install
  # policy creates a minimal one; these tune it. (operator.openshift.io/v1alpha1)
  configLogLevel: 1                          # spec.appConfig.logLevel
  configWebhookCertCheckInterval: 5m0s       # spec.appConfig.webhookConfig.certificateCheckInterval
  configBitwardenMode: Disabled              # spec.plugins.bitwardenSecretManagerProvider.mode (Disabled | Enabled)

  # ---- Cluster->cluster hub bootstrap (policy-eso-boot-store*.yaml) ----
  # Stands the hub up as a kubernetes-provider ClusterSecretStore on each spoke, authenticated
  # with a cert-manager-minted, auto-rotating client cert that the hub apiserver trusts.
  #
  # Tenancy: the hub-side policy issues ONE client cert per owned managed cluster — it enumerates the
  # hub's ManagedClusters, keeps those whose autoshift.io/owning-namespace label (set by the
  # cluster-labels policy) == this policy namespace, and into the policy namespace mints, per cluster,
  # a cert with CN "<hubBootstrap.clientIdentity.certCNPrefix>.<managedClusterName>.<hubBootstrap.clientIdentity.baseDomain>" plus
  # a per-cluster RoleBinding to a shared reader Role granting that CN read on Secrets in this
  # namespace ONLY. So every spoke in a deployment has its OWN identity but the same authorization
  # (this deployment's namespace), and cannot read across tenants. A spoke copies its own per-cluster
  # cert from the policy namespace and reads Secrets from that same namespace.
  #
  # Trust model: cert-manager mints ONE generic self-signed CA (hub-internal key) and that CA is
  # wired into the hub apiserver spec.clientCA. This is ADDITIVE — OpenShift merges a custom
  # clientCA with the operator-managed client signers (csr-signer, admin, kubelet, ...), so existing
  # client auth keeps working; we just add one more trusted issuer. The CA is long-lived and fully
  # ours (no chasing a Red-Hat-managed signer). The only cost is a one-time kube-apiserver rollout
  # when clientCA is first set. Multi-deployment safe: the CA / issuers / clientCA ConfigMap have
  # stable names, so every deployment declares the same shared CA (idempotent).
  # The chart-value DEFAULTS below mirror the per-cluster runtime structure 1:1: everything here under
  # externalSecretsOperator.hubBootstrap.<...> has the same shape as the override under
  # config.eso.hubBootstrap.<...>. A boot policy reads each value as: per-cluster rendered config first,
  # falling back to the chart value of the same path here.
  hubBootstrap:
    # ---- connection (all modes) ----
    hubServer: ''                            # hub apiserver URL (e.g. https://api.hub.example.com:6443). Required
                                             # unless deriveHubUrl (below) is true. Per-cluster override:
                                             # config.eso.hubBootstrap.hubServer.
    deriveHubUrl: false                      # if true AND hubServer is empty, the hub-bootstrap copy policy looks the
                                             # hub apiserver URL up itself (hub-template lookup of the hub's
                                             # apiserverurl.openshift.io ClusterClaim, spec.value). The policy resolves hub
                                             # templates as autoshift-policy-service-account (cluster-admin), so this just
                                             # works — no extra RBAC. Default false: the policy makes no hub lookup and uses
                                             # hubServer. Per-cluster override: config.eso.hubBootstrap.deriveHubUrl.
    storePrefix: hub-bootstrap               # names the store + the minted/copied Secrets/ConfigMaps
    clientCAConfigMap: ''                    # openshift-config CM the hub apiserver clientCA points at (default <prefix>-client-ca)
    # Default refreshInterval for the store-auth ExternalSecrets that policy-eso-secret-stores emits to
    # pull each store's credential from the hub through THIS bootstrap store. Per-store override:
    # config.eso.secretStores[].authSecretConfig.refreshInterval.
    authSecretRefreshInterval: 1h
    # ---- Trust mode -----------------------------------------------------------------------------
    # Selects WHO mints the client cert the spoke authenticates with and WHAT the hub apiserver
    # clientCA trusts. Per-deployment override: config.eso.hubBootstrap.mode. Pick ONE mode per hub:
    # APIServer.spec.clientCA is a single field, so deployments sharing a hub must agree on the mode.
    #   selfSigned (default) — the hub mints a self-signed CA (cert-manager) + one client cert per
    #       cluster (CN derived) and copies each to its spoke; hub clientCA <- that minted CA. Fully
    #       self-contained, no external PKI. Handled by policy ...-boot-clientca-self.
    #   externalCA — both clusters chain to a shared EXTERNAL CA. The SPOKE mints its own client cert
    #       via a user-provided ClusterIssuer (key never leaves the spoke; CN derived the SAME way from
    #       .ManagedClusterName so it matches the hub RBAC); hub clientCA <- the external CA bundle
    #       (externalCertAuthority below). No hub-minted CA. Handled by policy ...-boot-clientca-ext.
    #   externalCAReuseServingCert — externalCA, but instead of minting a client cert the spoke REUSES
    #       its existing apiserver SERVING cert (+key) as the client cert. SECURITY BLAST RADIUS: this
    #       replicates the apiserver private key into the ESO namespace — only enable when a customer
    #       explicitly cannot mint/issue a dedicated client cert. PRECONDITIONS (the policy cannot
    #       verify these; if unmet, client auth fails at the TLS layer or RBAC never matches):
    #         1. EKU: the serving cert MUST carry clientAuth (or anyExtendedKeyUsage) in addition to
    #            serverAuth — a serverAuth-only cert is REJECTED by the hub apiserver's mTLS handshake.
    #         2. IDENTITY: the hub binds RBAC to the cluster's registered apiserver host
    #            (ManagedCluster spec.managedClusterClientConfigs[].url host). The kube-apiserver maps a
    #            client cert to its Subject CN, so the serving cert's Subject CN MUST equal that host.
    #            If the cert puts the host only in SANs with a generic/empty CN, RBAC will not match.
    mode: selfSigned                         # selfSigned | externalCA | externalCAReuseServingCert
    # ---- clientIdentity: client cert CN + lifetime (selfSigned + externalCA; ignored in reuse) ----
    # DEFAULTS only — the per-deployment values are read by the hub clientca policy from
    # config.eso.hubBootstrap.clientIdentity.{certCNPrefix,baseDomain,certDuration,certRenewBefore}.
    clientIdentity:
      certCNPrefix: autoshift-eso-client     # client cert CN prefix; full CN = <prefix>.<managedClusterName>.<baseDomain>
      baseDomain: ''                         # client cert CN base domain (FQDN tail). selfSigned: defaults to
                                             # autoshift.io (origin marker; certs never leave the autoshift trust domain).
                                             # externalCA: REQUIRED (no default) — the CN must satisfy the customer PKI.
                                             # CN = <prefix>.<managedClusterName>.<baseDomain>, capped at
                                             # 63 chars: the managedClusterName segment is TRUNCATED to whatever budget the
                                             # prefix + baseDomain leave (61 minus their lengths, the 2 dots counted). Per-cluster
                                             # override: config.eso.hubBootstrap.clientIdentity.baseDomain. KNOWN LIMITATION: if prefix+baseDomain
                                             # leave no room the policy FAILS; and two clusters whose names share the surviving
                                             # truncation budget would collide — the clientca policy detects that and FAILS loudly.
      certDuration: 720h                     # cert-manager Certificate duration for client certs (default 30d)
      certRenewBefore: 480h                  # cert-manager renewBefore window (default 20d)
    # ---- externalCertAuthority: external-CA trust (externalCA / externalCAReuseServingCert) ----
    # Per-deployment overrides under config.eso.hubBootstrap.externalCertAuthority.<...>.
    externalCertAuthority:
      # External CA bundle the hub apiserver clientCA trusts. The clientca policy reads this ConfigMap
      # on the hub at runtime and materializes it into the openshift-config clientCA ConfigMap above.
      # REQUIRED in both external modes.
      caTrustBundle:
        namespace: openshift-config          # namespace of the external CA bundle CM
        name: ''                             # name of the external CA bundle CM (REQUIRED in external modes)
        key: ca-bundle.crt                   # key in that CM holding the PEM bundle
      # Spoke ClusterIssuer the spoke uses to mint its own client cert (externalCA mode only). Must be
      # user-provided (a precondition) and chained to the shared external CA.
      certIssuer:
        name: ''                             # ClusterIssuer/Issuer name (REQUIRED in externalCA mode)
        kind: ClusterIssuer                  # ClusterIssuer or Issuer
        group: cert-manager.io
      autoshiftProvisioned: true             # DEFAULT for config.eso.hubBootstrap.externalCertAuthority.autoshiftProvisioned.
                                             # true  => AutoShift provisions cert-manager: the readiness gate requires the
                                             #          cert-manager policy (below) Compliant for this cluster AND introspects
                                             #          the autoshift-managed issuer / serving cert before the bootstrap runs.
                                             # false => cert-manager (and the external PKI) is provisioned OUT-OF-BAND: the gate
                                             #          only verifies cert-manager is INSTALLED (operator CSV Succeeded) and
                                             #          trusts the rest — it does NOT wait on the autoshift policy or introspect
                                             #          the issuer/serving cert. Use when the external CA/issuer is managed
                                             #          entirely outside AutoShift and may not be cert-manager-backed/readable.
    # ---- Readiness gate (policy-eso-boot-readiness) ---------------------------------------------
    # The boot-readiness policy is a pure precursor: in the external trust modes it asserts the
    # cert-manager + issuer/serving-cert plumbing is healthy BEFORE the cert-auth bootstrap policies
    # are allowed to run. The bootstrap policies list it in spec.dependencies, so they stay Pending
    # (never attempt cert auth against dead infra) until it is Compliant, and self-heal when it
    # recovers. This is what keeps the system from locking itself out when an external CA / issuer is
    # broken at the same moment client certs expire. (These two are chart-only — no runtime override.)
    certManagerOperatorNamespace: cert-manager-operator  # ns holding the cert-manager-operator CSV (status.phase must be Succeeded)
    certManagerPolicyName: policy-cert-manager  # the autoshift Policy the readiness gates require Compliant
                                             # (per-cluster) when autoshiftProvisioned=true. Override per customer
                                             # environment. The gate reads its name here and looks it up in the policy
                                             # namespace; the hub-template SA must be able to read Policies for this to work.
    # ---- diagnostics: bootstrap run modes -------------------------------------------------------
    # Two mutually-independent escape valves for bringing up / debugging the cert bootstrap WITHOUT
    # letting the active (cluster-mutating) boot policies fire. "Active" = the five cert boot policies:
    # clientca-self, clientca-self-wire, clientca-ext, serving-ca, boot-store. The readiness gates
    # (readiness-hub/-spoke) and the non-cert policies (install, secret-stores, cert-auth-rbac,
    # secret-reader) are NEVER suppressed by these. Both modes are decided PER-CLUSTER at ACM propagation
    # time: each active boot policy reads config.eso.hubBootstrap.diagnostics.{readinessOnly,debugRender}
    # from its rendered-config via a HUB template and branches accordingly, so one cluster can dry-render
    # or sit readiness-only while others apply live. The two values below are only the DEFAULTS used when
    # a cluster's (and its clusterSet's) config omits the key. They are SEPARATE, composable switches:
    #   debugRender   → that policy applies nothing live and instead emits its debug-preview ConfigMap.
    #   readinessOnly → that policy renders an EMPTY object stream (no-op, Compliant), applying nothing.
    #   both          → debug wins for output (the preview ConfigMap renders); nothing applies live, so the
    #                   readiness gates are the only policies doing real work. Branch order in each policy:
    #                   {{hub if $debug}}<preview>{{else if not $readinessOnly}}<live>{{end}}.
    diagnostics:
      readinessOnly: false                   # DEFAULT for per-cluster config.eso.hubBootstrap.diagnostics.readinessOnly.
                                             # When effective (per cluster): the five active cert boot policies
                                             # render an empty object stream — they apply nothing, leaving only the
                                             # readiness gates to run. Use to validate readiness preconditions go
                                             # green before standing up the bootstrap. (The Policy objects still
                                             # exist and report Compliant; they are not absent as in the old
                                             # Helm-render suppression — that is what makes the per-cluster override
                                             # possible.)
      debugRender: false                     # DEFAULT for per-cluster config.eso.hubBootstrap.diagnostics.debugRender.
                                             # When effective (per cluster): that policy applies nothing live and
                                             # instead writes ONE ConfigMap (<configpolicy-name>-debug-render in the
                                             # policy namespace) whose data.rendered.yaml holds the FULL serialized
                                             # object stream it WOULD have applied — resolved on the target cluster
                                             # (same hub/runtime template evaluation), so it reflects real lookups,
                                             # EXCEPT Secret-sourced data which is replaced by a source descriptor.
                                             # Wins over readinessOnly for output (you still get the preview).
  certManagerResourceNamespace: cert-manager # cert-manager "cluster resource namespace" (CA Secret lives here)
  # Hub apiserver serving CA. The boot-serving-ca policy resolves this ON THE HUB at
  # runtime: if the apiserver serves a custom named cert for its external host it trusts that cert's
  # chain, otherwise it falls back to the operator-managed serving-CA bundle named by these keys.
  # It stashes the result in the policy namespace; the copy policy ships it to each spoke.
  hubCASourceNamespace: openshift-config-managed  # fallback serving-CA ConfigMap namespace
  hubCASourceName: kube-apiserver-server-ca       # fallback serving-CA ConfigMap name
  hubCASourceKey: ca-bundle.crt                   # fallback serving-CA ConfigMap key
  # ---- Boot prerequisites: hub-side RBAC for AutoShift internals -------------------------------
  # policy-eso-boot-prereqs renders this as Role/RoleBinding (namespaced) or ClusterRole/
  # ClusterRoleBinding (cluster) for each grant. It exists because the boot machinery resolves hub
  # templates as a ServiceAccount (autoshift-policy-service-account) that must read specific hub
  # objects — e.g. the readiness gates look up the cert-manager Policy's per-cluster status, which
  # needs get/list/watch on policies.policy.open-cluster-management.io in the policy namespace.
  #
  # STRUCTURE (deliberately generic so this can later be lifted into a standalone, centralized RBAC
  # policy group for ALL autoshift-internal grants): bootPrereqs.rbac is a LIST of grants. Each grant:
  #   name            base name for the generated Role/RoleBinding (or ClusterRole/ClusterRoleBinding)
  #   serviceAccount  { name, namespace } subject bound to the role; namespace defaults to policy ns
  #   scope           "namespaced" (default) -> Role + RoleBinding per namespace
  #                   "cluster"              -> ClusterRole + ClusterRoleBinding (cluster-wide)
  #   namespaces      (namespaced scope only) namespaces to create the Role/RoleBinding in;
  #                   defaults to [ the policy namespace ]
  #   rules           standard RBAC policyRules ([]{apiGroups,resources,verbs,...}) verbatim
  # Set bootPrereqs.rbac to [] (or omit) to render no prereq RBAC and skip the policy entirely.
  bootPrereqs:
    rbac:
      - name: eso-boot-policy-reader
        serviceAccount:
          name: autoshift-policy-service-account   # the hub-template SA the boot policies resolve as
          # namespace: open-cluster-policies        # defaults to policy_namespace
        scope: namespaced                           # the readiness gates read Policies in the policy ns
        # namespaces: [open-cluster-policies]        # defaults to [ policy_namespace ]
        rules:
          - apiGroups: ["policy.open-cluster-management.io"]
            resources: ["policies"]
            verbs: ["get", "list", "watch"]

# Internal lookup table used by policy-eso-secret-stores.yaml.
# Maps an authSecretConfig.fromRef token -> a description of the auth method's Secret refs
# in spec. This is NOT per-cluster config: edit it only to teach the policy about a new
# auth method. (vault iam/gcp can be added here once their ref layouts are settled.)
#
# Entry fields (dotted-string paths; the stores policy splits them into lists at Helm time):
#   provider:   the spec.provider.<provider> key (vault, kubernetes, aws, azurekv, ...)
#   base:       dotted path FROM spec.provider.<provider> to the block the components are
#               relative to. `auth` is NOT assumed — providers that nest creds under `auth`
#               put it here (e.g. "auth.cert"); ones that don't (e.g. Azure Key Vault's
#               authSecretRef) just use a different base. "" means refs sit directly on the
#               provider block.
#   components: map of component-name -> dotted path FROM the base block to that
#               SecretKeySelector. The name is what authSecretConfig.sources keys on; the
#               path lets a ref be nested under intermediate keys (e.g. vault iam's
#               secretRef.accessKeyIDSecretRef). authSecretConfig provisions each sourced
#               component independently, reading the target Secret name/key/namespace from
#               that component's ref in spec — so components may live in the SAME Secret
#               (they merge) or DIFFERENT Secrets (each provisioned separately). Optional
#               components (e.g. appRole roleRef, used only when roleId isn't inline) are
#               simply left unsourced.
internal:
  authRefPaths:
    # Vault provider (creds under auth.<method>)
    vaultToken:      { provider: vault,      base: auth,            components: { tokenSecretRef: tokenSecretRef } }
    vaultAppRole:    { provider: vault,      base: auth.appRole,    components: { secretRef: secretRef, roleRef: roleRef } }
    vaultLdap:       { provider: vault,      base: auth.ldap,       components: { secretRef: secretRef } }
    vaultUserPass:   { provider: vault,      base: auth.userPass,   components: { secretRef: secretRef } }
    vaultJwt:        { provider: vault,      base: auth.jwt,        components: { secretRef: secretRef } }
    vaultKubernetes: { provider: vault,      base: auth.kubernetes, components: { secretRef: secretRef } }
    vaultCert:       { provider: vault,      base: auth.cert,       components: { clientCert: clientCert, secretRef: secretRef } }
    # iam/gcp: refs nest under an intermediate key (secretRef.<ref>) — dotted paths handle it.
    vaultIam:        { provider: vault,      base: auth.iam,        components: { accessKeyID: secretRef.accessKeyIDSecretRef, secretAccessKey: secretRef.secretAccessKeySecretRef, sessionToken: secretRef.sessionTokenSecretRef } }
    vaultGcp:        { provider: vault,      base: auth.gcp,        components: { secretAccessKey: secretRef.secretAccessKeySecretRef } }
    # Kubernetes provider (creds under auth.<method>)
    kubernetesToken: { provider: kubernetes, base: auth.token,      components: { bearerToken: bearerToken } }
    kubernetesCert:  { provider: kubernetes, base: auth.cert,       components: { clientCert: clientCert, clientKey: clientKey } }

