# Default values for external-secrets-operator
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
externalSecretsOperator:
  name: openshift-external-secrets-operator
  namespace: external-secrets-operator
  channel: stable-v1
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  operatorGroupName: external-secrets-operator-operator-group
  # targetNamespaces: # Optional: specify target namespaces for namespace-scoped operators
  #   - external-secrets-operator
  # secret-reader ServiceAccount (created by policy-external-secrets-operator-secret-reader.yaml):
  # a read-only identity other AutoShift components use to consume the Secrets ESO
  # provisions. Created in `namespace` above; granted read on Secrets in the namespaces
  # from config.externalSecretsOperator.secretReaderNamespaces + config.defaultSecretsNamespace.
  secretReaderName: secret-reader

  # ---- ExternalSecretsConfig (singleton CR, name: cluster) -------------------------------------
  # The operator installs but deploys NO external-secrets pods until this CR exists. The install
  # policy creates a minimal one; these tune it. (operator.openshift.io/v1alpha1)
  configLogLevel: 1                          # spec.appConfig.logLevel
  configWebhookCertCheckInterval: 5m0s       # spec.appConfig.webhookConfig.certificateCheckInterval
  configBitwardenMode: Disabled              # spec.plugins.bitwardenSecretManagerProvider.mode (Disabled | Enabled)

  # ---- Cluster->cluster hub bootstrap (policy-external-secrets-operator-hub-bootstrap*.yaml) ----
  # Stands the hub up as a kubernetes-provider ClusterSecretStore on each spoke, authenticated
  # with a cert-manager-minted, auto-rotating client cert that the hub apiserver trusts.
  #
  # Tenancy: the hub-side policy issues ONE client cert per owned managed cluster — it enumerates the
  # hub's ManagedClusters, keeps those whose autoshift.io/owning-namespace label (set by the
  # cluster-labels policy) == this policy namespace, and into the policy namespace mints, per cluster,
  # a cert with CN "<hubBootstrapCertCNPrefix>.<managedClusterName>.<hubBootstrapCertBaseDomain>" plus
  # a per-cluster RoleBinding to a shared reader Role granting that CN read on Secrets in this
  # namespace ONLY. So every spoke in a deployment has its OWN identity but the same authorization
  # (this deployment's namespace), and cannot read across tenants. A spoke copies its own per-cluster
  # cert from the policy namespace and reads Secrets from that same namespace.
  #
  # Trust model: cert-manager mints ONE generic self-signed CA (hub-internal key) and that CA is
  # wired into the hub apiserver spec.clientCA. This is ADDITIVE — OpenShift merges a custom
  # clientCA with the operator-managed client signers (csr-signer, admin, kubelet, ...), so existing
  # client auth keeps working; we just add one more trusted issuer. The CA is long-lived and fully
  # ours (no chasing a Red-Hat-managed signer). The only cost is a one-time kube-apiserver rollout
  # when clientCA is first set. Multi-deployment safe: the CA / issuers / clientCA ConfigMap have
  # stable names, so every deployment declares the same shared CA (idempotent).
  hubServer: ''                              # hub apiserver URL (e.g. https://api.hub.example.com:6443). Required
                                             # unless hubBootstrapDeriveHubUrl (below) is true. Per-cluster override:
                                             # config.eso.hubBootstrap.hubServer.
  hubBootstrapDeriveHubUrl: false            # if true AND hubServer is empty, the hub-bootstrap copy policy looks the
                                             # hub apiserver URL up itself (hub-template lookup of Infrastructure.status.
                                             # apiServerURL). This REQUIRES granting the hub-template service account read
                                             # on config.openshift.io/Infrastructure — by enabling this you assert that
                                             # access exists. Default false: the policy makes no hub lookup and uses
                                             # hubServer. Per-cluster override: config.eso.hubBootstrap.deriveHubUrl.
  hubBootstrapStorePrefix: hub-bootstrap     # names the store + the minted/copied Secrets/ConfigMaps
  hubBootstrapClientCAConfigMap: ''          # openshift-config CM the hub apiserver clientCA points at (default <prefix>-client-ca)
  # ---- Trust mode -------------------------------------------------------------------------------
  # Selects WHO mints the client cert the spoke authenticates with and WHAT the hub apiserver
  # clientCA trusts. Per-deployment override: config.eso.hubBootstrap.mode. Pick ONE mode per hub:
  # APIServer.spec.clientCA is a single field, so deployments sharing a hub must agree on the mode.
  #   selfSigned (default) — the hub mints a self-signed CA (cert-manager) + one client cert per
  #       cluster (CN derived) and copies each to its spoke; hub clientCA <- that minted CA. Fully
  #       self-contained, no external PKI. Handled by policy ...-hub-bootstrap-trust.
  #   externalCA — both clusters chain to a shared EXTERNAL CA. The SPOKE mints its own client cert
  #       via a user-provided ClusterIssuer (key never leaves the spoke; CN derived the SAME way from
  #       .ManagedClusterName so it matches the hub RBAC); hub clientCA <- the external CA bundle
  #       (static, below). No hub-minted CA. Handled by policy ...-hub-bootstrap-trust-external.
  #   externalCAReuseServingCert — externalCA, but instead of minting a client cert the spoke REUSES
  #       its existing apiserver SERVING cert (+key) as the client cert. SECURITY BLAST RADIUS: this
  #       replicates the apiserver private key into the ESO namespace — only enable when a customer
  #       explicitly cannot mint/issue a dedicated client cert. PRECONDITIONS (the policy cannot
  #       verify these; if unmet, client auth fails at the TLS layer or RBAC never matches):
  #         1. EKU: the serving cert MUST carry clientAuth (or anyExtendedKeyUsage) in addition to
  #            serverAuth — a serverAuth-only cert is REJECTED by the hub apiserver's mTLS handshake.
  #         2. IDENTITY: the hub binds RBAC to the cluster's registered apiserver host
  #            (ManagedCluster spec.managedClusterClientConfigs[].url host). The kube-apiserver maps a
  #            client cert to its Subject CN, so the serving cert's Subject CN MUST equal that host.
  #            If the cert puts the host only in SANs with a generic/empty CN, RBAC will not match.
  hubBootstrapMode: selfSigned               # selfSigned | externalCA | externalCAReuseServingCert
  # External CA bundle the hub apiserver clientCA trusts (externalCA / externalCAReuseServingCert).
  # The trust policy reads this ConfigMap on the hub at runtime and materializes it into the
  # openshift-config clientCA ConfigMap above. REQUIRED in both external modes. Per-deployment
  # overrides under config.eso.hubBootstrap.externalClientCA.{namespace,name,key}.
  hubBootstrapExternalClientCANamespace: openshift-config  # namespace of the external CA bundle CM
  hubBootstrapExternalClientCAName: ''                     # name of the external CA bundle CM (REQUIRED in external modes)
  hubBootstrapExternalClientCAKey: ca-bundle.crt           # key in that CM holding the PEM bundle
  # Spoke ClusterIssuer the spoke uses to mint its own client cert (externalCA mode only). Must be
  # user-provided (a precondition) and chained to the shared external CA. Per-deployment overrides
  # under config.eso.hubBootstrap.spokeIssuer.{name,kind,group}.
  hubBootstrapSpokeIssuerName: ''            # ClusterIssuer/Issuer name (REQUIRED in externalCA mode)
  hubBootstrapSpokeIssuerKind: ClusterIssuer # ClusterIssuer or Issuer
  hubBootstrapSpokeIssuerGroup: cert-manager.io
  # Cert tuning DEFAULTS. The actual per-deployment values are read by the hub trust policy from
  # config.eso.hubBootstrap.{certCNPrefix,certDuration,certRenewBefore} (rendered-config-driven);
  # these only apply when that config omits them.
  hubBootstrapCertCNPrefix: autoshift-eso-client  # client cert CN prefix; full CN = <prefix>.<managedClusterName>.<baseDomain>
  hubBootstrapCertBaseDomain: ''             # client cert CN base domain (FQDN tail). selfSigned: defaults to
                                             # autoshift.io (origin marker; certs never leave the autoshift trust domain).
                                             # externalCA: REQUIRED (no default) — the CN must satisfy the customer PKI.
                                             # CN = <prefix>.<managedClusterName>.<baseDomain>, capped at
                                             # 63 chars: the managedClusterName segment is TRUNCATED to whatever budget the
                                             # prefix + baseDomain leave (61 minus their lengths, the 2 dots counted). Per-cluster
                                             # override: config.eso.hubBootstrap.baseDomain. KNOWN LIMITATION: if prefix+baseDomain
                                             # leave no room the policy FAILS; and two clusters whose names share the surviving
                                             # truncation budget would collide — the trust policy detects that and FAILS loudly.
  hubBootstrapCertDuration: 720h             # cert-manager Certificate duration for client certs (default 30d)
  hubBootstrapCertRenewBefore: 480h          # cert-manager renewBefore window (default 20d)
  certManagerResourceNamespace: cert-manager # cert-manager "cluster resource namespace" (CA Secret lives here)
  # Hub apiserver serving CA. The hub-bootstrap-serving-ca policy resolves this ON THE HUB at
  # runtime: if the apiserver serves a custom named cert for its external host it trusts that cert's
  # chain, otherwise it falls back to the operator-managed serving-CA bundle named by these keys.
  # It stashes the result in the policy namespace; the copy policy ships it to each spoke.
  hubCASourceNamespace: openshift-config-managed  # fallback serving-CA ConfigMap namespace
  hubCASourceName: kube-apiserver-server-ca       # fallback serving-CA ConfigMap name
  hubCASourceKey: ca-bundle.crt                   # fallback serving-CA ConfigMap key

# Internal lookup table used by policy-external-secrets-operator-stores.yaml.
# Maps an authSecretConfig.fromRef token -> a description of the auth method's Secret refs
# in spec. This is NOT per-cluster config: edit it only to teach the policy about a new
# auth method. (vault iam/gcp can be added here once their ref layouts are settled.)
#
# Entry fields (dotted-string paths; the stores policy splits them into lists at Helm time):
#   provider:   the spec.provider.<provider> key (vault, kubernetes, aws, azurekv, ...)
#   base:       dotted path FROM spec.provider.<provider> to the block the components are
#               relative to. `auth` is NOT assumed — providers that nest creds under `auth`
#               put it here (e.g. "auth.cert"); ones that don't (e.g. Azure Key Vault's
#               authSecretRef) just use a different base. "" means refs sit directly on the
#               provider block.
#   components: map of component-name -> dotted path FROM the base block to that
#               SecretKeySelector. The name is what authSecretConfig.sources keys on; the
#               path lets a ref be nested under intermediate keys (e.g. vault iam's
#               secretRef.accessKeyIDSecretRef). authSecretConfig provisions each sourced
#               component independently, reading the target Secret name/key/namespace from
#               that component's ref in spec — so components may live in the SAME Secret
#               (they merge) or DIFFERENT Secrets (each provisioned separately). Optional
#               components (e.g. appRole roleRef, used only when roleId isn't inline) are
#               simply left unsourced.
internal:
  authRefPaths:
    # Vault provider (creds under auth.<method>)
    vaultToken:      { provider: vault,      base: auth,            components: { tokenSecretRef: tokenSecretRef } }
    vaultAppRole:    { provider: vault,      base: auth.appRole,    components: { secretRef: secretRef, roleRef: roleRef } }
    vaultLdap:       { provider: vault,      base: auth.ldap,       components: { secretRef: secretRef } }
    vaultUserPass:   { provider: vault,      base: auth.userPass,   components: { secretRef: secretRef } }
    vaultJwt:        { provider: vault,      base: auth.jwt,        components: { secretRef: secretRef } }
    vaultKubernetes: { provider: vault,      base: auth.kubernetes, components: { secretRef: secretRef } }
    vaultCert:       { provider: vault,      base: auth.cert,       components: { clientCert: clientCert, secretRef: secretRef } }
    # iam/gcp: refs nest under an intermediate key (secretRef.<ref>) — dotted paths handle it.
    vaultIam:        { provider: vault,      base: auth.iam,        components: { accessKeyID: secretRef.accessKeyIDSecretRef, secretAccessKey: secretRef.secretAccessKeySecretRef, sessionToken: secretRef.sessionTokenSecretRef } }
    vaultGcp:        { provider: vault,      base: auth.gcp,        components: { secretAccessKey: secretRef.secretAccessKeySecretRef } }
    # Kubernetes provider (creds under auth.<method>)
    kubernetesToken: { provider: kubernetes, base: auth.token,      components: { bearerToken: bearerToken } }
    kubernetesCert:  { provider: kubernetes, base: auth.cert,       components: { clientCert: clientCert, clientKey: clientKey } }

