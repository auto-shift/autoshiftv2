# PRECURSOR READINESS GATE (PROVIDER / hub side) for the cert-based ESO hub bootstrap.
#
# Scope: the cluster acting as the bootstrap PROVIDER — the hub that the consumers authenticate to.
# Placed on hubClusterSets ONLY (identical to the hub-side boot policies it gates). EVERY hub in the
# set is a minter in selfSigned (top-level or intermediate), so the cert-manager requirement is keyed
# on PLACEMENT, not on the autoshift.io/self-managed label (which only flags the top hub).
#
# managedHubs (hubClusterSets members with self-managed=false): this gate STILL requires cert-manager
# here — no special-case. In a hub-of-hubs topology a managedHub's hub-side boot policies AND this gate
# are rendered onto it by the GLOBAL hub's deployment (which also installs cert-manager there), so the
# gate simply goes NonCompliant until the global deployment provisions cert-manager, then green. The
# managedHub's OWN deployment must NOT separately render these hub-side policies for itself (same policy
# names + namespace would collide) — that ownership split is enforced by the deployment values, not here.
#
# The hub's role per mode determines what must be ready:
#   selfSigned                 -> the hub MINTS the self-signed CA + a client cert per cluster with
#                                 cert-manager (policy-eso-boot-clientca-self) -> require cert-manager
#                                 CSV phase=Succeeded.
#   externalCA / reuse         -> the hub MINTS NOTHING; it only wires the external CA bundle into the
#                                 apiserver clientCA (policy-eso-boot-clientca-ext). No cert infra to
#                                 wait on here -> Compliant. (clientca-ext still validates the bundle
#                                 itself; the consumer-side issuer/serving-cert readiness is gated by
#                                 policy-eso-boot-readiness-spoke on the consumer.)
#
# Contract: this Policy is a GATE, surfaced WITHOUT `fail` (which buries the reason under the whole
# policy-rendered-as-a-string in the console). Two ConfigurationPolicies:
#   * eso-boot-readiness-hub-report (enforce) collects every problem into $errors, then — via the inline
#     status-report block at the end of its body — writes a per-policy status ConfigMap (full list) when
#     anything is wrong, and ENFORCE-deletes it when ready (self-clearing).
#   * eso-boot-readiness-hub-gate (inform) mustnothave's that status ConfigMap, so IT is the compliance
#     proxy: NonCompliant exactly while the report CM exists. The inform gate creates nothing — the
#     enforce report owns lifecycle, which is why the report must clear the CM on recovery.
#   ready -> report clears CM -> gate Compliant ; not ready -> report writes CM -> gate NonCompliant.
# The hub-side boot policies (policy-eso-boot-clientca-self, -clientca-ext, -serving-ca) list this in
# spec.dependencies, so they stay Pending until it is Compliant and resume when cert-manager recovers.
#
{{- $policyNamespace := $.Values.policy_namespace }}
{{- $eso := $.Values.externalSecretsOperator }}
{{- $hb := (default (dict) $eso.hubBootstrap) }}
{{- $cmOperatorNs := (dig "certManagerOperatorNamespace" "" $hb | default "cert-manager-operator") }}
{{- $cmPolicyName := (dig "certManagerPolicyName" "" $hb | default "policy-cert-manager") }}
{{- $defaultAutoshiftProvisioned := (dig "externalCertAuthority" "autoshiftProvisioned" "" $hb | default true) }}
{{- $defaultMode := (dig "mode" "" $hb | default "selfSigned") }}
{{/* Always gate on policy-eso-boot-prereqs: it backs the SA's Policy-read access (used by the
       cert-manager-policy compliance check below) and now ALWAYS renders (Compliant no-op when
       bootPrereqs.rbac is empty), so this dependency is unconditional. Both policies are hub-placed,
       so the same-cluster dependency is valid. */}}
{{- if $.Values.hubClusterSets }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-boot-readiness-hub
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/description: 'Readiness gate for the hub-side boot policies - assert cert-manager, issuer, and serving-cert health per trust mode before the active boot policies may run.'
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-12 Cryptographic Key Establishment and Management
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-eso-boot-prereqs
      namespace: {{ $policyNamespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  # Resolve hub templates as the autoshift hub-template SA so the rendered-config ConfigMap read in
  # the policy namespace succeeds (same as the other boot policies).
  hubTemplateOptions:
    serviceAccountName: autoshift-policy-service-account
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-boot-readiness-hub-report
        spec:
          # enforce: this CP OWNS the status objects — it writes the status ConfigMap when $errors is
          # non-empty and deletes it when empty. This CP's OWN compliance is NOT the gate signal (it stays
          # Compliant by reconciling those objects); the companion inform gate CP below is.
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### DERIVE (on the hub): this cluster's bootstrap mode from rendered config #####
            {{ "{{hub" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" $.ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $hubBootstrap := (dig "eso" "hubBootstrap" (dict) $clusterConfig) {{ "hub}}" }}
            {{ "{{hub-" }} $mode := (index $hubBootstrap "mode" | default "{{ $defaultMode }}") {{ "hub}}" }}
            ##### autoshiftProvisioned (default {{ $defaultAutoshiftProvisioned }}): true => the autoshift cert-manager policy must be #####
            ##### Compliant for THIS cluster (per-cluster status, derived on the hub); false => cert-manager is #####
            ##### out-of-band, so only the CSV-installed check runs below. selfSigned needs cert-manager either way. #####
            {{ "{{hub-" }} $autoshiftProvisioned := (dig "externalCertAuthority" "autoshiftProvisioned" {{ $defaultAutoshiftProvisioned }} $hubBootstrap) {{ "hub}}" }}
            {{ "{{hub-" }} $cmPolCompliant := "" {{ "hub}}" }}
            {{ "{{hub-" }} if and (eq $mode "selfSigned") $autoshiftProvisioned {{ "hub}}" }}
              {{ "{{hub-" }} $cmPol := (lookup "policy.open-cluster-management.io/v1" "Policy" "{{ $policyNamespace }}" "{{ $cmPolicyName }}") {{ "hub}}" }}
              {{ "{{hub-" }} range $st := (dig "status" "status" (list) $cmPol) {{ "hub}}" }}
                {{ "{{hub-" }} if eq (dig "clustername" "" $st) $.ManagedClusterName {{ "hub}}" }}{{ "{{hub-" }} $cmPolCompliant = (dig "compliant" "" $st) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            ##### BRIDGE to the runtime (hub) side #####
            {{ "{{-" }} $mode := `{{ "{{hub" }} $mode {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $autoshiftProvisioned := `{{ "{{hub" }} $autoshiftProvisioned {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $cmPolCompliant := `{{ "{{hub" }} $cmPolCompliant {{ "hub}}" }}` {{ "}}" }}
            ##### ACT (on the hub): only selfSigned mints here, so only selfSigned needs cert-manager. #####
            ##### external modes wire trust without minting -> nothing to wait on -> Compliant. #####
            {{ "{{-" }} $errors := list {{ "}}" }}
            {{ "{{-" }} if eq $mode "selfSigned" {{ "}}" }}
              ##### cert-manager operator CSV must be phase=Succeeded. Name carries a version suffix #####
              ##### (cert-manager-operator.vX.Y.Z) so match by prefix; zero matches is ALSO not-ready. #####
              {{ "{{-" }} $csvReady := false {{ "}}" }}
              {{ "{{-" }} range $csv := ((lookup "operators.coreos.com/v1alpha1" "ClusterServiceVersion" "{{ $cmOperatorNs }}" "").items | default list) {{ "}}" }}
                {{ "{{-" }} if and (hasPrefix "cert-manager-operator" $csv.metadata.name) (eq (dig "status" "phase" "" $csv) "Succeeded") {{ "}}" }}
                  {{ "{{-" }} $csvReady = true {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} if not $csvReady {{ "}}" }}
                {{ "{{-" }} $errors = append $errors (printf "[spoke] cert-manager-operator CSV in namespace %q is not phase=Succeeded — the hub mints the selfSigned CA + client certs with cert-manager" "{{ $cmOperatorNs }}") {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
              ##### autoshiftProvisioned=true: additionally require the autoshift cert-manager policy Compliant for THIS #####
              ##### cluster. false => skip (cert-manager is provisioned out-of-band; the CSV check above is enough). #####
              {{ "{{-" }} if and (eq $autoshiftProvisioned "true") (ne $cmPolCompliant "Compliant") {{ "}}" }}
                {{ "{{-" }} $errors = append $errors (printf "[spoke] autoshift cert-manager policy %q is not Compliant for this cluster (status=%q) — set config.eso.hubBootstrap.externalCertAuthority.autoshiftProvisioned=false if cert-manager is provisioned out-of-band, or ensure the policy exists and the hub-template SA can read Policies" "{{ $cmPolicyName }}" $cmPolCompliant) {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            ##### SURFACE results as DATA (no fail): the status-report block below writes the status #####
            ##### ConfigMap (full list) when anything was collected and mustnothave-clears it when $errors #####
            ##### is empty. The companion inform gate CP turns that ConfigMap's presence into compliance. #####
            {{ "{{-" }} if $errors {{ "}}" }}
            ##### PRECONDITION REPORT (replaces fail): full detail in a ConfigMap. ACM emits its own compliance #####
            ##### Events, so this carries the DETAIL only; the inform gate CP turns its presence into NonCompliant. #####
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: eso-boot-readiness-hub-status
                  namespace: open-cluster-management-agent-addon
                  labels:
                    autoshift.io/eso-boot-status: "true"
                    autoshift.io/eso-boot-policy: eso-boot-readiness-hub
                data:
                  policy: eso-boot-readiness-hub
                  errorCount: {{ "{{" }} $errors | len | quote {{ "}}" }}
                  errors: |
                    {{ "{{-" }} range $e := $errors {{ "}}" }}
                    - {{ "{{" }} $e {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} else {{ "}}" }}
            ##### No precondition errors: clear any stale status ConfigMap so the signal self-heals. #####
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: eso-boot-readiness-hub-status
                  namespace: open-cluster-management-agent-addon
            {{ "{{-" }} end {{ "}}" }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-boot-readiness-hub-gate
        spec:
          # inform GATE: the compliance proxy for the readiness report. It mutates nothing; it asserts the
          # report's status ConfigMap is ABSENT. Present (report found problems) -> NonCompliant -> the
          # hub-side boot policies stay Pending. Absent -> Compliant -> they proceed. The status CM lives in
          # open-cluster-management-agent-addon (always present), so the gate cannot falsely read Compliant
          # because the CM's namespace was missing.
          remediationAction: inform
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: eso-boot-readiness-hub-status
                  namespace: open-cluster-management-agent-addon
{{ end }}
