# Hub-side half of the cluster->cluster ESO bootstrap for the EXTERNAL-CA trust modes. Companion to
# policy-external-secrets-operator-hub-bootstrap-trust.yaml (which owns the selfSigned mode); the two
# are mutually exclusive by config.eso.hubBootstrap.mode so they never both write APIServer.spec.clientCA.
# Placed ONLY on hub clusters (hubClusterSets).
#
# Modes this policy owns (mode read from THIS cluster's rendered config; see chart values.yaml):
#   externalCA — both clusters chain to a SHARED EXTERNAL CA. The hub mints NOTHING: the SPOKE mints
#     its own client cert via a user-provided ClusterIssuer (handled in the spoke companion), and the
#     hub apiserver clientCA simply trusts the external CA bundle. Because the spoke derives its CN the
#     SAME way this policy does (<prefix>.<managedClusterName>.<baseDomain>, truncated to 63), the
#     per-cluster RBAC subject below matches the cert with no out-of-band coordination.
#   externalCAReuseServingCert — same external-CA trust, but the spoke presents its existing apiserver
#     SERVING cert as the client cert (no new cert minted anywhere). The hub cannot parse an x509 cert
#     in a template to learn that cert's Subject, so the RBAC identity is DISCOVERED from the cluster's
#     registered apiserver host (ManagedCluster spec.managedClusterClientConfigs[].url host). PRECONDITIONS
#     (unverifiable here): the serving cert must carry clientAuth EKU (else the hub's mTLS handshake
#     rejects it) and its Subject CN must equal that host (else this RBAC binding never matches). See
#     values.yaml hubBootstrapMode for the full caveat + the key-replication blast radius.
#
# What this policy does, PER ELIGIBLE CLUSTER (tenancy label autoshift.io/owning-namespace ==
# this policy namespace; missing label -> skip):
#   - materializes the configured external CA bundle ConfigMap into openshift-config and points the hub
#     APIServer.spec.clientCA at it (additive; OpenShift merges it with the operator-managed signers),
#   - creates one shared reader Role in the tenancy namespace + one RoleBinding per cluster whose subject
#     is that cluster's identity (derived CN for externalCA; discovered apiserver host for the reuse mode).
# No CA / issuer / Certificate is created here — that is exactly what differs from the selfSigned policy.
#
# Hub vs runtime split mirrors the selfSigned policy: hub templates DERIVE values from THIS cluster's
# rendered config only; runtime templates do the ManagedCluster lookup + all actions, resolving against
# the cluster the policy landed on. No-op unless at least one labelled cluster exists for this deployment.
#
{{- if $.Values.hubClusterSets }}
  {{- /* Structural naming — shares the reader Role + clientCA ConfigMap names with the selfSigned policy */}}
  {{- $policyNamespace := $.Values.policy_namespace }}
  {{- $eso := $.Values.externalSecretsOperator }}
  {{- $storePrefix := ($eso.hubBootstrapStorePrefix | default "hub-bootstrap") }}
  {{- $readerRole := (printf "%s-reader" $storePrefix) }}
  {{- $clientCAConfigMap := ($eso.hubBootstrapClientCAConfigMap | default (printf "%s-client-ca" $storePrefix)) }}
  {{- /* Cert / mode tuning DEFAULTS — actual values read per-deployment from config.eso.hubBootstrap below. */}}
  {{- $defaultMode := ($eso.hubBootstrapMode | default "selfSigned") }}
  {{- $defaultCertCNPrefix := ($eso.hubBootstrapCertCNPrefix | default "autoshift-eso-client") }}
  {{- $defaultCertBaseDomain := ($eso.hubBootstrapCertBaseDomain | default "") }}
  {{- $defaultExtCANamespace := ($eso.hubBootstrapExternalClientCANamespace | default "openshift-config") }}
  {{- $defaultExtCAName := ($eso.hubBootstrapExternalClientCAName | default "") }}
  {{- $defaultExtCAKey := ($eso.hubBootstrapExternalClientCAKey | default "ca-bundle.crt") }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-hub-bootstrap-trust-external
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-17 Public Key Infrastructure Certificates
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-hub-bootstrap-trust-external
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### DERIVE (hub): load THIS cluster's rendered config + its hubBootstrap mode/cert/external-CA settings #####
            {{ "{{hub" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" .ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $hubBootstrap := (dig "eso" "hubBootstrap" (dict) $clusterConfig) {{ "hub}}" }}
            {{ "{{hub-" }} $mode := (index $hubBootstrap "mode" | default "{{ $defaultMode }}") {{ "hub}}" }}
            {{ "{{hub-" }} $certCNPrefix := (index $hubBootstrap "certCNPrefix" | default "{{ $defaultCertCNPrefix }}") {{ "hub}}" }}
            {{ "{{hub-" }} $certBaseDomain := (index $hubBootstrap "baseDomain" | default "{{ $defaultCertBaseDomain }}") {{ "hub}}" }}
            {{ "{{hub-" }} $extCA := (dig "externalClientCA" (dict) $hubBootstrap) {{ "hub}}" }}
            {{ "{{hub-" }} $extCANamespace := (index $extCA "namespace" | default "{{ $defaultExtCANamespace }}") {{ "hub}}" }}
            {{ "{{hub-" }} $extCAName := (index $extCA "name" | default "{{ $defaultExtCAName }}") {{ "hub}}" }}
            {{ "{{hub-" }} $extCAKey := (index $extCA "key" | default "{{ $defaultExtCAKey }}") {{ "hub}}" }}
            ##### BRIDGE the derived settings to the runtime side #####
            {{ "{{-" }} $mode := `{{ "{{hub" }} $mode {{ "hub}}" }}` {{ "}}" }}
            ##### Reject an unknown mode loudly (a typo'd mode would otherwise silently no-op this policy AND #####
            ##### the selfSigned companion, leaving the hub apiserver with no clientCA wired for any cluster). #####
            {{ "{{-" }} if and (ne $mode "selfSigned") (ne $mode "externalCA") (ne $mode "externalCAReuseServingCert") {{ "}}" }}{{ "{{-" }} fail (printf "invalid config.eso.hubBootstrap.mode %q (or values hubBootstrapMode) — must be one of: selfSigned, externalCA, externalCAReuseServingCert" $mode) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} $certCNPrefix := `{{ "{{hub" }} $certCNPrefix {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $certBaseDomain := `{{ "{{hub" }} $certBaseDomain {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $extCANamespace := `{{ "{{hub" }} $extCANamespace {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $extCAName := `{{ "{{hub" }} $extCAName {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $extCAKey := `{{ "{{hub" }} $extCAKey {{ "hub}}" }}` {{ "}}" }}
            ##### RUNTIME (on the hub itself): build the eligible set ONLY in the two external modes. #####
            ##### selfSigned is owned by policy ...-hub-bootstrap-trust, so leave $eligible empty here. #####
            ##### Identity per cluster = derived CN (externalCA) OR the registered apiserver host (reuse mode). #####
            {{ "{{-" }} $eligible := list {{ "}}" }}
            {{ "{{-" }} $seenIds := dict {{ "}}" }}
            {{ "{{-" }} if or (eq $mode "externalCA") (eq $mode "externalCAReuseServingCert") {{ "}}" }}
            {{ "{{-" }} $cnBudget := (sub 61 (add (len $certCNPrefix) (len $certBaseDomain))) {{ "}}" }}
            {{ "{{-" }} range $mc := ((lookup "cluster.open-cluster-management.io/v1" "ManagedCluster" "" "").items | default list) {{ "}}" }}
              {{ "{{-" }} $mcName := $mc.metadata.name {{ "}}" }}
              {{ "{{-" }} $tenancyNs := (dig "metadata" "labels" "autoshift.io/owning-namespace" "" $mc) {{ "}}" }}
              {{ "{{-" }} if and (ne $tenancyNs "") (eq $tenancyNs "{{ $policyNamespace }}") {{ "}}" }}
                {{ "{{-" }} $identity := "" {{ "}}" }}
                {{ "{{-" }} if eq $mode "externalCA" {{ "}}" }}
                  ##### externalCA: CN = <prefix>.<clusterTrunc>.<baseDomain>, identical to the selfSigned derivation #####
                  {{ "{{-" }} if eq $certBaseDomain "" {{ "}}" }}{{ "{{-" }} fail "hubBootstrapCertBaseDomain (or config.eso.hubBootstrap.baseDomain) is required in externalCA mode (the spoke derives the SAME CN, so the hub RBAC must match)" {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} if lt $cnBudget 1 {{ "}}" }}{{ "{{-" }} fail (printf "hub-bootstrap CN budget exhausted: prefix %q + baseDomain %q leave no room for the cluster name (combined length must be <= 61); shorten the prefix or baseDomain" $certCNPrefix $certBaseDomain) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} $clusterSeg := $mcName {{ "}}" }}
                  {{ "{{-" }} if gt (len $mcName) $cnBudget {{ "}}" }}{{ "{{-" }} $clusterSeg = (slice $mcName 0 $cnBudget) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} $identity = (printf "%s.%s.%s" $certCNPrefix $clusterSeg $certBaseDomain) {{ "}}" }}
                {{ "{{-" }} else {{ "}}" }}
                  ##### externalCAReuseServingCert: identity = host of the cluster's registered apiserver URL. #####
                  ##### No urlParse in ACM templates, so split scheme//host:port/path with splitList + index. #####
                  {{ "{{-" }} $clientConfigs := (dig "spec" "managedClusterClientConfigs" (list) $mc) {{ "}}" }}
                  {{ "{{-" }} if not $clientConfigs {{ "}}" }}{{ "{{-" }} fail (printf "ManagedCluster %q has no spec.managedClusterClientConfigs[].url — cannot derive the client identity for externalCAReuseServingCert mode" $mcName) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} $url := (dig "url" "" (index $clientConfigs 0)) {{ "}}" }}
                  {{ "{{-" }} if eq $url "" {{ "}}" }}{{ "{{-" }} fail (printf "ManagedCluster %q managedClusterClientConfigs[0].url is empty" $mcName) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} $afterScheme := $url {{ "}}" }}
                  {{ "{{-" }} if contains "//" $url {{ "}}" }}{{ "{{-" }} $afterScheme = (index (splitList "//" $url) 1) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} $hostport := (index (splitList "/" $afterScheme) 0) {{ "}}" }}
                  {{ "{{-" }} $identity = (index (splitList ":" $hostport) 0) {{ "}}" }}
                  {{ "{{-" }} if eq $identity "" {{ "}}" }}{{ "{{-" }} fail (printf "could not derive apiserver host from ManagedCluster %q url %q" $mcName $url) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} if hasKey $seenIds $identity {{ "}}" }}{{ "{{-" }} fail (printf "hub-bootstrap-external identity collision: clusters %q and %q both map to identity %q; rename a cluster or (externalCA) lengthen the CN budget" (index $seenIds $identity) $mcName $identity) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} $seenIds = set $seenIds $identity $mcName {{ "}}" }}
                {{ "{{-" }} $eligible = append $eligible (dict "name" $mcName "id" $identity) {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} if $eligible {{ "}}" }}
            ##### WIRE THE EXTERNAL CA INTO THE HUB APISERVER clientCA (additive; operator signers stay trusted) #####
            {{ "{{-" }} if eq $extCAName "" {{ "}}" }}{{ "{{-" }} fail "config.eso.hubBootstrap.externalClientCA.name (or values hubBootstrapExternalClientCAName) is required in externalCA / externalCAReuseServingCert mode" {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} $extBundle := (dig "data" $extCAKey "" ((lookup "v1" "ConfigMap" $extCANamespace $extCAName) | default dict)) {{ "}}" }}
            {{ "{{-" }} if eq $extBundle "" {{ "}}" }}{{ "{{-" }} fail (printf "external CA bundle ConfigMap %s/%s key %q not found or empty — provide the shared external CA the hub apiserver should trust" $extCANamespace $extCAName $extCAKey) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: {{ $clientCAConfigMap }}
                  namespace: openshift-config
                data:
                  ca-bundle.crt: |
                    {{ "{{" }} $extBundle | autoindent {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: config.openshift.io/v1
                kind: APIServer
                metadata:
                  name: cluster
                spec:
                  clientCA:
                    name: {{ $clientCAConfigMap }}
            ##### SHARED reader Role in the tenancy namespace (one per namespace; the bindings below are per-cluster) #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: Role
                metadata:
                  name: {{ $readerRole }}
                  namespace: {{ $policyNamespace }}
                rules:
                  - apiGroups: [""]
                    resources: ["secrets"]
                    verbs: ["get", "list", "watch"]
            ##### PER CLUSTER: a RoleBinding scoped to that cluster's identity (no Certificate — nothing is minted here) #####
            {{ "{{-" }} range $entry := $eligible {{ "}}" }}
              {{ "{{-" }} $mcName := (index $entry "name") {{ "}}" }}
              {{ "{{-" }} $identity := (index $entry "id") {{ "}}" }}
              {{ "{{-" }} $bindingName := (printf "%s-%s" "{{ $readerRole }}" $mcName) {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: {{ "{{" }} $bindingName {{ "}}" }}
                  namespace: {{ $policyNamespace }}
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: Role
                  name: {{ $readerRole }}
                subjects:
                  - kind: User
                    name: {{ "{{" }} $identity {{ "}}" }}
                    apiGroup: rbac.authorization.k8s.io
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-eso-hub-bootstrap-trust-external
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-eso-hub-bootstrap-trust-external
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-eso-hub-bootstrap-trust-external
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-eso-hub-bootstrap-trust-external
    apiGroup: policy.open-cluster-management.io
    kind: Policy
{{ end }}
