# Spoke-side half of the cluster->cluster ESO bootstrap. Runs ON THE SPOKE and stands the
# hub up as a kubernetes-provider ClusterSecretStore so the spoke's ESO can read Secrets
# straight from the hub apiserver. Its companion is
# policy-external-secrets-operator-hub-bootstrap-trust.yaml, which (on the hub) mints, per
# AutoShift deployment (= per policy namespace), the client cert this store authenticates with
# and grants its CN read access scoped to that namespace.
#
# Tenancy: the spoke copies ITS OWN cluster-specific client cert (<prefix>-client-<managedClusterName>,
# minted by the trust policy in $policyNamespace) from $policyNamespace into the spoke ESO namespace
# under the fixed local name <prefix>-client. The store reads Secrets from $policyNamespace, which is
# the namespace this cluster's cert identity (CN) is granted to read.
#
# This is the COPY policy. Both inputs it ships to the spoke already live in the POLICY NAMESPACE
# on the hub, put there by the two hub-side policies:
#   - the client cert/key Secret  -> minted by policy-external-secrets-operator-hub-bootstrap-trust
#   - the hub serving-CA ConfigMap -> stashed by policy-external-secrets-operator-hub-bootstrap-serving-ca
# Hub templates ARE allowed to read the policy namespace, so this policy never touches openshift-config
# or the APIServer object (which the propagator may not read) — those lookups happen at runtime in the
# serving-ca policy on the hub itself. This indirection is what lets the flow compose across multiple
# AutoShift deployments and the hub -> managed-hub -> spoke topology.
#
# Hub vs runtime split:
#   - hub templates DERIVE the per-cluster config (hub-resident rendered config) AND copy the two
#     policy-namespace resources above into the spoke ESO namespace (a runtime template on the spoke
#     cannot read the hub's policy namespace, so the copy is exactly what hub templates are for).
#   - runtime templates do everything else AS ACTIONS ON THE SPOKE: build the ClusterSecretStore
#     and the ExternalSecrets from the bridged config values.
#
# Minimal cross-cluster copying: the only hub->spoke copies are the client cert/key and the hub
# serving CA. Everything else the spoke needs is pulled by the ExternalSecrets this policy emits,
# which read through the bootstrap store. cert-manager rotates the client cert on the hub and the
# serving-ca policy refreshes the serving CA; this policy re-copies both each evaluation.
#
# Config (per-cluster rendered config), config.eso.hubBootstrap:
#   hubServer       : hub apiserver URL. Required UNLESS deriveHubUrl is true.
#   deriveHubUrl    : if true, and hubServer is unset, this policy looks the URL up itself via a hub-template
#                     Infrastructure lookup — which requires the hub-template SA to have read on
#                     config.openshift.io/Infrastructure (operator opt-in). Default false: use hubServer config.
#   storeName       : ClusterSecretStore name (defaults to the chart's hubBootstrapStorePrefix)
#   externalSecrets : list of ExternalSecrets to create against the store (spec passed through)
# (No certCN/remoteNamespace: the identity + the namespace it reads are fixed by the deployment.)
#
# All-or-nothing: absent config.eso.hubBootstrap -> no-op. Depends on ESO being installed.
#
{{- $policyNamespace := $.Values.policy_namespace }}
{{- $eso := $.Values.externalSecretsOperator }}
{{- $esoNamespace := $eso.namespace }}
{{- $storePrefix := ($eso.hubBootstrapStorePrefix | default "hub-bootstrap") }}
{{- $clientSecret := (printf "%s-client" $storePrefix) }}
{{- $servingCAConfigMap := (printf "%s-hub-ca" $storePrefix) }}
{{- $defaultHubServer := ($eso.hubServer | default "") }}
{{- $defaultDeriveHubUrl := ($eso.hubBootstrapDeriveHubUrl | default false) }}
{{- /* Trust mode + the externalCA-mode mint settings (see chart values.yaml hubBootstrapMode). */}}
{{- $defaultMode := ($eso.hubBootstrapMode | default "selfSigned") }}
{{- $defaultCertCNPrefix := ($eso.hubBootstrapCertCNPrefix | default "autoshift-eso-client") }}
{{- $defaultCertBaseDomain := ($eso.hubBootstrapCertBaseDomain | default "") }}
{{- $defaultCertDuration := ($eso.hubBootstrapCertDuration | default "720h") }}
{{- $defaultCertRenewBefore := ($eso.hubBootstrapCertRenewBefore | default "480h") }}
{{- $defaultSpokeIssuerName := ($eso.hubBootstrapSpokeIssuerName | default "") }}
{{- $defaultSpokeIssuerKind := ($eso.hubBootstrapSpokeIssuerKind | default "ClusterIssuer") }}
{{- $defaultSpokeIssuerGroup := ($eso.hubBootstrapSpokeIssuerGroup | default "cert-manager.io") }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-hub-bootstrap
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-12 Cryptographic Key Establishment and Management
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-eso-install
      namespace: {{ $policyNamespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-hub-bootstrap
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### DERIVE (on the hub): per-cluster rendered config + the two policy-namespace inputs #####
            {{ "{{hub" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" .ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $hubBootstrap := (dig "eso" "hubBootstrap" (dict) $clusterConfig) {{ "hub}}" }}
            {{ "{{hub-" }} $mode := (index $hubBootstrap "mode" | default "{{ $defaultMode }}") {{ "hub}}" }}
            {{ "{{hub-" }} $hubServer := (index $hubBootstrap "hubServer" | default "{{ $defaultHubServer }}") {{ "hub}}" }}
            ##### hubServer resolution: explicit config/value always wins. If it is empty AND deriveHubUrl is on, THIS #####
            ##### policy looks the hub apiserver URL up directly (a hub-template Infrastructure lookup) — which only #####
            ##### works if the operator has granted the hub-template SA read on config.openshift.io/Infrastructure. #####
            ##### deriveHubUrl defaults OFF, so by default this policy makes NO hub lookup and demands explicit config; #####
            ##### enabling it is the operator opting in to that out-of-scope RBAC, not this policy assuming it. #####
            {{ "{{hub-" }} $deriveHubUrl := (dig "deriveHubUrl" {{ $defaultDeriveHubUrl }} $hubBootstrap) {{ "hub}}" }}
            {{ "{{hub-" }} if and (eq $hubServer "") $deriveHubUrl {{ "hub}}" }}{{ "{{hub-" }} $hubServer = (dig "status" "apiServerURL" "" ((lookup "config.openshift.io/v1" "Infrastructure" "" "cluster") | default dict)) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} $storeName := (index $hubBootstrap "storeName" | default "{{ $storePrefix }}") {{ "hub}}" }}
            ##### externalCA-mode mint settings: this cluster's client cert CN (derived the SAME way as the hub #####
            ##### trust policy, from .ManagedClusterName, so it matches the hub RBAC) + the user spoke issuer. #####
            {{ "{{hub-" }} $certCNPrefix := (index $hubBootstrap "certCNPrefix" | default "{{ $defaultCertCNPrefix }}") {{ "hub}}" }}
            {{ "{{hub-" }} $certBaseDomain := (index $hubBootstrap "baseDomain" | default "{{ $defaultCertBaseDomain }}") {{ "hub}}" }}
            {{ "{{hub-" }} $certDuration := (index $hubBootstrap "certDuration" | default "{{ $defaultCertDuration }}") {{ "hub}}" }}
            {{ "{{hub-" }} $certRenewBefore := (index $hubBootstrap "certRenewBefore" | default "{{ $defaultCertRenewBefore }}") {{ "hub}}" }}
            {{ "{{hub-" }} $spokeIssuer := (dig "spokeIssuer" (dict) $hubBootstrap) {{ "hub}}" }}
            {{ "{{hub-" }} $spokeIssuerName := (index $spokeIssuer "name" | default "{{ $defaultSpokeIssuerName }}") {{ "hub}}" }}
            {{ "{{hub-" }} $spokeIssuerKind := (index $spokeIssuer "kind" | default "{{ $defaultSpokeIssuerKind }}") {{ "hub}}" }}
            {{ "{{hub-" }} $spokeIssuerGroup := (index $spokeIssuer "group" | default "{{ $defaultSpokeIssuerGroup }}") {{ "hub}}" }}
            ##### Truncated cluster segment — the SAME identifier the hub trust policy derives for the CN and the #####
            ##### per-cluster client-secret name. We reuse it (not the raw cluster name) so the copied secret name #####
            ##### matches the hub side and can never outgrow its name limit. selfSigned baseDomain defaults to #####
            ##### autoshift.io exactly as the hub trust policy does, so the truncation budget is identical here. #####
            {{ "{{hub-" }} $segBaseDomain := (index $hubBootstrap "baseDomain" | default "autoshift.io") {{ "hub}}" }}
            {{ "{{hub-" }} $cnBudget := (sub 61 (add (len $certCNPrefix) (len $segBaseDomain))) {{ "hub}}" }}
            {{ "{{hub-" }} $clusterSeg := .ManagedClusterName {{ "hub}}" }}
            ##### substr needs int args; ACM math yields int64, so convert with int (sprig slice rejects strings). #####
            {{ "{{hub-" }} if gt (len .ManagedClusterName) $cnBudget {{ "hub}}" }}{{ "{{hub-" }} $clusterSeg = (substr 0 (int $cnBudget) .ManagedClusterName) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} $certCN := "" {{ "hub}}" }}
            {{ "{{hub-" }} if eq $mode "externalCA" {{ "hub}}" }}{{ "{{hub-" }} $certCN = (printf "%s.%s.%s" $certCNPrefix $clusterSeg $certBaseDomain) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} $clientSecretName := (printf "%s-%s" "{{ $clientSecret }}" $clusterSeg) {{ "hub}}" }}
            {{ "{{hub-" }} $clientSrc := (index ((lookup "v1" "Secret" "{{ $policyNamespace }}" $clientSecretName) | default dict) "data" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $servingCASrc := (dig "data" "ca.crt" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" "{{ $servingCAConfigMap }}") | default dict)) {{ "hub}}" }}
            ##### COPY THE POLICY-NAMESPACE INPUTS -> spoke ESO namespace (hub templates may read the policy namespace) #####
            {{ "{{hub-" }} if $hubBootstrap {{ "hub}}" }}
              {{ "{{hub-" }} if eq $hubServer "" {{ "hub}}" }}{{ "{{hub-" }} fail "hub apiserver URL unresolved: set config.eso.hubBootstrap.hubServer (or values externalSecretsOperator.hubServer), or enable deriveHubUrl AND grant the hub-template SA read on config.openshift.io/Infrastructure so this policy can look it up" {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} if eq $servingCASrc "" {{ "hub}}" }}{{ "{{hub-" }} fail (printf "hub serving CA ConfigMap %s/%s not found yet (the hub-bootstrap-serving-ca policy stashes it) — retrying" "{{ $policyNamespace }}" "{{ $servingCAConfigMap }}") {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
              ##### externalCA mode preconditions (the spoke mints its own cert below; both are user-provided) #####
              {{ "{{hub-" }} if eq $mode "externalCA" {{ "hub}}" }}
                {{ "{{hub-" }} if eq $certBaseDomain "" {{ "hub}}" }}{{ "{{hub-" }} fail "eso.hubBootstrap.baseDomain (or values hubBootstrapCertBaseDomain) is required in externalCA mode — the spoke-minted CN and the hub RBAC are both derived from it" {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} if eq $spokeIssuerName "" {{ "hub}}" }}{{ "{{hub-" }} fail "eso.hubBootstrap.spokeIssuer.name (or values hubBootstrapSpokeIssuerName) is required in externalCA mode — the spoke ClusterIssuer/Issuer (chained to the shared external CA) must be provisioned by the customer" {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
            ##### COPY HUB-MINTED CLIENT CERT -> spoke ESO namespace (selfSigned ONLY; external modes produce the #####
            ##### cert ON THE SPOKE at runtime below, so there is no hub-minted secret to copy). #####
              {{ "{{hub-" }} if eq $mode "selfSigned" {{ "hub}}" }}
              {{ "{{hub-" }} if not $clientSrc {{ "hub}}" }}{{ "{{hub-" }} fail (printf "hub client cert Secret %s/%s not found — the hub-bootstrap-trust policy mints it ONLY for ManagedClusters whose autoshift.io/owning-namespace label == %s, so verify this cluster carries that label; otherwise this is a transient startup race and will retry" "{{ $policyNamespace }}" $clientSecretName "{{ $policyNamespace }}") {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                type: kubernetes.io/tls
                metadata:
                  name: {{ $clientSecret }}
                  namespace: {{ $esoNamespace }}
                data:
                  {{ "{{hub-" }} range $dataKey, $dataValue := $clientSrc {{ "hub}}" }}
                  {{ "{{hub" }} $dataKey {{ "hub}}" }}: {{ "{{hub" }} $dataValue {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
            ##### COPY HUB SERVING CA -> spoke ESO namespace (so the store trusts the hub TLS) #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: {{ $servingCAConfigMap }}
                  namespace: {{ $esoNamespace }}
                data:
                  ca.crt: |
                    {{ "{{hub" }} $servingCASrc | autoindent {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            ##### BRIDGE config values to the runtime (spoke) side #####
            {{ "{{-" }} $mode := `{{ "{{hub" }} $mode {{ "hub}}" }}` {{ "}}" }}
            ##### Reject an unknown mode loudly: otherwise every mode arm below is skipped and the store is #####
            ##### still created pointing auth.cert at a secret nothing ever mints/copies (silent breakage). #####
            {{ "{{-" }} if and (ne $mode "selfSigned") (ne $mode "externalCA") (ne $mode "externalCAReuseServingCert") {{ "}}" }}{{ "{{-" }} fail (printf "invalid config.eso.hubBootstrap.mode %q (or values hubBootstrapMode) — must be one of: selfSigned, externalCA, externalCAReuseServingCert" $mode) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} $hubServer := `{{ "{{hub" }} $hubServer {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $storeName := `{{ "{{hub" }} $storeName {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $certCN := `{{ "{{hub" }} $certCN {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $certDuration := `{{ "{{hub" }} $certDuration {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $certRenewBefore := `{{ "{{hub" }} $certRenewBefore {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $spokeIssuerName := `{{ "{{hub" }} $spokeIssuerName {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $spokeIssuerKind := `{{ "{{hub" }} $spokeIssuerKind {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $spokeIssuerGroup := `{{ "{{hub" }} $spokeIssuerGroup {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $externalSecrets := `{{ "{{hub" }} index $hubBootstrap "externalSecrets" | default list | toRawJson {{ "hub}}" }}` | fromJson {{ "}}" }}
            ##### ACT ON THE SPOKE (runtime): build the store + ExternalSecrets from bridged config #####
            {{ "{{-" }} if ne $hubServer "" {{ "}}" }}
            ##### externalCA: mint THIS spoke's client cert locally (key never leaves the spoke) via the #####
            ##### user-provided issuer, into the same secret name the store reads below. #####
            {{ "{{-" }} if eq $mode "externalCA" {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: cert-manager.io/v1
                kind: Certificate
                metadata:
                  name: {{ $clientSecret }}
                  namespace: {{ $esoNamespace }}
                spec:
                  commonName: {{ "{{" }} $certCN {{ "}}" }}
                  secretName: {{ $clientSecret }}
                  duration: {{ "{{" }} $certDuration {{ "}}" }}
                  renewBefore: {{ "{{" }} $certRenewBefore {{ "}}" }}
                  usages:
                    - client auth
                    - digital signature
                    - key encipherment
                  privateKey:
                    algorithm: RSA
                    size: 2048
                  issuerRef:
                    name: {{ "{{" }} $spokeIssuerName {{ "}}" }}
                    kind: {{ "{{" }} $spokeIssuerKind {{ "}}" }}
                    group: {{ "{{" }} $spokeIssuerGroup {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            ##### externalCAReuseServingCert: copy THIS spoke's apiserver serving cert (+key) — discovered from #####
            ##### APIServer.spec.servingCerts.namedCertificates — into the store's client-cert secret. The key #####
            ##### replication is the documented blast radius of this mode (see values.yaml hubBootstrapMode). #####
            {{ "{{-" }} if eq $mode "externalCAReuseServingCert" {{ "}}" }}
            {{ "{{-" }} $apiserver := ((lookup "config.openshift.io/v1" "APIServer" "" "cluster") | default dict) {{ "}}" }}
            {{ "{{-" }} $namedCerts := (dig "spec" "servingCerts" "namedCertificates" (list) $apiserver) {{ "}}" }}
            {{ "{{-" }} if not $namedCerts {{ "}}" }}{{ "{{-" }} fail "externalCAReuseServingCert: APIServer/cluster has no spec.servingCerts.namedCertificates — there is no custom serving cert to reuse as the client cert" {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} $servingSecretName := (dig "servingCertificate" "name" "" (index $namedCerts 0)) {{ "}}" }}
            {{ "{{-" }} if eq $servingSecretName "" {{ "}}" }}{{ "{{-" }} fail "externalCAReuseServingCert: namedCertificates[0].servingCertificate.name is empty" {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} $servingData := (index ((lookup "v1" "Secret" "openshift-config" $servingSecretName) | default dict) "data" | default dict) {{ "}}" }}
            {{ "{{-" }} if not $servingData {{ "}}" }}{{ "{{-" }} fail (printf "externalCAReuseServingCert: serving cert Secret openshift-config/%s not found or empty" $servingSecretName) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                type: kubernetes.io/tls
                metadata:
                  name: {{ $clientSecret }}
                  namespace: {{ $esoNamespace }}
                data:
                  {{ "{{-" }} range $dataKey, $dataValue := $servingData {{ "}}" }}
                  {{ "{{" }} $dataKey {{ "}}" }}: {{ "{{" }} $dataValue {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: ClusterSecretStore
                metadata:
                  name: {{ "{{" }} $storeName {{ "}}" }}
                spec:
                  provider:
                    kubernetes:
                      server:
                        url: {{ "{{" }} $hubServer {{ "}}" }}
                        caProvider:
                          type: ConfigMap
                          name: {{ $servingCAConfigMap }}
                          key: ca.crt
                          namespace: {{ $esoNamespace }}
                      remoteNamespace: {{ $policyNamespace }}
                      auth:
                        cert:
                          clientCert:
                            name: {{ $clientSecret }}
                            namespace: {{ $esoNamespace }}
                            key: tls.crt
                          clientKey:
                            name: {{ $clientSecret }}
                            namespace: {{ $esoNamespace }}
                            key: tls.key
            ##### EXTERNAL SECRETS: pull everything else from the hub through the bootstrap store #####
              {{ "{{-" }} range $es := $externalSecrets {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                metadata:
                  name: {{ "{{" }} index $es "name" {{ "}}" }}
                  namespace: {{ "{{" }} index $es "namespace" | default "{{ $esoNamespace }}" {{ "}}" }}
                spec:
                  secretStoreRef:
                    name: {{ "{{" }} $storeName {{ "}}" }}
                    kind: ClusterSecretStore
                  {{ "{{-" }} if (index $es "refreshInterval") {{ "}}" }}
                  refreshInterval: {{ "{{" }} index $es "refreshInterval" {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} if (index $es "target") {{ "}}" }}
                  target:
                    {{ "{{" }} index $es "target" | toYaml | autoindent {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} if (index $es "data") {{ "}}" }}
                  data:
                    {{ "{{" }} index $es "data" | toYaml | autoindent {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} if (index $es "dataFrom") {{ "}}" }}
                  dataFrom:
                    {{ "{{" }} index $es "dataFrom" | toYaml | autoindent {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-eso-hub-bootstrap
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-eso-hub-bootstrap
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-eso-hub-bootstrap
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-eso-hub-bootstrap
    apiGroup: policy.open-cluster-management.io
    kind: Policy
