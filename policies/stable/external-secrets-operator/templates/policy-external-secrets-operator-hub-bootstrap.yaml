# Spoke-side half of the cluster->cluster ESO bootstrap. Runs ON THE SPOKE and stands the
# hub up as a kubernetes-provider ClusterSecretStore so the spoke's ESO can read Secrets
# straight from the hub apiserver. Its companion is
# policy-external-secrets-operator-hub-bootstrap-trust.yaml, which (on the hub) mints, per
# AutoShift deployment (= per policy namespace), the client cert this store authenticates with
# and grants its CN read access scoped to that namespace.
#
# Tenancy: the spoke copies its deployment's client cert from its OWN $policyNamespace — no
# per-cluster cert wiring, because the policy namespace already scopes it to the right tenant.
# The store reads Secrets from that same namespace ($policyNamespace), which is the ONLY
# namespace that deployment's cert identity is granted to read.
#
# This is the COPY policy. Both inputs it ships to the spoke already live in the POLICY NAMESPACE
# on the hub, put there by the two hub-side policies:
#   - the client cert/key Secret  -> minted by policy-external-secrets-operator-hub-bootstrap-trust
#   - the hub serving-CA ConfigMap -> stashed by policy-external-secrets-operator-hub-bootstrap-serving-ca
# Hub templates ARE allowed to read the policy namespace, so this policy never touches openshift-config
# or the APIServer object (which the propagator may not read) — those lookups happen at runtime in the
# serving-ca policy on the hub itself. This indirection is what lets the flow compose across multiple
# AutoShift deployments and the hub -> managed-hub -> spoke topology.
#
# Hub vs runtime split:
#   - hub templates DERIVE the per-cluster config (hub-resident rendered config) AND copy the two
#     policy-namespace resources above into the spoke ESO namespace (a runtime template on the spoke
#     cannot read the hub's policy namespace, so the copy is exactly what hub templates are for).
#   - runtime templates do everything else AS ACTIONS ON THE SPOKE: build the ClusterSecretStore
#     and the ExternalSecrets from the bridged config values.
#
# Minimal cross-cluster copying: the only hub->spoke copies are the client cert/key and the hub
# serving CA. Everything else the spoke needs is pulled by the ExternalSecrets this policy emits,
# which read through the bootstrap store. cert-manager rotates the client cert on the hub and the
# serving-ca policy refreshes the serving CA; this policy re-copies both each evaluation.
#
# Config (per-cluster rendered config), config.eso.hubBootstrap:
#   hubServer       : hub apiserver URL (defaults to values externalSecretsOperator.hubServer)
#   storeName       : ClusterSecretStore name (defaults to the chart's hubBootstrapStorePrefix)
#   externalSecrets : list of ExternalSecrets to create against the store (spec passed through)
# (No certCN/remoteNamespace: the identity + the namespace it reads are fixed by the deployment.)
#
# All-or-nothing: absent config.eso.hubBootstrap -> no-op. Depends on ESO being installed.
#
{{- $policyNamespace := $.Values.policy_namespace }}
{{- $eso := $.Values.externalSecretsOperator }}
{{- $esoNamespace := $eso.namespace }}
{{- $storePrefix := ($eso.hubBootstrapStorePrefix | default "hub-bootstrap") }}
{{- $clientSecret := (printf "%s-client" $storePrefix) }}
{{- $servingCAConfigMap := (printf "%s-hub-ca" $storePrefix) }}
{{- $defaultHubServer := ($eso.hubServer | default "") }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-external-secrets-operator-hub-bootstrap
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-12 Cryptographic Key Establishment and Management
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-external-secrets-operator-install
      namespace: {{ $policyNamespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: external-secrets-operator-hub-bootstrap
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### DERIVE (on the hub): per-cluster rendered config + the two policy-namespace inputs #####
            {{ "{{hub" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" .ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $hubBootstrap := (dig "eso" "hubBootstrap" (dict) $clusterConfig) {{ "hub}}" }}
            {{ "{{hub-" }} $hubServer := (index $hubBootstrap "hubServer" | default "{{ $defaultHubServer }}") {{ "hub}}" }}
            {{ "{{hub-" }} $storeName := (index $hubBootstrap "storeName" | default "{{ $storePrefix }}") {{ "hub}}" }}
            {{ "{{hub-" }} $clientSrc := (index ((lookup "v1" "Secret" "{{ $policyNamespace }}" "{{ $clientSecret }}") | default dict) "data" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $servingCASrc := (dig "data" "ca.crt" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" "{{ $servingCAConfigMap }}") | default dict)) {{ "hub}}" }}
            ##### COPY THE POLICY-NAMESPACE INPUTS -> spoke ESO namespace (hub templates may read the policy namespace) #####
            {{ "{{hub-" }} if $hubBootstrap {{ "hub}}" }}
              {{ "{{hub-" }} if eq $hubServer "" {{ "hub}}" }}{{ "{{hub-" }} fail "eso.hubBootstrap.hubServer (or values externalSecretsOperator.hubServer) is required" {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} if not $clientSrc {{ "hub}}" }}{{ "{{hub-" }} fail (printf "hub client cert Secret %s/%s not found — the hub-bootstrap-trust policy mints it ONLY into namespaces labelled autoshift.io/createdByAutoshift=true, so verify the policy namespace %s carries that label; otherwise this is a transient startup race and will retry" "{{ $policyNamespace }}" "{{ $clientSecret }}" "{{ $policyNamespace }}") {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} if eq $servingCASrc "" {{ "hub}}" }}{{ "{{hub-" }} fail (printf "hub serving CA ConfigMap %s/%s not found yet (the hub-bootstrap-serving-ca policy stashes it) — retrying" "{{ $policyNamespace }}" "{{ $servingCAConfigMap }}") {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
            ##### COPY HUB-MINTED CLIENT CERT -> spoke ESO namespace #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                type: kubernetes.io/tls
                metadata:
                  name: {{ $clientSecret }}
                  namespace: {{ $esoNamespace }}
                data:
                  {{ "{{hub-" }} range $dataKey, $dataValue := $clientSrc {{ "hub}}" }}
                  {{ "{{hub" }} $dataKey {{ "hub}}" }}: {{ "{{hub" }} $dataValue {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
            ##### COPY HUB SERVING CA -> spoke ESO namespace (so the store trusts the hub TLS) #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: {{ $servingCAConfigMap }}
                  namespace: {{ $esoNamespace }}
                data:
                  ca.crt: |
                    {{ "{{hub" }} $servingCASrc | autoindent {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            ##### BRIDGE config values to the runtime (spoke) side #####
            {{ "{{-" }} $hubServer := `{{ "{{hub" }} $hubServer {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $storeName := `{{ "{{hub" }} $storeName {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $externalSecrets := `{{ "{{hub" }} index $hubBootstrap "externalSecrets" | default list | toRawJson {{ "hub}}" }}` | fromJson {{ "}}" }}
            ##### ACT ON THE SPOKE (runtime): build the store + ExternalSecrets from bridged config #####
            {{ "{{-" }} if ne $hubServer "" {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: ClusterSecretStore
                metadata:
                  name: {{ "{{" }} $storeName {{ "}}" }}
                spec:
                  provider:
                    kubernetes:
                      server:
                        url: {{ "{{" }} $hubServer {{ "}}" }}
                        caProvider:
                          type: ConfigMap
                          name: {{ $servingCAConfigMap }}
                          key: ca.crt
                          namespace: {{ $esoNamespace }}
                      remoteNamespace: {{ $policyNamespace }}
                      auth:
                        cert:
                          clientCert:
                            name: {{ $clientSecret }}
                            namespace: {{ $esoNamespace }}
                            key: tls.crt
                          clientKey:
                            name: {{ $clientSecret }}
                            namespace: {{ $esoNamespace }}
                            key: tls.key
            ##### EXTERNAL SECRETS: pull everything else from the hub through the bootstrap store #####
              {{ "{{-" }} range $es := $externalSecrets {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                metadata:
                  name: {{ "{{" }} index $es "name" {{ "}}" }}
                  namespace: {{ "{{" }} index $es "namespace" | default "{{ $esoNamespace }}" {{ "}}" }}
                spec:
                  secretStoreRef:
                    name: {{ "{{" }} $storeName {{ "}}" }}
                    kind: ClusterSecretStore
                  {{ "{{-" }} if (index $es "refreshInterval") {{ "}}" }}
                  refreshInterval: {{ "{{" }} index $es "refreshInterval" {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} if (index $es "target") {{ "}}" }}
                  target:
                    {{ "{{" }} index $es "target" | toYaml | autoindent {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} if (index $es "data") {{ "}}" }}
                  data:
                    {{ "{{" }} index $es "data" | toYaml | autoindent {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} if (index $es "dataFrom") {{ "}}" }}
                  dataFrom:
                    {{ "{{" }} index $es "dataFrom" | toYaml | autoindent {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-external-secrets-operator-hub-bootstrap
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-external-secrets-operator-hub-bootstrap
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-external-secrets-operator-hub-bootstrap
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-external-secrets-operator-hub-bootstrap
    apiGroup: policy.open-cluster-management.io
    kind: Policy
