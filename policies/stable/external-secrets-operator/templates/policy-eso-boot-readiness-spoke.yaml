# PRECURSOR READINESS GATE (CONSUMER / spoke side) for the cert-based ESO hub bootstrap.
#
# Scope: the cluster acting as a CONSUMER of the bootstrap store — it mints/uses its OWN client cert
# to authenticate to the hub apiserver (policy-eso-boot-store). As far as ACM is concerned the hub
# itself is just another consumer once these policies land on it, so this gate is placed on BOTH the
# hub and managed cluster sets (identical to policy-eso-boot-store). The HUB-as-provider preconditions
# (minting the selfSigned CA, wiring the apiserver clientCA) live in policy-eso-boot-readiness-hub.
#
# Purpose: in the external trust modes the consumer authenticates with an external-CA-backed client
# cert. That path depends on cert-manager + an issuer (externalCA) or an external-CA-signed apiserver
# serving cert (externalCAReuseServingCert) being healthy. If boot-store mints/uses a client cert
# against dead issuer infra while certs expire, the system can lock itself out of self-correction (the
# ClusterIssuer secrets needed to repair the issuer cannot be delivered because delivery needs the
# certs). See config.eso.hubBootstrap.externalCertAuthority.autoshiftProvisioned (values default
# hubBootstrap.externalCertAuthority.autoshiftProvisioned).
#
# Contract: this Policy is a GATE, surfaced WITHOUT `fail` (which buries the real reason under the whole
# policy-rendered-as-a-string in the console and often truncates it off). Two ConfigurationPolicies:
#   * eso-boot-readiness-spoke-report (enforce) collects every problem into $errors, then — via the shared
#     eso.boot.statusReport helper — writes a per-policy status ConfigMap (the full list) + a Warning Event
#     when anything is wrong, and ENFORCE-deletes both when everything is ready (self-clearing).
#   * eso-boot-readiness-spoke-gate (inform) mustnothave's that status ConfigMap, so IT is the compliance
#     proxy: NonCompliant exactly while the report CM exists. The inform gate creates nothing itself — the
#     enforce report owns the objects' lifecycle, which is why the report must clear the CM on recovery.
#   everything ready  -> report clears CM       -> gate Compliant
#   anything not ready -> report writes CM+Event -> gate NonCompliant (Pending downstream)
# policy-eso-boot-store lists this policy in spec.dependencies, so it stays Pending until Compliant and
# resumes automatically when the infra recovers. No invariant-checking lives in boot-store anymore.
#
# Mode behaviour (cert-manager is conditional — a selfSigned consumer just copies a hub-minted secret
# and mints nothing, so requiring cert-manager there would be wrong). In an EXTERNAL mode, HOW the gate
# proves cert-manager is ready depends on autoshiftProvisioned — and when it is true the gate NEVER reads
# the cert-manager operator CSV, so the ESO config does not need to know the cert-manager namespace:
#   selfSigned                 -> consumes a hub-copied secret, mints nothing -> Compliant immediately
#   external + autoshiftProvisioned=false -> OUT-OF-BAND PKI: the autoshift cert-manager policy may not
#                                 exist, so the ONLY cert-manager check is the operator CSV (Succeeded) in
#                                 $cmOperatorNs; the policy-compliance + issuer/serving-cert checks are skipped
#   externalCA (autoshiftProvisioned=true)
#                              -> the autoshift cert-manager policy Compliant for this cluster (which itself
#                                 proves cert-manager is installed — NO direct CSV read) AND the spoke
#                                 ClusterIssuer/Issuer Ready (gate on the ISSUER, not the ESO client cert:
#                                 boot-store MINTS that cert AFTER this gate, so depending on it would deadlock)
#   externalCAReuseServingCert (autoshiftProvisioned=true)
#                              -> the autoshift cert-manager policy Compliant AND the apiserver serving cert
#                                 Secret (the one the reuse path copies) populated
#
# Hub vs runtime split mirrors the other boot policies: hub templates DERIVE the per-cluster mode +
# issuer config from this cluster's rendered config; runtime templates do the readiness LOOKUPS on the
# consumer (cert-manager + issuer + serving cert all live there) and `fail` if not ready.
#
{{- $policyNamespace := $.Values.policy_namespace }}
{{- $eso := $.Values.externalSecretsOperator }}
{{- $hb := (default (dict) $eso.hubBootstrap) }}
{{- $esoNamespace := $eso.namespace }}
{{- $cmOperatorNs := (dig "certManagerOperatorNamespace" "" $hb | default "cert-manager-operator") }}
{{- $defaultMode := (dig "mode" "" $hb | default "selfSigned") }}
{{- $defaultAutoshiftProvisioned := (dig "externalCertAuthority" "autoshiftProvisioned" "" $hb | default true) }}
{{- $cmPolicyName := (dig "certManagerPolicyName" "" $hb | default "policy-cert-manager") }}
{{- $defaultIssuerName := (dig "externalCertAuthority" "certIssuer" "name" "" $hb | default "") }}
{{- $defaultIssuerKind := (dig "externalCertAuthority" "certIssuer" "kind" "" $hb | default "ClusterIssuer") }}
{{- $defaultIssuerGroup := (dig "externalCertAuthority" "certIssuer" "group" "" $hb | default "cert-manager.io") }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-boot-readiness-spoke
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/description: 'Readiness gate for the spoke-side boot policies - assert per-mode PKI preconditions on the target cluster before the bootstrap store is built.'
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-12 Cryptographic Key Establishment and Management
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  # Resolve hub templates as the autoshift hub-template SA so the rendered-config ConfigMap read in
  # the policy namespace succeeds (same as the other boot policies).
  hubTemplateOptions:
    serviceAccountName: autoshift-policy-service-account
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-boot-readiness-spoke-report
        spec:
          # enforce: this CP OWNS the status objects — it writes the status ConfigMap + Warning Event when
          # $errors is non-empty and deletes them when empty. This CP's OWN compliance is NOT the gate
          # signal (it stays Compliant by successfully reconciling those objects); the inform gate CP below is.
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### DERIVE (on the hub): per-cluster mode + issuer config from rendered config #####
            {{ "{{hub" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" $.ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $hubBootstrap := (dig "eso" "hubBootstrap" (dict) $clusterConfig) {{ "hub}}" }}
            {{ "{{hub-" }} $mode := (index $hubBootstrap "mode" | default "{{ $defaultMode }}") {{ "hub}}" }}
            {{ "{{hub-" }} $autoshiftProvisioned := (dig "externalCertAuthority" "autoshiftProvisioned" {{ $defaultAutoshiftProvisioned }} $hubBootstrap) {{ "hub}}" }}
            {{ "{{hub-" }} $cmPolCompliant := "" {{ "hub}}" }}
            {{ "{{hub-" }} if and (ne $mode "selfSigned") $autoshiftProvisioned {{ "hub}}" }}
              {{ "{{hub-" }} $cmPol := (lookup "policy.open-cluster-management.io/v1" "Policy" "{{ $policyNamespace }}" "{{ $cmPolicyName }}") {{ "hub}}" }}
              {{ "{{hub-" }} range $st := (dig "status" "status" (list) $cmPol) {{ "hub}}" }}
                {{ "{{hub-" }} if eq (dig "clustername" "" $st) $.ManagedClusterName {{ "hub}}" }}{{ "{{hub-" }} $cmPolCompliant = (dig "compliant" "" $st) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} $spokeIssuer := (dig "externalCertAuthority" "certIssuer" (dict) $hubBootstrap) {{ "hub}}" }}
            {{ "{{hub-" }} $issuerName := (index $spokeIssuer "name" | default "{{ $defaultIssuerName }}") {{ "hub}}" }}
            {{ "{{hub-" }} $issuerKind := (index $spokeIssuer "kind" | default "{{ $defaultIssuerKind }}") {{ "hub}}" }}
            {{ "{{hub-" }} $issuerGroup := (index $spokeIssuer "group" | default "{{ $defaultIssuerGroup }}") {{ "hub}}" }}
            ##### BRIDGE to the runtime (consumer) side — bools cross as the strings "true"/"false" #####
            {{ "{{-" }} $mode := `{{ "{{hub" }} $mode {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $autoshiftProvisioned := `{{ "{{hub" }} $autoshiftProvisioned {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $cmPolCompliant := `{{ "{{hub" }} $cmPolCompliant {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $issuerName := `{{ "{{hub" }} $issuerName {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $issuerKind := `{{ "{{hub" }} $issuerKind {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $issuerGroup := `{{ "{{hub" }} $issuerGroup {{ "hub}}" }}` {{ "}}" }}
            ##### ACT (on the consumer): COLLECT every readiness problem for the desired mode into $errors, #####
            ##### then surface them ONCE at the end via the status ConfigMap — one apply shows all issues, no #####
            ##### fail-next loop. $errors empty -> emit nothing -> Compliant. cert-manager is required only #####
            ##### when an EXTERNAL mode is active here (not out-of-band); a selfSigned consumer mints nothing. #####
            {{ "{{-" }} $external := (ne $mode "selfSigned") {{ "}}" }}
            {{ "{{-" }} $errors := list {{ "}}" }}
            {{ "{{-" }} if $external {{ "}}" }}
              ##### cert-manager readiness source depends on autoshiftProvisioned: #####
              ##### true  -> the autoshift cert-manager POLICY being Compliant for THIS cluster IS the proof #####
              #####          cert-manager is installed + healthy, so we do NOT read the operator CSV — the ESO #####
              #####          config never needs to know the cert-manager operator namespace. #####
              ##### false -> out-of-band PKI: no autoshift policy to lean on, so fall back to reading the operator #####
              #####          CSV (phase=Succeeded) directly. Name carries a version suffix (cert-manager-operator. #####
              #####          vX.Y.Z) so match by prefix; zero matches is ALSO not-ready. #####
              {{ "{{-" }} if eq $autoshiftProvisioned "true" {{ "}}" }}
                {{ "{{-" }} if ne $cmPolCompliant "Compliant" {{ "}}" }}
                  {{ "{{-" }} $errors = append $errors (printf "[spoke] autoshift cert-manager policy %q is not Compliant for this cluster (status=%q) — set config.eso.hubBootstrap.externalCertAuthority.autoshiftProvisioned=false if cert-manager is provisioned out-of-band, or ensure the policy exists and the hub-template SA can read Policies" "{{ $cmPolicyName }}" $cmPolCompliant) {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} else {{ "}}" }}
                {{ "{{-" }} $csvReady := false {{ "}}" }}
                {{ "{{-" }} range $csv := ((lookup "operators.coreos.com/v1alpha1" "ClusterServiceVersion" "{{ $cmOperatorNs }}" "").items | default list) {{ "}}" }}
                  {{ "{{-" }} if and (hasPrefix "cert-manager-operator" $csv.metadata.name) (eq (dig "status" "phase" "" $csv) "Succeeded") {{ "}}" }}
                    {{ "{{-" }} $csvReady = true {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} if not $csvReady {{ "}}" }}
                  {{ "{{-" }} $errors = append $errors (printf "[spoke] cert-manager-operator CSV in namespace %q is not phase=Succeeded (mode %q needs cert-manager to mint the client cert)" "{{ $cmOperatorNs }}" $mode) {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
              ##### Each dependent lookup is guarded by an else-if on its precondition so a missing input #####
              ##### records an error instead of erroring out the template. The issuer/serving-cert checks run only #####
              ##### when autoshiftProvisioned (out-of-band PKI is trusted, not introspected). #####
              {{ "{{-" }} if and (eq $mode "externalCA") (eq $autoshiftProvisioned "true") {{ "}}" }}
                ##### externalCA: the spoke ClusterIssuer/Issuer that boot-store mints the client cert with #####
                ##### must be Ready. Gating on the ISSUER (not the not-yet-minted ESO cert) avoids a deadlock #####
                ##### where boot-store waits on this gate while the gate waits on boot-store's own cert. #####
                {{ "{{-" }} if eq $issuerName "" {{ "}}" }}
                  {{ "{{-" }} $errors = append $errors "[spoke] externalCA mode but externalCertAuthority.certIssuer.name is unset — cannot verify the issuer the spoke mints its client cert with" {{ "}}" }}
                {{ "{{-" }} else if ne $issuerName "" {{ "}}" }}
                  ##### ClusterIssuer is cluster-scoped (namespace ""); Issuer lives in the ESO namespace #####
                  ##### where boot-store creates the Certificate. #####
                  {{ "{{-" }} $issuerNs := "" {{ "}}" }}
                  {{ "{{-" }} if ne $issuerKind "ClusterIssuer" {{ "}}" }}{{ "{{-" }} $issuerNs = "{{ $esoNamespace }}" {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} $issuer := (lookup (printf "%s/v1" $issuerGroup) $issuerKind $issuerNs $issuerName) {{ "}}" }}
                  {{ "{{-" }} if not $issuer {{ "}}" }}
                    {{ "{{-" }} $errors = append $errors (printf "[spoke] %s %q not found (group %s) — the externalCA spoke issuer is not provisioned yet" $issuerKind $issuerName $issuerGroup) {{ "}}" }}
                  {{ "{{-" }} else if $issuer {{ "}}" }}
                    {{ "{{-" }} $issuerReady := false {{ "}}" }}
                    {{ "{{-" }} range $c := (dig "status" "conditions" (list) $issuer) {{ "}}" }}
                      {{ "{{-" }} if and (eq (dig "type" "" $c) "Ready") (eq (dig "status" "" $c) "True") {{ "}}" }}
                        {{ "{{-" }} $issuerReady = true {{ "}}" }}
                      {{ "{{-" }} end {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                    {{ "{{-" }} if not $issuerReady {{ "}}" }}
                      {{ "{{-" }} $errors = append $errors (printf "[spoke] %s %q is not Ready (status.conditions[type=Ready] != True) — the spoke cannot mint a client cert against it" $issuerKind $issuerName) {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} else if and (eq $mode "externalCAReuseServingCert") (eq $autoshiftProvisioned "true") {{ "}}" }}
                ##### reuse: the apiserver serving cert (signed by the external CA) is the client cert. #####
                ##### Discover the serving Secret the SAME way boot-store does (APIServer namedCertificates, #####
                ##### host match then first-entry fallback) and assert it exists and carries tls.crt. #####
                {{ "{{-" }} $namedCerts := (dig "spec" "servingCerts" "namedCertificates" (list) ((lookup "config.openshift.io/v1" "APIServer" "" "cluster") | default dict)) {{ "}}" }}
                {{ "{{-" }} if not $namedCerts {{ "}}" }}
                  {{ "{{-" }} $errors = append $errors "[spoke] APIServer/cluster has no spec.servingCerts.namedCertificates — no external serving cert to reuse yet" {{ "}}" }}
                {{ "{{-" }} else if $namedCerts {{ "}}" }}
                  {{ "{{-" }} $apiHost := (index (splitList ":" (replace "https://" "" (fromClusterClaim "apiserverurl.openshift.io"))) 0) {{ "}}" }}
                  {{ "{{-" }} $servingSecretName := "" {{ "}}" }}
                  {{ "{{-" }} range $nc := $namedCerts {{ "}}" }}
                    {{ "{{-" }} if and (eq $servingSecretName "") (has $apiHost ((index $nc "names") | default list)) {{ "}}" }}
                      {{ "{{-" }} $servingSecretName = (dig "servingCertificate" "name" "" $nc) {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} if eq $servingSecretName "" {{ "}}" }}{{ "{{-" }} $servingSecretName = (dig "servingCertificate" "name" "" (index $namedCerts 0)) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} if eq $servingSecretName "" {{ "}}" }}
                    {{ "{{-" }} $errors = append $errors "[spoke] could not resolve servingCertificate.name from APIServer/cluster namedCertificates" {{ "}}" }}
                  {{ "{{-" }} else if ne $servingSecretName "" {{ "}}" }}
                    {{ "{{-" }} $servingSecret := (lookup "v1" "Secret" "openshift-config" $servingSecretName) {{ "}}" }}
                    {{ "{{-" }} if eq (dig "data" "tls.crt" "" ($servingSecret | default dict)) "" {{ "}}" }}
                      {{ "{{-" }} $errors = append $errors (printf "[spoke] apiserver serving cert Secret openshift-config/%q is missing or has no tls.crt — the external-CA serving cert is not materialized yet" $servingSecretName) {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            ##### SURFACE results as DATA (no fail): the eso.boot.statusReport helper emits, AS RUNTIME #####
            ##### conditionals on $errors, the status ConfigMap (full list) + Warning Event when anything was #####
            ##### collected, and mustnothave's both when $errors is empty so the signal self-heals. The #####
            ##### companion inform gate CP below turns that ConfigMap's presence into this Policy's compliance. #####
            {{- include "eso.boot.statusReport" (dict "policy" "eso-boot-readiness-spoke" "ns" "open-cluster-management-agent-addon") | nindent 12 }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-boot-readiness-spoke-gate
        spec:
          # inform GATE: the compliance proxy for the readiness report. It mutates nothing; it merely asserts
          # the report's status ConfigMap is ABSENT. Present (the report found problems) -> NonCompliant ->
          # dependents (policy-eso-boot-store) stay Pending. Absent -> Compliant -> the bootstrap proceeds.
          # No hub/runtime templating here — a static name match against the per-policy status ConfigMap.
          # The status CM lives in open-cluster-management-agent-addon: it always exists on a managed cluster
          # (klusterlet addon ns), so the gate can never falsely read Compliant because the CM's namespace
          # was missing. The enforce report CP writes/clears it in the same namespace.
          remediationAction: inform
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: eso-boot-readiness-spoke-status
                  namespace: open-cluster-management-agent-addon
