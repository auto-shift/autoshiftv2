{{- /*
  Single-sourced object-templates body for policy-eso-boot-clientca-self-wire.
  Included TWICE below: once as the live object stream (indent 12), once as the
  text payload of the debug-render ConfigMap (nindent 20). Include directives are
  indented; {{- left-trims the source newline+spaces and nindent re-supplies them.
  Helm-render locals are threaded in via the context dict ($ctx) so the body
  resolves them with .field lookups.
*/ -}}
{{- define "eso.bootBody.clientcaSelfWire" -}}
##### DERIVE (hub): the trust mode from THIS cluster's rendered config, then bridge it to runtime #####
{{ "{{hub" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ .policyNamespace }}" (printf "%s.rendered-config" $.ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
{{ "{{hub" }} $hubBootstrap := (dig "eso" "hubBootstrap" (dict) $clusterConfig) {{ "hub}}" }}
{{ "{{hub-" }} $mode := (index $hubBootstrap "mode" | default "{{ .defaultMode }}") {{ "hub}}" }}
##### teardown: EXPLICIT opt-in decommission flag — a positive flag, never inferred from config #####
##### absence, so a transient rendered-config read miss can never trigger a teardown. #####
{{ "{{hub-" }} $teardown := (dig "teardown" {{ .defaultTeardown }} $hubBootstrap) {{ "hub}}" }}
{{ "{{-" }} $mode := `{{ "{{hub" }} $mode {{ "hub}}" }}` {{ "}}" }}
{{ "{{-" }} $teardown := `{{ "{{hub" }} if $teardown {{ "hub}}" }}1{{ "{{hub" }} end {{ "hub}}" }}` {{ "}}" }}
##### TEARDOWN (explicit config.eso.hubBootstrap.teardown): unwire the hub apiserver clientCA and #####
##### remove the shared clientCA ConfigMap. Ordered: the APIServer pointer is emptied BEFORE the #####
##### ConfigMap is deleted so the apiserver operator never sees a dangling reference. Emitted by BOTH #####
##### this policy and the external companion (identical objects — idempotent), so teardown converges #####
##### regardless of which mode was active. Unsetting clientCA is the documented disruptive rollout. #####
{{ "{{-" }} if eq $teardown "1" {{ "}}" }}
- complianceType: musthave
  objectDefinition:
    apiVersion: config.openshift.io/v1
    kind: APIServer
    metadata:
      name: cluster
    spec:
      clientCA:
        name: ""
- complianceType: mustnothave
  objectDefinition:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: {{ .clientCAConfigMap }}
      namespace: openshift-config
{{ "{{-" }} end {{ "}}" }}
##### RUNTIME (on the hub): only wire the apiserver clientCA when selfSigned mode is active AND at #####
##### least one autoshift-labelled ManagedCluster exists — mirrors the mint policy's $eligible gate #####
##### so the disruptive kube-apiserver rollout only happens when the feature is actually in use. #####
{{ "{{-" }} $hasEligible := false {{ "}}" }}
{{ "{{-" }} if and (eq $mode "selfSigned") (ne $teardown "1") {{ "}}" }}
  {{ "{{-" }} range $mc := ((lookup "cluster.open-cluster-management.io/v1" "ManagedCluster" "" "").items | default list) {{ "}}" }}
    {{ "{{-" }} if ne (dig "metadata" "labels" "autoshift.io/owning-namespace" "" $mc) "" {{ "}}" }}
      {{ "{{-" }} $hasEligible = true {{ "}}" }}
    {{ "{{-" }} end {{ "}}" }}
  {{ "{{-" }} end {{ "}}" }}
{{ "{{-" }} end {{ "}}" }}
{{ "{{-" }} if $hasEligible {{ "}}" }}
  ##### Read the CA cert minted by the dependency policy and materialize it into the openshift-config #####
  ##### clientCA ConfigMap, then point APIServer.spec.clientCA at it. fromSecret returns "" only if #####
  ##### the key is empty (never for a populated CA secret); a MISSING secret errors -> NonCompliant -> #####
  ##### retry, which is exactly the dependency-gated behaviour we want. #####
  {{ "{{-" }} $caBundle := (fromSecret "{{ .cmResourceNamespace }}" "{{ .caName }}" "ca.crt") {{ "}}" }}
  {{ "{{-" }} if ne $caBundle "" {{ "}}" }}
- complianceType: musthave
  objectDefinition:
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: {{ .clientCAConfigMap }}
      namespace: openshift-config
    data:
      ca-bundle.crt: |
        {{- if .debug }}
        DEBUG would-read: Secret {{ .cmResourceNamespace }}/{{ .caName }} key ca.crt (base64-decoded into this field)
        {{- else }}
        {{ "{{" }} $caBundle | base64dec | autoindent {{ "}}" }}
        {{- end }}
- complianceType: musthave
  objectDefinition:
    apiVersion: config.openshift.io/v1
    kind: APIServer
    metadata:
      name: cluster
    spec:
      clientCA:
        name: {{ .clientCAConfigMap }}
  {{ "{{-" }} end {{ "}}" }}
{{ "{{-" }} end {{ "}}" }}
{{- end -}}
# Wires the hub apiserver spec.clientCA to TRUST the self-signed CA minted by
# policy-eso-boot-clientca-self (the "mint" policy). Split out from that policy ON
# PURPOSE: it reads the CA's secret via fromSecret, and ACM resolves an object-templates-raw template
# ATOMICALLY — if fromSecret errored on the not-yet-existing CA secret, it would block the SAME template
# that mints the CA Certificate that creates the secret (permanent deadlock). As a SEPARATE policy that
# depends on the mint policy being Compliant, this one simply stays NonCompliant and retries until
# cert-manager has populated the CA secret, then wires the clientCA. The wiring is additive — OpenShift
# merges spec.clientCA with the operator-managed client signers, so existing client auth keeps working.
#
# Placed ONLY on hub clusters (hubClusterSets). Like the mint policy, it gates on selfSigned mode AND at
# least one autoshift-labelled ManagedCluster existing, so the disruptive kube-apiserver rollout that
# setting spec.clientCA triggers only happens when the feature is actually in use.
#
{{- if $.Values.hubClusterSets }}
  {{- $policyNamespace := $.Values.policy_namespace }}
  {{- $eso := $.Values.externalSecretsOperator }}
  {{- $hb := (default (dict) $eso.hubBootstrap) }}
  {{- $storePrefix := (dig "storePrefix" "" $hb | default "hub-bootstrap") }}
  {{- $caName := (printf "%s-ca" $storePrefix) }}
  {{- $clientCAConfigMap := (dig "clientCAConfigMap" "" $hb | default (printf "%s-client-ca" $storePrefix)) }}
  {{- $cmResourceNamespace := ($eso.certManagerResourceNamespace | default "cert-manager") }}
  {{- $defaultMode := (dig "mode" "" $hb | default "selfSigned") }}
  {{- /* Explicit decommission flag (config.eso.hubBootstrap.teardown / values hubBootstrap.teardown). */}}
  {{- $defaultTeardown := (dig "teardown" "" $hb | default false) }}
  {{- /* Diagnostics run modes (deployment-wide). readinessOnly: suppress this active policy entirely.
         debugRender: emit only a preview ConfigMap of what this policy WOULD apply (and nothing live).
         debugRender wins, so previews still render under readinessOnly. */ -}}
  {{- $readinessOnly := (dig "diagnostics" "readinessOnly" "" $hb | default false) }}
  {{- $debugRender := (dig "diagnostics" "debugRender" "" $hb | default false) }}
  {{- $ctx := (dict "policyNamespace" $policyNamespace "caName" $caName "clientCAConfigMap" $clientCAConfigMap "cmResourceNamespace" $cmResourceNamespace "defaultMode" $defaultMode "defaultTeardown" $defaultTeardown) }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-boot-clientca-self-wire
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/description: 'selfSigned mode - wire the minted bootstrap CA into APIServer.spec.clientCA (additive; one kube-apiserver rollout on first set).'
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-17 Public Key Infrastructure Certificates
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  # Explicit dependency: do not wire (read) the CA before the mint policy has applied the CA Certificate
  # + issuers. fromSecret then retries until cert-manager populates the secret.
  dependencies:
    - name: policy-eso-boot-clientca-self
      namespace: {{ $policyNamespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-boot-clientca-self-wire
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            {{ "{{hub-" }} $debugCfg := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" $.ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $debug := (dig "eso" "hubBootstrap" "diagnostics" "debugRender" {{ $debugRender }} $debugCfg) {{ "hub}}" }}
            {{ "{{hub-" }} $readinessOnly := (dig "eso" "hubBootstrap" "diagnostics" "readinessOnly" {{ $readinessOnly }} $debugCfg) {{ "hub}}" }}
            {{ "{{hub-" }} if $debug {{ "hub}}" }}
            ##### DEBUG RENDER: applies nothing live; captures the full object stream this policy WOULD #####
            ##### apply (resolved on the target cluster) as text, for inspection. #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: eso-boot-clientca-self-wire-debug-render
                  namespace: {{ $policyNamespace }}
                  labels:
                    autoshift.io/eso-debug-render: "true"
                data:
                  rendered.yaml: |
                    {{- include "eso.bootBody.clientcaSelfWire" (merge (dict "debug" true) $ctx) | nindent 20 }}
            {{ "{{hub-" }} else {{ "hub}}" }}
            ##### debugRender OFF: clear any stale preview ConfigMap left by a previous debug run #####
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: eso-boot-clientca-self-wire-debug-render
                  namespace: {{ $policyNamespace }}
            {{ "{{hub-" }} if not $readinessOnly {{ "hub}}" }}
            {{- include "eso.bootBody.clientcaSelfWire" $ctx | nindent 12 }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
{{ end }}
