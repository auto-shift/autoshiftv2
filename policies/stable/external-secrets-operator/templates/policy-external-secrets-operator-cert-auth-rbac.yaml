# This policy generates the RBAC backing the kubernetes-provider `cert` auth method for
# ESO stores. It is the companion to policy-external-secrets-operator-stores.yaml: that
# policy creates the SecretStore / ClusterSecretStore objects; this one reads the same
# config.eso.secretStores list and, for every store whose provider is `kubernetes` with
# `cert` auth, grants the certificate's CN (certAuthRBAC.username) access to secrets.
#
# Scope (from the store kind):
#   - SecretStore        -> Role + RoleBinding in each target namespace
#                           (certAuthRBAC.namespaces, else remoteNamespace, else the
#                           store namespace)
#   - ClusterSecretStore -> ClusterRole + ClusterRoleBinding (cluster-wide), OR
#                           ClusterRole + a RoleBinding per namespace when
#                           certAuthRBAC.namespaces or spec.conditions[].namespaces are set
# Verbs default to create/update/list/delete (override with certAuthRBAC.verbs).
# certAuthRBAC.username is required for a kubernetes cert-auth store (fails otherwise).
#
{{- $policyNamespace := $.Values.policy_namespace }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-external-secrets-operator-cert-auth-rbac
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: AC Access Control
    policy.open-cluster-management.io/controls: AC-3 Access Enforcement
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: external-secrets-operator-cert-auth-rbac
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### LOAD PER-CLUSTER RENDERED CONFIG #####
            {{ "{{hub" }} $cm := (lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" .ManagedClusterName)) | default dict {{ "hub}}" }}
            {{ "{{hub" }} $config := (index $cm "data" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $configYaml := (index $config "config" | default "" | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $eso := (index $configYaml "eso" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $secretStores := (index $eso "secretStores" | default list) {{ "hub}}" }}
            {{ "{{hub-" }} range $item := $secretStores {{ "hub}}" }}
              ##### RESOLVE STORE KIND: secretStore / clusterSecretStore #####
              {{ "{{hub-" }} $kind := "" {{ "hub}}" }}
              {{ "{{hub-" }} $store := dict {{ "hub}}" }}
              {{ "{{hub-" }} if hasKey $item "clusterSecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $kind = "ClusterSecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $store = (index $item "clusterSecretStore") {{ "hub}}" }}
              {{ "{{hub-" }} else if hasKey $item "secretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $kind = "SecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $store = (index $item "secretStore") {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} $storeName := (index $store "name" | default "<unnamed>") {{ "hub}}" }}
              {{ "{{hub-" }} $spec := (index $store "spec" | default dict) {{ "hub}}" }}
              ##### RBAC: kubernetes provider + cert auth -> grant the cert CN secret access #####
              {{ "{{hub-" }} $providerMap := (index $spec "provider" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} $k8s := (index $providerMap "kubernetes" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} if hasKey (index $k8s "auth" | default dict) "cert" {{ "hub}}" }}
                {{ "{{hub-" }} $rbac := (index $store "certAuthRBAC" | default dict) {{ "hub}}" }}
                {{ "{{hub-" }} $user := (index $rbac "username" | default "") {{ "hub}}" }}
                {{ "{{hub-" }} if eq $user "" {{ "hub}}" }}{{ "{{hub-" }} fail (printf "store %q: spec.provider.kubernetes.auth.cert requires certAuthRBAC.username (the cert CN to bind secret RBAC to)" $storeName) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} $verbs := (index $rbac "verbs" | default (list "create" "update" "list" "delete")) {{ "hub}}" }}
                {{ "{{hub-" }} $rbacNs := (index $rbac "namespaces" | default list) {{ "hub}}" }}
                {{ "{{hub-" }} if not $rbacNs {{ "hub}}" }}
                  {{ "{{hub-" }} if eq $kind "SecretStore" {{ "hub}}" }}
                    {{ "{{hub-" }} $rns := (index $k8s "remoteNamespace" | default "") {{ "hub}}" }}
                    {{ "{{hub-" }} $rbacNs = (ternary (list $rns) (list (index $store "namespace")) (ne $rns "")) {{ "hub}}" }}
                  {{ "{{hub-" }} else {{ "hub}}" }}
                    {{ "{{hub-" }} range $c := (index $spec "conditions" | default list) {{ "hub}}" }}
                      {{ "{{hub-" }} $rbacNs = (concat $rbacNs (index $c "namespaces" | default list)) {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} $roleName := (printf "eso-cert-%s-%s" (lower $kind) $storeName) {{ "hub}}" }}
                {{ "{{hub-" }} if eq $kind "ClusterSecretStore" {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRole
                metadata:
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                rules:
                  - apiGroups: [""]
                    resources: ["secrets"]
                    verbs: {{ "{{hub" }} $verbs | toJson {{ "hub}}" }}
                  {{ "{{hub-" }} if $rbacNs {{ "hub}}" }}
                  {{ "{{hub-" }} range $ns := $rbacNs {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                  namespace: {{ "{{hub" }} $ns {{ "hub}}" }}
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: ClusterRole
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                subjects:
                  - kind: User
                    name: {{ "{{hub" }} $user {{ "hub}}" }}
                    apiGroup: rbac.authorization.k8s.io
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} else {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRoleBinding
                metadata:
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: ClusterRole
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                subjects:
                  - kind: User
                    name: {{ "{{hub" }} $user {{ "hub}}" }}
                    apiGroup: rbac.authorization.k8s.io
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} else {{ "hub}}" }}
                {{ "{{hub-" }} range $ns := $rbacNs {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: Role
                metadata:
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                  namespace: {{ "{{hub" }} $ns {{ "hub}}" }}
                rules:
                  - apiGroups: [""]
                    resources: ["secrets"]
                    verbs: {{ "{{hub" }} $verbs | toJson {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                  namespace: {{ "{{hub" }} $ns {{ "hub}}" }}
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: Role
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                subjects:
                  - kind: User
                    name: {{ "{{hub" }} $user {{ "hub}}" }}
                    apiGroup: rbac.authorization.k8s.io
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-external-secrets-operator-cert-auth-rbac
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-external-secrets-operator-cert-auth-rbac
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-external-secrets-operator-cert-auth-rbac
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-external-secrets-operator-cert-auth-rbac
    apiGroup: policy.open-cluster-management.io
    kind: Policy
