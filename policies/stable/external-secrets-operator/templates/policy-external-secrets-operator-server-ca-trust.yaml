# This policy delivers a remote apiserver's SERVING CA to a consuming cluster so that an ESO
# kubernetes-provider store on that cluster can TRUST the remote apiserver it reads from. It is
# the server-trust half of the cross-cluster `cert` auth flow: the store's
# `provider.kubernetes.server.caBundle` / `…server.caProvider` is the CONSUMER of this CA bundle —
# NOT the local apiserver. (The client-signing-CA / `APIServer.spec.clientCA` half is a hub-role,
# single-writer concern handled hub-only by policy-external-secrets-operator-hub-bootstrap-trust.yaml;
# this policy MUST NOT touch APIServer/cluster, or it collides with that single writer.)
#
# Destination: the per-cluster namespace ACM auto-creates on each managed cluster, named after the
# managed cluster's name on the hub (`.ManagedClusterName`) — the same namespace ACM replicates
# policies into. It always exists, is unique per cluster, and the store's `caProvider.namespace`
# points at it. No apiserver change, so no kube-apiserver rollout.
#
# Opt-in, all-or-nothing on `source`:
# - source fully set     -> create the destination CA ConfigMap
# - source partially set -> fail (all of namespace/name/key, or none)
# - source absent        -> no-op
# (Likely temporary / may move elsewhere later.)
#
# Config (per-cluster rendered config):
#   config.externalSecretsOperator.serverCATrust:
#     source: { namespace, name, key }   # ConfigMap on the HUB holding the remote serving CA bundle
#     configMapName: remote-ca           # optional; destination CM name in the <ManagedClusterName> ns (default remote-ca)
#
# It copies the hub source CA into <ManagedClusterName>/<configMapName> under `ca.crt`, where the
# ESO store's caProvider reads it. Runs on the target (consuming) clusters.
#
{{- $policyNamespace := $.Values.policy_namespace }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-server-ca-trust
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-17 Public Key Infrastructure Certificates
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-server-ca-trust
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### LOAD PER-CLUSTER RENDERED CONFIG #####
            {{ "{{hub" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" .ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $serverCATrust := (dig "externalSecretsOperator" "serverCATrust" (dict) $clusterConfig) {{ "hub}}" }}
            {{ "{{hub" }} $source := (index $serverCATrust "source" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $configMapName := (index $serverCATrust "configMapName" | default "remote-ca") {{ "hub}}" }}
            ##### source is all-or-nothing: act when fully set, fail when partial, no-op when absent #####
            {{ "{{hub-" }} $sourceComplete := and (index $source "namespace") (index $source "name") (index $source "key") {{ "hub}}" }}
            {{ "{{hub-" }} $sourceAnySet := or (index $source "namespace") (index $source "name") (index $source "key") {{ "hub}}" }}
            {{ "{{hub-" }} if $sourceComplete {{ "hub}}" }}
            ##### COPY HUB CA BUNDLE -> <ManagedClusterName>/<configMapName> (key ca.crt); store caProvider consumes it #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: {{ "{{hub" }} $configMapName {{ "hub}}" }}
                  namespace: {{ "{{hub" }} .ManagedClusterName {{ "hub}}" }}
                data:
                  ca.crt: |
                    {{ "{{hub" }} fromConfigMap (index $source "namespace") (index $source "name") (index $source "key") | autoindent {{ "hub}}" }}
            {{ "{{hub-" }} else if $sourceAnySet {{ "hub}}" }}{{ "{{hub-" }} fail "serverCATrust.source.namespace, .name and .key must all be defined (or omit source entirely)" {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-eso-server-ca-trust
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-eso-server-ca-trust
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-eso-server-ca-trust
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-eso-server-ca-trust
    apiGroup: policy.open-cluster-management.io
    kind: Policy
