# This policy generates the RBAC backing the kubernetes-provider `cert` auth method for
# ESO stores. It is the companion to policy-eso-secret-stores.yaml: that
# policy creates the SecretStore / ClusterSecretStore objects; this one reads the same
# config.eso.secretStores list and, for every store whose provider is `kubernetes` with
# `cert` auth, grants the certificate's CN (certAuthRBAC.username) access to secrets.
#
# Scope (from the store kind):
#   - SecretStore        -> Role + RoleBinding in each target namespace
#                           (certAuthRBAC.namespaces, else remoteNamespace, else the
#                           store namespace)
#   - ClusterSecretStore -> ClusterRole + ClusterRoleBinding (cluster-wide), OR
#                           ClusterRole + a RoleBinding per namespace when
#                           certAuthRBAC.namespaces or spec.conditions[].namespaces are set
# Verbs default to create/update/list/delete (override with certAuthRBAC.verbs).
# certAuthRBAC.username is required for a kubernetes cert-auth store (fails otherwise).
#
{{- $policyNamespace := $.Values.policy_namespace }}
{{- /* Prune-removed-stores default. hasKey (not dig|default) so an explicit values-level `false` survives. */}}
{{- $pruneDefault := true }}
{{- if hasKey $.Values.externalSecretsOperator "pruneRemovedStores" }}{{- $pruneDefault = $.Values.externalSecretsOperator.pruneRemovedStores }}{{- end }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-cert-auth-rbac
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/description: 'Create the RBAC that grants a kubernetes-provider store client-cert CN its Secret access (certAuthRBAC), scoped to match the store.'
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: AC Access Control
    policy.open-cluster-management.io/controls: AC-3 Access Enforcement
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-cert-auth-rbac
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### LOAD PER-CLUSTER RENDERED CONFIG #####
            {{ "{{hub" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" $.ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $secretStores := (dig "eso" "secretStores" (list) $clusterConfig) {{ "hub}}" }}
            ##### Collect hub-template precondition problems into $hubErrors (no `fail`, which buries the reason #####
            ##### under the whole policy string). Each is tagged [hub] (originating template layer) and bridged #####
            ##### to a runtime $errors below, surfaced via the status ConfigMap + inform gate. Per-store skip: a #####
            ##### misconfigured store is recorded and skipped; the other stores' RBAC is still provisioned. #####
            {{ "{{hub-" }} $hubErrors := list {{ "hub}}" }}
            ##### PRUNE (removed-store strand): every RBAC object emitted below is labelled with the prune #####
            ##### decision baked at emission (store `prune`, else config.eso.pruneRemovedStores, else chart #####
            ##### default); $expectedRBAC collects what THIS render wants and the runtime sweep at the #####
            ##### bottom deletes labelled leftovers. #####
            {{ "{{hub-" }} $prunePolicy := (dig "eso" "pruneRemovedStores" {{ $pruneDefault }} $clusterConfig) {{ "hub}}" }}
            {{ "{{hub-" }} $expectedRBAC := dict {{ "hub}}" }}
            {{ "{{hub-" }} range $storeItem := $secretStores {{ "hub}}" }}
              ##### RESOLVE STORE KIND: secretStore / clusterSecretStore. `default dict` guards: a null #####
              ##### list item / empty kind body would otherwise crash hasKey/index and abort the whole #####
              ##### hub template (the fail-envelope failure mode). #####
              {{ "{{hub-" }} $storeItem = ($storeItem | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} $storeKind := "" {{ "hub}}" }}
              {{ "{{hub-" }} $store := dict {{ "hub}}" }}
              {{ "{{hub-" }} if hasKey $storeItem "clusterSecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $storeKind = "ClusterSecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $store = (index $storeItem "clusterSecretStore" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} else if hasKey $storeItem "secretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $storeKind = "SecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $store = (index $storeItem "secretStore" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} $storeName := (index $store "name" | default "<unnamed>") {{ "hub}}" }}
              {{ "{{hub-" }} $storePrune := $prunePolicy {{ "hub}}" }}
              {{ "{{hub-" }} if hasKey $store "prune" {{ "hub}}" }}{{ "{{hub-" }} $storePrune = (index $store "prune") {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} $spec := (index $store "spec" | default dict) {{ "hub}}" }}
              ##### RBAC: kubernetes provider + cert auth -> grant the cert CN secret access #####
              {{ "{{hub-" }} $kubernetesProvider := (dig "provider" "kubernetes" (dict) $spec) {{ "hub}}" }}
              {{ "{{hub-" }} if hasKey (index $kubernetesProvider "auth" | default dict) "cert" {{ "hub}}" }}
                {{ "{{hub-" }} $certAuthRBAC := (index $store "certAuthRBAC" | default dict) {{ "hub}}" }}
                {{ "{{hub-" }} $username := (index $certAuthRBAC "username" | default "") {{ "hub}}" }}
                {{ "{{hub-" }} if eq $username "" {{ "hub}}" }}
                  ##### Missing username: record the problem (tagged [hub]) and SKIP this store's RBAC — a #####
                  ##### binding with an empty subject would be meaningless. Other stores are unaffected. #####
                  {{ "{{hub-" }} $hubErrors = append $hubErrors (printf "[hub] store %q: spec.provider.kubernetes.auth.cert requires certAuthRBAC.username (the cert CN to bind secret RBAC to)" $storeName) {{ "hub}}" }}
                {{ "{{hub-" }} else {{ "hub}}" }}
                {{ "{{hub-" }} $verbs := (index $certAuthRBAC "verbs" | default (list "create" "update" "list" "delete")) {{ "hub}}" }}
                {{ "{{hub-" }} $rbacNamespaces := (index $certAuthRBAC "namespaces" | default list) {{ "hub}}" }}
                {{ "{{hub-" }} if not $rbacNamespaces {{ "hub}}" }}
                  {{ "{{hub-" }} if eq $storeKind "SecretStore" {{ "hub}}" }}
                    {{ "{{hub-" }} $remoteNamespace := (index $kubernetesProvider "remoteNamespace" | default "") {{ "hub}}" }}
                    {{ "{{hub-" }} $rbacNamespaces = (ternary (list $remoteNamespace) (list (index $store "namespace")) (ne $remoteNamespace "")) {{ "hub}}" }}
                  {{ "{{hub-" }} else if eq $storeKind "ClusterSecretStore" {{ "hub}}" }}
                    {{ "{{hub-" }} range $condition := (index $spec "conditions" | default list) {{ "hub}}" }}
                      {{ "{{hub-" }} $rbacNamespaces = (concat $rbacNamespaces (index ($condition | default dict) "namespaces" | default list)) {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} $roleName := (printf "eso-cert-%s-%s" (lower $storeKind) $storeName) {{ "hub}}" }}
                {{ "{{hub-" }} if eq $storeKind "ClusterSecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $_ := set $expectedRBAC (printf "ClusterRole||%s" $roleName) true {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRole
                metadata:
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                  labels:
                    autoshift.io/eso-cert-auth-rbac: "true"
                    autoshift.io/eso-prune: {{ "{{hub" }} $storePrune | quote {{ "hub}}" }}
                rules:
                  - apiGroups: [""]
                    resources: ["secrets"]
                    verbs: {{ "{{hub" }} $verbs | toJson {{ "hub}}" }}
                  {{ "{{hub-" }} if $rbacNamespaces {{ "hub}}" }}
                  {{ "{{hub-" }} range $namespace := $rbacNamespaces {{ "hub}}" }}
                  {{ "{{hub-" }} $_ := set $expectedRBAC (printf "RoleBinding|%s|%s" $namespace $roleName) true {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                  namespace: {{ "{{hub" }} $namespace {{ "hub}}" }}
                  labels:
                    autoshift.io/eso-cert-auth-rbac: "true"
                    autoshift.io/eso-prune: {{ "{{hub" }} $storePrune | quote {{ "hub}}" }}
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: ClusterRole
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                subjects:
                  - kind: User
                    name: {{ "{{hub" }} $username {{ "hub}}" }}
                    apiGroup: rbac.authorization.k8s.io
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  ##### no namespaces -> CLUSTER-WIDE grant. Plain `else`: this arm is already CSS-only, and #####
                  ##### the previous `else if eq $storeKind "SecretStore"` was unreachable there — cluster-wide #####
                  ##### stores got a ClusterRole with NO binding (silent zero access for the cert CN). #####
                  {{ "{{hub-" }} else {{ "hub}}" }}
                  {{ "{{hub-" }} $_ := set $expectedRBAC (printf "ClusterRoleBinding||%s" $roleName) true {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRoleBinding
                metadata:
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                  labels:
                    autoshift.io/eso-cert-auth-rbac: "true"
                    autoshift.io/eso-prune: {{ "{{hub" }} $storePrune | quote {{ "hub}}" }}
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: ClusterRole
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                subjects:
                  - kind: User
                    name: {{ "{{hub" }} $username {{ "hub}}" }}
                    apiGroup: rbac.authorization.k8s.io
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} else if eq $storeKind "SecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} range $namespace := $rbacNamespaces {{ "hub}}" }}
                {{ "{{hub-" }} $_ := set $expectedRBAC (printf "Role|%s|%s" $namespace $roleName) true {{ "hub}}" }}
                {{ "{{hub-" }} $_ := set $expectedRBAC (printf "RoleBinding|%s|%s" $namespace $roleName) true {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: Role
                metadata:
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                  namespace: {{ "{{hub" }} $namespace {{ "hub}}" }}
                  labels:
                    autoshift.io/eso-cert-auth-rbac: "true"
                    autoshift.io/eso-prune: {{ "{{hub" }} $storePrune | quote {{ "hub}}" }}
                rules:
                  - apiGroups: [""]
                    resources: ["secrets"]
                    verbs: {{ "{{hub" }} $verbs | toJson {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                  namespace: {{ "{{hub" }} $namespace {{ "hub}}" }}
                  labels:
                    autoshift.io/eso-cert-auth-rbac: "true"
                    autoshift.io/eso-prune: {{ "{{hub" }} $storePrune | quote {{ "hub}}" }}
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: Role
                  name: {{ "{{hub" }} $roleName {{ "hub}}" }}
                subjects:
                  - kind: User
                    name: {{ "{{hub" }} $username {{ "hub}}" }}
                    apiGroup: rbac.authorization.k8s.io
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            ##### BRIDGE the hub-collected problems to a runtime $errors and SURFACE them as DATA (no fail): #####
            ##### the helper writes the eso-cert-auth-rbac-status ConfigMap (full list) when non-empty and #####
            ##### mustnothave-clears it when empty. The companion inform gate CP turns its presence into this #####
            ##### Policy's compliance. #####
            {{ "{{-" }} $errors := `{{ "{{hub" }} $hubErrors | toJson {{ "hub}}" }}` | fromJson {{ "}}" }}
            ##### SWEEP removed stores' RBAC (runtime): diff labelled live RBAC against what THIS render #####
            ##### wants; delete leftovers whose eso-prune label (baked at emission) says "true". Disabled #####
            ##### when any store errored (its config is being fixed — do not delete its live RBAC) and when #####
            ##### the rendered config could not be read (a transient miss must never prune). RBAC kinds are #####
            ##### core — no CRD guard needed. #####
            {{ "{{-" }} $expectedRBAC := `{{ "{{hub" }} $expectedRBAC | toJson {{ "hub}}" }}` | fromJson {{ "}}" }}
            {{ "{{-" }} $sweepOn := `{{ "{{hub" }} if and $clusterConfig (not $hubErrors) {{ "hub}}" }}1{{ "{{hub" }} end {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} if eq $sweepOn "1" {{ "}}" }}
              {{ "{{-" }} range $obj := ((lookup "rbac.authorization.k8s.io/v1" "ClusterRole" "" "").items | default list) {{ "}}" }}
                {{ "{{-" }} $objLabels := (dig "metadata" "labels" (dict) $obj) {{ "}}" }}
                {{ "{{-" }} $objName := (dig "metadata" "name" "" $obj) {{ "}}" }}
                {{ "{{-" }} if and (hasKey $objLabels "autoshift.io/eso-cert-auth-rbac") (eq (index $objLabels "autoshift.io/eso-prune" | default "true") "true") (not (hasKey $expectedRBAC (printf "ClusterRole||%s" $objName))) {{ "}}" }}
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRole
                metadata:
                  name: {{ "{{" }} $objName {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} range $obj := ((lookup "rbac.authorization.k8s.io/v1" "ClusterRoleBinding" "" "").items | default list) {{ "}}" }}
                {{ "{{-" }} $objLabels := (dig "metadata" "labels" (dict) $obj) {{ "}}" }}
                {{ "{{-" }} $objName := (dig "metadata" "name" "" $obj) {{ "}}" }}
                {{ "{{-" }} if and (hasKey $objLabels "autoshift.io/eso-cert-auth-rbac") (eq (index $objLabels "autoshift.io/eso-prune" | default "true") "true") (not (hasKey $expectedRBAC (printf "ClusterRoleBinding||%s" $objName))) {{ "}}" }}
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRoleBinding
                metadata:
                  name: {{ "{{" }} $objName {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} range $obj := ((lookup "rbac.authorization.k8s.io/v1" "Role" "" "").items | default list) {{ "}}" }}
                {{ "{{-" }} $objLabels := (dig "metadata" "labels" (dict) $obj) {{ "}}" }}
                {{ "{{-" }} $objName := (dig "metadata" "name" "" $obj) {{ "}}" }}
                {{ "{{-" }} $objNs := (dig "metadata" "namespace" "" $obj) {{ "}}" }}
                {{ "{{-" }} if and (hasKey $objLabels "autoshift.io/eso-cert-auth-rbac") (eq (index $objLabels "autoshift.io/eso-prune" | default "true") "true") (not (hasKey $expectedRBAC (printf "Role|%s|%s" $objNs $objName))) {{ "}}" }}
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: Role
                metadata:
                  name: {{ "{{" }} $objName {{ "}}" }}
                  namespace: {{ "{{" }} $objNs {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} range $obj := ((lookup "rbac.authorization.k8s.io/v1" "RoleBinding" "" "").items | default list) {{ "}}" }}
                {{ "{{-" }} $objLabels := (dig "metadata" "labels" (dict) $obj) {{ "}}" }}
                {{ "{{-" }} $objName := (dig "metadata" "name" "" $obj) {{ "}}" }}
                {{ "{{-" }} $objNs := (dig "metadata" "namespace" "" $obj) {{ "}}" }}
                {{ "{{-" }} if and (hasKey $objLabels "autoshift.io/eso-cert-auth-rbac") (eq (index $objLabels "autoshift.io/eso-prune" | default "true") "true") (not (hasKey $expectedRBAC (printf "RoleBinding|%s|%s" $objNs $objName))) {{ "}}" }}
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: {{ "{{" }} $objName {{ "}}" }}
                  namespace: {{ "{{" }} $objNs {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{- include "eso.boot.statusReport" (dict "policy" "eso-cert-auth-rbac" "ns" "open-cluster-management-agent-addon") | nindent 12 }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-cert-auth-rbac-gate
        spec:
          # inform GATE: the compliance proxy for the per-store RBAC report. It mutates nothing; it asserts
          # the report's status ConfigMap is ABSENT. Present (a store failed validation) -> NonCompliant;
          # absent -> Compliant. Valid stores' RBAC is still provisioned by the enforce report (per-store
          # skip), so this gate flags "some store is misconfigured" without blocking the healthy ones. The
          # status CM lives in open-cluster-management-agent-addon (always present on hub + spoke).
          remediationAction: inform
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: eso-cert-auth-rbac-status
                  namespace: open-cluster-management-agent-addon
