# Hub-side half of the cluster->cluster ESO bootstrap. This policy is placed ONLY on hub
# clusters (hubClusterSets) and provisions, PER AUTOSHIFT DEPLOYMENT, a client-cert identity
# the hub apiserver trusts — so that deployment's spokes can read Secrets from the hub via the
# kubernetes provider. Its spoke-side companion is policy-external-secrets-operator-hub-bootstrap.yaml.
#
# Trust model: cert-manager mints ONE generic self-signed CA (its own key, hub-internal) and that
# CA is wired into the hub apiserver clientCA trust. This is ADDITIVE — OpenShift merges a custom
# spec.clientCA with the operator-managed client signers (csr-signer, admin, kubelet, ...), so
# existing client auth keeps working; we just add one more trusted issuer. The CA is long-lived and
# fully ours (no chasing a Red-Hat-managed signer's rotation, no OCP-version coupling). The only
# cost is a one-time kube-apiserver rollout when spec.clientCA is first set. Multi-deployment safe:
# the CA / CA issuer / clientCA ConfigMap all have stable chart-derived names, so every deployment
# declares the SAME shared CA (idempotent) — nobody fights over spec.clientCA. The per-namespace
# certs are signed by this one CA; isolation lives entirely in CN->RBAC.
#
# Tenancy model: an AutoShift deployment is a tenancy boundary, and its policy namespace carries
# the label autoshift.io/createdByAutoshift: "true". This policy enumerates those namespaces
# (cluster-scoped — NOT bounded to a single policy namespace, so it works no matter how many
# AutoShift deployments share the hub) and issues, into EACH:
#   - one client Certificate, CN = "<certCNPrefix>-<namespace>" (distinct per deployment), and
#   - a Role + RoleBinding granting that CN read on Secrets in THAT namespace ONLY.
# So each deployment's identity is isolated to its own namespace — it cannot read across tenants.
# A spoke doesn't need any per-cluster cert wiring: its hub-side templates already read from its
# own $policyNamespace, so it copies its deployment's cert automatically.
#
# Hub vs runtime split:
#   - HUB templates DERIVE VALUES FROM THIS CLUSTER'S RENDERED CONFIG ONLY — they load the
#     <cluster>.rendered-config ConfigMap (hub-resident, so the propagator can read it) and pull the
#     hubBootstrap cert settings (CN prefix, duration, renewBefore), then bridge them to runtime.
#   - RUNTIME templates do everything else: the cluster-state lookup (enumerating THIS cluster's
#     AutoShift namespaces) AND all actions (CA + issuers, clientCA wiring, per-namespace certs +
#     RBAC). They run as the target cluster's local config-policy-controller (cluster-admin).
# Why the namespace lookup and actions are runtime, not hub: a hub template resolves against the
# top-level PROPAGATING hub, so it would need a privileged propagator SA and — worse — for an
# INTERMEDIATE hub (managed by a self-managed hub, but not self-managing) it would query/act on the
# WRONG cluster. Runtime resolves against the cluster the policy LANDED ON: a self-managed hub acts
# on itself (local-cluster); an intermediate hub acts on itself. Mental model: hub reads ITS config
# -> policy lands on that same cluster -> runtime lists that cluster's namespaces and mints into them.
# Rule: only RENDERED-CONFIG derivation belongs in hub templates; cluster-state lookups + actions are runtime.
#
# Whole policy is a no-op unless at least one labelled namespace exists (so the CA + the disruptive
# clientCA wiring are only created when the feature is actually in use).
#
# Depends on cert-manager being installed on the hub (policy-cert-manager-operator-install).
#
{{- if $.Values.hubClusterSets }}
  {{- /* Structural naming (chart convention, like saName/clusterRoleName in the sibling policies) */}}
  {{- $policyNamespace := $.Values.policy_namespace }}
  {{- $eso := $.Values.externalSecretsOperator }}
  {{- $storePrefix := ($eso.hubBootstrapStorePrefix | default "hub-bootstrap") }}
  {{- $clientSecret := (printf "%s-client" $storePrefix) }}
  {{- $readerRole := (printf "%s-reader" $storePrefix) }}
  {{- $selfSignedIssuer := (printf "%s-selfsigned" $storePrefix) }}
  {{- $caIssuer := (printf "%s-ca-issuer" $storePrefix) }}
  {{- $caName := (printf "%s-ca" $storePrefix) }}
  {{- $clientCAConfigMap := ($eso.hubBootstrapClientCAConfigMap | default (printf "%s-client-ca" $storePrefix)) }}
  {{- $cmResourceNamespace := ($eso.certManagerResourceNamespace | default "cert-manager") }}
  {{- /* Cert tuning: these are DEFAULTS only. The actual values are read per-deployment from */}}
  {{- /* config.eso.hubBootstrap via hub templates below (rendered-config-driven, like the siblings). */}}
  {{- $defaultCertCNPrefix := ($eso.hubBootstrapCertCNPrefix | default "autoshift-eso-client") }}
  {{- $defaultCertDuration := ($eso.hubBootstrapCertDuration | default "720h") }}
  {{- $defaultCertRenewBefore := ($eso.hubBootstrapCertRenewBefore | default "480h") }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-external-secrets-operator-hub-bootstrap-trust
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-17 Public Key Infrastructure Certificates
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-cert-manager-operator-install
      namespace: {{ $policyNamespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: external-secrets-operator-hub-bootstrap-trust
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### DERIVE (hub): load THIS cluster's rendered config + its hubBootstrap cert settings #####
            {{ "{{hub" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" .ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $hubBootstrap := (dig "eso" "hubBootstrap" (dict) $clusterConfig) {{ "hub}}" }}
            {{ "{{hub-" }} $certCNPrefix := (index $hubBootstrap "certCNPrefix" | default "{{ $defaultCertCNPrefix }}") {{ "hub}}" }}
            {{ "{{hub-" }} $certDuration := (index $hubBootstrap "certDuration" | default "{{ $defaultCertDuration }}") {{ "hub}}" }}
            {{ "{{hub-" }} $certRenewBefore := (index $hubBootstrap "certRenewBefore" | default "{{ $defaultCertRenewBefore }}") {{ "hub}}" }}
            ##### BRIDGE the derived cert settings to the runtime side #####
            {{ "{{-" }} $certCNPrefix := `{{ "{{hub" }} $certCNPrefix {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $certDuration := `{{ "{{hub" }} $certDuration {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $certRenewBefore := `{{ "{{hub" }} $certRenewBefore {{ "hub}}" }}` {{ "}}" }}
            ##### RUNTIME (on the managed cluster itself): list THIS cluster's AutoShift namespaces #####
            {{ "{{-" }} $namespaces := list {{ "}}" }}
            {{ "{{-" }} range $_, $ns := ((lookup "v1" "Namespace" "" "" "autoshift.io/createdByAutoshift=true").items | default list) {{ "}}" }}{{ "{{-" }} $namespaces = append $namespaces $ns.metadata.name {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} if $namespaces {{ "}}" }}
            ##### ACT (runtime, local config-policy-controller on the cluster that landed this policy) #####
            ##### one generic self-signed CA (cert-manager) that signs all the client certs #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: cert-manager.io/v1
                kind: ClusterIssuer
                metadata:
                  name: {{ $selfSignedIssuer }}
                spec:
                  selfSigned: {}
            - complianceType: musthave
              objectDefinition:
                apiVersion: cert-manager.io/v1
                kind: Certificate
                metadata:
                  name: {{ $caName }}
                  namespace: {{ $cmResourceNamespace }}
                spec:
                  isCA: true
                  commonName: {{ $caName }}
                  secretName: {{ $caName }}
                  duration: 87600h
                  renewBefore: 720h
                  privateKey:
                    algorithm: RSA
                    size: 4096
                  issuerRef:
                    name: {{ $selfSignedIssuer }}
                    kind: ClusterIssuer
                    group: cert-manager.io
            - complianceType: musthave
              objectDefinition:
                apiVersion: cert-manager.io/v1
                kind: ClusterIssuer
                metadata:
                  name: {{ $caIssuer }}
                spec:
                  ca:
                    secretName: {{ $caName }}
            ##### WIRE THE CA INTO THE HUB APISERVER clientCA TRUST (additive; operator signers stay trusted) #####
            {{ "{{-" }} $caBundle := (dig "data" "ca.crt" "" ((lookup "v1" "Secret" "{{ $cmResourceNamespace }}" "{{ $caName }}") | default dict)) {{ "}}" }}
            {{ "{{-" }} if ne $caBundle "" {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: {{ $clientCAConfigMap }}
                  namespace: openshift-config
                data:
                  ca-bundle.crt: |
                    {{ "{{" }} $caBundle | base64dec | autoindent {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: config.openshift.io/v1
                kind: APIServer
                metadata:
                  name: cluster
                spec:
                  clientCA:
                    name: {{ $clientCAConfigMap }}
            {{ "{{-" }} end {{ "}}" }}
            ##### PER NAMESPACE (tenancy boundary): one client cert + an identity scoped to that namespace #####
            {{ "{{-" }} range $ns := $namespaces {{ "}}" }}
              {{ "{{-" }} $certCN := (printf "%s-%s" $certCNPrefix $ns) {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: cert-manager.io/v1
                kind: Certificate
                metadata:
                  name: {{ $clientSecret }}
                  namespace: {{ "{{" }} $ns {{ "}}" }}
                spec:
                  commonName: {{ "{{" }} $certCN {{ "}}" }}
                  secretName: {{ $clientSecret }}
                  duration: {{ "{{" }} $certDuration {{ "}}" }}
                  renewBefore: {{ "{{" }} $certRenewBefore {{ "}}" }}
                  usages:
                    - client auth
                    - digital signature
                    - key encipherment
                  privateKey:
                    algorithm: RSA
                    size: 2048
                  issuerRef:
                    name: {{ $caIssuer }}
                    kind: ClusterIssuer
                    group: cert-manager.io
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: Role
                metadata:
                  name: {{ $readerRole }}
                  namespace: {{ "{{" }} $ns {{ "}}" }}
                rules:
                  - apiGroups: [""]
                    resources: ["secrets"]
                    verbs: ["get", "list", "watch"]
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: {{ $readerRole }}
                  namespace: {{ "{{" }} $ns {{ "}}" }}
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: Role
                  name: {{ $readerRole }}
                subjects:
                  - kind: User
                    name: {{ "{{" }} $certCN {{ "}}" }}
                    apiGroup: rbac.authorization.k8s.io
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-external-secrets-operator-hub-bootstrap-trust
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-external-secrets-operator-hub-bootstrap-trust
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-external-secrets-operator-hub-bootstrap-trust
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-external-secrets-operator-hub-bootstrap-trust
    apiGroup: policy.open-cluster-management.io
    kind: Policy
{{ end }}
