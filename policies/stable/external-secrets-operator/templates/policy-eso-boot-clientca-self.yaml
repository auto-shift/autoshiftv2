{{- /*
  Single-sourced object-templates body for policy-eso-boot-clientca-self.
  Included TWICE below: once as the live object stream (indent 12), once as the text
  payload of the debug-render ConfigMap (nindent 20). Include directives are indented;
  {{- left-trims the source newline+spaces and nindent re-supplies them. Helm-render locals threaded in via the context dict ($ctx).
*/ -}}
{{- define "eso.bootBody.clientcaSelf" -}}
##### DERIVE (hub): load THIS cluster's rendered config + its hubBootstrap cert settings #####
{{ "{{hub" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ .policyNamespace }}" (printf "%s.rendered-config" $.ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
{{ "{{hub" }} $hubBootstrap := (dig "eso" "hubBootstrap" (dict) $clusterConfig) {{ "hub}}" }}
{{ "{{hub-" }} $mode := (index $hubBootstrap "mode" | default "{{ .defaultMode }}") {{ "hub}}" }}
{{ "{{hub-" }} $clientIdentity := (dig "clientIdentity" (dict) $hubBootstrap) {{ "hub}}" }}
{{ "{{hub-" }} $certCNPrefix := (index $clientIdentity "certCNPrefix" | default "{{ .defaultCertCNPrefix }}") {{ "hub}}" }}
{{ "{{hub-" }} $certBaseDomain := (index $clientIdentity "baseDomain" | default "{{ .defaultCertBaseDomain }}") {{ "hub}}" }}
##### Cert spec fields: explicit per-cluster config wins, else the chart default, else a MODE-BASED default. #####
##### selfSigned (our own CA honors them verbatim) -> sensible values INCLUDING client auth (required for hub #####
##### mTLS); external modes -> EMPTY so the issuer governs validity/keyUsage. This policy only mints in #####
##### selfSigned, so in practice the selfSigned arm always applies here. #####
{{ "{{hub-" }} $ssCertDefaults := (eq $mode "selfSigned") {{ "hub}}" }}
{{ "{{hub-" }} $certDuration := (index $clientIdentity "certDuration" | default "{{ .defaultCertDuration }}" | default (ternary "720h" "" $ssCertDefaults)) {{ "hub}}" }}
{{ "{{hub-" }} $certRenewBefore := (index $clientIdentity "certRenewBefore" | default "{{ .defaultCertRenewBefore }}" | default (ternary "480h" "" $ssCertDefaults)) {{ "hub}}" }}
{{ "{{hub-" }} $certUsages := (index $clientIdentity "certUsages" | default (`{{ .defaultCertUsages | toJson }}` | fromJson) | default (ternary (list "client auth" "digital signature" "key encipherment") (list) $ssCertDefaults)) {{ "hub}}" }}
{{ "{{hub-" }} $privateKeyAlgorithm := (index $clientIdentity "privateKeyAlgorithm" | default "{{ .defaultPrivateKeyAlgorithm }}" | default (ternary "RSA" "" $ssCertDefaults)) {{ "hub}}" }}
{{ "{{hub-" }} $privateKeySize := (index $clientIdentity "privateKeySize" | default "{{ .defaultPrivateKeySize }}" | default (ternary "2048" "" $ssCertDefaults)) {{ "hub}}" }}
##### BRIDGE the derived cert settings to the runtime side #####
{{ "{{-" }} $mode := `{{ "{{hub" }} $mode {{ "hub}}" }}` {{ "}}" }}
##### Collect precondition problems into $errors (no `fail`, which buries the reason under the whole #####
##### policy string); surfaced via the status ConfigMap + inform gate below. #####
{{ "{{-" }} $errors := list {{ "}}" }}
##### Reject an unknown mode (a typo'd mode would otherwise silently no-op this policy AND its external #####
##### companion, leaving the hub apiserver with no clientCA wired for any cluster). #####
{{ "{{-" }} if and (ne $mode "selfSigned") (ne $mode "externalCA") (ne $mode "externalCAReuseServingCert") {{ "}}" }}
  {{ "{{-" }} $errors = append $errors (printf "[spoke] invalid config.eso.hubBootstrap.mode %q (or values hubBootstrap.mode) — must be one of: selfSigned, externalCA, externalCAReuseServingCert" $mode) {{ "}}" }}
{{ "{{-" }} end {{ "}}" }}
{{ "{{-" }} $certCNPrefix := `{{ "{{hub" }} $certCNPrefix {{ "hub}}" }}` {{ "}}" }}
{{ "{{-" }} $certBaseDomain := `{{ "{{hub" }} $certBaseDomain {{ "hub}}" }}` {{ "}}" }}
{{ "{{-" }} $certDuration := `{{ "{{hub" }} $certDuration {{ "hub}}" }}` {{ "}}" }}
{{ "{{-" }} $certRenewBefore := `{{ "{{hub" }} $certRenewBefore {{ "hub}}" }}` {{ "}}" }}
{{ "{{-" }} $certUsages := `{{ "{{hub" }} $certUsages | toJson {{ "hub}}" }}` | fromJson {{ "}}" }}
{{ "{{-" }} $privateKeyAlgorithm := `{{ "{{hub" }} $privateKeyAlgorithm {{ "hub}}" }}` {{ "}}" }}
{{ "{{-" }} $privateKeySize := `{{ "{{hub" }} $privateKeySize {{ "hub}}" }}` {{ "}}" }}
##### RUNTIME (on the hub itself): enumerate THIS hub's ManagedClusters, build the eligible set #####
##### Keep EVERY cluster carrying the autoshift.io/owning-namespace label (any deployment — one #####
##### hub hosts clusters from many). Missing label -> SKIP (treat as a non-autoshift cluster; the eval #####
##### interval is deliberately small). CN = <prefix>.<clusterTrunc>.<baseDomain> capped at 63: the #####
##### cluster-name segment is truncated to the budget the prefix + baseDomain leave (61 minus their #####
##### lengths, the 2 dots counted). Budget exhausted -> fail; truncation collision -> fail (no hash #####
##### function exists in ACM templates, so a collision cannot be silently disambiguated). #####
{{ "{{-" }} $cnBudget := (sub 61 (add (len $certCNPrefix) (len $certBaseDomain))) {{ "}}" }}
{{ "{{-" }} $eligible := list {{ "}}" }}
{{ "{{-" }} $nsIdentities := dict {{ "}}" }}
{{ "{{-" }} $seenCNs := dict {{ "}}" }}
{{ "{{-" }} $seenNames := dict {{ "}}" }}
##### This policy owns the selfSigned mode ONLY. In externalCA / externalCAReuseServingCert #####
##### the hub mints no CA + no client certs — policy ...-boot-clientca-ext owns those #####
##### modes (clientCA <- external bundle, per-cluster RBAC only). Leaving $eligible empty below #####
##### makes this whole policy a no-op so the two never both write APIServer.spec.clientCA. #####
{{ "{{-" }} if eq $mode "selfSigned" {{ "}}" }}
  ##### CN budget is cluster-independent (prefix + baseDomain only) — check ONCE up front. Exhausted -> #####
  ##### record it and skip enumeration entirely (no per-cluster segment can be derived). #####
  {{ "{{-" }} if lt $cnBudget 1 {{ "}}" }}
    {{ "{{-" }} $errors = append $errors (printf "[spoke] hub-bootstrap CN budget exhausted: prefix %q + baseDomain %q leave no room for the cluster name (their combined length must be <= 61); shorten hubBootstrap.clientIdentity.certCNPrefix or hubBootstrap.clientIdentity.baseDomain" $certCNPrefix $certBaseDomain) {{ "}}" }}
  {{ "{{-" }} else {{ "}}" }}
  {{ "{{-" }} range $mc := ((lookup "cluster.open-cluster-management.io/v1" "ManagedCluster" "" "").items | default list) {{ "}}" }}
    {{ "{{-" }} $mcName := $mc.metadata.name {{ "}}" }}
    {{ "{{-" }} $tenancyNs := (dig "metadata" "labels" "autoshift.io/owning-namespace" "" $mc) {{ "}}" }}
    {{ "{{-" }} if ne $tenancyNs "" {{ "}}" }}
      ##### Per cluster: collect any problem into $errors WITHOUT aborting (so every bad cluster is #####
      ##### reported at once) and only register + mint a cluster that derives cleanly. $clusterOk tracks #####
      ##### whether THIS cluster is usable; ANY error blocks the whole action below (all-or-nothing, as #####
      ##### the previous `fail` did). Crash-prone index ops are guarded behind their precondition checks. #####
      ##### SECRET-NAME segment (STORAGE, not identity): the OCM ManagedCluster name. It is UNIQUE per #####
      ##### hub and available with no lookup, and the secret only ever lives in this hub's namespaces — #####
      ##### so the spoke store copies it by this SAME OCM name with no clusterClaim derivation. Truncated #####
      ##### to the budget purely so the resource name stays bounded; collision = truncation only. substr #####
      ##### needs int args, but ACM math (add/sub) yields int64 — convert with toInt (sprig slice rejects strings). #####
      {{ "{{-" }} $clusterOk := true {{ "}}" }}
      {{ "{{-" }} $nameSeg := $mcName {{ "}}" }}
      {{ "{{-" }} if gt (len $mcName) $cnBudget {{ "}}" }}{{ "{{-" }} $nameSeg = (substr 0 (toInt $cnBudget) $mcName) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
      {{ "{{-" }} if hasKey $seenNames $nameSeg {{ "}}" }}
        {{ "{{-" }} $errors = append $errors (printf "[spoke] hub-bootstrap client-secret name collision after truncation: clusters %q and %q both map to secret segment %q; lengthen the budget (shorter prefix/baseDomain) or rename a cluster" (index $seenNames $nameSeg) $mcName $nameSeg) {{ "}}" }}
        {{ "{{-" }} $clusterOk = false {{ "}}" }}
      {{ "{{-" }} end {{ "}}" }}
      ##### CN segment (IDENTITY / RBAC subject): the cluster's REAL name = the apiserverurl.openshift.io #####
      ##### clusterClaim host label (api.<realName>.<base> -> <realName>), NOT $mcName. Self-managed hubs #####
      ##### are ALL named "local-cluster", so the OCM name would collide into one ambiguous identity if this #####
      ##### signer's CA were ever shared. Byte-identical derivation to the externalCA companion + the spoke #####
      ##### store, so the identity contract is uniform across every mode. The full (untruncated) real name #####
      ##### is carried as a SAN below so the complete identity survives CN truncation. #####
      {{ "{{-" }} $apiUrl := "" {{ "}}" }}
      {{ "{{-" }} range $claim := (dig "status" "clusterClaims" (list) $mc) {{ "}}" }}
        {{ "{{-" }} if eq (dig "name" "" $claim) "apiserverurl.openshift.io" {{ "}}" }}{{ "{{-" }} $apiUrl = (dig "value" "" $claim) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
      {{ "{{-" }} end {{ "}}" }}
      {{ "{{-" }} $certCN := "" {{ "}}" }}
      {{ "{{-" }} $realName := "" {{ "}}" }}
      {{ "{{-" }} if eq $apiUrl "" {{ "}}" }}
        {{ "{{-" }} $errors = append $errors (printf "[spoke] ManagedCluster %q has no apiserverurl.openshift.io clusterClaim — cannot derive its real cluster name for the client cert CN" $mcName) {{ "}}" }}
        {{ "{{-" }} $clusterOk = false {{ "}}" }}
      {{ "{{-" }} else {{ "}}" }}
        {{ "{{-" }} $hostLabels := (splitList "." (index (splitList ":" (replace "https://" "" $apiUrl)) 0)) {{ "}}" }}
        {{ "{{-" }} if lt (len $hostLabels) 2 {{ "}}" }}
          {{ "{{-" }} $errors = append $errors (printf "[spoke] ManagedCluster %q apiserver URL %q is not of the form https://api.<cluster>.<base> — cannot derive the real cluster name" $mcName $apiUrl) {{ "}}" }}
          {{ "{{-" }} $clusterOk = false {{ "}}" }}
        {{ "{{-" }} else {{ "}}" }}
          {{ "{{-" }} $realName = (index $hostLabels 1) {{ "}}" }}
          {{ "{{-" }} $cnSeg := $realName {{ "}}" }}
          {{ "{{-" }} if gt (len $realName) $cnBudget {{ "}}" }}{{ "{{-" }} $cnSeg = (substr 0 (toInt $cnBudget) $realName) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
          {{ "{{-" }} $certCN = (printf "%s.%s.%s" $certCNPrefix $cnSeg $certBaseDomain) {{ "}}" }}
          {{ "{{-" }} if hasKey $seenCNs $certCN {{ "}}" }}
            {{ "{{-" }} $errors = append $errors (printf "[spoke] hub-bootstrap CN collision after truncation: clusters %q and %q both map to CN %q; lengthen the budget (shorter prefix/baseDomain) or rename a cluster" (index $seenCNs $certCN) $mcName $certCN) {{ "}}" }}
            {{ "{{-" }} $clusterOk = false {{ "}}" }}
          {{ "{{-" }} end {{ "}}" }}
        {{ "{{-" }} end {{ "}}" }}
      {{ "{{-" }} end {{ "}}" }}
      ##### register + enqueue only a fully-valid cluster (seen* maps stay collision-accurate; an errored #####
      ##### cluster is skipped, and the action is blocked wholesale by `not $errors` below regardless). #####
      {{ "{{-" }} if $clusterOk {{ "}}" }}
        {{ "{{-" }} $seenNames = set $seenNames $nameSeg $mcName {{ "}}" }}
        {{ "{{-" }} $seenCNs = set $seenCNs $certCN $mcName {{ "}}" }}
        {{ "{{-" }} $eligible = append $eligible (dict "name" $mcName "cn" $certCN "seg" $nameSeg "san" $realName "ns" $tenancyNs) {{ "}}" }}
        ##### group CNs by owning namespace for the per-namespace reader Role + RoleBinding below #####
        {{ "{{-" }} $nsList := (index $nsIdentities $tenancyNs | default list) {{ "}}" }}
        {{ "{{-" }} $nsList = append $nsList $certCN {{ "}}" }}
        {{ "{{-" }} $_ := set $nsIdentities $tenancyNs $nsList {{ "}}" }}
      {{ "{{-" }} end {{ "}}" }}
    {{ "{{-" }} end {{ "}}" }}
  {{ "{{-" }} end {{ "}}" }}
  {{ "{{-" }} end {{ "}}" }}
{{ "{{-" }} end {{ "}}" }}
{{ "{{-" }} if and $eligible (not $errors) {{ "}}" }}
  ##### ACT (runtime, local config-policy-controller on the cluster that landed this policy) — only when #####
  ##### NO precondition error was collected, so one misconfigured cluster blocks the whole mint (matching #####
  ##### the previous fail-aborts-everything behavior) and the status ConfigMap reports every problem. #####
  ##### one generic self-signed CA (cert-manager) that signs all the client certs #####
- complianceType: musthave
  objectDefinition:
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: {{ .selfSignedIssuer }}
    spec:
      selfSigned: {}
- complianceType: musthave
  objectDefinition:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: {{ .caName }}
      namespace: {{ .cmResourceNamespace }}
    spec:
      isCA: true
      commonName: {{ .caName }}
      secretName: {{ .caName }}
      duration: 87600h
      renewBefore: 720h
      privateKey:
        algorithm: RSA
        size: 4096
      issuerRef:
        name: {{ .selfSignedIssuer }}
        kind: ClusterIssuer
        group: cert-manager.io
- complianceType: musthave
  objectDefinition:
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: {{ .caIssuer }}
    spec:
      ca:
        secretName: {{ .caName }}
  ##### The hub apiserver clientCA wiring (trusting this CA) lives in the dependent companion policy #####
  ##### policy-eso-boot-clientca-self-wire. It must NOT be done here: it reads #####
  ##### this CA's secret via fromSecret, and ACM resolves a template ATOMICALLY — a fromSecret on the #####
  ##### not-yet-existing CA secret would error and block THIS template, which is the very template #####
  ##### that mints the CA Certificate that creates the secret (deadlock). As a separate policy gated #####
  ##### on this one being Compliant, it simply retries until cert-manager has populated the secret. #####
  ##### PER OWNING NAMESPACE: one shared reader Role + ONE RoleBinding whose subjects are every #####
  ##### owned cluster's client CN. The owning deployment's store policy reads its client Secret AND #####
  ##### the Secrets it wants from THIS namespace, so the identity + RBAC must land here, not in $policyNamespace. #####
  ##### The RoleBinding is mustonlyhave: its subjects are pinned to EXACTLY the current owners, so a #####
  ##### cluster that moves to another tenancy namespace is dropped from this binding (no stale access). #####
  ##### Every tenant-scoped object below carries an autoshift.io/secret-reader-* label so a future cleanup #####
  ##### pass can list them and delete any whose namespace is no longer a key in $nsIdentities. The hub- #####
  ##### global CA / issuers / clientCA / APIServer are deliberately NOT labelled (different lifecycle, and #####
  ##### they do not live in a tenancy namespace, so a namespace-based sweep must never touch them). #####
  {{ "{{-" }} range $ownerNs, $cns := $nsIdentities {{ "}}" }}
- complianceType: musthave
  objectDefinition:
    apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: {{ .readerRole }}
      namespace: {{ "{{" }} $ownerNs {{ "}}" }}
      labels:
        autoshift.io/secret-reader-role: {{ .storePrefix }}
    rules:
      - apiGroups: [""]
        resources: ["secrets"]
        verbs: ["get", "list", "watch"]
- complianceType: mustonlyhave
  objectDefinition:
    apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: {{ .readerRole }}
      namespace: {{ "{{" }} $ownerNs {{ "}}" }}
      labels:
        autoshift.io/secret-reader-rolebinding: {{ .storePrefix }}
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: {{ .readerRole }}
    subjects:
      {{ "{{-" }} range $cn := $cns {{ "}}" }}
      - kind: User
        name: {{ "{{" }} $cn {{ "}}" }}
        apiGroup: rbac.authorization.k8s.io
      {{ "{{-" }} end {{ "}}" }}
  {{ "{{-" }} end {{ "}}" }}
  ##### PER CLUSTER: one client cert minted into the cluster's OWN owning namespace (where its owning #####
  ##### deployment's store policy reads it). Secret name reuses the truncated CN segment, so that store #####
  ##### derives the identical name. CN uniqueness is enforced hub-wide above ($seenCNs), across namespaces. #####
  {{ "{{-" }} range $entry := $eligible {{ "}}" }}
    {{ "{{-" }} $secretName := (printf "%s-%s" "{{ .clientSecret }}" (index $entry "seg")) {{ "}}" }}
- complianceType: musthave
  objectDefinition:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: {{ "{{" }} $secretName {{ "}}" }}
      namespace: {{ "{{" }} (index $entry "ns") {{ "}}" }}
      labels:
        autoshift.io/hub-bootstrap-client-cert: {{ .storePrefix }}
    spec:
      commonName: {{ "{{" }} (index $entry "cn") {{ "}}" }}
      ##### full (untruncated) real cluster name as a SAN so the complete identity is preserved even #####
      ##### when the CN's cluster segment was truncated to the 63-char budget #####
      dnsNames:
        - {{ "{{" }} (index $entry "san") {{ "}}" }}
      secretName: {{ "{{" }} $secretName {{ "}}" }}
      {{ "{{-" }} if ne $certDuration "" {{ "}}" }}
      duration: {{ "{{" }} $certDuration {{ "}}" }}
      {{ "{{-" }} end {{ "}}" }}
      {{ "{{-" }} if ne $certRenewBefore "" {{ "}}" }}
      renewBefore: {{ "{{" }} $certRenewBefore {{ "}}" }}
      {{ "{{-" }} end {{ "}}" }}
      {{ "{{-" }} if $certUsages {{ "}}" }}
      usages:
      {{ "{{-" }} range $u := $certUsages {{ "}}" }}
        - {{ "{{" }} $u {{ "}}" }}
      {{ "{{-" }} end {{ "}}" }}
      {{ "{{-" }} end {{ "}}" }}
      {{ "{{-" }} if ne $privateKeyAlgorithm "" {{ "}}" }}
      privateKey:
        algorithm: {{ "{{" }} $privateKeyAlgorithm {{ "}}" }}
        {{ "{{-" }} if ne $privateKeySize "" {{ "}}" }}
        size: {{ "{{" }} $privateKeySize {{ "}}" }}
        {{ "{{-" }} end {{ "}}" }}
      {{ "{{-" }} end {{ "}}" }}
      issuerRef:
        name: {{ .caIssuer }}
        kind: ClusterIssuer
        group: cert-manager.io
  {{ "{{-" }} end {{ "}}" }}
{{ "{{-" }} end {{ "}}" }}
##### CLEANUP (orphaned RoleBindings): a reader RoleBinding this policy labelled whose namespace no #####
##### longer owns a cluster (not a key in $nsIdentities) is stale — emit a mustNotHave so ACM deletes #####
##### it. Deleting the binding alone revokes access (its Role grants nothing unbound; Role/Cert cleanup #####
##### is left to a future label sweep). Gated on the SAME mode as the enumerate loop above: the inactive #####
##### companion policy has an EMPTY $nsIdentities, so without this gate it would delete every labelled #####
##### binding — including the active policy's. Runs even when $eligible is empty (last cluster left), but #####
##### NOT when $errors is non-empty: a derivation error can drop a live cluster from $nsIdentities, and #####
##### deleting its binding on a transient error would revoke access — skip cleanup until the error clears. #####
{{ "{{-" }} if and (eq $mode "selfSigned") (not $errors) {{ "}}" }}
  {{ "{{-" }} range $rb := ((lookup "rbac.authorization.k8s.io/v1" "RoleBinding" "" "").items | default list) {{ "}}" }}
    {{ "{{-" }} $rbLabels := (dig "metadata" "labels" (dict) $rb) {{ "}}" }}
    {{ "{{-" }} if hasKey $rbLabels "autoshift.io/secret-reader-rolebinding" {{ "}}" }}
      {{ "{{-" }} $rbNs := (dig "metadata" "namespace" "" $rb) {{ "}}" }}
      {{ "{{-" }} if not (hasKey $nsIdentities $rbNs) {{ "}}" }}
- complianceType: mustnothave
  objectDefinition:
    apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: {{ "{{" }} (dig "metadata" "name" "" $rb) {{ "}}" }}
      namespace: {{ "{{" }} $rbNs {{ "}}" }}
      {{ "{{-" }} end {{ "}}" }}
    {{ "{{-" }} end {{ "}}" }}
  {{ "{{-" }} end {{ "}}" }}
{{ "{{-" }} end {{ "}}" }}
##### SURFACE precondition results as DATA (no fail): the helper writes the eso-boot-clientca-self-status #####
##### ConfigMap (full list) when $errors is non-empty and mustnothave-clears it when empty. The companion #####
##### inform gate CP turns that ConfigMap's presence into this Policy's compliance for dependents. #####
{{- include "eso.boot.statusReport" (dict "policy" "eso-boot-clientca-self" "ns" "open-cluster-management-agent-addon") | nindent 0 }}
{{- end -}}
# Hub-side half of the cluster->cluster ESO bootstrap. This policy is placed ONLY on hub
# clusters (hubClusterSets) and provisions, PER AUTOSHIFT DEPLOYMENT, a client-cert identity
# the hub apiserver trusts — so that deployment's spokes can read Secrets from the hub via the
# kubernetes provider. Its spoke-side companion is policy-eso-boot-store.yaml.
#
# Trust model: cert-manager mints ONE generic self-signed CA (its own key, hub-internal) and that
# CA is wired into the hub apiserver clientCA trust. This is ADDITIVE — OpenShift merges a custom
# spec.clientCA with the operator-managed client signers (csr-signer, admin, kubelet, ...), so
# existing client auth keeps working; we just add one more trusted issuer. The CA is long-lived and
# fully ours (no chasing a Red-Hat-managed signer's rotation, no OCP-version coupling). The only
# cost is a one-time kube-apiserver rollout when spec.clientCA is first set. Multi-deployment safe:
# the CA / CA issuer / clientCA ConfigMap all have stable chart-derived names, so every deployment
# declares the SAME shared CA (idempotent) — nobody fights over spec.clientCA. The per-namespace
# certs are signed by this one CA; isolation lives entirely in CN->RBAC.
#
# Tenancy model: an AutoShift deployment is a tenancy boundary = its policy namespace. Each
# ManagedCluster is labelled (by another policy) autoshift.io/owning-namespace = the
# namespace of its owning deployment. A cluster belongs to exactly ONE clusterSet, so exactly ONE
# deployment's copy of this policy ever lands on a given hub — and that single copy serves EVERY
# ManagedCluster on the hub, INCLUDING clusters owned by other deployments. This policy enumerates
# the hub's ManagedClusters, keeps every one carrying the tenancy label (missing label -> skip: not
# an autoshift cluster), and issues, PER CLUSTER, into that cluster's OWN owning namespace (NOT this
# policy's namespace — the owning deployment's store policy reads the client Secret AND the Secrets
# it wants from there, so both the identity and its RBAC must land in the owning namespace):
#   - one client Certificate, CN = "<certCNPrefix>.<realClusterName>.<baseDomain>" where realClusterName
#     is the cluster's apiserverurl.openshift.io clusterClaim host label (api.<realName>.<base>), NOT the
#     OCM ManagedCluster name (self-managed hubs are all "local-cluster"); the segment is truncated so the
#     whole CN fits 63 chars and the full real name is added as a SAN, and
#   - a shared reader Role per owning namespace, plus ONE RoleBinding per owning namespace whose
#     subjects are every owned cluster's CN (grouped by namespace, not one binding per cluster).
# The CA + ClusterIssuers stay hub-global (single shared trust domain); only the per-cluster cert + the
# reader RBAC are tenant-scoped. Wiring that CA into the hub apiserver spec.clientCA is a SEPARATE,
# dependent policy (policy-eso-boot-clientca-self-wire) — see the note at the wiring
# site below for why it cannot share this template. The trust MODE (selfSigned vs externalCA) is
# necessarily hub-uniform — it wires the single APIServer.spec.clientCA — so deriving it (and the CN
# settings) from this hub's rendered config below is correct for every cluster the hub hosts.
# Per-cluster CN (not per-namespace) so the SAME derivation works for the external-CA variant where
# the spoke mints its own cert with CN derived from its OWN apiserverurl.openshift.io clusterClaim — both
# sides compute the identical CN from the cluster's REAL name, so the identity contract needs no coordination.
# The per-cluster client SECRET name, by contrast, keys off the OCM ManagedCluster name (unique per hub,
# storage-only) so the spoke store copies it without any clusterClaim derivation of its own.
# Truncation can in principle collide two clusters sharing the surviving budget; ACM templates have
# no hash function, so the loop DETECTS a collision and fails loudly rather than silently merging
# identities. A spoke needs no per-cluster wiring: its copy policy reads <prefix>-client-<its name>.
#
# Hub vs runtime split:
#   - HUB templates DERIVE VALUES FROM THIS CLUSTER'S RENDERED CONFIG ONLY — they load the
#     <cluster>.rendered-config ConfigMap (hub-resident, so the propagator can read it) and pull the
#     hubBootstrap cert settings (CN prefix, duration, renewBefore), then bridge them to runtime.
#   - RUNTIME templates do everything else: the cluster-state lookup (enumerating THIS hub's
#     ManagedClusters) AND all actions (CA + issuers, per-cluster certs + RBAC). The apiserver clientCA
#     wiring is split into the dependent -apiserver companion policy (see the wiring-site note below).
#     They run as the target cluster's local config-policy-controller (cluster-admin).
# Why the ManagedCluster lookup and actions are runtime, not hub: a hub template resolves against the
# top-level PROPAGATING hub, so it would need a privileged propagator SA and — worse — for an
# INTERMEDIATE hub (managed by a self-managed hub, but not self-managing) it would query/act on the
# WRONG cluster. Runtime resolves against the cluster the policy LANDED ON: a self-managed hub acts
# on itself (local-cluster); an intermediate hub acts on itself. Mental model: hub reads ITS config
# -> policy lands on that same cluster -> runtime lists that hub's ManagedClusters and mints per cluster.
# Rule: only RENDERED-CONFIG derivation belongs in hub templates; cluster-state lookups + actions are runtime.
#
# Whole policy is a no-op unless at least one labelled namespace exists (so the CA + the disruptive
# clientCA wiring are only created when the feature is actually in use).
#
# Depends on cert-manager being installed on the hub (policy-cert-manager-operator-install).
#
{{- if $.Values.hubClusterSets }}
  {{- /* Structural naming (chart convention, like saName/clusterRoleName in the sibling policies) */}}
  {{- $policyNamespace := $.Values.policy_namespace }}
  {{- $eso := $.Values.externalSecretsOperator }}
  {{- $hb := (default (dict) $eso.hubBootstrap) }}
  {{- $storePrefix := (dig "storePrefix" "" $hb | default "hub-bootstrap") }}
  {{- $clientSecret := (printf "%s-client" $storePrefix) }}
  {{- $readerRole := (printf "%s-reader" $storePrefix) }}
  {{- $selfSignedIssuer := (printf "%s-selfsigned" $storePrefix) }}
  {{- $caIssuer := (printf "%s-ca-issuer" $storePrefix) }}
  {{- $caName := (printf "%s-ca" $storePrefix) }}
  {{- /* clientCA ConfigMap name is owned by the companion -apiserver policy, which does the apiserver wiring. */}}
  {{- $cmResourceNamespace := ($eso.certManagerResourceNamespace | default "cert-manager") }}
  {{- /* Cert tuning: these are DEFAULTS only. The actual values are read per-deployment from */}}
  {{- /* config.eso.hubBootstrap via hub templates below (rendered-config-driven, like the siblings). */}}
  {{- $defaultMode := (dig "mode" "" $hb | default "selfSigned") }}
  {{- $defaultCertCNPrefix := (dig "clientIdentity" "certCNPrefix" "" $hb | default "autoshift-eso-client") }}
  {{- /* selfSigned identity domain has a sensible default (the certs never leave the autoshift trust */}}
  {{- /* domain); externalCA, where the CN must satisfy the customer PKI, leaves this empty + REQUIRED. */}}
  {{- $defaultCertBaseDomain := (dig "clientIdentity" "baseDomain" "" $hb | default "autoshift.io") }}
  {{- /* Cert spec tuning — all empty by default; each field is emitted on the per-cluster client Certificate */}}
  {{- /* ONLY when set. NOTE selfSigned uses our own CA, so it HONORS these verbatim — and cert-manager's */}}
  {{- /* default usages omit "client auth", which hub mTLS needs; set clientIdentity.certUsages accordingly. */}}
  {{- $defaultCertDuration := (dig "clientIdentity" "certDuration" "" $hb) }}
  {{- $defaultCertRenewBefore := (dig "clientIdentity" "certRenewBefore" "" $hb) }}
  {{- $defaultCertUsages := (dig "clientIdentity" "certUsages" (list) $hb) }}
  {{- $defaultPrivateKeyAlgorithm := (dig "clientIdentity" "privateKeyAlgorithm" "" $hb) }}
  {{- $defaultPrivateKeySize := (dig "clientIdentity" "privateKeySize" "" $hb) }}
  {{- /* Diagnostics run modes (deployment-wide). readinessOnly: suppress this active policy entirely.
         debugRender: emit only a preview ConfigMap of what this policy WOULD apply (nothing live).
         debugRender wins, so previews still render under readinessOnly. */ -}}
  {{- $readinessOnly := (dig "diagnostics" "readinessOnly" "" $hb | default false) }}
  {{- $debugRender := (dig "diagnostics" "debugRender" "" $hb | default false) }}
  {{- $ctx := (dict "policyNamespace" $policyNamespace "storePrefix" $storePrefix "clientSecret" $clientSecret "readerRole" $readerRole "selfSignedIssuer" $selfSignedIssuer "caIssuer" $caIssuer "caName" $caName "cmResourceNamespace" $cmResourceNamespace "defaultMode" $defaultMode "defaultCertCNPrefix" $defaultCertCNPrefix "defaultCertBaseDomain" $defaultCertBaseDomain "defaultCertDuration" $defaultCertDuration "defaultCertRenewBefore" $defaultCertRenewBefore "defaultCertUsages" $defaultCertUsages "defaultPrivateKeyAlgorithm" $defaultPrivateKeyAlgorithm "defaultPrivateKeySize" $defaultPrivateKeySize) }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-boot-clientca-self
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-17 Public Key Infrastructure Certificates
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    # The provider readiness gate subsumes the bare cert-manager-install dependency: in selfSigned it
    # requires the cert-manager CSV to be phase=Succeeded (this policy mints the CA + client certs with
    # it), and it is the single precursor all hub-side boot policies share. cert-manager is still
    # installed by its own policy/trigger; this gate just observes that it is healthy first.
    - name: policy-eso-boot-readiness-hub
      namespace: {{ $policyNamespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-boot-clientca-self
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            {{ "{{hub-" }} $debugCfg := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" $.ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $debug := (dig "eso" "hubBootstrap" "diagnostics" "debugRender" {{ $debugRender }} $debugCfg) {{ "hub}}" }}
            {{ "{{hub-" }} $readinessOnly := (dig "eso" "hubBootstrap" "diagnostics" "readinessOnly" {{ $readinessOnly }} $debugCfg) {{ "hub}}" }}
            {{ "{{hub-" }} if $debug {{ "hub}}" }}
            ##### DEBUG RENDER: applies nothing live; captures the full object stream this policy WOULD #####
            ##### apply (resolved on the target cluster) as text, for inspection. #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: eso-boot-clientca-self-debug-render
                  namespace: {{ $policyNamespace }}
                  labels:
                    autoshift.io/eso-debug-render: "true"
                data:
                  rendered.yaml: |
                    {{- include "eso.bootBody.clientcaSelf" $ctx | nindent 20 }}
            {{ "{{hub-" }} else if not $readinessOnly {{ "hub}}" }}
            {{- include "eso.bootBody.clientcaSelf" $ctx | nindent 12 }}
            {{ "{{hub-" }} end {{ "hub}}" }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-boot-clientca-self-gate
        spec:
          # inform GATE: the compliance proxy for the minter's precondition report. It mutates nothing; it
          # asserts the report's status ConfigMap is ABSENT. Present (the enforce body collected a
          # precondition error) -> NonCompliant, so the dependent wiring policy stays Pending. Absent ->
          # Compliant. The status CM lives in open-cluster-management-agent-addon (always present on the
          # hub's klusterlet), so the gate can never falsely read Compliant because the namespace was missing.
          remediationAction: inform
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: eso-boot-clientca-self-status
                  namespace: open-cluster-management-agent-addon
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-eso-boot-clientca-self
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-eso-boot-clientca-self
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-eso-boot-clientca-self
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-eso-boot-clientca-self
    apiGroup: policy.open-cluster-management.io
    kind: Policy
{{ end }}
