# HUB-SIDE RBAC PREREQUISITES for the ESO boot machinery.
#
# Why this exists: the boot policies (and especially the readiness gates) resolve their hub templates
# as a ServiceAccount — autoshift-policy-service-account — and that SA must be able to read specific
# hub objects for those templates to succeed. The concrete driver today is the readiness gates'
# per-cluster cert-manager-policy compliance check (a hub lookup of policies.policy.open-cluster-
# management.io in the policy namespace); without read access there, that lookup fails closed and the
# gate cannot go Compliant. Rather than scatter RBAC across the boot policies, this one policy
# centralizes it and is driven entirely by config (externalSecretsOperator.bootPrereqs.rbac).
#
# STRUCTURE — deliberately generic so it can later be lifted out into a standalone, shared policy
# group that centralizes ALL autoshift-internal RBAC: bootPrereqs.rbac is a list of grants, each a
# { name, serviceAccount{name,namespace}, scope, namespaces, rules } record. The grant list is read
# PER HUB from that hub's rendered config (config.eso.bootPrereqs.rbac), falling back to the
# chart-baked default, and a HUB template loops it at policy evaluation time, emitting per grant:
#   scope: namespaced (default) -> a Role + RoleBinding in each target namespace (default: policy ns)
#   scope: cluster              -> a ClusterRole + ClusterRoleBinding (cluster-wide)
# The grant's `rules` are standard RBAC policyRules, passed through verbatim (JSON-inlined — JSON is
# valid YAML). Chart-provided grants are validated at Helm render time below (fail fast). Grants
# arriving via a rendered-config override are NOT re-validated: a grant missing name or
# serviceAccount.name is SKIPPED (emitting a half-formed object would just wedge the CP), and an
# unknown scope emits nothing. A skipped grant surfaces downstream — the readiness-hub gate's hub
# lookups fail closed without their RBAC.
#
# PLACEMENT: hubClusterSets only — these grants back hub-side template resolution. Managed-cluster
# RBAC, if ever needed, is a future extension (add a placement selector per grant and split the loop).
#
{{- $policyNamespace := $.Values.policy_namespace }}
{{- $eso := $.Values.externalSecretsOperator }}
{{- $rbac := (dig "bootPrereqs" "rbac" (list) $eso) }}
{{- /* Validate the chart-baked grants at render time (fail fast). Rendered-config overrides bypass
       this — see header. */ -}}
{{- range $grant := $rbac }}
  {{- $name := (required "bootPrereqs.rbac[].name is required" $grant.name) }}
  {{- $sa := (required (printf "bootPrereqs.rbac[%q].serviceAccount is required" $name) $grant.serviceAccount) }}
  {{- $_ := (required (printf "bootPrereqs.rbac[%q].serviceAccount.name is required" $name) $sa.name) }}
  {{- $scope := ($grant.scope | default "namespaced") }}
  {{- if not (has $scope (list "namespaced" "cluster")) }}
    {{- fail (printf "bootPrereqs.rbac[%q].scope %q is invalid — must be \"namespaced\" or \"cluster\"" $name $scope) }}
  {{- end }}
{{- end }}
{{/* The Policy always renders when hubClusterSets exist (even when the grant list is empty →
       object-templates-raw evaluates to an empty list, a Compliant no-op). object-templates-raw
       tolerates the empty list where structured object-templates would not, so hub-side dependents
       can list policy-eso-boot-prereqs in spec.dependencies unconditionally and rely on it existing
       + going Compliant regardless of bootPrereqs.rbac. The hubClusterSets gate matches every
       dependent (all hub-only) and policyset-eso-boot-hub membership. */}}
{{- if $.Values.hubClusterSets }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-boot-prereqs
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/description: 'Hub-side RBAC for AutoShift internals - grant the hub-template ServiceAccount the reads the ESO boot policies need (config-driven bootPrereqs.rbac grant list).'
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: AC Access Control
    policy.open-cluster-management.io/controls: AC-3 Access Enforcement
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-boot-prereqs
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### DERIVE (hub): the grant list for THIS hub — its rendered-config override when present, #####
            ##### else the chart-baked default (JSON-inlined at Helm render; JSON is valid template input). #####
            {{ "{{hub-" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" $.ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $baked := (`{"rbac": {{ $rbac | toJson }}}` | fromJson) {{ "hub}}" }}
            {{ "{{hub-" }} $grants := (dig "eso" "bootPrereqs" "rbac" $baked.rbac $clusterConfig) {{ "hub}}" }}
            {{ "{{hub-" }} range $grant := $grants {{ "hub}}" }}
            {{ "{{hub-" }} $name := (dig "name" "" $grant) {{ "hub}}" }}
            {{ "{{hub-" }} $saName := (dig "serviceAccount" "name" "" $grant) {{ "hub}}" }}
            {{ "{{hub-" }} $saNamespace := (dig "serviceAccount" "namespace" "{{ $policyNamespace }}" $grant) {{ "hub}}" }}
            {{ "{{hub-" }} $scope := (dig "scope" "namespaced" $grant) {{ "hub}}" }}
            {{ "{{hub-" }} $rules := (dig "rules" (list) $grant) {{ "hub}}" }}
            ##### skip malformed grants (missing name or serviceAccount.name) rather than emit a half-formed object #####
            {{ "{{hub-" }} if and (ne $name "") (ne $saName "") {{ "hub}}" }}
            {{ "{{hub-" }} if eq $scope "cluster" {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRole
                metadata:
                  name: {{ "{{hub" }} $name {{ "hub}}" }}
                rules: {{ "{{hub" }} $rules | toRawJson {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRoleBinding
                metadata:
                  name: {{ "{{hub" }} $name {{ "hub}}" }}
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: ClusterRole
                  name: {{ "{{hub" }} $name {{ "hub}}" }}
                subjects:
                  - kind: ServiceAccount
                    name: {{ "{{hub" }} $saName {{ "hub}}" }}
                    namespace: {{ "{{hub" }} $saNamespace {{ "hub}}" }}
            {{ "{{hub-" }} else if eq $scope "namespaced" {{ "hub}}" }}
            {{ "{{hub-" }} range $ns := (dig "namespaces" (list "{{ $policyNamespace }}") $grant) {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: Role
                metadata:
                  name: {{ "{{hub" }} $name {{ "hub}}" }}
                  namespace: {{ "{{hub" }} $ns {{ "hub}}" }}
                rules: {{ "{{hub" }} $rules | toRawJson {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: {{ "{{hub" }} $name {{ "hub}}" }}
                  namespace: {{ "{{hub" }} $ns {{ "hub}}" }}
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: Role
                  name: {{ "{{hub" }} $name {{ "hub}}" }}
                subjects:
                  - kind: ServiceAccount
                    name: {{ "{{hub" }} $saName {{ "hub}}" }}
                    namespace: {{ "{{hub" }} $saNamespace {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
{{ end }}
