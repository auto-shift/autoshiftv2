# This policy creates the `secret-reader` ServiceAccount and the RBAC that lets it read
# the Secrets ESO provisions on a managed cluster. It is the consumer-side counterpart to
# the store/auth policies: other AutoShift components use this identity to read provisioned
# Secrets, rather than each reaching for ESO internals.
#
# Namespaces it is granted read on are read from the per-cluster rendered config (hub
# lookup), combined and de-duplicated:
#   - config.externalSecretsOperator.secretReaderNamespaces   (list)
#   - config.defaultSecretsNamespace                          (top-level string, appended)
#
# It creates: one ServiceAccount (in the ESO operator namespace), one ClusterRole granting
# get/list/watch on secrets, and a RoleBinding per namespace binding the SA to that role.
#
{{- $policyNamespace := $.Values.policy_namespace }}
{{- $saName := ($.Values.externalSecretsOperator.secretReaderName | default "secret-reader") }}
{{- $saNamespace := $.Values.externalSecretsOperator.namespace }}
{{- $clusterRoleName := "eso-secret-reader" }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-external-secrets-operator-secret-reader
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: AC Access Control
    policy.open-cluster-management.io/controls: AC-3 Access Enforcement
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: external-secrets-operator-secret-reader
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### LOAD PER-CLUSTER RENDERED CONFIG #####
            {{ "{{hub" }} $cm := (lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" .ManagedClusterName)) | default dict {{ "hub}}" }}
            {{ "{{hub" }} $config := (index $cm "data" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $configYaml := (index $config "config" | default "" | fromYaml | default dict) {{ "hub}}" }}
            ##### COLLECT READER NAMESPACES: externalSecretsOperator.secretReaderNamespaces + defaultSecretsNamespace #####
            {{ "{{hub" }} $eso := (index $configYaml "externalSecretsOperator" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $readerNs := (index $eso "secretReaderNamespaces" | default list) {{ "hub}}" }}
            {{ "{{hub" }} $defaultNs := (index $configYaml "defaultSecretsNamespace" | default "") {{ "hub}}" }}
            {{ "{{hub-" }} if ne $defaultNs "" {{ "hub}}" }}{{ "{{hub-" }} $readerNs = (append $readerNs $defaultNs) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} $readerNs = ($readerNs | uniq) {{ "hub}}" }}
            ##### SERVICE ACCOUNT (the secret-reader identity) #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ServiceAccount
                metadata:
                  name: {{ $saName }}
                  namespace: {{ $saNamespace }}
            ##### CLUSTER ROLE: read secrets #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRole
                metadata:
                  name: {{ $clusterRoleName }}
                rules:
                  - apiGroups: [""]
                    resources: ["secrets"]
                    verbs: ["get", "list", "watch"]
            ##### ROLE BINDING PER READER NAMESPACE #####
            {{ "{{hub-" }} range $ns := $readerNs {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: {{ $clusterRoleName }}
                  namespace: {{ "{{hub" }} $ns {{ "hub}}" }}
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: ClusterRole
                  name: {{ $clusterRoleName }}
                subjects:
                  - kind: ServiceAccount
                    name: {{ $saName }}
                    namespace: {{ $saNamespace }}
            {{ "{{hub-" }} end {{ "hub}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-external-secrets-operator-secret-reader
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-external-secrets-operator-secret-reader
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-external-secrets-operator-secret-reader
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-external-secrets-operator-secret-reader
    apiGroup: policy.open-cluster-management.io
    kind: Policy
