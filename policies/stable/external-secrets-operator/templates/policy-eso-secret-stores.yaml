# This policy creates ESO SecretStore / ClusterSecretStore objects on managed clusters.
# Config is read from the per-cluster rendered-config ConfigMap via hub template lookup,
# mirroring the cluster-config-maps rendering pattern used elsewhere in this repo.
#
# Config shape (under config.eso.secretStores) is a LIST of single-key items. Each item is
# keyed by its kind — either `clusterSecretStore` or `secretStore` — and the rendered object
# differs based on that key:
#   - clusterSecretStore : cluster-scoped, no metadata.namespace
#   - secretStore        : namespaced, requires metadata.namespace
# In both cases `spec` is passed through verbatim (identical SecretStoreSpec; see
# eso-vault-reference.md §1). The provider is orthogonal to the kind — any provider
# the installed ESO supports (vault, kubernetes, cloud SMs, ...) works under either
# kind, since the whole `spec` block is rendered as-is.
#
# The `kubernetes` provider lets a store read native Secrets from another cluster's
# API server (cross-cluster source of truth; see eso-vault-reference.md §3.2).
#
# `authSecretConfig` (optional, sibling of `spec`) provisions the auth Secret(s) the store
# references — NOT by copying the value cross-cluster, but by emitting an ExternalSecret that
# pulls the credential from the HUB through the hub-bootstrap ClusterSecretStore (see
# policy-eso-boot-store). ESO is the transport; the only remaining hub->spoke copy anywhere in
# this chart is the bootstrap client cert. spec is AUTHORITATIVE: the user writes the auth refs
# in spec as normal; authSecretConfig names the method (`fromRef`) and a `sources` map telling
# the hub which Secret (in the hub policy namespace = the bootstrap store's remoteNamespace)
# backs each ref, and — if that credential is not already present there — where it comes from.
# The template branches on `sources` (single invariant keeps source->target unambiguous):
#   - len(sources) == 1 AND that entry has no `key`  -> WHOLE-SECRET pull: the whole hub Secret
#     is extracted (dataFrom.extract) into the one target Secret all the method's refs share.
#     Rejected if the method's refs name different Secrets.
#   - everything else                                -> PER-COMPONENT: one entry per component,
#     each keyed by component name and each WITH a `key` (source.key -> the ref's key). Each
#     becomes a data[] entry {secretKey: ref.key, remoteRef: {key: hubSecretName, property: source.key}}.
# Each source entry carries `hubSecretName` (the Secret in the hub policy namespace the bootstrap
# store serves), an optional `key` (the property within it), and an optional `external` block
# (storeRef + remoteRef) that tells policy-eso-hub-secrets to MATERIALIZE hubSecretName on the hub
# from an external secret manager. Omit `external` when the Secret already lives in the policy
# namespace (native). For each sourced component the template still reads that component's ref out
# of spec for its target Secret name/key/namespace. No spec mutation. fromRef -> {provider, base,
# components} is declared in values.yaml `.internal.authRefPaths`, loaded into $authRefPaths.
# Target namespace: the ref's namespace for a ClusterSecretStore (required), or the store's
# namespace for a SecretStore. Components group by target Secret name — refs in the SAME
# Secret merge; refs in DIFFERENT Secrets are each provisioned separately.
#
# This file creates the SecretStore / ClusterSecretStore objects and the spoke-side auth
# ExternalSecrets. The HUB half — getting each credential INTO the hub policy namespace (native or
# pulled from an external SM) — is policy-eso-hub-secrets.yaml, which reads this same config. The
# RBAC that backs the kubernetes-provider `cert` auth method is generated by a sibling policy in
# policy-eso-cert-auth-rbac.yaml, which also reads the same config.
#
#   config:
#     eso:
#       secretStores:
#         - clusterSecretStore:
#             name: vault-backend
#             spec:
#               provider:
#                 vault:
#                   server: https://vault.example.com:8200
#                   path: secret
#                   version: v2
#                   auth:
#                     kubernetes:                 # SA-based; no static secret, so no authSecretConfig
#                       mountPath: kubernetes
#                       role: eso-reader
#                       serviceAccountRef:
#                         name: external-secrets
#                         namespace: external-secrets-operator
#         - secretStore:
#             name: vault-backend
#             namespace: team-a
#             authSecretConfig:                   # provision the Secret the ref below points at
#               fromRef: vaultToken               # mirror spec.provider.vault.auth.tokenSecretRef
#               refreshInterval: 1h               # optional; how often the spoke ExternalSecret re-pulls
#               sources:                          # pull the value from the HUB via the bootstrap store
#                 tokenSecretRef:
#                   hubSecretName: vault-token     # Secret name in the hub policy ns (bootstrap remoteRef.key)
#                   key: token                     # property within it -> the ref's key
#                   external:                      # OPTIONAL: materialize vault-token on the hub from an
#                     storeRef:                    # external SM. Omit for a native Secret already present.
#                       name: hub-vault
#                       kind: ClusterSecretStore
#                     remoteRef:
#                       key: secret/data/eso/vault-token
#                       property: token
#             spec:
#               provider:
#                 vault:
#                   server: https://vault.example.com:8200
#                   path: secret
#                   version: v2
#                   auth:
#                     tokenSecretRef:             # authoritative; Secret provisioned from source above
#                       name: vault-token
#                       key: token
#         # Kubernetes provider — read Secrets from a remote cluster's API server.
#         - clusterSecretStore:
#             name: remote-cluster
#             caSource:                           # OPTIONAL (kubernetes + ConfigMap caProvider only):
#               namespace: eso-trust              # hub ConfigMap holding the REMOTE apiserver's serving CA.
#               name: remote-serving-ca           # This policy delivers it into the store's OWN caProvider
#               key: ca-bundle.crt                # ConfigMap (name/key/namespace below) on the spoke, so the
#                                                 # names always match. Omit caSource to supply the CA yourself.
#             spec:
#               provider:
#                 kubernetes:
#                   server:
#                     url: https://remote-apiserver.example.com:6443
#                     caProvider:                 # the delivered CA lands here (namespace defaults to the
#                       type: ConfigMap           # <ManagedClusterName> namespace when left unset)
#                       name: remote-ca
#                       key: ca.crt
#                   remoteNamespace: shared-secrets
#                   auth:
#                     serviceAccount:
#                       name: eso-remote-reader
#                       namespace: external-secrets-operator
#
{{- $policyNamespace := $.Values.policy_namespace }}
{{- /* Bootstrap store name default (mirrors policy-eso-boot-store: config.eso.hubBootstrap.storeName,
       else storePrefix) — the spoke auth ExternalSecrets pull their credentials through it. Plus the
       default refreshInterval for those ExternalSecrets (per-store override: authSecretConfig.refreshInterval). */ -}}
{{- $storePrefix := (dig "hubBootstrap" "storePrefix" "" $.Values.externalSecretsOperator | default "hub-bootstrap") }}
{{- $authRefreshInterval := (dig "hubBootstrap" "authSecretRefreshInterval" "" $.Values.externalSecretsOperator | default "1h") }}
{{- /* Prune-removed-stores default. hasKey (not dig|default) so an explicit values-level `false` survives —
       `false | default true` would silently flip it back to true. */}}
{{- $pruneDefault := true }}
{{- if hasKey $.Values.externalSecretsOperator "pruneRemovedStores" }}{{- $pruneDefault = $.Values.externalSecretsOperator.pruneRemovedStores }}{{- end }}
{{- /* Normalize internal.authRefPaths (dotted strings, authored in values.yaml) into the
       list form the hub template walks. Done at HELM time so the hub side stays on
       builtins only (no splitList there). base "" -> [], "a.b" -> [a b]. */ -}}
{{- $authRefPaths := dict }}
{{- range $refToken, $methodDef := $.Values.internal.authRefPaths }}
  {{- $componentPaths := dict }}
  {{- range $componentName, $componentPath := $methodDef.components }}
    {{- $_ := set $componentPaths $componentName (splitList "." $componentPath) }}
  {{- end }}
  {{- $baseSegments := ternary (list) (splitList "." $methodDef.base) (eq ($methodDef.base | toString) "") }}
  {{- $_ := set $authRefPaths $refToken (dict "provider" $methodDef.provider "base" $baseSegments "components" $componentPaths) }}
{{- end }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-secret-stores
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-eso-install
      namespace: {{ $policyNamespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-secret-stores
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### LOAD PER-CLUSTER RENDERED CONFIG #####
            {{ "{{hub" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" $.ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $secretStores := (dig "eso" "secretStores" (list) $clusterConfig) {{ "hub}}" }}
            ##### Capture the managed cluster name BEFORE the range (range rebinds `.`). It is the #####
            ##### ACM-auto-created per-cluster namespace on the spoke where this policy lands a store's #####
            ##### delivered serving CA (see caSource below), so an unset kubernetes caProvider.namespace #####
            ##### defaults to it. #####
            {{ "{{hub" }} $managedClusterName := $.ManagedClusterName {{ "hub}}" }}
            ##### REF MAP (fromRef -> {provider, base, components}); authored in values.yaml, baked in #####
            {{ "{{hub" }} $authRefPaths := `{{ $authRefPaths | toJson }}` | fromJson {{ "hub}}" }}
            ##### BOOTSTRAP STORE NAME: the auth credentials are delivered to the spoke by ExternalSecrets that #####
            ##### pull through the hub-bootstrap ClusterSecretStore (policy-eso-boot-store). Resolve its name the #####
            ##### SAME way that policy does: config.eso.hubBootstrap.storeName, else the chart storePrefix. #####
            {{ "{{hub-" }} $hubBoot := (dig "eso" "hubBootstrap" (dict) $clusterConfig) {{ "hub}}" }}
            {{ "{{hub-" }} $bootStoreName := (index $hubBoot "storeName" | default "{{ $storePrefix }}") {{ "hub}}" }}
            ##### PRECONDITION collection (replaces fail, which buries the reason under the whole policy string). #####
            ##### Problems are keyed by store name then template layer into $storeErrors (errors.<store>.[hub|spoke]) #####
            ##### and surfaced via the status ConfigMap + inform gate. PER-STORE SKIP: a store with ANY error is #####
            ##### recorded and its objects are NOT emitted, but every other store still provisions — so one bad #####
            ##### store never blocks the workloads relying on the others. All problems here are on the hub layer. #####
            {{ "{{hub-" }} $storeErrors := dict {{ "hub}}" }}
            ##### $authTargets: chart-wide registry of target auth Secrets (ns/name -> claiming store + a #####
            ##### content signature), for the CROSS-STORE collision check below — only healthy (emitted) #####
            ##### stores register, so a skipped store never blocks a later claimant. #####
            {{ "{{hub-" }} $authTargets := dict {{ "hub}}" }}
            ##### PRUNE (gap: removed-store strand): every object emitted below is stamped with an #####
            ##### autoshift.io/eso-prune label capturing, AT EMISSION TIME, whether it may be deleted once #####
            ##### its store leaves the config — the config entry is gone by sweep time, so the live label is #####
            ##### the record of intent. Decision: store-level `prune` if set, else config.eso.pruneRemovedStores, #####
            ##### else the chart default (true). The $expected* dicts collect what THIS render wants to exist; #####
            ##### the runtime sweep at the bottom deletes labelled leftovers not in them. #####
            {{ "{{hub-" }} $prunePolicy := (dig "eso" "pruneRemovedStores" {{ $pruneDefault }} $clusterConfig) {{ "hub}}" }}
            {{ "{{hub-" }} $expectedStores := dict {{ "hub}}" }}
            {{ "{{hub-" }} $expectedAuthES := dict {{ "hub}}" }}
            {{ "{{hub-" }} $expectedCACMs := dict {{ "hub}}" }}
            {{ "{{hub-" }} range $storeIndex, $storeItem := $secretStores {{ "hub}}" }}
              ##### RESOLVE STORE KIND: secretStore / clusterSecretStore. `default dict` on every #####
              ##### user-authored node: a null list item / empty kind body would otherwise crash #####
              ##### hasKey/index and abort the whole hub template (the fail-envelope failure mode). #####
              {{ "{{hub-" }} $storeItem = ($storeItem | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} $storeKind := "" {{ "hub}}" }}
              {{ "{{hub-" }} $store := dict {{ "hub}}" }}
              {{ "{{hub-" }} if hasKey $storeItem "clusterSecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $storeKind = "ClusterSecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $store = (index $storeItem "clusterSecretStore" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} else if hasKey $storeItem "secretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $storeKind = "SecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $store = (index $storeItem "secretStore" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              ##### nameless stores report under a position-unique key so two broken items don't swallow #####
              ##### each other's messages in the $storeErrors dict. #####
              {{ "{{hub-" }} $storeName := (index $store "name" | default (printf "<item %d>" $storeIndex)) {{ "hub}}" }}
              {{ "{{hub-" }} $spec := (index $store "spec" | default dict) {{ "hub}}" }}
              ##### $storeMsgs: this store's hub-layer problems. Non-empty => the store is skipped (not emitted) #####
              ##### and its messages are folded into $storeErrors under errors.<store>.hub after all checks run. #####
              {{ "{{hub-" }} $storeMsgs := list {{ "hub}}" }}
              ##### STORE IDENTITY validation: an unrecognized/empty item or a nameless store would otherwise #####
              ##### emit a null-named object; a SecretStore without a namespace is likewise unappliable. #####
              {{ "{{hub-" }} if eq $storeKind "" {{ "hub}}" }}
                {{ "{{hub-" }} $storeMsgs = append $storeMsgs "unrecognized secretStores item — each entry needs a clusterSecretStore or secretStore key" {{ "hub}}" }}
              {{ "{{hub-" }} else if eq (index $store "name" | default "") "" {{ "hub}}" }}
                {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "%s needs a name" $storeKind) {{ "hub}}" }}
              {{ "{{hub-" }} else if and (eq $storeKind "SecretStore") (eq (index $store "namespace" | default "") "") {{ "hub}}" }}
                {{ "{{hub-" }} $storeMsgs = append $storeMsgs "secretStore needs a namespace" {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              ##### PRUNE decision (store `prune` wins; hasKey so an explicit false survives) + EXPECTED #####
              ##### registration. Registered as soon as the identity is valid — even if LATER validation #####
              ##### skips the store — so a declared-but-misconfigured store is never treated as removed. #####
              {{ "{{hub-" }} $storePrune := $prunePolicy {{ "hub}}" }}
              {{ "{{hub-" }} if hasKey $store "prune" {{ "hub}}" }}{{ "{{hub-" }} $storePrune = (index $store "prune") {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} if not $storeMsgs {{ "hub}}" }}
                {{ "{{hub-" }} $_ := set $expectedStores (printf "%s|%s|%s" $storeKind (index $store "namespace" | default "") (index $store "name")) true {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              ##### DEFAULT kubernetes caProvider.namespace -> the managed cluster's namespace on the spoke #####
              ##### (where the caSource delivery below lands the remote serving CA). Only when the user left #####
              ##### it unset; dig returns the live nested map, so set mutates $spec in place before render. #####
              {{ "{{hub-" }} $caProvider := (dig "provider" "kubernetes" "server" "caProvider" (dict) $spec) {{ "hub}}" }}
              {{ "{{hub-" }} if and $caProvider (not (index $caProvider "namespace")) {{ "hub}}" }}
                {{ "{{hub-" }} $_ := set $caProvider "namespace" $managedClusterName {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              ##### REMOTE SERVING-CA DELIVERY (replaces the old server-ca-trust policy): gated on this #####
              ##### store being a kubernetes store with a ConfigMap caProvider AND a `caSource` (hub CM #####
              ##### holding that remote's serving CA). The dest CM is the store's OWN caProvider — name + #####
              ##### key + namespace come from it, so they always match; absent caProvider/caSource = no-op. #####
              {{ "{{hub-" }} $caSource := (index $store "caSource" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} $caSrcComplete := false {{ "hub}}" }}
              {{ "{{hub-" }} if $caSource {{ "hub}}" }}
                {{ "{{hub-" }} $caSrcAllSet := and (index $caSource "namespace") (index $caSource "name") (index $caSource "key") {{ "hub}}" }}
                {{ "{{hub-" }} $caSrcAnySet := or (index $caSource "namespace") (index $caSource "name") (index $caSource "key") {{ "hub}}" }}
                {{ "{{hub-" }} if and $caSrcAnySet (not $caSrcAllSet) {{ "hub}}" }}
                  {{ "{{hub-" }} $storeMsgs = append $storeMsgs "caSource needs namespace, name and key (or omit it entirely)" {{ "hub}}" }}
                {{ "{{hub-" }} else if $caSrcAllSet {{ "hub}}" }}
                  {{ "{{hub-" }} if not $caProvider {{ "hub}}" }}
                    {{ "{{hub-" }} $storeMsgs = append $storeMsgs "caSource is set but spec.provider.kubernetes.server.caProvider is not — there is no ConfigMap for the delivered CA to populate" {{ "hub}}" }}
                  {{ "{{hub-" }} else if ne (index $caProvider "type" | default "ConfigMap") "ConfigMap" {{ "hub}}" }}
                    {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "caSource delivery supports only a ConfigMap-type caProvider (got %q)" (index $caProvider "type")) {{ "hub}}" }}
                  {{ "{{hub-" }} else if eq (index $caProvider "name" | default "") "" {{ "hub}}" }}
                    {{ "{{hub-" }} $storeMsgs = append $storeMsgs "caProvider.name is required to deliver caSource" {{ "hub}}" }}
                  {{ "{{hub-" }} else {{ "hub}}" }}
                    {{ "{{hub-" }} $caSrcComplete = true {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              ##### PROVISION AUTH SECRETS: spec is authoritative. fromRef names the method; #####
              ##### `sources` maps each component (a SecretKeySelector under the method) to a hub #####
              ##### source. We read each component's ref from spec for its target Secret/key, copy #####
              ##### the source value in, and group by target Secret (same-Secret components merge; #####
              ##### components in different Secrets each get their own). No type-reflection funcs. #####
              {{ "{{hub-" }} $authSecretConfig := (index $store "authSecretConfig" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} $refreshInterval := (index $authSecretConfig "refreshInterval" | default "{{ $authRefreshInterval }}") {{ "hub}}" }}
              {{ "{{hub-" }} $secretGroups := dict {{ "hub}}" }}
              {{ "{{hub-" }} if $authSecretConfig {{ "hub}}" }}
                {{ "{{hub-" }} $fromRef := (index $authSecretConfig "fromRef" | default "") {{ "hub}}" }}
                {{ "{{hub-" }} if eq $fromRef "" {{ "hub}}" }}
                  {{ "{{hub-" }} $storeMsgs = append $storeMsgs "authSecretConfig needs fromRef" {{ "hub}}" }}
                {{ "{{hub-" }} else if not (hasKey $authRefPaths $fromRef) {{ "hub}}" }}
                  {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "unsupported authSecretConfig.fromRef %q" $fromRef) {{ "hub}}" }}
                {{ "{{hub-" }} else {{ "hub}}" }}
                  ##### fromRef is valid: only NOW index the method definition. Indexing a missing key would #####
                  ##### crash the hub template, re-triggering the exact `fail`-style envelope this refactor avoids. #####
                  {{ "{{hub-" }} $methodDef := (index $authRefPaths $fromRef) {{ "hub}}" }}
                  {{ "{{hub-" }} $provider := (index $methodDef "provider") {{ "hub}}" }}
                  {{ "{{hub-" }} $basePath := (index $methodDef "base" | default list) {{ "hub}}" }}
                  {{ "{{hub-" }} $components := (index $methodDef "components" | default dict) {{ "hub}}" }}
                  {{ "{{hub-" }} $specProviders := (index $spec "provider" | default dict) {{ "hub}}" }}
                  {{ "{{hub-" }} if not (hasKey $specProviders $provider) {{ "hub}}" }}
                    {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "authSecretConfig.fromRef %q targets provider %q but spec.provider.%s is not set" $fromRef $provider $provider) {{ "hub}}" }}
                  {{ "{{hub-" }} else {{ "hub}}" }}
                    ##### walk from the provider block down `base` to the ref container (no hardcoded `auth`) #####
                    {{ "{{hub-" }} $baseBlock := (index $specProviders $provider | default dict) {{ "hub}}" }}
                    {{ "{{hub-" }} range $segment := $basePath {{ "hub}}" }}
                      {{ "{{hub-" }} $baseBlock = (index $baseBlock $segment | default dict) {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    ##### Source/target pairing — authSecretConfig.sources is a map keyed by component name: #####
                    #####  - exactly ONE entry with no key  -> whole-Secret copy; the method's refs must share one Secret #####
                    #####  - otherwise (one keyed, or many) -> per component: source.key -> the component's ref key #####
                    {{ "{{hub-" }} $sources := (index $authSecretConfig "sources" | default dict) {{ "hub}}" }}
                    {{ "{{hub-" }} if not $sources {{ "hub}}" }}
                      {{ "{{hub-" }} $storeMsgs = append $storeMsgs "authSecretConfig needs sources" {{ "hub}}" }}
                    {{ "{{hub-" }} else {{ "hub}}" }}
                      {{ "{{hub-" }} $anyKeyless := false {{ "hub}}" }}
                      {{ "{{hub-" }} range $componentName, $componentSource := $sources {{ "hub}}" }}
                        {{ "{{hub-" }} if eq (index ($componentSource | default dict) "key" | default "") "" {{ "hub}}" }}
                          {{ "{{hub-" }} $anyKeyless = true {{ "hub}}" }}
                        {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} $wholeCopy := and (eq (len $sources) 1) $anyKeyless {{ "hub}}" }}
                      {{ "{{hub-" }} if $wholeCopy {{ "hub}}" }}
                        ##### WHOLE-SECRET COPY: every present ref must name the SAME Secret; copy the source into it #####
                        {{ "{{hub-" }} $wholeCopySource := dict {{ "hub}}" }}
                        {{ "{{hub-" }} range $componentName, $componentSource := $sources {{ "hub}}" }}
                          {{ "{{hub-" }} $wholeCopySource = ($componentSource | default dict) {{ "hub}}" }}
                        {{ "{{hub-" }} end {{ "hub}}" }}
                        {{ "{{hub-" }} $sharedNamespace := "" {{ "hub}}" }}
                        {{ "{{hub-" }} $sharedName := "" {{ "hub}}" }}
                        {{ "{{hub-" }} $haveShared := false {{ "hub}}" }}
                        {{ "{{hub-" }} range $componentName, $componentPath := $components {{ "hub}}" }}
                          {{ "{{hub-" }} $targetRef := $baseBlock {{ "hub}}" }}
                          {{ "{{hub-" }} range $segment := $componentPath {{ "hub}}" }}
                            {{ "{{hub-" }} $targetRef = (index $targetRef $segment | default dict) {{ "hub}}" }}
                          {{ "{{hub-" }} end {{ "hub}}" }}
                          {{ "{{hub-" }} if $targetRef {{ "hub}}" }}
                            {{ "{{hub-" }} $candidateName := (index $targetRef "name" | default "") {{ "hub}}" }}
                            {{ "{{hub-" }} if eq $candidateName "" {{ "hub}}" }}
                              {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "the %s %q ref in spec must set name" $fromRef $componentName) {{ "hub}}" }}
                            {{ "{{hub-" }} else {{ "hub}}" }}
                              {{ "{{hub-" }} $candidateNamespace := (index $store "namespace") {{ "hub}}" }}
                              {{ "{{hub-" }} $refNsOk := true {{ "hub}}" }}
                              {{ "{{hub-" }} if eq $storeKind "ClusterSecretStore" {{ "hub}}" }}
                                {{ "{{hub-" }} $candidateNamespace = (index $targetRef "namespace" | default "") {{ "hub}}" }}
                                {{ "{{hub-" }} if eq $candidateNamespace "" {{ "hub}}" }}
                                  {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "the %s %q ref on a ClusterSecretStore needs .namespace" $fromRef $componentName) {{ "hub}}" }}
                                  {{ "{{hub-" }} $refNsOk = false {{ "hub}}" }}
                                {{ "{{hub-" }} end {{ "hub}}" }}
                              {{ "{{hub-" }} end {{ "hub}}" }}
                              {{ "{{hub-" }} if $refNsOk {{ "hub}}" }}
                                {{ "{{hub-" }} if not $haveShared {{ "hub}}" }}
                                  {{ "{{hub-" }} $sharedNamespace = $candidateNamespace {{ "hub}}" }}
                                  {{ "{{hub-" }} $sharedName = $candidateName {{ "hub}}" }}
                                  {{ "{{hub-" }} $haveShared = true {{ "hub}}" }}
                                {{ "{{hub-" }} else if or (ne $candidateNamespace $sharedNamespace) (ne $candidateName $sharedName) {{ "hub}}" }}
                                  {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "%s has one keyless source but its refs target different Secrets (%s/%s vs %s/%s) — give one keyed source per component" $fromRef $sharedNamespace $sharedName $candidateNamespace $candidateName) {{ "hub}}" }}
                                {{ "{{hub-" }} end {{ "hub}}" }}
                              {{ "{{hub-" }} end {{ "hub}}" }}
                            {{ "{{hub-" }} end {{ "hub}}" }}
                          {{ "{{hub-" }} end {{ "hub}}" }}
                        {{ "{{hub-" }} end {{ "hub}}" }}
                        {{ "{{hub-" }} if not $haveShared {{ "hub}}" }}
                          ##### only report "no refs" if nothing else already failed on this store (avoids a #####
                          ##### misleading secondary message when the real cause was an empty ref name above). #####
                          {{ "{{hub-" }} if not $storeMsgs {{ "hub}}" }}
                            {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "authSecretConfig.fromRef %q has no auth refs set in spec to provision" $fromRef) {{ "hub}}" }}
                          {{ "{{hub-" }} end {{ "hub}}" }}
                        {{ "{{hub-" }} else {{ "hub}}" }}
                          ##### stamp the hub Secret NAME on the group (whole-copy). The spoke ExternalSecret pulls #####
                          ##### it through the bootstrap store via dataFrom.extract.key = this name — the store's #####
                          ##### remoteNamespace (the policy namespace) is where policy-eso-hub-secrets materializes it. #####
                          {{ "{{hub-" }} $wholeSecretName := (index $wholeCopySource "hubSecretName" | default "") {{ "hub}}" }}
                          {{ "{{hub-" }} if eq $wholeSecretName "" {{ "hub}}" }}
                            {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "authSecretConfig.fromRef %q whole-Secret source needs hubSecretName (the Secret name in the hub policy namespace the bootstrap store serves)" $fromRef) {{ "hub}}" }}
                          {{ "{{hub-" }} else {{ "hub}}" }}
                            {{ "{{hub-" }} $groupKey := (printf "%s/%s" $sharedNamespace $sharedName) {{ "hub}}" }}
                            {{ "{{hub-" }} $_ := set $secretGroups $groupKey (dict "ns" $sharedNamespace "name" $sharedName "wholeFrom" $wholeSecretName) {{ "hub}}" }}
                          {{ "{{hub-" }} end {{ "hub}}" }}
                        {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} else {{ "hub}}" }}
                        ##### PER-COMPONENT: each entry maps source.key -> its component ref's key (every entry must have a key). #####
                        ##### $componentOk gates building the remoteRef descriptor, so a component that failed validation is #####
                        ##### recorded + skipped and never contributes a half-formed data[] entry to the spoke ExternalSecret. #####
                        {{ "{{hub-" }} range $componentName, $componentSource := $sources {{ "hub}}" }}
                          {{ "{{hub-" }} $componentSource = ($componentSource | default dict) {{ "hub}}" }}
                          {{ "{{hub-" }} $componentOk := true {{ "hub}}" }}
                          {{ "{{hub-" }} if not (hasKey $components $componentName) {{ "hub}}" }}
                            {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "%s has no component %q" $fromRef $componentName) {{ "hub}}" }}
                            {{ "{{hub-" }} $componentOk = false {{ "hub}}" }}
                          {{ "{{hub-" }} end {{ "hub}}" }}
                          {{ "{{hub-" }} $sourceKey := "" {{ "hub}}" }}
                          {{ "{{hub-" }} if $componentOk {{ "hub}}" }}
                            {{ "{{hub-" }} $sourceKey = (index $componentSource "key" | default "") {{ "hub}}" }}
                            {{ "{{hub-" }} if eq $sourceKey "" {{ "hub}}" }}
                              {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "source for %s %q has no key — a keyless (whole-Secret) copy is only allowed when it is the single source" $fromRef $componentName) {{ "hub}}" }}
                              {{ "{{hub-" }} $componentOk = false {{ "hub}}" }}
                            {{ "{{hub-" }} end {{ "hub}}" }}
                          {{ "{{hub-" }} end {{ "hub}}" }}
                          ##### walk the component's path (relative to the base block) to its ref #####
                          {{ "{{hub-" }} $targetRef := dict {{ "hub}}" }}
                          {{ "{{hub-" }} if $componentOk {{ "hub}}" }}
                            {{ "{{hub-" }} $targetRef = $baseBlock {{ "hub}}" }}
                            {{ "{{hub-" }} range $segment := (index $components $componentName) {{ "hub}}" }}
                              {{ "{{hub-" }} $targetRef = (index $targetRef $segment | default dict) {{ "hub}}" }}
                            {{ "{{hub-" }} end {{ "hub}}" }}
                            {{ "{{hub-" }} if not $targetRef {{ "hub}}" }}
                              {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "authSecretConfig.fromRef %q component %q has no ref in spec — set it or drop it from sources" $fromRef $componentName) {{ "hub}}" }}
                              {{ "{{hub-" }} $componentOk = false {{ "hub}}" }}
                            {{ "{{hub-" }} end {{ "hub}}" }}
                          {{ "{{hub-" }} end {{ "hub}}" }}
                          {{ "{{hub-" }} $targetName := "" {{ "hub}}" }}
                          {{ "{{hub-" }} $targetKey := "" {{ "hub}}" }}
                          {{ "{{hub-" }} if $componentOk {{ "hub}}" }}
                            {{ "{{hub-" }} $targetName = (index $targetRef "name" | default "") {{ "hub}}" }}
                            {{ "{{hub-" }} $targetKey = (index $targetRef "key" | default "") {{ "hub}}" }}
                            {{ "{{hub-" }} if or (eq $targetName "") (eq $targetKey "") {{ "hub}}" }}
                              {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "the %s %q ref in spec must set name and key" $fromRef $componentName) {{ "hub}}" }}
                              {{ "{{hub-" }} $componentOk = false {{ "hub}}" }}
                            {{ "{{hub-" }} end {{ "hub}}" }}
                          {{ "{{hub-" }} end {{ "hub}}" }}
                          {{ "{{hub-" }} $targetNamespace := "" {{ "hub}}" }}
                          {{ "{{hub-" }} if $componentOk {{ "hub}}" }}
                            {{ "{{hub-" }} $targetNamespace = (index $store "namespace") {{ "hub}}" }}
                            {{ "{{hub-" }} if eq $storeKind "ClusterSecretStore" {{ "hub}}" }}
                              {{ "{{hub-" }} $targetNamespace = (index $targetRef "namespace" | default "") {{ "hub}}" }}
                              {{ "{{hub-" }} if eq $targetNamespace "" {{ "hub}}" }}
                                {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "the %s %q ref on a ClusterSecretStore needs .namespace" $fromRef $componentName) {{ "hub}}" }}
                                {{ "{{hub-" }} $componentOk = false {{ "hub}}" }}
                              {{ "{{hub-" }} end {{ "hub}}" }}
                            {{ "{{hub-" }} end {{ "hub}}" }}
                          {{ "{{hub-" }} end {{ "hub}}" }}
                          {{ "{{hub-" }} $hubSecretName := (index $componentSource "hubSecretName" | default "") {{ "hub}}" }}
                          {{ "{{hub-" }} if and $componentOk (eq $hubSecretName "") {{ "hub}}" }}
                            {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "source for %s %q needs hubSecretName (the Secret name in the hub policy namespace the bootstrap store serves)" $fromRef $componentName) {{ "hub}}" }}
                            {{ "{{hub-" }} $componentOk = false {{ "hub}}" }}
                          {{ "{{hub-" }} end {{ "hub}}" }}
                          {{ "{{hub-" }} if $componentOk {{ "hub}}" }}
                            {{ "{{hub-" }} $groupKey := (printf "%s/%s" $targetNamespace $targetName) {{ "hub}}" }}
                            {{ "{{hub-" }} if not (hasKey $secretGroups $groupKey) {{ "hub}}" }}
                              {{ "{{hub-" }} $_ := set $secretGroups $groupKey (dict "ns" $targetNamespace "name" $targetName "data" (dict)) {{ "hub}}" }}
                            {{ "{{hub-" }} end {{ "hub}}" }}
                            {{ "{{hub-" }} $groupData := (index (index $secretGroups $groupKey) "data") {{ "hub}}" }}
                            ##### remoteRef into the bootstrap store: key = the hub Secret name, property = the source #####
                            ##### key. The spoke ExternalSecret below turns each of these into a data[] entry. TARGET-KEY #####
                            ##### conflict check: two components writing the same key of the same target Secret would #####
                            ##### silently last-write-win — record it instead (per-store skip). `comp` is carried on the #####
                            ##### descriptor so the clash message can name both claimants. #####
                            {{ "{{hub-" }} if hasKey $groupData $targetKey {{ "hub}}" }}
                              {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "the %s %q and %q refs both write key %q of Secret %s/%s — one target key cannot come from two sources" $fromRef (index (index $groupData $targetKey) "comp") $componentName $targetKey $targetNamespace $targetName) {{ "hub}}" }}
                            {{ "{{hub-" }} else {{ "hub}}" }}
                              {{ "{{hub-" }} $_ := set $groupData $targetKey (dict "remoteKey" $hubSecretName "property" $sourceKey "comp" $componentName) {{ "hub}}" }}
                            {{ "{{hub-" }} end {{ "hub}}" }}
                          {{ "{{hub-" }} end {{ "hub}}" }}
                        {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              ##### CROSS-STORE TARGET COLLISION: two stores may share a target auth Secret ONLY when they'd #####
              ##### render IDENTICAL ExternalSecrets (same sources + refreshInterval) — identical musthave #####
              ##### objects are idempotent. A DIFFERING claim would leave two ExternalSecrets fighting over #####
              ##### one Secret; the later store (config list order) is recorded + skipped. Pass 1 detects #####
              ##### (stashing each group's signature), pass 2 registers only if the store stayed clean — so #####
              ##### a skipped store's targets never block a later claimant. #####
              {{ "{{hub-" }} if not $storeMsgs {{ "hub}}" }}
                {{ "{{hub-" }} range $groupKey, $group := $secretGroups {{ "hub}}" }}
                  {{ "{{hub-" }} $groupSig := (printf "%s|%s|%s" (index $group "wholeFrom" | default "") (index $group "data" | default dict | toJson) $refreshInterval) {{ "hub}}" }}
                  {{ "{{hub-" }} $_ := set $group "sig" $groupSig {{ "hub}}" }}
                  {{ "{{hub-" }} if hasKey $authTargets $groupKey {{ "hub}}" }}
                    {{ "{{hub-" }} $claim := (index $authTargets $groupKey) {{ "hub}}" }}
                    {{ "{{hub-" }} if ne (index $claim "sig") $groupSig {{ "hub}}" }}
                      {{ "{{hub-" }} $storeMsgs = append $storeMsgs (printf "auth target Secret %s is already provisioned differently by store %q — two stores can share a target Secret only with identical sources and refreshInterval" $groupKey (index $claim "store")) {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} if not $storeMsgs {{ "hub}}" }}
                {{ "{{hub-" }} range $groupKey, $group := $secretGroups {{ "hub}}" }}
                  {{ "{{hub-" }} if not (hasKey $authTargets $groupKey) {{ "hub}}" }}
                    {{ "{{hub-" }} $_ := set $authTargets $groupKey (dict "store" $storeName "sig" (index $group "sig")) {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              ##### FOLD this store's hub-layer problems into the structured report under errors.<store>.hub #####
              {{ "{{hub-" }} if $storeMsgs {{ "hub}}" }}
                {{ "{{hub-" }} $_ := set $storeErrors $storeName (dict "hub" $storeMsgs) {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              ##### EMIT this store's objects ONLY when it has NO errors (per-store skip): a misconfigured store #####
              ##### is recorded + skipped while every healthy store still provisions, so one bad store never stops #####
              ##### the workloads relying on the others. #####
              {{ "{{hub-" }} if not $storeMsgs {{ "hub}}" }}
              {{ "{{hub-" }} range $groupKey, $group := $secretGroups {{ "hub}}" }}
              {{ "{{hub-" }} $_ := set $expectedAuthES (printf "%s|%s" (index $group "ns") (index $group "name")) true {{ "hub}}" }}
            ##### RENDER: AUTH ExternalSecret (one per target Secret) — the spoke's ESO materializes the auth #####
            ##### Secret by pulling the credential from the HUB through the hub-bootstrap ClusterSecretStore. #####
            ##### remoteRef.key = the hub Secret name in the store's remoteNamespace (the policy namespace, #####
            ##### where policy-eso-hub-secrets lands it); property = the source key. Whole-Secret copy uses #####
            ##### dataFrom.extract. No cross-cluster fromSecret/copySecretData copy remains — ESO is the transport. #####
            ##### NOTE: pruning this ExternalSecret garbage-collects its target Secret (creationPolicy: Owner). #####
            ##### Stores legitimately SHARING a target (identical signature) should agree on `prune`. #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                metadata:
                  name: {{ "{{hub" }} index $group "name" {{ "hub}}" }}
                  namespace: {{ "{{hub" }} index $group "ns" {{ "hub}}" }}
                  labels:
                    autoshift.io/eso-store-auth: "true"
                    autoshift.io/eso-prune: {{ "{{hub" }} $storePrune | quote {{ "hub}}" }}
                spec:
                  refreshInterval: {{ "{{hub" }} $refreshInterval | quote {{ "hub}}" }}
                  secretStoreRef:
                    name: {{ "{{hub" }} $bootStoreName {{ "hub}}" }}
                    kind: ClusterSecretStore
                  target:
                    name: {{ "{{hub" }} index $group "name" {{ "hub}}" }}
                    creationPolicy: Owner
                {{ "{{hub-" }} if hasKey $group "wholeFrom" {{ "hub}}" }}
                  dataFrom:
                    - extract:
                        ##### key/property/secretKey are QUOTED so a numeric-looking value renders as the #####
                        ##### string the ExternalSecret CRD expects, not an int. #####
                        key: {{ "{{hub" }} index $group "wholeFrom" | quote {{ "hub}}" }}
                {{ "{{hub-" }} else if not (hasKey $group "wholeFrom") {{ "hub}}" }}
                  data:
                  {{ "{{hub-" }} range $dataKey, $dataValue := (index $group "data") {{ "hub}}" }}
                    - secretKey: {{ "{{hub" }} $dataKey | quote {{ "hub}}" }}
                      remoteRef:
                        key: {{ "{{hub" }} index $dataValue "remoteKey" | quote {{ "hub}}" }}
                        property: {{ "{{hub" }} index $dataValue "property" | quote {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} if $caSrcComplete {{ "hub}}" }}
              {{ "{{hub-" }} $_ := set $expectedCACMs (printf "%s|%s" (index $caProvider "namespace") (index $caProvider "name")) true {{ "hub}}" }}
            ##### RENDER: remote serving CA -> the store's own kubernetes caProvider ConfigMap. If you take #####
            ##### over managing this ConfigMap manually (drop caSource but keep caProvider), remove the #####
            ##### autoshift.io labels or the sweep below will treat it as a removed store's leftover. #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: {{ "{{hub" }} index $caProvider "name" {{ "hub}}" }}
                  namespace: {{ "{{hub" }} index $caProvider "namespace" {{ "hub}}" }}
                  labels:
                    autoshift.io/eso-store-ca: "true"
                    autoshift.io/eso-prune: {{ "{{hub" }} $storePrune | quote {{ "hub}}" }}
                data:
                  {{ "{{hub" }} index $caProvider "key" | default "ca.crt" {{ "hub}}" }}: |
                    {{ "{{hub" }} fromConfigMap (index $caSource "namespace") (index $caSource "name") (index $caSource "key") | autoindent {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} if eq $storeKind "ClusterSecretStore" {{ "hub}}" }}
            ##### RENDER: ClusterSecretStore #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: ClusterSecretStore
                metadata:
                  name: {{ "{{hub" }} index $store "name" {{ "hub}}" }}
                  labels:
                    autoshift.io/eso-store: "true"
                    autoshift.io/eso-prune: {{ "{{hub" }} $storePrune | quote {{ "hub}}" }}
                spec:
                  {{ "{{hub" }} $spec | toYaml | autoindent {{ "hub}}" }}
              {{ "{{hub-" }} else if eq $storeKind "SecretStore" {{ "hub}}" }}
            ##### RENDER: SecretStore #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: SecretStore
                metadata:
                  name: {{ "{{hub" }} index $store "name" {{ "hub}}" }}
                  namespace: {{ "{{hub" }} index $store "namespace" {{ "hub}}" }}
                  labels:
                    autoshift.io/eso-store: "true"
                    autoshift.io/eso-prune: {{ "{{hub" }} $storePrune | quote {{ "hub}}" }}
                spec:
                  {{ "{{hub" }} $spec | toYaml | autoindent {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            ##### BRIDGE the structured per-store problems to a runtime $storeErrors and SURFACE them as DATA #####
            ##### (no fail): the helper writes eso-secret-stores-status (errors keyed by store then layer) when #####
            ##### any store errored and mustnothave-clears it when all stores are clean. The companion inform #####
            ##### gate CP below turns that ConfigMap's presence into this Policy's compliance. #####
            {{ "{{-" }} $storeErrors := `{{ "{{hub" }} $storeErrors | toJson {{ "hub}}" }}` | fromJson {{ "}}" }}
            ##### SWEEP removed stores (runtime): diff labelled live objects against what THIS render wants. #####
            ##### Only objects carrying an autoshift.io/eso-store* ownership label are candidates, and only #####
            ##### when their eso-prune label (baked at emission) says "true". Disabled when ANY store errored #####
            ##### (a misconfigured store's live objects must not be deleted while its config is being fixed) #####
            ##### and when the rendered config could not be read (a transient miss must never prune a fleet). #####
            ##### CRD lookups guard the ESO kinds (lookup on an unregistered kind errors the whole template). #####
            {{ "{{-" }} $expectedStores := `{{ "{{hub" }} $expectedStores | toJson {{ "hub}}" }}` | fromJson {{ "}}" }}
            {{ "{{-" }} $expectedAuthES := `{{ "{{hub" }} $expectedAuthES | toJson {{ "hub}}" }}` | fromJson {{ "}}" }}
            {{ "{{-" }} $expectedCACMs := `{{ "{{hub" }} $expectedCACMs | toJson {{ "hub}}" }}` | fromJson {{ "}}" }}
            {{ "{{-" }} $sweepOn := `{{ "{{hub" }} if and $clusterConfig (not $storeErrors) {{ "hub}}" }}1{{ "{{hub" }} end {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} if eq $sweepOn "1" {{ "}}" }}
              {{ "{{-" }} if (lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" "clustersecretstores.external-secrets.io") {{ "}}" }}
                {{ "{{-" }} range $obj := ((lookup "external-secrets.io/v1" "ClusterSecretStore" "" "").items | default list) {{ "}}" }}
                  {{ "{{-" }} $objLabels := (dig "metadata" "labels" (dict) $obj) {{ "}}" }}
                  {{ "{{-" }} $objName := (dig "metadata" "name" "" $obj) {{ "}}" }}
                  {{ "{{-" }} if and (hasKey $objLabels "autoshift.io/eso-store") (eq (index $objLabels "autoshift.io/eso-prune" | default "true") "true") (not (hasKey $expectedStores (printf "ClusterSecretStore||%s" $objName))) {{ "}}" }}
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: ClusterSecretStore
                metadata:
                  name: {{ "{{" }} $objName {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} if (lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" "secretstores.external-secrets.io") {{ "}}" }}
                {{ "{{-" }} range $obj := ((lookup "external-secrets.io/v1" "SecretStore" "" "").items | default list) {{ "}}" }}
                  {{ "{{-" }} $objLabels := (dig "metadata" "labels" (dict) $obj) {{ "}}" }}
                  {{ "{{-" }} $objName := (dig "metadata" "name" "" $obj) {{ "}}" }}
                  {{ "{{-" }} $objNs := (dig "metadata" "namespace" "" $obj) {{ "}}" }}
                  {{ "{{-" }} if and (hasKey $objLabels "autoshift.io/eso-store") (eq (index $objLabels "autoshift.io/eso-prune" | default "true") "true") (not (hasKey $expectedStores (printf "SecretStore|%s|%s" $objNs $objName))) {{ "}}" }}
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: SecretStore
                metadata:
                  name: {{ "{{" }} $objName {{ "}}" }}
                  namespace: {{ "{{" }} $objNs {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} if (lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" "externalsecrets.external-secrets.io") {{ "}}" }}
                {{ "{{-" }} range $obj := ((lookup "external-secrets.io/v1" "ExternalSecret" "" "").items | default list) {{ "}}" }}
                  {{ "{{-" }} $objLabels := (dig "metadata" "labels" (dict) $obj) {{ "}}" }}
                  {{ "{{-" }} $objName := (dig "metadata" "name" "" $obj) {{ "}}" }}
                  {{ "{{-" }} $objNs := (dig "metadata" "namespace" "" $obj) {{ "}}" }}
                  {{ "{{-" }} if and (hasKey $objLabels "autoshift.io/eso-store-auth") (eq (index $objLabels "autoshift.io/eso-prune" | default "true") "true") (not (hasKey $expectedAuthES (printf "%s|%s" $objNs $objName))) {{ "}}" }}
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                metadata:
                  name: {{ "{{" }} $objName {{ "}}" }}
                  namespace: {{ "{{" }} $objNs {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} range $obj := ((lookup "v1" "ConfigMap" "" "").items | default list) {{ "}}" }}
                {{ "{{-" }} $objLabels := (dig "metadata" "labels" (dict) $obj) {{ "}}" }}
                {{ "{{-" }} if hasKey $objLabels "autoshift.io/eso-store-ca" {{ "}}" }}
                  {{ "{{-" }} $objName := (dig "metadata" "name" "" $obj) {{ "}}" }}
                  {{ "{{-" }} $objNs := (dig "metadata" "namespace" "" $obj) {{ "}}" }}
                  {{ "{{-" }} if and (eq (index $objLabels "autoshift.io/eso-prune" | default "true") "true") (not (hasKey $expectedCACMs (printf "%s|%s" $objNs $objName))) {{ "}}" }}
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: {{ "{{" }} $objName {{ "}}" }}
                  namespace: {{ "{{" }} $objNs {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{- include "eso.boot.statusReportPerStore" (dict "policy" "eso-secret-stores" "ns" "open-cluster-management-agent-addon") | nindent 12 }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-secret-stores-gate
        spec:
          # inform GATE: the compliance proxy for the per-store report. It mutates nothing; it asserts the
          # report's status ConfigMap is ABSENT. Present (at least one store failed validation) -> NonCompliant;
          # absent -> Compliant. The healthy stores are still provisioned by the enforce report (per-store skip),
          # so this gate flags "some store is misconfigured" without blocking the working ones. The status CM
          # lives in open-cluster-management-agent-addon (always present on hub + spoke).
          remediationAction: inform
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: eso-secret-stores-status
                  namespace: open-cluster-management-agent-addon
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-eso-secret-stores
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-eso-secret-stores
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-eso-secret-stores
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-eso-secret-stores
    apiGroup: policy.open-cluster-management.io
    kind: Policy
