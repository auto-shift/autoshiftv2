# Hub-side half of the store-auth credential flow. This policy is placed ONLY on hub clusters
# (hubClusterSets) and MATERIALIZES, into each owned cluster's owning namespace on the hub, that
# cluster's secret-store auth credentials that were declared with an `external` origin — so the
# spoke can then pull them from the hub through the hub-bootstrap ClusterSecretStore
# (policy-eso-boot-store). Its spoke-side companion is policy-eso-secret-stores.yaml, which emits
# the pulling ExternalSecret.
#
# Why a separate, hub-placed policy: objects a ConfigurationPolicy emits land on the cluster the
# policy is placed on. The credential must live in the HUB owning namespace (the bootstrap store's
# remoteNamespace for that tenant), so a spoke-placed policy cannot create it — only a hub-placed
# one can. This mirrors policy-eso-boot-clientca-self, which is likewise hub-placed, enumerates the
# hub's owned ManagedClusters, and provisions per-cluster inputs into each cluster's owning namespace.
#
# Nothing here special-cases a "root" store. The store an `external` source points at is resolved by
# name/kind like any other; a cluster-scoped ClusterSecretStore (defined once, anywhere) is therefore
# referenceable by every deployment's configs, so a single such store + a single native seed can feed
# the whole hub — but that is emergent from ordinary store semantics, not a distinct concept.
#
# Two-hop transport (ESO is the transport; the only hub->spoke COPY left in the chart is the
# bootstrap client cert):
#   1. (this policy, HUB) ExternalSecret in the policy namespace, referencing the user's own
#      external store (`external.storeRef`, e.g. a vault ClusterSecretStore that exists ON THE HUB),
#      pulls `external.remoteRef` into Secret `hubSecretName`.
#   2. (secret-stores, SPOKE) ExternalSecret referencing the hub-bootstrap ClusterSecretStore pulls
#      `hubSecretName` from the hub into the local auth Secret the store's `spec` references.
# A credential whose source has NO `external` block is assumed to already exist natively in the
# policy namespace (placed out-of-band or by a hub-side secretStore) and is skipped here.
#
# Hub vs runtime split (same rule as clientca-self — derive on hub, ACT on runtime): everything
# here is a RUNTIME template that runs on the hub itself (the local config-policy-controller). It
# enumerates the hub's ManagedClusters and, for each carrying an autoshift.io/owning-namespace label,
# reads that cluster's rendered-config from ITS OWN owning namespace and reads
# `config.eso.secretStores`. Running at runtime — NOT in hub templates — is what keeps an INTERMEDIATE
# managed-hub acting on ITS OWN clusters: a hub template would resolve against the global propagating
# hub and read the WRONG cluster's configs. Like clientca-self, this single hub-resident copy serves
# EVERY owned cluster across ALL deployments (cross-tenant), emitting into each cluster's owning ns.
#
# RBAC note: the runtime lookups enumerate ManagedClusters and get rendered-config ConfigMaps in each
# owning namespace, so the hub's config-policy-controller SA must be able to list ManagedClusters and
# get/list ConfigMaps in those namespaces. If a live cluster shows the report perpetually empty (or a
# lookup RBAC error), grant those reads via the bootPrereqs.rbac scaffold (policy-eso-boot-prereqs)
# rather than widening this policy.
#
# Per-credential skip + conflict detection: a credential with a bad/ambiguous `external` block is
# recorded and skipped while every other credential still materializes (prod fault-isolation, like
# secret-stores). Two clusters in the SAME owning namespace naming the same `hubSecretName` with
# DIFFERENT external origins is a conflict (one Secret cannot be owned by two ExternalSecrets) — that
# credential is skipped and the clash reported. The same name in DIFFERENT owning namespaces is two
# independent credentials (keyed by namespace + name). Problems surface via the status ConfigMap +
# inform gate (no `fail`).
#
# Config: config.eso.secretStores[].{clusterSecretStore|secretStore}.authSecretConfig.sources.<comp>:
#   hubSecretName : Secret name in the hub policy namespace (the bootstrap store's remoteRef key)
#   key           : optional; property within that Secret. Omit for a whole-secret pull.
#   external:
#     storeRef    : { name, kind (default ClusterSecretStore) } — a store that EXISTS ON THE HUB
#     remoteRef   : { key (required), property, version } — where the value lives in that store
#
# Depends on ESO being installed. All-or-nothing per credential; absent external origins -> no-op.
#
{{- if $.Values.hubClusterSets }}
{{- $policyNamespace := $.Values.policy_namespace }}
{{- $authRefreshInterval := (dig "hubBootstrap" "authSecretRefreshInterval" "" $.Values.externalSecretsOperator | default "1h") }}
{{- /* Prune-removed-stores default. hasKey (not dig|default) so an explicit values-level `false` survives. */}}
{{- $pruneDefault := true }}
{{- if hasKey $.Values.externalSecretsOperator "pruneRemovedStores" }}{{- $pruneDefault = $.Values.externalSecretsOperator.pruneRemovedStores }}{{- end }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-hub-secrets
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-12 Cryptographic Key Establishment and Management
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-eso-install
      namespace: {{ $policyNamespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-hub-secrets
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### RUNTIME on the hub: enumerate the hub's ManagedClusters, read each owned cluster's #####
            ##### rendered-config from ITS OWN owning namespace, and collect every store-auth credential #####
            ##### declared with an `external` origin, keyed by (owning namespace, hubSecretName). Serves all #####
            ##### deployments from this one copy. All problems here are on the runtime layer. #####
            {{ "{{-" }} $defaultRefresh := "{{ $authRefreshInterval }}" {{ "}}" }}
            {{ "{{-" }} $errors := list {{ "}}" }}
            {{ "{{-" }} $emit := dict {{ "}}" }}
            {{ "{{-" }} range $mc := ((lookup "cluster.open-cluster-management.io/v1" "ManagedCluster" "" "").items | default list) {{ "}}" }}
              {{ "{{-" }} $clusterName := $mc.metadata.name {{ "}}" }}
              ##### CROSS-TENANT (like clientca-self): this single hub-resident copy serves EVERY owned #####
              ##### cluster, not just one deployment. Read each cluster's rendered-config from ITS OWN owning #####
              ##### namespace (autoshift.io/owning-namespace, = that deployment's policy ns) and emit into that #####
              ##### same namespace. A cluster with no owning-namespace label is not an autoshift cluster -> skip. #####
              {{ "{{-" }} $ownerNs := (dig "metadata" "labels" "autoshift.io/owning-namespace" "" $mc) {{ "}}" }}
              {{ "{{-" }} if ne $ownerNs "" {{ "}}" }}
                {{ "{{-" }} $cfg := (dig "data" "config" "" ((lookup "v1" "ConfigMap" $ownerNs (printf "%s.rendered-config" $clusterName)) | default dict) | fromYaml | default dict) {{ "}}" }}
                {{ "{{-" }} $stores := (dig "eso" "secretStores" (list) $cfg) {{ "}}" }}
                ##### prune policy: the DECLARING cluster's config decides (cross-tenant — each deployment #####
                ##### governs its own credentials), falling back to this chart's default. #####
                {{ "{{-" }} $clusterPrune := (dig "eso" "pruneRemovedStores" {{ $pruneDefault }} $cfg) {{ "}}" }}
                {{ "{{-" }} range $storeItem := $stores {{ "}}" }}
                  ##### `default dict` normalization on every user-authored node (here + $src below): a null #####
                  ##### list item / empty source would otherwise crash hasKey/index and abort the WHOLE runtime #####
                  ##### template — the unreadable template-error envelope this design exists to avoid. #####
                  {{ "{{-" }} $storeItem = ($storeItem | default dict) {{ "}}" }}
                  {{ "{{-" }} $store := dict {{ "}}" }}
                  {{ "{{-" }} if hasKey $storeItem "clusterSecretStore" {{ "}}" }}{{ "{{-" }} $store = (index $storeItem "clusterSecretStore" | default dict) {{ "}}" }}{{ "{{-" }} else if hasKey $storeItem "secretStore" {{ "}}" }}{{ "{{-" }} $store = (index $storeItem "secretStore" | default dict) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} $storeName := (index $store "name" | default "<unnamed>") {{ "}}" }}
                  {{ "{{-" }} $storePrune := $clusterPrune {{ "}}" }}
                  {{ "{{-" }} if hasKey $store "prune" {{ "}}" }}{{ "{{-" }} $storePrune = (index $store "prune") {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} $asc := (index $store "authSecretConfig" | default dict) {{ "}}" }}
                  {{ "{{-" }} $refresh := (index $asc "refreshInterval" | default $defaultRefresh) {{ "}}" }}
                  {{ "{{-" }} $sources := (index $asc "sources" | default dict) {{ "}}" }}
                  {{ "{{-" }} range $comp, $src := $sources {{ "}}" }}
                    {{ "{{-" }} $src = ($src | default dict) {{ "}}" }}
                    ##### PRESENCE of `external` (hasKey, not truthiness) is the origin discriminator: an empty or #####
                    ##### half-written block declares external intent and must ERROR below, not silently degrade #####
                    ##### to native. Only the fully-absent key means native. #####
                    {{ "{{-" }} if hasKey $src "external" {{ "}}" }}
                      {{ "{{-" }} $ext := (index $src "external" | default dict) {{ "}}" }}
                      ##### validate the external origin; a bad component is recorded and skipped (per-credential skip) #####
                      {{ "{{-" }} $hubSecretName := (index $src "hubSecretName" | default "") {{ "}}" }}
                      {{ "{{-" }} $storeRef := (index $ext "storeRef" | default dict) {{ "}}" }}
                      {{ "{{-" }} $srName := (index $storeRef "name" | default "") {{ "}}" }}
                      {{ "{{-" }} $srKind := (index $storeRef "kind" | default "ClusterSecretStore") {{ "}}" }}
                      {{ "{{-" }} $remoteRef := (index $ext "remoteRef" | default dict) {{ "}}" }}
                      {{ "{{-" }} $rrKey := (index $remoteRef "key" | default "") {{ "}}" }}
                      {{ "{{-" }} $srcKey := (index $src "key" | default "") {{ "}}" }}
                      {{ "{{-" }} $ok := true {{ "}}" }}
                      {{ "{{-" }} if eq $hubSecretName "" {{ "}}" }}{{ "{{-" }} $errors = append $errors (printf "[spoke] cluster %q store %q source %q: external origin needs hubSecretName" $clusterName $storeName $comp) {{ "}}" }}{{ "{{-" }} $ok = false {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                      {{ "{{-" }} if eq $srName "" {{ "}}" }}{{ "{{-" }} $errors = append $errors (printf "[spoke] cluster %q store %q source %q: external.storeRef.name is required" $clusterName $storeName $comp) {{ "}}" }}{{ "{{-" }} $ok = false {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                      {{ "{{-" }} if eq $rrKey "" {{ "}}" }}{{ "{{-" }} $errors = append $errors (printf "[spoke] cluster %q store %q source %q: external.remoteRef.key is required" $clusterName $storeName $comp) {{ "}}" }}{{ "{{-" }} $ok = false {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                      {{ "{{-" }} if $ok {{ "}}" }}
                        {{ "{{-" }} $storeSig := (printf "%s/%s" $srKind $srName) {{ "}}" }}
                        {{ "{{-" }} $rr := (dict "key" $rrKey "property" (index $remoteRef "property" | default "") "version" (index $remoteRef "version" | default "")) {{ "}}" }}
                        {{ "{{-" }} $rrSig := (printf "%s|%s|%s" $rrKey (index $remoteRef "property" | default "") (index $remoteRef "version" | default "")) {{ "}}" }}
                        {{ "{{-" }} $whole := (eq $srcKey "") {{ "}}" }}
                        ##### key by (owning namespace, hubSecretName): the same name in two different tenants is #####
                        ##### two independent credentials; only a clash WITHIN one namespace is a conflict. #####
                        {{ "{{-" }} $emitKey := (printf "%s/%s" $ownerNs $hubSecretName) {{ "}}" }}
                        {{ "{{-" }} if not (hasKey $emit $emitKey) {{ "}}" }}
                          ##### first declaration of this credential — seed the emit entry #####
                          {{ "{{-" }} $e := (dict "name" $hubSecretName "ns" $ownerNs "refresh" $refresh "srName" $srName "srKind" $srKind "storeSig" $storeSig "whole" $whole "wholeRef" $rr "wholeSig" $rrSig "data" (dict) "bad" false "prune" $storePrune) {{ "}}" }}
                          {{ "{{-" }} if not $whole {{ "}}" }}{{ "{{-" }} $_ := set (index $e "data") $srcKey (dict "rr" $rr "sig" $rrSig) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                          {{ "{{-" }} $_ := set $emit $emitKey $e {{ "}}" }}
                        {{ "{{-" }} else {{ "}}" }}
                          ##### merge into the existing entry; any inconsistency marks the credential bad + skipped #####
                          {{ "{{-" }} $e := (index $emit $emitKey) {{ "}}" }}
                          ##### prune is ANDed across declarers: any store wanting retention wins #####
                          {{ "{{-" }} $_ := set $e "prune" (and (index $e "prune") $storePrune) {{ "}}" }}
                          {{ "{{-" }} if not (index $e "bad") {{ "}}" }}
                            {{ "{{-" }} if ne (index $e "storeSig") $storeSig {{ "}}" }}
                              {{ "{{-" }} $errors = append $errors (printf "[spoke] hub Secret %q in namespace %q is claimed by two different external stores (%q vs %q) — one credential Secret cannot be filled from two stores; skipping it" $hubSecretName $ownerNs (index $e "storeSig") $storeSig) {{ "}}" }}
                              {{ "{{-" }} $_ := set $e "bad" true {{ "}}" }}
                            {{ "{{-" }} else if or (and $whole (index $e "data" | len | lt 0) ) (and $whole (not (index $e "whole"))) {{ "}}" }}
                              {{ "{{-" }} $errors = append $errors (printf "[spoke] hub Secret %q in namespace %q mixes a whole-secret source and a keyed source — use one or the other; skipping it" $hubSecretName $ownerNs) {{ "}}" }}
                              {{ "{{-" }} $_ := set $e "bad" true {{ "}}" }}
                            {{ "{{-" }} else if and $whole (index $e "whole") {{ "}}" }}
                              {{ "{{-" }} if ne (index $e "wholeSig") $rrSig {{ "}}" }}
                                {{ "{{-" }} $errors = append $errors (printf "[spoke] hub Secret %q in namespace %q is declared as a whole-secret pull from two different remoteRefs; skipping it" $hubSecretName $ownerNs) {{ "}}" }}
                                {{ "{{-" }} $_ := set $e "bad" true {{ "}}" }}
                              {{ "{{-" }} end {{ "}}" }}
                            {{ "{{-" }} else if and (not $whole) (index $e "whole") {{ "}}" }}
                              {{ "{{-" }} $errors = append $errors (printf "[spoke] hub Secret %q in namespace %q mixes a keyed source and a whole-secret source — use one or the other; skipping it" $hubSecretName $ownerNs) {{ "}}" }}
                              {{ "{{-" }} $_ := set $e "bad" true {{ "}}" }}
                            {{ "{{-" }} else {{ "}}" }}
                              ##### keyed + keyed: add this key, or flag if the same key disagrees on its remoteRef #####
                              {{ "{{-" }} if hasKey (index $e "data") $srcKey {{ "}}" }}
                                {{ "{{-" }} if ne (index (index (index $e "data") $srcKey) "sig") $rrSig {{ "}}" }}
                                  {{ "{{-" }} $errors = append $errors (printf "[spoke] hub Secret %q in namespace %q key %q is declared from two different remoteRefs; skipping it" $hubSecretName $ownerNs $srcKey) {{ "}}" }}
                                  {{ "{{-" }} $_ := set $e "bad" true {{ "}}" }}
                                {{ "{{-" }} end {{ "}}" }}
                              {{ "{{-" }} else {{ "}}" }}
                                {{ "{{-" }} $_ := set (index $e "data") $srcKey (dict "rr" $rr "sig" $rrSig) {{ "}}" }}
                              {{ "{{-" }} end {{ "}}" }}
                            {{ "{{-" }} end {{ "}}" }}
                          {{ "{{-" }} end {{ "}}" }}
                        {{ "{{-" }} end {{ "}}" }}
                      {{ "{{-" }} end {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            ##### EMIT one ExternalSecret per healthy credential into the policy namespace. A `bad` (ambiguous) #####
            ##### credential is skipped; the others still materialize (per-credential fault isolation). #####
            {{ "{{-" }} range $name, $e := $emit {{ "}}" }}
              {{ "{{-" }} if not (index $e "bad") {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                metadata:
                  name: {{ "{{" }} index $e "name" {{ "}}" }}
                  namespace: {{ "{{" }} index $e "ns" {{ "}}" }}
                  labels:
                    autoshift.io/eso-hub-secret: "true"
                    autoshift.io/eso-prune: {{ "{{" }} index $e "prune" | quote {{ "}}" }}
                spec:
                  refreshInterval: {{ "{{" }} index $e "refresh" | quote {{ "}}" }}
                  secretStoreRef:
                    name: {{ "{{" }} index $e "srName" {{ "}}" }}
                    kind: {{ "{{" }} index $e "srKind" {{ "}}" }}
                  target:
                    name: {{ "{{" }} index $e "name" {{ "}}" }}
                    creationPolicy: Owner
                {{ "{{-" }} if index $e "whole" {{ "}}" }}
                  dataFrom:
                    - extract:
                        ##### key/property/version/secretKey are QUOTED: a numeric-looking value (vault kv2 #####
                        ##### `version: 2`) would otherwise render as an int where the CRD wants a string. #####
                        key: {{ "{{" }} index (index $e "wholeRef") "key" | quote {{ "}}" }}
                        {{ "{{-" }} if (index (index $e "wholeRef") "property") {{ "}}" }}
                        property: {{ "{{" }} index (index $e "wholeRef") "property" | quote {{ "}}" }}
                        {{ "{{-" }} end {{ "}}" }}
                        {{ "{{-" }} if (index (index $e "wholeRef") "version") {{ "}}" }}
                        version: {{ "{{" }} index (index $e "wholeRef") "version" | quote {{ "}}" }}
                        {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} else {{ "}}" }}
                  data:
                  {{ "{{-" }} range $sk, $d := (index $e "data") {{ "}}" }}
                    - secretKey: {{ "{{" }} $sk | quote {{ "}}" }}
                      remoteRef:
                        key: {{ "{{" }} index (index $d "rr") "key" | quote {{ "}}" }}
                        {{ "{{-" }} if (index (index $d "rr") "property") {{ "}}" }}
                        property: {{ "{{" }} index (index $d "rr") "property" | quote {{ "}}" }}
                        {{ "{{-" }} end {{ "}}" }}
                        {{ "{{-" }} if (index (index $d "rr") "version") {{ "}}" }}
                        version: {{ "{{" }} index (index $d "rr") "version" | quote {{ "}}" }}
                        {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            ##### SWEEP removed credentials: a hub ExternalSecret this policy labelled whose (namespace, name) #####
            ##### is not declared by ANY owned cluster this evaluation is a removed credential — prune it when #####
            ##### its eso-prune label (baked at emission; ANDed across declarers) says "true". `bad` entries #####
            ##### are still keys in $emit, so a conflicted credential is never treated as removed. Disabled #####
            ##### while $errors is non-empty (a config being fixed must not lose its live objects). Pruning #####
            ##### the ExternalSecret garbage-collects its target Secret (creationPolicy: Owner). #####
            {{ "{{-" }} if not $errors {{ "}}" }}
              {{ "{{-" }} if (lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" "externalsecrets.external-secrets.io") {{ "}}" }}
                {{ "{{-" }} range $obj := ((lookup "external-secrets.io/v1" "ExternalSecret" "" "").items | default list) {{ "}}" }}
                  {{ "{{-" }} $objLabels := (dig "metadata" "labels" (dict) $obj) {{ "}}" }}
                  {{ "{{-" }} $objName := (dig "metadata" "name" "" $obj) {{ "}}" }}
                  {{ "{{-" }} $objNs := (dig "metadata" "namespace" "" $obj) {{ "}}" }}
                  {{ "{{-" }} if and (hasKey $objLabels "autoshift.io/eso-hub-secret") (eq (index $objLabels "autoshift.io/eso-prune" | default "true") "true") (not (hasKey $emit (printf "%s/%s" $objNs $objName))) {{ "}}" }}
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: ExternalSecret
                metadata:
                  name: {{ "{{" }} $objName {{ "}}" }}
                  namespace: {{ "{{" }} $objNs {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            ##### SURFACE precondition results as DATA (no fail): the helper writes eso-hub-secrets-status #####
            ##### when $errors is non-empty and mustnothave-clears it when empty. The inform gate CP below #####
            ##### turns that ConfigMap's presence into this Policy's compliance. #####
            {{- include "eso.boot.statusReport" (dict "policy" "eso-hub-secrets" "ns" "open-cluster-management-agent-addon") | nindent 12 }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-hub-secrets-gate
        spec:
          # inform GATE: the compliance proxy for the materialization report. It mutates nothing; it asserts
          # the report's status ConfigMap is ABSENT. Present (a credential's external origin was bad or
          # ambiguous) -> NonCompliant; absent -> Compliant. The healthy credentials are still materialized by
          # the enforce report (per-credential skip). The status CM lives in open-cluster-management-agent-addon
          # (always present on the hub's klusterlet).
          remediationAction: inform
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: eso-hub-secrets-status
                  namespace: open-cluster-management-agent-addon
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-eso-hub-secrets
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-eso-hub-secrets
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-eso-hub-secrets
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-eso-hub-secrets
    apiGroup: policy.open-cluster-management.io
    kind: Policy
{{ end }}
