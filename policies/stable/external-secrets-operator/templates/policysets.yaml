# PolicySets for External Secrets Operator
#
# All placement for this chart lives HERE: policies are grouped by shared intent + placement
# into PolicySets, and each PolicySet is bound to one Placement. The policy files themselves
# carry no Placement/PlacementBinding. Every placement uses the same predicate
# (autoshift.io/external-secrets-operator=true); the groups differ only in clusterSets
# (hubs-only vs hubs+managed) and in what the member policies do:
#
#   policyset-eso-install        (all clusters)  operator install + ExternalSecretsConfig
#   policyset-eso-secret-stores  (all clusters)  user stores + their auth transport + cert RBAC
#   policyset-eso-secret-reader  (all clusters)  read-only consumption ServiceAccount/RBAC
#   policyset-eso-boot-spoke     (all clusters)  spoke half of the hub bootstrap (gate + store)
#   policyset-eso-boot-hub       (hubs only)     hub half of the hub bootstrap (prereqs, gate,
#                                                CA mint/wire, serving-CA discovery)
#   policyset-eso-hub-secrets    (hubs only)     hop-1 credential materialization on the hub
#
##### OPERATOR INSTALL — all placed clusters #####
apiVersion: policy.open-cluster-management.io/v1beta1
kind: PolicySet
metadata:
  name: policyset-eso-install
  namespace: {{ .Values.policy_namespace }}
spec:
  description: External Secrets Operator installation - operator subscription and the ExternalSecretsConfig CR that deploys the controller pods
  policies:
    - policy-eso-install
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-eso-install
  namespace: {{ .Values.policy_namespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-eso-install
  namespace: {{ .Values.policy_namespace }}
placementRef:
  name: placement-eso-install
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policyset-eso-install
    apiGroup: policy.open-cluster-management.io
    kind: PolicySet
---
