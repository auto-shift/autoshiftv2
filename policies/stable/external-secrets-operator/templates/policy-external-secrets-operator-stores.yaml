# This policy creates ESO SecretStore / ClusterSecretStore objects on managed clusters.
# Config is read from the per-cluster rendered-config ConfigMap via hub template lookup,
# mirroring the cluster-config-maps rendering pattern used elsewhere in this repo.
#
# Config shape (under config.eso.secretStores) is a LIST of single-key items. Each item is
# keyed by its kind — either `clusterSecretStore` or `secretStore` — and the rendered object
# differs based on that key:
#   - clusterSecretStore : cluster-scoped, no metadata.namespace
#   - secretStore        : namespaced, requires metadata.namespace
# In both cases `spec` is passed through verbatim (identical SecretStoreSpec; see
# eso-vault-reference.md §1). The provider is orthogonal to the kind — any provider
# the installed ESO supports (vault, kubernetes, cloud SMs, ...) works under either
# kind, since the whole `spec` block is rendered as-is.
#
# The `kubernetes` provider lets a store read native Secrets from another cluster's
# API server (cross-cluster source of truth; see eso-vault-reference.md §3.2).
#
# `authSecretConfig` (optional, sibling of `spec`) provisions the auth Secret the store
# references. spec is AUTHORITATIVE: the user writes the auth ref in spec as normal, and
# each authSecretConfig entry just names which ref to mirror (`fromRef`) and where the
# value comes from on the HUB (`source`). The template reads that ref out of spec to
# learn the Secret name/key/namespace, then creates it on the managed cluster with the
# value copied via hub `fromSecret` — no spec mutation, nothing to keep in sync. fromRef
# tokens map to a spec ref path via values.yaml `.internal.authRefPaths` (same tokens
# listed in the README), loaded into $refPathMap below.
# Target namespace: the ref's namespace for a ClusterSecretStore (required), or the
# store's namespace for a SecretStore. authSecretConfig may be a single entry or a list;
# entries whose refs share a Secret name merge into one Secret. Omit `source.key` to copy
# the WHOLE hub Secret (all keys verbatim) — the easy way to provision a multi-key method
# like cert (clientCert + clientKey) from one entry.
#
# This file only creates the SecretStore / ClusterSecretStore objects (and their auth
# Secrets). The RBAC that backs the kubernetes-provider `cert` auth method
# (`certAuthRBAC`) is generated by a sibling policy in
# policy-external-secrets-operator-cert-auth-rbac.yaml, which reads the same config.
#
#   config:
#     eso:
#       secretStores:
#         - clusterSecretStore:
#             name: vault-backend
#             spec:
#               provider:
#                 vault:
#                   server: https://vault.example.com:8200
#                   path: secret
#                   version: v2
#                   auth:
#                     kubernetes:                 # SA-based; no static secret, so no authSecretConfig
#                       mountPath: kubernetes
#                       role: eso-reader
#                       serviceAccountRef:
#                         name: external-secrets
#                         namespace: external-secrets-operator
#         - secretStore:
#             name: vault-backend
#             namespace: team-a
#             authSecretConfig:                   # provision the Secret the ref below points at
#               fromRef: vaultToken               # mirror spec.provider.vault.auth.tokenSecretRef
#               source:                           # copy the value from this HUB Secret
#                 namespace: eso-auth-secrets
#                 name: vault-token
#                 key: token
#             spec:
#               provider:
#                 vault:
#                   server: https://vault.example.com:8200
#                   path: secret
#                   version: v2
#                   auth:
#                     tokenSecretRef:             # authoritative; Secret provisioned from source above
#                       name: vault-token
#                       key: token
#         # Kubernetes provider — read Secrets from a remote cluster's API server.
#         - clusterSecretStore:
#             name: remote-cluster
#             spec:
#               provider:
#                 kubernetes:
#                   server:
#                     url: https://remote-apiserver.example.com:6443
#                     caProvider:
#                       type: ConfigMap
#                       name: remote-ca
#                       key: ca.crt
#                       namespace: external-secrets-operator
#                   remoteNamespace: shared-secrets
#                   auth:
#                     serviceAccount:
#                       name: eso-remote-reader
#                       namespace: external-secrets-operator
#
{{- $policyNamespace := $.Values.policy_namespace }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-external-secrets-operator-stores
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-external-secrets-operator-install
      namespace: {{ $policyNamespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: external-secrets-operator-stores
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### LOAD PER-CLUSTER RENDERED CONFIG #####
            {{ "{{hub" }} $cm := (lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" .ManagedClusterName)) | default dict {{ "hub}}" }}
            {{ "{{hub" }} $config := (index $cm "data" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $configYaml := (index $config "config" | default "" | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $eso := (index $configYaml "eso" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $secretStores := (index $eso "secretStores" | default list) {{ "hub}}" }}
            ##### REF -> SPEC PATH MAP (fromRef token -> [provider, ...path under provider.auth]) #####
            ##### Authored as plain YAML in values.yaml (.internal.authRefPaths); baked in here. #####
            {{ "{{hub" }} $refPathMap := `{{ $.Values.internal.authRefPaths | toJson }}` | fromJson {{ "hub}}" }}
            {{ "{{hub-" }} range $item := $secretStores {{ "hub}}" }}
              ##### RESOLVE STORE KIND: secretStore / clusterSecretStore #####
              {{ "{{hub-" }} $kind := "" {{ "hub}}" }}
              {{ "{{hub-" }} $store := dict {{ "hub}}" }}
              {{ "{{hub-" }} if hasKey $item "clusterSecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $kind = "ClusterSecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $store = (index $item "clusterSecretStore") {{ "hub}}" }}
              {{ "{{hub-" }} else if hasKey $item "secretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $kind = "SecretStore" {{ "hub}}" }}
                {{ "{{hub-" }} $store = (index $item "secretStore") {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} $storeName := (index $store "name" | default "<unnamed>") {{ "hub}}" }}
              {{ "{{hub-" }} $spec := (index $store "spec" | default dict) {{ "hub}}" }}
              ##### PROVISION AUTH SECRETS: spec is authoritative — read each ref the #####
              ##### authSecretConfig entry names (fromRef), then copy the hub source value #####
              ##### into the Secret/key that ref already points at. Group by Secret so a #####
              ##### multi-key method (e.g. cert) lands as one Secret with several keys. #####
              {{ "{{hub-" }} $authCfg := (index $store "authSecretConfig") {{ "hub}}" }}
              {{ "{{hub-" }} $entries := list {{ "hub}}" }}
              {{ "{{hub-" }} if $authCfg {{ "hub}}" }}{{ "{{hub-" }} if kindIs "slice" $authCfg {{ "hub}}" }}{{ "{{hub-" }} $entries = $authCfg {{ "hub}}" }}{{ "{{hub-" }} else {{ "hub}}" }}{{ "{{hub-" }} $entries = (list $authCfg) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} $secretGroups := dict {{ "hub}}" }}
              {{ "{{hub-" }} range $entry := $entries {{ "hub}}" }}
                {{ "{{hub-" }} $fromRef := (index $entry "fromRef" | default "") {{ "hub}}" }}
                {{ "{{hub-" }} if eq $fromRef "" {{ "hub}}" }}{{ "{{hub-" }} fail (printf "store %q: each authSecretConfig entry needs fromRef (the auth ref in spec to mirror)" $storeName) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} if not (hasKey $refPathMap $fromRef) {{ "hub}}" }}{{ "{{hub-" }} fail (printf "store %q: unsupported authSecretConfig.fromRef %q (supported: %s)" $storeName $fromRef (keys $refPathMap | sortAlpha | join ", ")) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} $segs := (index $refPathMap $fromRef) {{ "hub}}" }}
                {{ "{{hub-" }} $provider := (index $segs 0) {{ "hub}}" }}
                {{ "{{hub-" }} $rest := (slice $segs 1) {{ "hub}}" }}
                {{ "{{hub-" }} $providerMap := (index $spec "provider" | default dict) {{ "hub}}" }}
                {{ "{{hub-" }} if not (hasKey $providerMap $provider) {{ "hub}}" }}{{ "{{hub-" }} fail (printf "store %q: authSecretConfig.fromRef %q targets provider %q but spec.provider.%s is not set" $storeName $fromRef $provider $provider) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} $authBlock := (index (index $providerMap $provider) "auth" | default dict) {{ "hub}}" }}
                {{ "{{hub-" }} $ref := dict {{ "hub}}" }}
                {{ "{{hub-" }} if eq (len $rest) 1 {{ "hub}}" }}
                  {{ "{{hub-" }} $ref = (index $authBlock (index $rest 0) | default dict) {{ "hub}}" }}
                {{ "{{hub-" }} else {{ "hub}}" }}
                  {{ "{{hub-" }} $ref = (index (index $authBlock (index $rest 0) | default dict) (index $rest 1) | default dict) {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} if not $ref {{ "hub}}" }}{{ "{{hub-" }} fail (printf "store %q: authSecretConfig.fromRef %q points at spec.provider.%s.auth.%s but that ref is not set in spec" $storeName $fromRef $provider (join "." $rest)) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} $refName := (index $ref "name" | default "") {{ "hub}}" }}
                {{ "{{hub-" }} $refKey := (index $ref "key" | default "") {{ "hub}}" }}
                {{ "{{hub-" }} if or (eq $refName "") (eq $refKey "") {{ "hub}}" }}{{ "{{hub-" }} fail (printf "store %q: the %s ref in spec must set name and key" $storeName $fromRef) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} $ns := "" {{ "hub}}" }}
                {{ "{{hub-" }} if eq $kind "ClusterSecretStore" {{ "hub}}" }}
                  {{ "{{hub-" }} $ns = (index $ref "namespace" | default "") {{ "hub}}" }}
                  {{ "{{hub-" }} if eq $ns "" {{ "hub}}" }}{{ "{{hub-" }} fail (printf "store %q: the %s ref on a ClusterSecretStore needs .namespace so the auth Secret can be provisioned in one place (referent/per-namespace creds must be provisioned yourself)" $storeName $fromRef) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} else {{ "hub}}" }}
                  {{ "{{hub-" }} $ns = (index $store "namespace") {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} $src := (index $entry "source" | default dict) {{ "hub}}" }}
                {{ "{{hub-" }} $srcKey := (index $src "key" | default "") {{ "hub}}" }}
                {{ "{{hub-" }} $gk := (printf "%s/%s" $ns $refName) {{ "hub}}" }}
                {{ "{{hub-" }} if not (hasKey $secretGroups $gk) {{ "hub}}" }}{{ "{{hub-" }} $_ := set $secretGroups $gk (dict "ns" $ns "name" $refName "data" (dict)) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} $gdata := (index (index $secretGroups $gk) "data") {{ "hub}}" }}
                {{ "{{hub-" }} if eq $srcKey "" {{ "hub}}" }}
                  ##### source.key omitted -> copy the WHOLE source Secret (all keys verbatim) #####
                  {{ "{{hub-" }} $srcData := (index ((lookup "v1" "Secret" (index $src "namespace") (index $src "name")) | default dict) "data" | default dict) {{ "hub}}" }}
                  {{ "{{hub-" }} if not $srcData {{ "hub}}" }}{{ "{{hub-" }} fail (printf "store %q: authSecretConfig source Secret %s/%s not found or empty (whole-secret copy needs an existing hub Secret)" $storeName (index $src "namespace") (index $src "name")) {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} range $k, $v := $srcData {{ "hub}}" }}{{ "{{hub-" }} $_ := set $gdata $k $v {{ "hub}}" }}{{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} else {{ "hub}}" }}
                  ##### source.key set -> copy that one key into the ref's key #####
                  {{ "{{hub-" }} $_ := set $gdata $refKey (fromSecret (index $src "namespace") (index $src "name") $srcKey) {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} range $gk, $g := $secretGroups {{ "hub}}" }}
            ##### RENDER: AUTH SECRET (one per target Secret; keys merged) #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                type: Opaque
                metadata:
                  name: {{ "{{hub" }} index $g "name" {{ "hub}}" }}
                  namespace: {{ "{{hub" }} index $g "ns" {{ "hub}}" }}
                data:
                  {{ "{{hub-" }} range $k, $v := (index $g "data") {{ "hub}}" }}
                  {{ "{{hub" }} $k {{ "hub}}" }}: {{ "{{hub" }} $v {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} if eq $kind "ClusterSecretStore" {{ "hub}}" }}
            ##### RENDER: ClusterSecretStore #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: ClusterSecretStore
                metadata:
                  name: {{ "{{hub" }} index $store "name" {{ "hub}}" }}
                spec:
                  {{ "{{hub" }} $spec | toYaml | autoindent {{ "hub}}" }}
              {{ "{{hub-" }} else if eq $kind "SecretStore" {{ "hub}}" }}
            ##### RENDER: SecretStore #####
            - complianceType: musthave
              objectDefinition:
                apiVersion: external-secrets.io/v1
                kind: SecretStore
                metadata:
                  name: {{ "{{hub" }} index $store "name" {{ "hub}}" }}
                  namespace: {{ "{{hub" }} index $store "namespace" {{ "hub}}" }}
                spec:
                  {{ "{{hub" }} $spec | toYaml | autoindent {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-external-secrets-operator-stores
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-external-secrets-operator-stores
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-external-secrets-operator-stores
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-external-secrets-operator-stores
    apiGroup: policy.open-cluster-management.io
    kind: Policy
