{{- $policyName := "policy-eso-install" }}

apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ .Values.policy_namespace }}
  annotations:
    policy.open-cluster-management.io/description: 'Install the External Secrets Operator (namespace, OperatorGroup, subscription) and the ExternalSecretsConfig CR that deploys the controller pods.'
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-operator-ns
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: {{ .Values.externalSecretsOperator.namespace }}
                  labels:
                    openshift.io/cluster-monitoring: "true"
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1beta1
        kind: OperatorPolicy
        metadata:
          name: install-operator-eso
        spec:
          remediationAction: enforce
          severity: high
          complianceType: musthave
          operatorGroup:
            # if operator group exists in namespace use that, otherwise use namespace name as default
            name: '{{ "{{" }} with (lookup "operators.coreos.com/v1" "OperatorGroup" "{{ .Values.externalSecretsOperator.namespace }}" "").items {{ "}}" }}{{ "{{" }} (index . 0).metadata.name {{ "}}" }}{{ "{{" }} else {{ "}}" }}{{ .Values.externalSecretsOperator.namespace }}{{ "{{" }} end {{ "}}" }}'
            namespace: {{ .Values.externalSecretsOperator.namespace }}
            {{- if .Values.externalSecretsOperator.targetNamespaces }}
            targetNamespaces:
              {{- range .Values.externalSecretsOperator.targetNamespaces }}
              - {{ . }}
              {{- end }}
            {{- end }}
          subscription:
            name: '{{ "{{hub" }} index $.ManagedClusterLabels "autoshift.io/external-secrets-operator-subscription-name" | default "{{ .Values.externalSecretsOperator.name }}" {{ "hub}}" }}'
            namespace: {{ .Values.externalSecretsOperator.namespace }}
            # Source: base from label or helm default; if disconnected-mirror is true, appends -<suffix>
            source: '{{ "{{hub" }} $base := (index $.ManagedClusterLabels "autoshift.io/external-secrets-operator-source" | default "{{ .Values.externalSecretsOperator.source }}") {{ "hub}}" }}{{ "{{hub" }} ternary (printf "%s-%s" $base (index $.ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index $.ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") {{ "hub}}" }}'
            sourceNamespace: '{{ "{{hub" }} index $.ManagedClusterLabels "autoshift.io/external-secrets-operator-source-namespace" | default "{{ .Values.externalSecretsOperator.sourceNamespace }}" {{ "hub}}" }}'
            channel: '{{ "{{hub" }} index $.ManagedClusterLabels "autoshift.io/external-secrets-operator-channel" | default "{{ .Values.externalSecretsOperator.channel }}" {{ "hub}}" }}'
            startingCSV: '{{ "{{hub" }} index $.ManagedClusterLabels "autoshift.io/external-secrets-operator-version" | default "" {{ "hub}}" }}'
          # Upgrade approval for subscription will be set based on if version is set not this flag
          # If version is set install plan is set to manual and only the version specified will be installed
          upgradeApproval: Automatic
          versions:
            - '{{ "{{hub" }} index $.ManagedClusterLabels "autoshift.io/external-secrets-operator-version" | default "" {{ "hub}}" }}'
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-config
        spec:
          # Singleton ExternalSecretsConfig (name: cluster) — without it the operator is installed
          # but deploys NO external-secrets controller/webhook pods. The CRD only exists once the
          # operator reconciles, so this ConfigurationPolicy stays noncompliant (retrying) until then.
          #
          # The CR spec = the chart's externalSecretsOperator.externalSecretsConfig value (the
          # default, baked below as JSON) deep-merged under the per-cluster overlay
          # config.eso.externalSecretsConfig from the rendered config (hub-template sprig
          # `merge` — overlay is dst, so it wins; lists replaced wholesale). The rendered config
          # already resolves cluster > clusterset > deployment defaults, so the full precedence is
          #   cluster > clusterset > deployment defaults (top-level config:) > chart values.
          # The final spec is emitted as single-line JSON (valid YAML) — ACM hub templates have
          # toJson but not toYaml. GOTCHA: a ZERO value (0, false, "") in the overlay cannot
          # override a non-zero baked default (sprig merge treats dst zeros as empty and fills
          # them from src) — set such values at the lowest level that needs them.
          # Use case that motivated this: the operator applies a deny-all egress NetworkPolicy to
          # the operand (only :6443 + DNS allowed by default), so any store provider NOT on :6443
          # (e.g. Vault behind a route on :443) needs spec.controllerConfig.networkPolicies egress
          # rules — see README "ExternalSecretsConfig passthrough".
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
{{- $escBase := .Values.externalSecretsOperator.externalSecretsConfig | default dict }}
          object-templates-raw: |
            {{ "{{hub-" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ .Values.policy_namespace }}" (printf "%s.rendered-config" $.ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $escOverlay := (dig "eso" "externalSecretsConfig" (dict) $clusterConfig) {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: operator.openshift.io/v1alpha1
                kind: ExternalSecretsConfig
                metadata:
                  name: cluster
                  labels:
                    app: external-secrets-operator
                spec: {{ "{{hub" }} (merge $escOverlay (`{{ $escBase | toJson }}` | fromJson)) | toJson {{ "hub}}" }}
