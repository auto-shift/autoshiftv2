# PRECURSOR READINESS GATE for the cert-based ESO hub bootstrap.
#
# Purpose: in the external trust modes the spoke authenticates to the hub apiserver with an
# external-CA-backed client cert. That whole path depends on cert-manager + an issuer (externalCA)
# or an external-CA-signed apiserver serving cert (externalCAReuseServingCert) being healthy. If a
# bootstrap policy mints/uses a client cert against dead issuer infra, and that happens to coincide
# with client certs expiring, the system can lock itself out of self-correction (the ClusterIssuer
# secrets it would need to repair the issuer cannot be delivered because delivery itself needs the
# certs). See values.yaml hubBootstrapExternalCAProvisioned.
#
# Contract: pure assertion. This policy creates NOTHING. It only `fail`s.
#   everything ready for the configured mode -> emit no objects -> Compliant
#   anything not ready                       -> fail explicitly  -> NonCompliant (Pending downstream)
# The bootstrap policies (policy-eso-boot-clientca-ext, policy-eso-boot-store) list this policy in
# spec.dependencies, so they stay Pending until it is Compliant and resume automatically when the
# infra recovers. No invariant-checking lives in those policies anymore — they may assume "if I am
# running, the gate already said go."
#
# Mode behaviour (the cert-manager check is itself conditional — selfSigned spokes never run
# cert-manager, so requiring it everywhere would be wrong):
#   selfSigned (plain spoke)   -> consumes a hub-copied secret, mints nothing -> Compliant immediately
#   selfSigned (self-managed hub) -> the hub mints the CA + client certs with cert-manager, so require
#                                 cert-manager CSV Succeeded here (detected via autoshift.io/self-managed)
#   externalCAProvisioned=true -> out-of-band PKI we cannot introspect -> Compliant (explicit skip)
#   externalCA                 -> cert-manager CSV Succeeded AND the spoke ClusterIssuer/Issuer Ready
#                                 (gate on the ISSUER, not the ESO client cert: boot-store MINTS that
#                                 cert AFTER this gate, so depending on it would deadlock)
#   externalCAReuseServingCert -> cert-manager CSV Succeeded AND the apiserver serving cert Secret
#                                 (the one the reuse path copies) exists and is populated
#
# Hub vs runtime split mirrors the other boot policies: hub templates DERIVE the per-cluster mode +
# issuer config from this cluster's rendered config; runtime templates do the readiness LOOKUPS on
# the spoke (cert-manager + issuer + serving cert all live on the spoke) and `fail` if not ready.
#
{{- $policyNamespace := $.Values.policy_namespace }}
{{- $eso := $.Values.externalSecretsOperator }}
{{- $esoNamespace := $eso.namespace }}
{{- $cmOperatorNs := ($eso.hubBootstrapCertManagerOperatorNamespace | default "cert-manager-operator") }}
{{- $defaultMode := ($eso.hubBootstrapMode | default "selfSigned") }}
{{- $defaultOOB := ($eso.hubBootstrapExternalCAProvisioned | default false) }}
{{- $defaultIssuerName := ($eso.hubBootstrapSpokeIssuerName | default "") }}
{{- $defaultIssuerKind := ($eso.hubBootstrapSpokeIssuerKind | default "ClusterIssuer") }}
{{- $defaultIssuerGroup := ($eso.hubBootstrapSpokeIssuerGroup | default "cert-manager.io") }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-boot-readiness
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-12 Cryptographic Key Establishment and Management
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  # Resolve hub templates as the autoshift hub-template SA so the rendered-config ConfigMap read in
  # the policy namespace succeeds (same as the other boot policies).
  hubTemplateOptions:
    serviceAccountName: autoshift-policy-service-account
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-boot-readiness
        spec:
          # inform: this policy is a check; it never mutates the cluster. Compliance IS the signal.
          remediationAction: inform
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### DERIVE (on the hub): per-cluster mode + issuer config from rendered config #####
            {{ "{{hub" }} $clusterConfig := (dig "data" "config" "" ((lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" .ManagedClusterName)) | default dict) | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $hubBootstrap := (dig "eso" "hubBootstrap" (dict) $clusterConfig) {{ "hub}}" }}
            {{ "{{hub-" }} $mode := (index $hubBootstrap "mode" | default "{{ $defaultMode }}") {{ "hub}}" }}
            {{ "{{hub-" }} $oob := (dig "externalCAProvisioned" {{ $defaultOOB }} $hubBootstrap) {{ "hub}}" }}
            {{ "{{hub-" }} $spokeIssuer := (dig "spokeIssuer" (dict) $hubBootstrap) {{ "hub}}" }}
            {{ "{{hub-" }} $issuerName := (index $spokeIssuer "name" | default "{{ $defaultIssuerName }}") {{ "hub}}" }}
            {{ "{{hub-" }} $issuerKind := (index $spokeIssuer "kind" | default "{{ $defaultIssuerKind }}") {{ "hub}}" }}
            {{ "{{hub-" }} $issuerGroup := (index $spokeIssuer "group" | default "{{ $defaultIssuerGroup }}") {{ "hub}}" }}
            ##### Is THIS cluster the self-managed hub? selfSigned mints its CA + client certs with #####
            ##### cert-manager ON THE HUB, so the hub needs cert-manager even in selfSigned. Label is #####
            ##### hub-template-only context, so read it here and bridge the result. #####
            {{ "{{hub-" }} $selfManaged := (index .ManagedClusterLabels "autoshift.io/self-managed" | default "false") {{ "hub}}" }}
            ##### BRIDGE to the runtime (spoke) side — bools cross as the strings "true"/"false" #####
            {{ "{{-" }} $mode := `{{ "{{hub" }} $mode {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $oob := `{{ "{{hub" }} $oob {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $issuerName := `{{ "{{hub" }} $issuerName {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $issuerKind := `{{ "{{hub" }} $issuerKind {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $issuerGroup := `{{ "{{hub" }} $issuerGroup {{ "hub}}" }}` {{ "}}" }}
            {{ "{{-" }} $selfManaged := `{{ "{{hub" }} $selfManaged {{ "hub}}" }}` {{ "}}" }}
            ##### ACT (on the spoke): COLLECT every readiness problem for the desired mode into $errors, then #####
            ##### fail ONCE at the end with the full list — so a single apply surfaces all issues and we avoid #####
            ##### a fix-one-fail-next loop. $errors empty -> emit nothing -> Compliant. #####
            ##### cert-manager is required when an EXTERNAL mode is active on this spoke (not out-of-band), OR #####
            ##### this is the self-managed HUB in selfSigned (it mints the CA + client certs locally). A plain #####
            ##### selfSigned SPOKE just consumes a hub-copied secret -> no cert-manager -> Compliant. #####
            {{ "{{-" }} $externalActive := (and (ne $mode "selfSigned") (ne $oob "true")) {{ "}}" }}
            {{ "{{-" }} $hubSelfSigned := (and (eq $mode "selfSigned") (eq $selfManaged "true")) {{ "}}" }}
            {{ "{{-" }} $errors := list {{ "}}" }}
            {{ "{{-" }} if or $externalActive $hubSelfSigned {{ "}}" }}
              ##### cert-manager operator CSV must be phase=Succeeded. Name carries a version suffix #####
              ##### (cert-manager-operator.vX.Y.Z) so match by prefix; zero matches is ALSO not-ready. #####
              {{ "{{-" }} $csvReady := false {{ "}}" }}
              {{ "{{-" }} range $csv := ((lookup "operators.coreos.com/v1alpha1" "ClusterServiceVersion" "{{ $cmOperatorNs }}" "").items | default list) {{ "}}" }}
                {{ "{{-" }} if and (hasPrefix "cert-manager-operator" $csv.metadata.name) (eq (dig "status" "phase" "" $csv) "Succeeded") {{ "}}" }}
                  {{ "{{-" }} $csvReady = true {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} if not $csvReady {{ "}}" }}
                {{ "{{-" }} $errors = append $errors (printf "cert-manager-operator CSV in namespace %q is not phase=Succeeded (mode %q%s needs cert-manager)" "{{ $cmOperatorNs }}" $mode (ternary " on the self-managed hub" "" $hubSelfSigned)) {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            ##### Issuer / serving-cert checks are external-mode-only (selfSigned uses cert-manager's #####
            ##### built-in selfSigned issuer — nothing external to gate on). Each dependent lookup is guarded #####
            ##### by an else-if on its precondition so a missing input records an error instead of erroring out. #####
            {{ "{{-" }} if $externalActive {{ "}}" }}
              {{ "{{-" }} if eq $mode "externalCA" {{ "}}" }}
                ##### externalCA: the spoke ClusterIssuer/Issuer that boot-store mints the client cert with #####
                ##### must be Ready. Gating on the ISSUER (not the not-yet-minted ESO cert) avoids a deadlock #####
                ##### where boot-store waits on this gate while the gate waits on boot-store's own cert. #####
                {{ "{{-" }} if eq $issuerName "" {{ "}}" }}
                  {{ "{{-" }} $errors = append $errors "externalCA mode but spokeIssuer.name is unset — cannot verify the issuer the spoke mints its client cert with" {{ "}}" }}
                {{ "{{-" }} else if ne $issuerName "" {{ "}}" }}
                  ##### ClusterIssuer is cluster-scoped (namespace ""); Issuer lives in the ESO namespace #####
                  ##### where boot-store creates the Certificate. #####
                  {{ "{{-" }} $issuerNs := "" {{ "}}" }}
                  {{ "{{-" }} if ne $issuerKind "ClusterIssuer" {{ "}}" }}{{ "{{-" }} $issuerNs = "{{ $esoNamespace }}" {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} $issuer := (lookup (printf "%s/v1" $issuerGroup) $issuerKind $issuerNs $issuerName) {{ "}}" }}
                  {{ "{{-" }} if not $issuer {{ "}}" }}
                    {{ "{{-" }} $errors = append $errors (printf "%s %q not found (group %s) — the externalCA spoke issuer is not provisioned yet" $issuerKind $issuerName $issuerGroup) {{ "}}" }}
                  {{ "{{-" }} else if $issuer {{ "}}" }}
                    {{ "{{-" }} $issuerReady := false {{ "}}" }}
                    {{ "{{-" }} range $c := (dig "status" "conditions" (list) $issuer) {{ "}}" }}
                      {{ "{{-" }} if and (eq (dig "type" "" $c) "Ready") (eq (dig "status" "" $c) "True") {{ "}}" }}
                        {{ "{{-" }} $issuerReady = true {{ "}}" }}
                      {{ "{{-" }} end {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                    {{ "{{-" }} if not $issuerReady {{ "}}" }}
                      {{ "{{-" }} $errors = append $errors (printf "%s %q is not Ready (status.conditions[type=Ready] != True) — the spoke cannot mint a client cert against it" $issuerKind $issuerName) {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} else if eq $mode "externalCAReuseServingCert" {{ "}}" }}
                ##### reuse: the apiserver serving cert (signed by the external CA) is the client cert. #####
                ##### Discover the serving Secret the SAME way boot-store does (APIServer namedCertificates, #####
                ##### host match then first-entry fallback) and assert it exists and carries tls.crt. #####
                {{ "{{-" }} $namedCerts := (dig "spec" "servingCerts" "namedCertificates" (list) ((lookup "config.openshift.io/v1" "APIServer" "" "cluster") | default dict)) {{ "}}" }}
                {{ "{{-" }} if not $namedCerts {{ "}}" }}
                  {{ "{{-" }} $errors = append $errors "APIServer/cluster has no spec.servingCerts.namedCertificates — no external serving cert to reuse yet" {{ "}}" }}
                {{ "{{-" }} else if $namedCerts {{ "}}" }}
                  {{ "{{-" }} $apiHost := (index (splitList ":" (replace "https://" "" (fromClusterClaim "apiserverurl.openshift.io"))) 0) {{ "}}" }}
                  {{ "{{-" }} $servingSecretName := "" {{ "}}" }}
                  {{ "{{-" }} range $nc := $namedCerts {{ "}}" }}
                    {{ "{{-" }} if and (eq $servingSecretName "") (has $apiHost ((index $nc "names") | default list)) {{ "}}" }}
                      {{ "{{-" }} $servingSecretName = (dig "servingCertificate" "name" "" $nc) {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} if eq $servingSecretName "" {{ "}}" }}{{ "{{-" }} $servingSecretName = (dig "servingCertificate" "name" "" (index $namedCerts 0)) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} if eq $servingSecretName "" {{ "}}" }}
                    {{ "{{-" }} $errors = append $errors "could not resolve servingCertificate.name from APIServer/cluster namedCertificates" {{ "}}" }}
                  {{ "{{-" }} else if ne $servingSecretName "" {{ "}}" }}
                    {{ "{{-" }} $servingSecret := (lookup "v1" "Secret" "openshift-config" $servingSecretName) {{ "}}" }}
                    {{ "{{-" }} if eq (dig "data" "tls.crt" "" ($servingSecret | default dict)) "" {{ "}}" }}
                      {{ "{{-" }} $errors = append $errors (printf "apiserver serving cert Secret openshift-config/%q is missing or has no tls.crt — the external-CA serving cert is not materialized yet" $servingSecretName) {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                  {{ "{{-" }} end {{ "}}" }}
                {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            ##### SINGLE failure point: if anything was collected, emit ALL of it at once so one fix clears the #####
            ##### gate. Built by hand (not join) to stay on ACM's supported template-function set. #####
            {{ "{{-" }} if $errors {{ "}}" }}
              {{ "{{-" }} $msg := "" {{ "}}" }}
              {{ "{{-" }} range $e := $errors {{ "}}" }}
                {{ "{{-" }} $msg = (printf "%s\n  - %s" $msg $e) {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} fail (printf "readiness gate: %d issue(s) block ESO %q-mode bootstrap on this cluster:%s" (len $errors) $mode $msg) {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-eso-boot-readiness
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-eso-boot-readiness
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-eso-boot-readiness
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-eso-boot-readiness
    apiGroup: policy.open-cluster-management.io
    kind: Policy
