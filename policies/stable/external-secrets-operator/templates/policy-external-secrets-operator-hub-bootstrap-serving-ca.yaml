# Serving-CA capture, hub-side. Placed ONLY on hub clusters (hubClusterSets). It resolves the
# CA that signs the hub apiserver's SERVING cert and stashes it as a ConfigMap in the policy
# namespace, where the copy policy (policy-external-secrets-operator-hub-bootstrap.yaml) can read
# it with a hub template and ship it to the spokes. This is the client->server half of the mTLS
# trust (the spoke's store must trust the cert the hub apiserver presents).
#
# Why a separate policy that writes into the policy namespace:
#   - The apiserver serving cert lives in openshift-config / openshift-config-managage and the
#     APIServer config object — NONE of which the policy propagator may read. So the lookup CANNOT
#     be a hub template. Instead this whole policy is RUNTIME: it lands on the hub (which is self-
#     managing, or is an intermediate hub managed by a self-managed hub) and the LOCAL
#     config-policy-controller (cluster-admin) does the lookup on the cluster itself.
#   - It writes the result into the policy namespace. The copy policy then reads it with a hub
#     template (hub templates ARE allowed to read the policy namespace) and copies it to each
#     spoke. That indirection is what makes the flow compose across MULTIPLE AutoShift deployments
#     and the hub -> managed-hub -> spoke topology: every hub captures its OWN serving CA locally,
#     and the copy only ever reads from the policy namespace.
#
# Resolution (runtime, on the hub): if the hub apiserver serves a custom named certificate for its
# external apiserver host, trust that cert's chain (its openshift-config Secret, key tls.crt);
# otherwise fall back to the operator-managed serving CA bundle (the apiserver always serves
# something signed by an operator-managed signer, so that bundle is the safe default).
#
# Rotation note (named-cert path only): tls.crt is the leaf+intermediate chain, not the issuing CA,
# so the spoke effectively pins the current serving leaf. When that serving cert rotates, the spoke
# trusts the stale leaf until this policy re-stashes and the copy policy re-ships it (one evalInterval
# window), during which store reads can fail closed. The operator-managed fallback path stashes the
# real CA bundle and is rotation-clean. If the hub uses a stable custom CA, point hubCASource* at it.
#
{{- if $.Values.hubClusterSets }}
{{- $policyNamespace := $.Values.policy_namespace }}
{{- $eso := $.Values.externalSecretsOperator }}
{{- $storePrefix := ($eso.hubBootstrapStorePrefix | default "hub-bootstrap") }}
{{- $servingCAConfigMap := (printf "%s-hub-ca" $storePrefix) }}
{{- /* Fallback serving-CA bundle (operator-managed) used when no custom named cert matches. */}}
{{- $caNamespace := ($eso.hubCASourceNamespace | default "openshift-config-managed") }}
{{- $caName := ($eso.hubCASourceName | default "kube-apiserver-server-ca") }}
{{- $caKey := ($eso.hubCASourceKey | default "ca-bundle.crt") }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-eso-hub-bootstrap-serving-ca
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: SC System and Communications Protection
    policy.open-cluster-management.io/controls: SC-17 Public Key Infrastructure Certificates
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: eso-hub-bootstrap-serving-ca
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            #Indentation Anchor
            ##### RUNTIME (on the hub itself): resolve the hub apiserver serving CA #####
            ##### prefer a custom named serving cert for the hub's external apiserver host; else the operator-managed CA #####
            {{ "{{-" }} $apiserver := ((lookup "config.openshift.io/v1" "APIServer" "" "cluster") | default dict) {{ "}}" }}
            {{ "{{-" }} $infra := ((lookup "config.openshift.io/v1" "Infrastructure" "" "cluster") | default dict) {{ "}}" }}
            {{ "{{-" }} $apiHost := (index (splitList ":" (replace "https://" "" (dig "status" "apiServerURL" "" $infra))) 0) {{ "}}" }}
            {{ "{{-" }} $caPEM := "" {{ "}}" }}
            {{ "{{-" }} range $nc := (dig "spec" "servingCerts" "namedCertificates" list $apiserver) {{ "}}" }}
              {{ "{{-" }} if has $apiHost ((index $nc "names") | default list) {{ "}}" }}
                {{ "{{-" }} $ncSecret := (dig "servingCertificate" "name" "" $nc) {{ "}}" }}
                {{ "{{-" }} if ne $ncSecret "" {{ "}}" }}{{ "{{-" }} $caPEM = (fromSecret "openshift-config" $ncSecret "tls.crt" | base64dec) {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
            {{ "{{-" }} if eq $caPEM "" {{ "}}" }}{{ "{{-" }} $caPEM = (fromConfigMap "{{ $caNamespace }}" "{{ $caName }}" "{{ $caKey }}") {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
            ##### STASH the serving CA in the policy namespace for the copy policy to read (hub-template-readable) #####
            {{ "{{-" }} if ne $caPEM "" {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: {{ $servingCAConfigMap }}
                  namespace: {{ $policyNamespace }}
                data:
                  ca.crt: |
                    {{ "{{" }} $caPEM | autoindent {{ "}}" }}
            {{ "{{-" }} end {{ "}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-eso-hub-bootstrap-serving-ca
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/external-secrets-operator'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-eso-hub-bootstrap-serving-ca
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-eso-hub-bootstrap-serving-ca
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-eso-hub-bootstrap-serving-ca
    apiGroup: policy.open-cluster-management.io
    kind: Policy
{{ end }}
