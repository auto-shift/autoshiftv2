# Stable backend signing secret derived from the cluster UID (deterministic, so re-evaluations don't
# rotate it). mustonlyhave keeps exactly this value.
object-templates-raw: |
  {{hub- $ns := "tssc-dh" hub}}
  {{- $clusterUID := (lookup "v1" "Namespace" "" "kube-system" | default dict).metadata.uid | default "fallback" }}
  {{- $backendSecret := printf "%s-rhdh-backend" $clusterUID | sha256sum }}
  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: tssc-developer-hub-backend-secret
        namespace: '{{hub $ns hub}}'
      type: Opaque
      data:
        secret: '{{ $backendSecret | b64enc }}'
