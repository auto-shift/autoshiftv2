# Assembles the ${VAR} env values the app-config references, from the integration secrets each RHADS
# component publishes (spoke-side lookups) plus DNS-derived hosts. ArgoCD is wired to the infra
# instance (openshift-gitops) via username/password — no ArgoCD API token needed. Needs the elevated
# SA (hub template reads config; the lookups are spoke-side).
object-templates-raw: |
  {{hub- $cm := (lookup "v1" "ConfigMap" .PolicyMetadata.namespace (printf "%s.rendered-config" .ManagedClusterName)) | default dict hub}}
  {{hub- $cfg := (index ($cm.data | default dict) "config" | default "" | fromYaml | default dict) hub}}
  {{hub- $realm := (index (index $cfg "keycloak" | default dict) "realmName" | default "tssc-iam") hub}}
  {{- /* Which ArgoCD RHDH scaffolds into: config.devHub.argocd.team -> that team's argocd-dev
         (openshift-gitops-<team>); unset -> the infra-gitops platform instance. */}}
  {{hub- $argoTeam := (dig "devHub" "argocd" "team" "" $cfg) hub}}
  {{hub- $argoNs := ternary (printf "openshift-gitops-%s" $argoTeam) "openshift-gitops" (ne $argoTeam "") hub}}
  {{hub- $argoRouteName := ternary "argocd-dev-server" "infra-gitops-server" (ne $argoTeam "") hub}}
  {{hub- $argoSecretName := ternary "argocd-dev-cluster" "infra-gitops-cluster" (ne $argoTeam "") hub}}
  {{- $ns := "tssc-dh" }}
  {{- $dnsObj := lookup "config.openshift.io/v1" "DNS" "" "cluster" | default dict }}
  {{- $baseDomain := ($dnsObj.spec | default dict).baseDomain | default "cluster.local" }}
  {{- $appsDomain := printf "apps.%s" $baseDomain }}
  {{- $dhRoute := (lookup "route.openshift.io/v1" "Route" $ns "backstage-developer-hub" | default dict).spec | default dict }}
  {{- $dhHost := index $dhRoute "host" | default (printf "backstage-developer-hub-tssc-dh.%s" $appsDomain) }}
  {{- $kcHost := printf "keycloak.%s" $appsDomain }}
  {{- $backendData := (lookup "v1" "Secret" $ns "tssc-developer-hub-backend-secret" | default dict).data | default dict }}
  {{- $backendSecret := index $backendData "secret" | default "" | b64dec }}
  {{- $kcClientData := (lookup "v1" "Secret" "keycloak-system" "rhdh-realm-clients" | default dict).data | default dict }}
  {{- $kcClientSecret := index $kcClientData "rhdh" | default "" | b64dec }}
  {{- $argoRouteSpec := (lookup "route.openshift.io/v1" "Route" "{{hub $argoNs hub}}" "{{hub $argoRouteName hub}}" | default dict).spec | default dict }}
  {{- $argoHost := index $argoRouteSpec "host" | default "" }}
  {{- $argoAdminData := (lookup "v1" "Secret" "{{hub $argoNs hub}}" "{{hub $argoSecretName hub}}" | default dict).data | default dict }}
  {{- $argoPassword := index $argoAdminData "admin.password" | default "" | b64dec }}
  {{- $acsData := (lookup "v1" "Secret" "stackrox" "tssc-acs-integration" | default dict).data | default dict }}
  {{- $acsEndpoint := index $acsData "endpoint" | default "" | b64dec }}
  {{- $acsToken := index $acsData "token" | default "" | b64dec }}
  {{- $tpaData := (lookup "v1" "Secret" "tssc-tpa" "tssc-tpa-integration" | default dict).data | default dict }}
  {{- $tpaBombastic := index $tpaData "bombastic_api_url" | default "" | b64dec }}
  {{- $tpaVexination := index $tpaData "vexination_api_url" | default "" | b64dec }}
  {{- $tasData := (lookup "v1" "Secret" "tssc-tas" "tssc-tas-integration" | default dict).data | default dict }}
  {{- $rekorUrl := index $tasData "rekor_url" | default "" | b64dec }}
  {{- $glData := (lookup "v1" "Secret" "gitlab-system" "tssc-gitlab-credentials" | default dict).data | default dict }}
  {{- $glHost := index $glData "host" | default "" | b64dec }}
  {{- $glToken := index $glData "token" | default "" | b64dec }}
  {{- $ghData := (lookup "v1" "Secret" "github-system" "tssc-github-credentials" | default dict).data | default dict }}
  {{- $ghHost := index $ghData "host" | default "" | b64dec | default "github.com" }}
  {{- $ghToken := index $ghData "token" | default "" | b64dec }}
  {{- $ghOrg := index $ghData "org" | default "" | b64dec }}
  {{- $k8sData := (lookup "v1" "Secret" $ns "rhdh-kubernetes-token" | default dict).data | default dict }}
  {{- $k8sToken := index $k8sData "token" | default "" | b64dec }}
  {{- $quayRoute := (lookup "route.openshift.io/v1" "Route" "quay-enterprise" "registry-quay" | default dict).spec | default dict }}
  {{- $quayHost := index $quayRoute "host" | default "" }}
  {{- $quayUrl := ternary (printf "https://%s" $quayHost) "" (ne $quayHost "") }}
  {{- $quayData := (lookup "v1" "Secret" "quay-enterprise" "quay-integration" | default dict).data | default dict }}
  {{- $quayToken := index $quayData "token" | default "" | b64dec }}
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: tssc-developer-hub-env
        namespace: '{{ $ns }}'
      type: Opaque
      stringData:
        BACKEND_URL: 'https://{{ $dhHost }}'
        BACKEND_SECRET: '{{ $backendSecret }}'
        AUTH_SESSION_SECRET: '{{ $backendSecret }}'
        KEYCLOAK_URL: 'https://{{ $kcHost }}'
        KEYCLOAK_REALM: '{{hub $realm hub}}'
        KEYCLOAK_CLIENT_ID: rhdh
        KEYCLOAK_CLIENT_SECRET: '{{ $kcClientSecret }}'
        ARGOCD_HOSTNAME: '{{ $argoHost }}'
        ARGOCD_USER: admin
        ARGOCD_PASSWORD: '{{ $argoPassword }}'
        ARGOCD_API_TOKEN: ''
        ACS_ENDPOINT: '{{ $acsEndpoint }}'
        ACS_API_TOKEN: '{{ $acsToken }}'
        TPA_BOMBASTIC_API_URL: '{{ $tpaBombastic }}'
        TPA_VEXINATION_API_URL: '{{ $tpaVexination }}'
        REKOR_URL: '{{ $rekorUrl }}'
        GITLAB_HOST: '{{ $glHost }}'
        GITLAB_TOKEN: '{{ $glToken }}'
        GITHUB_HOST: '{{ $ghHost }}'
        GITHUB_TOKEN: '{{ $ghToken }}'
        GITHUB_ORG: '{{ $ghOrg }}'
        K8S_SERVICEACCOUNT_TOKEN: '{{ $k8sToken }}'
        QUAY_URL: '{{ $quayUrl }}'
        QUAY_API_TOKEN: '{{ $quayToken }}'
