apiVersion: v1
kind: Namespace
metadata:
  name: tssc-dh
  labels:
    openshift.io/cluster-monitoring: "true"
---
# ServiceAccount + long-lived token the Backstage Kubernetes plugin uses to read cluster resources.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhdh-kubernetes
  namespace: tssc-dh
---
apiVersion: v1
kind: Secret
metadata:
  name: rhdh-kubernetes-token
  namespace: tssc-dh
  annotations:
    kubernetes.io/service-account.name: rhdh-kubernetes
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhdh-kubernetes-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: rhdh-kubernetes
    namespace: tssc-dh
