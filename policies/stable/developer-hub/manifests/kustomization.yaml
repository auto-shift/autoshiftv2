apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Renders the shared components/operator-install chart. Visible per-operator ACM lookups below.
helmGlobals:
  chartHome: ../../../../components/
helmCharts:
  - name: operator-install
    releaseName: developer-hub
    valuesInline:
      name: developer-hub
      namespace: rhdh-operator
      remediation: ${REMEDIATION}
      subscription:
        name: '{{hub index .ManagedClusterLabels "autoshift.io/dev-hub-subscription-name" | default "rhdh" hub}}'
        channel: '{{hub index .ManagedClusterLabels "autoshift.io/dev-hub-channel" | default "fast-1.9" hub}}'
        source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/dev-hub-source" | default "redhat-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
        sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/dev-hub-source-namespace" | default "openshift-marketplace" hub}}'
        startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/dev-hub-version" | default "" hub}}'
      versions: '{{hub compact (list (index .ManagedClusterLabels "autoshift.io/dev-hub-version" | default "")) | toRawJson | toLiteral hub}}'
