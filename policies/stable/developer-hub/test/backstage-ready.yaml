# Readiness gate (inform-only): the Backstage CR reports Deployed.
object-templates-raw: |
  - complianceType: musthave
    objectDefinition:
      apiVersion: rhdh.redhat.com/v1alpha3
      kind: Backstage
      metadata:
        name: developer-hub
        namespace: tssc-dh
      status:
        conditions:
          - type: Deployed
            status: "True"
