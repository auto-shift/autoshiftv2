{{- $policyName := "policy-developer-hub-instance" }}
{{- $placementName := "placement-policy-developer-hub-instance" }}
{{- $instanceName := .Values.developerHub.instanceName }}
{{- $instanceNs := .Values.developerHub.instanceNamespace }}

apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ .Values.policy_namespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-developer-hub-operator-install
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    # ── Prereq: GitHub credentials must exist on this cluster ────────────────
    # Checks that the admin-created tssc-github-credentials Secret exists in
    # github-system with the required keys before hub templates attempt to read
    # it. inform-only — the policy reports NonCompliant if the secret is absent.
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: github-credentials-prereq
        spec:
          remediationAction: inform
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub-" }} $githubEnabled := index .ManagedClusterLabels "autoshift.io/tssc-github" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} if eq $githubEnabled "true" {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: tssc-github-credentials
                  namespace: github-system
                data:
                  host: ''
                  token: ''
                  org: ''
            {{ "{{hub-" }} end {{ "hub}}" }}
    # ── Prereq: GitLab credentials must exist on this cluster ────────────────
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: gitlab-credentials-prereq
        spec:
          remediationAction: inform
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub-" }} $gitlabEnabled := index .ManagedClusterLabels "autoshift.io/gitlab" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} if eq $gitlabEnabled "true" {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: tssc-gitlab-credentials
                  namespace: gitlab-system
            {{ "{{hub-" }} end {{ "hub}}" }}
    # ── Namespace ─────────────────────────────────────────────────────────────
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: developer-hub-namespace
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub-" }} $devHubNs := index .ManagedClusterLabels "autoshift.io/dev-hub-instance-namespace" | default "{{ $instanceNs }}" {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: {{ "{{hub" }} $devHubNs {{ "hub}}" }}
    # ── App Config ConfigMap ───────────────────────────────────────────────────
    # Assembles the Backstage app-config from hub template conditionals.
    # References ${VAR} env vars — the tssc-developer-hub-env Secret populates them.
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: developer-hub-app-config
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub-" }} $devHubNs := index .ManagedClusterLabels "autoshift.io/dev-hub-instance-namespace" | default "{{ $instanceNs }}" {{ "hub}}" }}
            {{ "{{hub-" }} $kcRealm := index .ManagedClusterLabels "autoshift.io/keycloak-realm-name" | default "tssc-iam" {{ "hub}}" }}
            {{ "{{hub-" }} $acsEnabled := index .ManagedClusterLabels "autoshift.io/acs" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $tpaEnabled := index .ManagedClusterLabels "autoshift.io/trusted-profile-analyzer" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $tasEnabled := index .ManagedClusterLabels "autoshift.io/tas" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $gitlabEnabled := index .ManagedClusterLabels "autoshift.io/gitlab" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $githubEnabled := index .ManagedClusterLabels "autoshift.io/tssc-github" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $azureEnabled := index .ManagedClusterLabels "autoshift.io/tssc-azure" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $jenkinsEnabled := index .ManagedClusterLabels "autoshift.io/tssc-jenkins" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $bitbucketEnabled := index .ManagedClusterLabels "autoshift.io/tssc-bitbucket" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $nexusEnabled := index .ManagedClusterLabels "autoshift.io/tssc-nexus" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $quayIntEnabled := index .ManagedClusterLabels "autoshift.io/tssc-quay" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $artifactoryEnabled := index .ManagedClusterLabels "autoshift.io/tssc-artifactory" | default "false" {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: tssc-developer-hub-app-config
                  namespace: {{ "{{hub" }} $devHubNs {{ "hub}}" }}
                data:
                  app-config.tssc.yaml: |
                    app:
                      title: Red Hat Developer Hub
                      baseUrl: ${BACKEND_URL}
                    backend:
                      auth:
                        externalAccess:
                          - type: static
                            options:
                              token: ${BACKEND_SECRET}
                              subject: legacy
                      baseUrl: ${BACKEND_URL}
                      cors:
                        origin: ${BACKEND_URL}
                    auth:
                      environment: production
                      providers:
                        oidc:
                          production:
                            metadataUrl: ${KEYCLOAK_URL}/realms/{{ "{{hub" }} $kcRealm {{ "hub}}" }}/.well-known/openid-configuration
                            clientId: ${KEYCLOAK_CLIENT_ID}
                            clientSecret: ${KEYCLOAK_CLIENT_SECRET}
                            scope: openid email profile groups
                            prompt: auto
                            signIn:
                              resolvers:
                                - resolver: preferredUsernameMatchingUserEntityName
                    signInPage: oidc
                    {{ "{{hub-" }} if or (eq $artifactoryEnabled "true") (eq $nexusEnabled "true") (eq $quayIntEnabled "true") {{ "hub}}" }}
                    proxy:
                      endpoints:
                        {{ "{{hub-" }} if eq $artifactoryEnabled "true" {{ "hub}}" }}
                        '/jfrog-artifactory/api':
                          target: ${ARTIFACTORY_URL}
                          headers:
                            Authorization: 'Bearer ${ARTIFACTORY_API_TOKEN}'
                          secure: true
                        {{ "{{hub-" }} end {{ "hub}}" }}
                        {{ "{{hub-" }} if eq $nexusEnabled "true" {{ "hub}}" }}
                        '/nexus-repository-manager':
                          target: ${NEXUS_URL}
                          headers:
                            X-Requested-With: 'XMLHttpRequest'
                          changeOrigin: true
                          secure: true
                        {{ "{{hub-" }} end {{ "hub}}" }}
                        {{ "{{hub-" }} if eq $quayIntEnabled "true" {{ "hub}}" }}
                        '/quay/api':
                          target: ${QUAY_URL}
                          changeOrigin: true
                          headers:
                            X-Requested-With: 'XMLHttpRequest'
                            Authorization: 'Bearer ${QUAY_API_TOKEN}'
                          secure: true
                        {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    catalog:
                      rules:
                        - allow: [Component, System, Group, Resource, Location, Template, API]
                      locations: []
                      {{ "{{hub-" }} if or (eq $gitlabEnabled "true") (eq $githubEnabled "true") {{ "hub}}" }}
                      providers:
                        {{ "{{hub-" }} if eq $gitlabEnabled "true" {{ "hub}}" }}
                        gitlab:
                          default:
                            host: ${GITLAB_HOST}
                            branch: main
                            fallbackBranch: master
                            entityFilename: catalog-info.yaml
                            projectPattern: '[\s\S]*'
                        {{ "{{hub-" }} end {{ "hub}}" }}
                        {{ "{{hub-" }} if eq $githubEnabled "true" {{ "hub}}" }}
                        github:
                          default:
                            organization: ${GITHUB_ORG}
                            catalogPath: /catalog-info.yaml
                            filters:
                              branch: main
                        {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} end {{ "hub}}" }}
                    argocd:
                      appLocatorMethods:
                        - type: config
                          instances:
                            - name: default
                              url: https://${ARGOCD_HOSTNAME}
                              token: ${ARGOCD_API_TOKEN}
                              username: ${ARGOCD_USER}
                    {{ "{{hub-" }} if eq $artifactoryEnabled "true" {{ "hub}}" }}
                    artifactory:
                      uiUrl: ${ARTIFACTORY_URL}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} if eq $azureEnabled "true" {{ "hub}}" }}
                    azureDevOps:
                      host: ${AZURE_HOST}
                      organization: ${AZURE_ORG}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} if eq $jenkinsEnabled "true" {{ "hub}}" }}
                    jenkins:
                      instances:
                        - name: default
                          baseUrl: ${JENKINS_BASEURL}
                          username: ${JENKINS_USERNAME}
                          apiKey: ${JENKINS_TOKEN}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} if eq $nexusEnabled "true" {{ "hub}}" }}
                    nexus:
                      uiUrl: ${NEXUS_URL}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} if eq $quayIntEnabled "true" {{ "hub}}" }}
                    quay:
                      uiUrl: ${QUAY_URL}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} if or (eq $gitlabEnabled "true") (eq $githubEnabled "true") (eq $azureEnabled "true") (eq $bitbucketEnabled "true") {{ "hub}}" }}
                    integrations:
                      {{ "{{hub-" }} if eq $gitlabEnabled "true" {{ "hub}}" }}
                      gitlab:
                        - host: ${GITLAB_HOST}
                          token: ${GITLAB_TOKEN}
                          apiBaseUrl: https://${GITLAB_HOST}/api/v4
                          baseUrl: https://${GITLAB_HOST}
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} if eq $githubEnabled "true" {{ "hub}}" }}
                      github:
                        - host: ${GITHUB_HOST}
                          token: ${GITHUB_TOKEN}
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} if eq $azureEnabled "true" {{ "hub}}" }}
                      azure:
                        - host: ${AZURE_HOST}
                          credentials:
                            - personalAccessToken: ${AZURE_TOKEN}
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} if eq $bitbucketEnabled "true" {{ "hub}}" }}
                      bitbucketCloud:
                        - appPassword: ${BITBUCKET_APP_PASSWORD}
                          username: ${BITBUCKET_USERNAME}
                      {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} if eq $acsEnabled "true" {{ "hub}}" }}
                    acs:
                      endpoint: ${ACS_ENDPOINT}
                      token: ${ACS_API_TOKEN}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} if eq $tpaEnabled "true" {{ "hub}}" }}
                    trustification:
                      bombasticApiUrl: ${TPA_BOMBASTIC_API_URL}
                      vexinationApiUrl: ${TPA_VEXINATION_API_URL}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} if eq $tasEnabled "true" {{ "hub}}" }}
                    tas:
                      rekorUrl: ${REKOR_URL}
                    {{ "{{hub-" }} end {{ "hub}}" }}
    # ── Dynamic Plugins ConfigMap ──────────────────────────────────────────────
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: developer-hub-dynamic-plugins
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub-" }} $devHubNs := index .ManagedClusterLabels "autoshift.io/dev-hub-instance-namespace" | default "{{ $instanceNs }}" {{ "hub}}" }}
            {{ "{{hub-" }} $gitlabEnabled := index .ManagedClusterLabels "autoshift.io/gitlab" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $githubEnabled := index .ManagedClusterLabels "autoshift.io/tssc-github" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $argoEnabled := ne (index .ManagedClusterLabels "autoshift.io/gitops-dev" | default "false") "false" {{ "hub}}" }}
            {{ "{{hub-" }} $azureEnabled := index .ManagedClusterLabels "autoshift.io/tssc-azure" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $jenkinsEnabled := index .ManagedClusterLabels "autoshift.io/tssc-jenkins" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $bitbucketEnabled := index .ManagedClusterLabels "autoshift.io/tssc-bitbucket" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $nexusEnabled := index .ManagedClusterLabels "autoshift.io/tssc-nexus" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $quayIntEnabled := index .ManagedClusterLabels "autoshift.io/tssc-quay" | default "false" {{ "hub}}" }}
            {{ "{{hub-" }} $artifactoryEnabled := index .ManagedClusterLabels "autoshift.io/tssc-artifactory" | default "false" {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: tssc-developer-hub-dynamic-plugins
                  namespace: {{ "{{hub" }} $devHubNs {{ "hub}}" }}
                data:
                  dynamic-plugins.yaml: |
                    includes:
                      - dynamic-plugins.default.yaml
                    plugins:
                      #
                      # CI
                      #
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-tekton:bs_1.45.3__3.33.3'
                        disabled: false
                        pluginConfig:
                          dynamicPlugins:
                            frontend:
                              backstage-community.plugin-tekton:
                                mountPoints:
                                  - config:
                                      if:
                                        allOf:
                                          - isTektonCIAvailable
                                      layout:
                                        gridColumn: 1 / -1
                                        gridRowStart: 1
                                    importName: TektonCI
                                    mountPoint: entity.page.ci/cards
                      {{ "{{hub-" }} if eq $githubEnabled "true" {{ "hub}}" }}
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-github-actions:bs_1.45.3__0.18.0'
                        disabled: false
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} if eq $azureEnabled "true" {{ "hub}}" }}
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-azure-devops-backend:bs_1.45.3__0.23.0'
                        disabled: false
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-azure-devops:bs_1.45.3__0.23.0'
                        disabled: false
                        pluginConfig:
                          dynamicPlugins:
                            frontend:
                              backstage-community.plugin-azure-devops:
                                mountPoints:
                                  - mountPoint: entity.page.ci/cards
                                    importName: EntityAzurePipelinesContent
                                    config:
                                      layout:
                                        gridColumn: "1 / -1"
                                      if:
                                        allOf:
                                          - isAzurePipelinesAvailable
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} if eq $jenkinsEnabled "true" {{ "hub}}" }}
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-jenkins:bs_1.45.3__0.26.0'
                        disabled: false
                        pluginConfig:
                          dynamicPlugins:
                            frontend:
                              backstage-community.plugin-jenkins:
                                mountPoints:
                                  - mountPoint: entity.page.ci/cards
                                    importName: EntityJenkinsContent
                                    config:
                                      layout:
                                        gridColumn: "1 / -1"
                                      if:
                                        allOf:
                                          - isJenkinsAvailable
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-jenkins-backend:bs_1.45.3__0.22.0'
                        disabled: false
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      - package: 'oci://quay.io/redhat-tssc/backstage-plugins:1.9.0!tssc-plugins-backstage-community-plugin-multi-source-security-viewer'
                        disabled: false
                        pluginConfig:
                          dynamicPlugins:
                            frontend:
                              tssc-plugins.backstage-community-plugin-multi-source-security-viewer:
                                mountPoints:
                                  - config:
                                      layout:
                                        gridColumn: 1 / -1
                                        gridRowStart: 2
                                      if:
                                        allOf:
                                          - isMultiCIAvailable
                                    importName: EntityMultiCIPipelinesContent
                                    mountPoint: entity.page.ci/cards
                                entityTabs:
                                  - path: /ci
                                    title: CI
                                    mountPoint: entity.page.ci
                      - package: 'oci://quay.io/redhat-tssc/backstage-plugins:1.9.0!tssc-plugins-backstage-community-plugin-multi-source-security-viewer-backend'
                        disabled: false
                      #
                      # ArgoCD
                      #
                      {{ "{{hub-" }} if $argoEnabled {{ "hub}}" }}
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-argocd:bs_1.45.3__2.4.3'
                        disabled: false
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-argocd-backend:bs_1.45.3__1.0.2'
                        disabled: false
                        pluginConfig:
                          argocd:
                            appLocatorMethods:
                              - type: 'config'
                                instances: []
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-scaffolder-backend-argocd:bs_1.45.3__1.8.1'
                        disabled: false
                        pluginConfig:
                          argocd:
                            appLocatorMethods:
                              - type: 'config'
                                instances: []
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      #
                      # Kubernetes
                      #
                      - package: './dynamic-plugins/dist/backstage-plugin-kubernetes'
                        disabled: false
                      - package: './dynamic-plugins/dist/backstage-plugin-kubernetes-backend-dynamic'
                        disabled: false
                        pluginConfig:
                          kubernetes:
                            clusterLocatorMethods:
                              - clusters:
                                  - authProvider: serviceAccount
                                    customResources:
                                      - group: argoproj.io
                                        apiVersion: v1alpha1
                                        plural: rollouts
                                      - apiVersion: v1
                                        group: route.openshift.io
                                        plural: routes
                                      - apiVersion: v1
                                        group: tekton.dev
                                        plural: pipelineruns
                                      - apiVersion: v1
                                        group: tekton.dev
                                        plural: taskruns
                                    name: rhdh-cluster
                                    serviceAccountToken: ${K8S_SERVICEACCOUNT_TOKEN}
                                    skipTLSVerify: true
                                    url: https://kubernetes.default.svc
                                type: config
                            serviceLocatorMethod:
                              type: multiTenant
                      - package: './dynamic-plugins/dist/backstage-community-plugin-topology'
                        disabled: false
                      #
                      # GitLab
                      #
                      {{ "{{hub-" }} if eq $gitlabEnabled "true" {{ "hub}}" }}
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/immobiliarelabs-backstage-plugin-gitlab:bs_1.45.3__6.13.0'
                        disabled: false
                        pluginConfig:
                          dynamicPlugins:
                            frontend:
                              immobiliarelabs.backstage-plugin-gitlab:
                                mountPoints:
                                  - mountPoint: entity.page.ci/cards
                                    importName: EntityGitlabPipelinesTable
                                    config:
                                      layout:
                                        gridColumn: "1 / -1"
                                      if:
                                        allOf:
                                          - isGitlabAvailable
                                          - hasAnnotation:
                                              - gitlab.com/enabled
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/immobiliarelabs-backstage-plugin-gitlab-backend:bs_1.45.3__6.13.0'
                        disabled: false
                      - package: './dynamic-plugins/dist/backstage-plugin-scaffolder-backend-module-gitlab-dynamic'
                        disabled: false
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      #
                      # GitHub
                      #
                      {{ "{{hub-" }} if eq $bitbucketEnabled "true" {{ "hub}}" }}
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-scaffolder-backend-module-bitbucket-cloud:bs_1.45.3__0.2.15'
                        disabled: false
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} if eq $githubEnabled "true" {{ "hub}}" }}
                      - package: './dynamic-plugins/dist/backstage-plugin-scaffolder-backend-module-github-dynamic'
                        disabled: false
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      #
                      # Image Registry
                      #
                      {{ "{{hub-" }} if eq $artifactoryEnabled "true" {{ "hub}}" }}
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-jfrog-artifactory:bs_1.45.3__1.24.1'
                        disabled: false
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} if eq $nexusEnabled "true" {{ "hub}}" }}
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-nexus-repository-manager:bs_1.45.3__1.19.4'
                        disabled: false
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      {{ "{{hub-" }} if eq $quayIntEnabled "true" {{ "hub}}" }}
                      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-quay:bs_1.45.3__1.28.1'
                        disabled: false
                      {{ "{{hub-" }} end {{ "hub}}" }}
                      #
                      # TechDocs
                      #
                      - package: './dynamic-plugins/dist/backstage-plugin-techdocs'
                        disabled: false
                      - package: './dynamic-plugins/dist/backstage-plugin-techdocs-backend-dynamic'
                        disabled: false
                      #
                      # RBAC
                      #
                      - package: './dynamic-plugins/dist/backstage-community-plugin-rbac'
                        disabled: false
                      #
                      # Keycloak
                      #
                      - package: './dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic'
                        disabled: false
    # ── Backend Secret ─────────────────────────────────────────────────────────
    # Generates a stable backend signing secret derived from the cluster UID.
    # Deterministic so re-evaluations don't rotate the value.
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: developer-hub-backend-secret
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub-" }} $devHubNs := index .ManagedClusterLabels "autoshift.io/dev-hub-instance-namespace" | default "{{ $instanceNs }}" {{ "hub}}" }}
            {{ "{{-" }} $ns := "{{ "{{hub" }} $devHubNs {{ "hub}}" }}" {{ "}}" }}
            {{`{{`}} $clusterUID := (lookup "v1" "Namespace" "" "kube-system" | default dict).metadata.uid | default "fallback" {{`}}`}}
            {{`{{`}} $backendSecret := printf "%s-rhdh-backend" $clusterUID | sha256sum {{`}}`}}
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: tssc-developer-hub-backend-secret
                  namespace: '{{ "{{" }} $ns {{ "}}" }}'
                type: Opaque
                data:
                  secret: '{{ "{{" }} $backendSecret | b64enc {{ "}}" }}'
    # ── Environment Secret ─────────────────────────────────────────────────────
    # Assembles env vars from integration secrets via spoke-side lookups.
    # All ${VAR} references in the app-config resolve from these values.
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: developer-hub-env
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub-" }} $devHubNs := index .ManagedClusterLabels "autoshift.io/dev-hub-instance-namespace" | default "{{ $instanceNs }}" {{ "hub}}" }}
            {{ "{{hub-" }} $devHubName := index .ManagedClusterLabels "autoshift.io/dev-hub-instance-name" | default "{{ $instanceName }}" {{ "hub}}" }}
            {{ "{{hub-" }} $argoTeam := index .ManagedClusterLabels "autoshift.io/dev-hub-gitops-team" | default "dev" {{ "hub}}" }}
            {{ "{{hub-" }} $argoNs := printf "openshift-gitops-%s" $argoTeam {{ "hub}}" }}
            {{ "{{hub-" }} $kcNs := index .ManagedClusterLabels "autoshift.io/keycloak-namespace" | default "keycloak-system" {{ "hub}}" }}
            {{ "{{hub-" }} $kcRealm := index .ManagedClusterLabels "autoshift.io/keycloak-realm-name" | default "tssc-iam" {{ "hub}}" }}
            {{ "{{hub-" }} $tpaNs := index .ManagedClusterLabels "autoshift.io/trusted-profile-analyzer-namespace" | default "trusted-profile-analyzer" {{ "hub}}" }}
            {{ "{{-" }} $ns := "{{ "{{hub" }} $devHubNs {{ "hub}}" }}" {{ "}}" }}
            {{ "{{-" }} $argoNs := "{{ "{{hub" }} $argoNs {{ "hub}}" }}" {{ "}}" }}
            {{ "{{-" }} $kcNs := "{{ "{{hub" }} $kcNs {{ "hub}}" }}" {{ "}}" }}
            {{ "{{-" }} $tpaNs := "{{ "{{hub" }} $tpaNs {{ "hub}}" }}" {{ "}}" }}
            {{ "{{-" }} $argoData := (lookup "v1" "Secret" $argoNs "tssc-argocd-integration" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $argoHostname := index $argoData "ARGOCD_HOSTNAME" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $argoToken := index $argoData "ARGOCD_API_TOKEN" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $argoUser := index $argoData "ARGOCD_USER" | default "YWRtaW4=" | b64dec {{ "}}" }}
            {{ "{{-" }} $kcRouteSpec := (lookup "route.openshift.io/v1" "Route" $kcNs "keycloak" | default dict).spec | default dict {{ "}}" }}
            {{ "{{-" }} $kcHost := index $kcRouteSpec "host" | default "" {{ "}}" }}
            {{ "{{-" }} $kcClientData := (lookup "v1" "Secret" $kcNs "rhdh-realm-clients" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $kcClientSecret := index $kcClientData "rhdh" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $dhRouteSpec := (lookup "route.openshift.io/v1" "Route" $ns "developer-hub" | default dict).spec | default dict {{ "}}" }}
            {{ "{{-" }} $dhHost := index $dhRouteSpec "host" | default "" {{ "}}" }}
            {{ "{{-" }} $backendSecretData := (lookup "v1" "Secret" $ns "tssc-developer-hub-backend-secret" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $backendSecret := index $backendSecretData "secret" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $acsData := (lookup "v1" "Secret" "stackrox" "tssc-acs-integration" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $acsEndpoint := index $acsData "endpoint" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $acsToken := index $acsData "token" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $tpaData := (lookup "v1" "Secret" $tpaNs "tssc-tpa-integration" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $tpaBombastic := index $tpaData "bombastic_api_url" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $tpaVexination := index $tpaData "vexination_api_url" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $tasData := (lookup "v1" "Secret" "openshift-operators" "tssc-tas-integration" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $rekorUrl := index $tasData "rekor_url" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $glData := (lookup "v1" "Secret" "gitlab-system" "tssc-gitlab-credentials" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $glHost := index $glData "host" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $glToken := index $glData "token" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $ghData := (lookup "v1" "Secret" "github-system" "tssc-github-credentials" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $ghHost := index $ghData "host" | default "github.com" | b64dec {{ "}}" }}
            {{ "{{-" }} $ghToken := index $ghData "token" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $ghOrg := index $ghData "org" | default "" | b64dec {{ "}}" }}
            {{ "{{-" }} $azureData := (lookup "v1" "Secret" "tssc-integrations" "tssc-azure-integration" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $jenkinsData := (lookup "v1" "Secret" "tssc-integrations" "tssc-jenkins-integration" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $bbData := (lookup "v1" "Secret" "tssc-integrations" "tssc-bitbucket-integration" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $nexusData := (lookup "v1" "Secret" "tssc-integrations" "tssc-nexus-integration" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $quayData := (lookup "v1" "Secret" "tssc-integrations" "tssc-quay-integration" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $artifactoryData := (lookup "v1" "Secret" "tssc-integrations" "tssc-artifactory-integration" | default dict).data | default dict {{ "}}" }}
            {{ "{{-" }} $k8sData := (lookup "v1" "Secret" "tssc-integrations" "tssc-k8s-integration" | default dict).data | default dict {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: tssc-developer-hub-env
                  namespace: {{ "{{" }} $ns {{ "}}" }}
                type: Opaque
                stringData:
                  BACKEND_URL: 'https://{{ "{{" }} $dhHost {{ "}}" }}'
                  BACKEND_SECRET: '{{ "{{" }} $backendSecret {{ "}}" }}'
                  KEYCLOAK_URL: 'https://{{ "{{" }} $kcHost {{ "}}" }}'
                  KEYCLOAK_REALM: '{{ "{{hub" }} $kcRealm {{ "hub}}" }}'
                  KEYCLOAK_CLIENT_ID: developer-hub
                  KEYCLOAK_CLIENT_SECRET: '{{ "{{" }} $kcClientSecret {{ "}}" }}'
                  ARGOCD_HOSTNAME: '{{ "{{" }} $argoHostname {{ "}}" }}'
                  ARGOCD_USER: '{{ "{{" }} $argoUser {{ "}}" }}'
                  ARGOCD_API_TOKEN: '{{ "{{" }} $argoToken {{ "}}" }}'
                  ACS_ENDPOINT: '{{ "{{" }} $acsEndpoint {{ "}}" }}'
                  ACS_API_TOKEN: '{{ "{{" }} $acsToken {{ "}}" }}'
                  TPA_BOMBASTIC_API_URL: '{{ "{{" }} $tpaBombastic {{ "}}" }}'
                  TPA_VEXINATION_API_URL: '{{ "{{" }} $tpaVexination {{ "}}" }}'
                  REKOR_URL: '{{ "{{" }} $rekorUrl {{ "}}" }}'
                  GITLAB_HOST: '{{ "{{" }} $glHost {{ "}}" }}'
                  GITLAB_TOKEN: '{{ "{{" }} $glToken {{ "}}" }}'
                  GITHUB_HOST: '{{ "{{" }} $ghHost {{ "}}" }}'
                  GITHUB_TOKEN: '{{ "{{" }} $ghToken {{ "}}" }}'
                  GITHUB_ORG: '{{ "{{" }} $ghOrg {{ "}}" }}'
                  K8S_SERVICEACCOUNT_TOKEN: '{{ "{{" }} index $k8sData "token" | default "" | b64dec {{ "}}" }}'
                  AZURE_HOST: '{{ "{{" }} index $azureData "host" | default "" | b64dec {{ "}}" }}'
                  AZURE_ORG: '{{ "{{" }} index $azureData "organization" | default "" | b64dec {{ "}}" }}'
                  AZURE_TOKEN: '{{ "{{" }} index $azureData "token" | default "" | b64dec {{ "}}" }}'
                  JENKINS_BASEURL: '{{ "{{" }} index $jenkinsData "baseUrl" | default "" | b64dec {{ "}}" }}'
                  JENKINS_USERNAME: '{{ "{{" }} index $jenkinsData "username" | default "" | b64dec {{ "}}" }}'
                  JENKINS_TOKEN: '{{ "{{" }} index $jenkinsData "token" | default "" | b64dec {{ "}}" }}'
                  BITBUCKET_APP_PASSWORD: '{{ "{{" }} index $bbData "appPassword" | default "" | b64dec {{ "}}" }}'
                  BITBUCKET_USERNAME: '{{ "{{" }} index $bbData "username" | default "" | b64dec {{ "}}" }}'
                  NEXUS_URL: '{{ "{{" }} index $nexusData "url" | default "" | b64dec {{ "}}" }}'
                  QUAY_URL: '{{ "{{" }} index $quayData "url" | default "" | b64dec {{ "}}" }}'
                  QUAY_API_TOKEN: '{{ "{{" }} index $quayData "token" | default "" | b64dec {{ "}}" }}'
                  ARTIFACTORY_URL: '{{ "{{" }} index $artifactoryData "url" | default "" | b64dec {{ "}}" }}'
                  ARTIFACTORY_API_TOKEN: '{{ "{{" }} index $artifactoryData "token" | default "" | b64dec {{ "}}" }}'
    # ── Backstage Instance ─────────────────────────────────────────────────────
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: developer-hub-instance
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub-" }} $devHubNs := index .ManagedClusterLabels "autoshift.io/dev-hub-instance-namespace" | default "{{ $instanceNs }}" {{ "hub}}" }}
            {{ "{{hub-" }} $devHubName := index .ManagedClusterLabels "autoshift.io/dev-hub-instance-name" | default "{{ $instanceName }}" {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: rhdh.redhat.com/v1alpha3
                kind: Backstage
                metadata:
                  name: {{ "{{hub" }} $devHubName {{ "hub}}" }}
                  namespace: {{ "{{hub" }} $devHubNs {{ "hub}}" }}
                spec:
                  application:
                    appConfig:
                      configMaps:
                        - name: tssc-developer-hub-app-config
                    dynamicPluginsConfigMapName: tssc-developer-hub-dynamic-plugins
                    extraEnvs:
                      secrets:
                        - name: tssc-developer-hub-env
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ $placementName }}
  namespace: {{ .Values.policy_namespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/dev-hub'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ $placementName }}
  namespace: {{ .Values.policy_namespace }}
placementRef:
  name: {{ $placementName }}
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: {{ $policyName }}
    apiGroup: policy.open-cluster-management.io
    kind: Policy
