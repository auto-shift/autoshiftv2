apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-aap-cert-bundle
  namespace: ${POLICY_NAMESPACE}
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/aap-noobaa-s3-storage'
              operator: In
              values:
                - 'true'
            - key: 'autoshift.io/aap'
              operator: In
              values:
                - 'true'
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/aap-custom-cabundle'
              operator: In
              values:
                - 'true'
            - key: 'autoshift.io/aap'
              operator: In
              values:
                - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
