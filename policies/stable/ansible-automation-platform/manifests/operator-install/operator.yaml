apiVersion: policy.open-cluster-management.io/v1beta1
kind: OperatorPolicy
metadata:
  name: install-operator-aap
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  complianceType: musthave
  operatorGroup:
    # Spoke-side template ({{ }}): if an OperatorGroup already exists in the namespace use it,
    # otherwise fall back to the namespace name. Resolves on the managed cluster.
    name: '{{ with (lookup "operators.coreos.com/v1" "OperatorGroup" "ansible-automation-platform" "").items }}{{ (index . 0).metadata.name }}{{ else }}ansible-automation-platform{{ end }}'
    namespace: ansible-automation-platform
    targetNamespaces:
      - ansible-automation-platform
  subscription:
    name: '{{hub index .ManagedClusterLabels "autoshift.io/aap-subscription-name" | default "ansible-automation-platform-operator" hub}}'
    namespace: ansible-automation-platform
    # Source: base from label or default; if disconnected-mirror is true, append -<mirror suffix>.
    source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/aap-source" | default "redhat-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
    sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/aap-source-namespace" | default "openshift-marketplace" hub}}'
    channel: '{{hub index .ManagedClusterLabels "autoshift.io/aap-channel" | default "stable-2.6" hub}}'
    startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/aap-version" | default "" hub}}'
  # Version drives upgrade approval: if a version is set the install plan is manual and pinned.
  upgradeApproval: Automatic
  versions:
    - '{{hub index .ManagedClusterLabels "autoshift.io/aap-version" | default "" hub}}'
