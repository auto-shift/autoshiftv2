apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: aap-service-ca-configmap
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates-raw: |
    # ConfigMap for service-ca (internal services like NooBaa S3)
    - complianceType: musthave
      objectDefinition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: aap-service-ca
          namespace: ansible-automation-platform
          annotations:
            service.beta.openshift.io/inject-cabundle: "true"
