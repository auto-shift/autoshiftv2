apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: aap-cert-bundle
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates-raw: |
    # Combined Secret with both CAs for AAP to use
    - complianceType: musthave
      objectDefinition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: user-ca-bundle
          namespace: ansible-automation-platform
        type: Opaque
        data:
          trusted-ca-bundle: {{ printf "%s\n%s" (index (lookup "v1" "ConfigMap" "ansible-automation-platform" "aap-service-ca").data "service-ca.crt") (index (lookup "v1" "ConfigMap" "ansible-automation-platform" "aap-trusted-ca").data "ca-bundle.crt") | base64enc }}
