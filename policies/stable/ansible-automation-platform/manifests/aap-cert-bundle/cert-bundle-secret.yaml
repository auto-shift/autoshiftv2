# Combined Secret with both CAs for AAP to use. Bare resource — PG wraps it into a
# ConfigurationPolicy. The spoke-side lookup value must be quoted so it's valid YAML.
apiVersion: v1
kind: Secret
metadata:
  name: user-ca-bundle
  namespace: ansible-automation-platform
type: Opaque
data:
  trusted-ca-bundle: '{{ printf "%s\n%s" (index (lookup "v1" "ConfigMap" "ansible-automation-platform" "aap-service-ca").data "service-ca.crt") (index (lookup "v1" "ConfigMap" "ansible-automation-platform" "aap-trusted-ca").data "ca-bundle.crt") | base64enc }}'
