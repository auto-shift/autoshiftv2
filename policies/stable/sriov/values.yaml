### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# sriov<bool>: 'true' or 'false' - Controls whether sriov is managed
#
# Configuration:
# sriov-subscription-name<string>: Operator subscription name (default: 'sriov-network-operator')
# sriov-channel<string>: Operator channel (default: 'stable')
# sriov-version<string>: Specific operator version (CSV) to install (optional)
# sriov-source<string>: Operator catalog source (default: 'redhat-operators')
# sriov-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
#
# Examples:
# autoshift.io/sriov: 'true'
# autoshift.io/sriov-subscription-name: 'sriov-network-operator'
# autoshift.io/sriov-channel: 'stable'
# autoshift.io/sriov-version: 'operator-name.v1.x.x'
# autoshift.io/sriov-source: 'redhat-operators'
# autoshift.io/sriov-source-namespace: 'openshift-marketplace'