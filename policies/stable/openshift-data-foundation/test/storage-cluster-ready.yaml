# Readiness gate: the StorageCluster must report Available before dependents proceed. Wrapped by
# PG into a musthave ConfigurationPolicy; its PG policy entry is remediationAction: inform
# (a status can only be observed, never enforced).
apiVersion: ocs.openshift.io/v1
kind: StorageCluster
metadata:
  name: ocs-storagecluster
  namespace: openshift-storage
status:
  conditions:
    - status: 'False'
      type: VersionMismatch
    - status: 'True'
      type: ReconcileComplete
    - status: 'True'
      type: Available
    - status: 'False'
      type: Progressing
    - status: 'False'
      type: Degraded
