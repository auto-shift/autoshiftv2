apiVersion: policy.open-cluster-management.io/v1beta1
kind: OperatorPolicy
metadata:
  name: install-operator-odf
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  complianceType: musthave
  operatorGroup:
    # if operator group exists in namespace use that, otherwise use namespace name as default
    name: '{{ with (lookup "operators.coreos.com/v1" "OperatorGroup" "openshift-storage" "").items }}{{ (index . 0).metadata.name }}{{ else }}openshift-storage{{ end }}'
    namespace: openshift-storage
    targetNamespaces:
      - openshift-storage
  subscription:
    name: '{{hub index .ManagedClusterLabels "autoshift.io/odf-subscription-name" | default "odf-operator" hub}}'
    namespace: openshift-storage
    # Source: base from label or default; if disconnected-mirror is true, appends -<suffix>
    source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/odf-source" | default "redhat-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
    sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/odf-source-namespace" | default "openshift-marketplace" hub}}'
    channel: '{{hub index .ManagedClusterLabels "autoshift.io/odf-channel" | default "stable-4.20" hub}}'
    startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/odf-version" | default "" hub}}'
  # Upgrade approval for subscription will be set based on if version is set not this flag
  # If version is set install plan is set to manual and only the version specified will be installed
  upgradeApproval: Automatic
  versions:
    - '{{hub index .ManagedClusterLabels "autoshift.io/odf-version" | default "" hub}}'
