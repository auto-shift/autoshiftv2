apiVersion: noobaa.io/v1alpha1
kind: BackingStore
metadata:
  name: noobaa-default-backing-store
  namespace: openshift-storage
spec:
  pvPool:
    numVolumes: '{{hub index .ManagedClusterLabels "autoshift.io/odf-noobaa-store-size" | default "1" hub}}'
    resources:
      limits:
        cpu: 1000m
        memory: 4000Mi
      requests:
        cpu: 500m
        memory: 500Mi
        storage: '{{hub index .ManagedClusterLabels "autoshift.io/odf-noobaa-store-num-volumes" | default "500Gi" hub}}'
    secret: {}
  type: pv-pool
