apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-odf-standard
  namespace: ${POLICY_NAMESPACE}
spec:
  # No spec.clusterSets: selected via ManagedClusterSetBindings in this namespace + the predicate.
  # Standard (non-standalone) ODF: full block + object storage.
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/odf'
              operator: In
              values:
                - 'true'
            - key: 'autoshift.io/odf-multi-cloud-gateway'
              operator: NotIn
              values:
                - 'standalone'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
