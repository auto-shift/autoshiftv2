apiVersion: policy.open-cluster-management.io/v1beta1
kind: OperatorPolicy
metadata:
  name: install-operator-openshift-ai
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  complianceType: musthave
  # RHOAI is a global (AllNamespaces) operator — OperatorGroup has no targetNamespaces. Reuse an existing
  # OperatorGroup in the namespace if present, else create rhods-operator-group.
  operatorGroup:
    name: '{{ with (lookup "operators.coreos.com/v1" "OperatorGroup" "redhat-ods-operator" "").items }}{{ (index . 0).metadata.name }}{{ else }}rhods-operator-group{{ end }}'
    namespace: redhat-ods-operator
  subscription:
    name: '{{hub index .ManagedClusterLabels "autoshift.io/openshift-ai-subscription-name" | default "rhods-operator" hub}}'
    namespace: redhat-ods-operator
    # Source: base from label or default; if disconnected-mirror is true, append the mirror suffix.
    source: '{{hub $base := (index .ManagedClusterLabels "autoshift.io/openshift-ai-source" | default "redhat-operators") hub}}{{hub ternary (printf "%s-%s" $base (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror")) $base (eq (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true") hub}}'
    sourceNamespace: '{{hub index .ManagedClusterLabels "autoshift.io/openshift-ai-source-namespace" | default "openshift-marketplace" hub}}'
    channel: '{{hub index .ManagedClusterLabels "autoshift.io/openshift-ai-channel" | default "stable-3.4" hub}}'
    startingCSV: '{{hub index .ManagedClusterLabels "autoshift.io/openshift-ai-version" | default "" hub}}'
  # A pinned version drives manual, pinned install plans; empty = automatic upgrades on the channel.
  upgradeApproval: Automatic
  versions:
    - '{{hub index .ManagedClusterLabels "autoshift.io/openshift-ai-version" | default "" hub}}'
