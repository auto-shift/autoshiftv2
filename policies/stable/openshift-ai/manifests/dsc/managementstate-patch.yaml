# Per-cluster managementState from AutoShift labels, resolved by ACM at enforcement time. `default`
# keeps the ai-accelerator base value, so a cluster only overrides the components it labels. Extend this
# patch to expose any other DSC field (storageClass, sizes, MaaS/ESO wiring) the same way.
apiVersion: datasciencecluster.opendatahub.io/v2
kind: DataScienceCluster
metadata:
  name: default-dsc
spec:
  components:
    kserve:
      managementState: '{{hub index .ManagedClusterLabels "autoshift.io/openshift-ai-kserve" | default "Managed" hub}}'
    kueue:
      managementState: '{{hub index .ManagedClusterLabels "autoshift.io/openshift-ai-kueue" | default "Removed" hub}}'
