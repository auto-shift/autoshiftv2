{{ $policyName := "policy-infra-monitoring" }}
{{ $configMapName := "cluster-monitoring-config" }}
{{ $configPolicyName := "cluster-infra-monitoring" }}
{{ $labelPrefix := .Values.infraNodes.labelPrefix | default "autoshift.io/" }}
{{ $placementName := printf "placement-%s" $policyName }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ .Values.policy_namespace }}
  annotations:
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
    policy.open-cluster-management.io/standards: NIST SP 800-53
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: {{ not .Values.infraNodes.monitoring.migrate }}
  dependencies:
  {{- range .Values.infraNodes.dependencies.install }}
  - apiVersion: policy.open-cluster-management.io/v1
    compliance: Compliant
    kind: Policy
    name: {{ . }}
    namespace: {{ $.Values.policy_namespace }}
    {{- end }}
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: {{ $configPolicyName }}
        spec:
          object-templates-raw: |
            {{`{{`}} $cmData := ((lookup "v1" "ConfigMap" "openshift-monitoring" "cluster-monitoring-config" | default dict).data | default dict) {{`}}`}}
            {{`{{`}} $cfg := (index $cmData "config.yaml" | default "" | fromYaml) | default dict {{`}}`}}
            {{`{{`}} $infraSelector := dict "node-role.kubernetes.io/infra" "" {{`}}`}}
            {{`{{`}} $infraTolerations := list (dict "key" "node-role.kubernetes.io/infra" "effect" "NoSchedule") (dict "key" "node-role.kubernetes.io/infra" "effect" "NoExecute") {{`}}`}}
            {{ "{{hub-" }} if eq (index .ManagedClusterLabels "autoshift.io/uwm" | default "false") "true" {{ "hub}}" }}
            {{`{{`}} $_ := set $cfg "enableUserWorkload" true {{`}}`}}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{`{{`}} $components := list "alertmanagerMain" "prometheusK8s" "prometheusOperator" "kubeStateMetrics" "openshiftStateMetrics" "thanosQuerier" "monitoringPlugin" {{`}}`}}
            {{ "{{hub-" }} if ne (index .ManagedClusterLabels "autoshift.io/disconnected-mirror" | default "false") "true" {{ "hub}}" }}
            {{`{{`}} $components = append $components "telemeterClient" {{`}}`}}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{`{{`}} range $comp := $components {{`}}`}}
            {{`{{`}} $existing := (index $cfg $comp | default dict) {{`}}`}}
            {{`{{`}} $_ := set $existing "nodeSelector" $infraSelector {{`}}`}}
            {{`{{`}} $_ := set $existing "tolerations" $infraTolerations {{`}}`}}
            {{`{{`}} $_ := set $cfg $comp $existing {{`}}`}}
            {{`{{`}} end {{`}}`}}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: cluster-monitoring-config
                  namespace: openshift-monitoring
                data:
                  config.yaml: |
                    {{`{{`}} $cfg | toYaml | autoindent {{`}}`}}
          pruneObjectBehavior: {{ .Values.infraNodes.monitoring.pruneObjectBehavior | default "None" }}
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ $placementName }}
  namespace: {{ .Values.policy_namespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := .Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := .Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: {{ printf "%s%s" $labelPrefix "infra-nodes" }}
              operator: Exists
            - key: {{ printf "%s%s" $labelPrefix "infra-nodes" }}
              operator: NotIn
              values:
                - "0"
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ $placementName }}
  namespace: {{ .Values.policy_namespace }}
placementRef:
  name: {{ $placementName }}
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: {{ $policyName }}
    apiGroup: policy.open-cluster-management.io
    kind: Policy
