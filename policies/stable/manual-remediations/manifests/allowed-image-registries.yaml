apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: set-allowed-registries
spec:
  remediationAction: ${REMEDIATION}
  severity: high
  pruneObjectBehavior: None
  # First-class ConfigurationPolicy: PG passes it through unmodified, so evaluationInterval
  # is baked here (PG only injects it into raw manifests it wraps itself).
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  object-templates-raw: |
    - complianceType: musthave
      objectDefinition:
        apiVersion: config.openshift.io/v1
        kind: Image
        metadata:
          name: cluster
        spec:
          allowedRegistriesForImport:
            - domainName: quay.io
              insecure: false
            - domainName: registry.redhat.io
              insecure: false
          registrySources:
            allowedRegistries:
              - quay.io
              - registry.redhat.io
              - image-registry.openshift-image-registry.svc:5000
