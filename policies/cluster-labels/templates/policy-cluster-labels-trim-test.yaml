{{ if (.Values.debug | default false) }}
{{- $policyName := "policy-trim-marker-test" }}
{{- $placementName := (printf "placement-%s" $policyName) }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ $.Values.policy_namespace }}
  annotations:
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
    policy.open-cluster-management.io/standards: NIST SP 800-53
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trim-marker-test-raw
        spec:
          remediationAction: enforce
          severity: low
          object-templates-raw: |
            {{ "{{" }} $testTrue := true {{ "}}" }}
            {{ "{{-" }} $testFalse := false {{ "}}" }}
            {{ "{{-" }} $testDict := dict "key1" "val1" "key2" "val2" {{ "}}" }}
            {{ "{{-" }} $testList := list "a" "b" "c" {{ "}}" }}
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: trim-test-results
                  namespace: {{ $.Values.policy_namespace }}
                data:
                  raw-results: |
                    === CASE 1: var assign WITH trim between content ===
                    line-before: content
                    {{ "{{-" }} $unused1 := "test" {{ "}}" }}
                    line-after: content
                    === CASE 2: var assign NO trim between content ===
                    line-before: content
                    {{ "{{" }} $unused2 := "test" {{ "}}" }}
                    line-after: content
                    === CASE 3: if TRUE WITH trim between content ===
                    line-before: content
                    {{ "{{-" }} if $testTrue {{ "}}" }}
                    conditional-content: here
                    {{ "{{-" }} end {{ "}}" }}
                    line-after: content
                    === CASE 4: if TRUE NO trim between content ===
                    line-before: content
                    {{ "{{" }} if $testTrue {{ "}}" }}
                    conditional-content: here
                    {{ "{{" }} end {{ "}}" }}
                    line-after: content
                    === CASE 5: if FALSE WITH trim between content ===
                    line-before: content
                    {{ "{{-" }} if $testFalse {{ "}}" }}
                    should-not-appear: hidden
                    {{ "{{-" }} end {{ "}}" }}
                    line-after: content
                    === CASE 6: if FALSE NO trim between content ===
                    line-before: content
                    {{ "{{" }} if $testFalse {{ "}}" }}
                    should-not-appear: hidden
                    {{ "{{" }} end {{ "}}" }}
                    line-after: content
                    === CASE 7: range WITH trim between content ===
                    line-before: content
                    {{ "{{-" }} range $_, $item := $testList {{ "}}" }}
                    item: {{ "{{" }} $item {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                    line-after: content
                    === CASE 8: range NO trim between content ===
                    line-before: content
                    {{ "{{" }} range $_, $item := $testList {{ "}}" }}
                    item: {{ "{{" }} $item {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}
                    line-after: content
                    === CASE 9: first line after pipe WITH trim ===
                    {{ "{{-" }} if $testTrue {{ "}}" }}
                    first-line: content
                    {{ "{{-" }} end {{ "}}" }}
                    === CASE 10: first line after pipe NO trim ===
                    {{ "{{" }} if $testTrue {{ "}}" }}
                    first-line: content
                    {{ "{{" }} end {{ "}}" }}
                    === CASE 11: nested yaml WITH trim (our pattern) ===
                    apiVersion: v1
                    kind: FakeResource
                    spec:
                      fieldA: valueA
                    {{ "{{-" }} if $testTrue {{ "}}" }}
                      conditionalField: conditionalValue
                    {{ "{{-" }} end {{ "}}" }}
                      fieldB: valueB
                    === CASE 12: nested yaml NO trim ===
                    apiVersion: v1
                    kind: FakeResource
                    spec:
                      fieldA: valueA
                    {{ "{{" }} if $testTrue {{ "}}" }}
                      conditionalField: conditionalValue
                    {{ "{{" }} end {{ "}}" }}
                      fieldB: valueB
                    === CASE 13: end WITH trim between content ===
                    {{ "{{" }} if $testTrue {{ "}}" }}
                    conditional-content: here
                    {{ "{{-" }} end {{ "}}" }}
                    after-end: content
                    === CASE 14: end NO trim between content ===
                    {{ "{{" }} if $testTrue {{ "}}" }}
                    conditional-content: here
                    {{ "{{" }} end {{ "}}" }}
                    after-end: content
                    === CASE 15: range dict WITH trim ===
                    header: start
                    {{ "{{-" }} range $k, $v := $testDict {{ "}}" }}
                    {{ "{{" }} $k {{ "}}" }}: {{ "{{" }} $v {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                    footer: end
                    === CASE 16: range dict NO trim ===
                    header: start
                    {{ "{{" }} range $k, $v := $testDict {{ "}}" }}
                    {{ "{{" }} $k {{ "}}" }}: {{ "{{" }} $v {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}
                    footer: end
                    === CASE 17: if TRUE trim on if only (not end) ===
                    line-before: content
                    {{ "{{-" }} if $testTrue {{ "}}" }}
                    conditional-content: here
                    {{ "{{" }} end {{ "}}" }}
                    line-after: content
                    === CASE 18: if TRUE trim on end only (not if) ===
                    line-before: content
                    {{ "{{" }} if $testTrue {{ "}}" }}
                    conditional-content: here
                    {{ "{{-" }} end {{ "}}" }}
                    line-after: content
                    === CASE 19: value output with left trim ===
                    line-before: content
                    fieldA:{{ "{{-" }} "hello" {{ "}}" }}
                    line-after: content
                    === CASE 20: if-else TRUE with trim ===
                    line-before: content
                    {{ "{{-" }} if $testTrue {{ "}}" }}
                    true-branch: here
                    {{ "{{-" }} else {{ "}}" }}
                    false-branch: here
                    {{ "{{-" }} end {{ "}}" }}
                    line-after: content
                    === CASE 21: if-else FALSE with trim ===
                    line-before: content
                    {{ "{{-" }} if $testFalse {{ "}}" }}
                    true-branch: here
                    {{ "{{-" }} else {{ "}}" }}
                    false-branch: here
                    {{ "{{-" }} end {{ "}}" }}
                    line-after: content
                    === CASE 22: nested if with trim ===
                    line-before: content
                    {{ "{{-" }} if $testTrue {{ "}}" }}
                    outer-true: yes
                    {{ "{{-" }} if $testFalse {{ "}}" }}
                    inner-false: should-not-appear
                    {{ "{{-" }} end {{ "}}" }}
                    after-inner: content
                    {{ "{{-" }} end {{ "}}" }}
                    line-after: content
                    === CASE 23: empty range (no items) with trim ===
                    line-before: content
                    {{ "{{-" }} $emptyList := list {{ "}}" }}
                    {{ "{{-" }} range $_, $item := $emptyList {{ "}}" }}
                    item: {{ "{{" }} $item {{ "}}" }}
                    {{ "{{-" }} end {{ "}}" }}
                    line-after: content
                    === CASE 24: toYaml output of dict ===
                    line-before: content
                    {{ "{{" }} $testDict | toYaml {{ "}}" }}
                    line-after: content
                    === CASE 25: toYaml with autoindent ===
                    line-before: content
                    {{ "{{" }} $testDict | toYaml | autoindent {{ "}}" }}
                    line-after: content
                    === END ===
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trim-marker-test-hub
        spec:
          remediationAction: enforce
          severity: low
          object-templates:
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: trim-test-hub-results
                  namespace: {{ $.Values.policy_namespace }}
                data:
                  hub-results: |
                    === HUB CASE 1: if TRUE WITH hub- trim ===
                    line-before: content
                    {{`{{hub- if eq "true" "true" hub}}`}}
                    conditional: here
                    {{`{{hub- end hub}}`}}
                    line-after: content
                    === HUB CASE 2: if TRUE NO hub- trim ===
                    line-before: content
                    {{`{{hub if eq "true" "true" hub}}`}}
                    conditional: here
                    {{`{{hub end hub}}`}}
                    line-after: content
                    === HUB CASE 3: if FALSE WITH hub- trim ===
                    line-before: content
                    {{`{{hub- if eq "true" "false" hub}}`}}
                    should-not-appear: hidden
                    {{`{{hub- end hub}}`}}
                    line-after: content
                    === HUB CASE 4: if FALSE NO hub- trim ===
                    line-before: content
                    {{`{{hub if eq "true" "false" hub}}`}}
                    should-not-appear: hidden
                    {{`{{hub end hub}}`}}
                    line-after: content
                    === HUB CASE 5: first line WITH hub- trim ===
                    {{`{{hub- if eq "true" "true" hub}}`}}
                    first-line: content
                    {{`{{hub- end hub}}`}}
                    === HUB CASE 6: first line NO hub- trim ===
                    {{`{{hub if eq "true" "true" hub}}`}}
                    first-line: content
                    {{`{{hub end hub}}`}}
                    === HUB CASE 7: var assign WITH hub- trim ===
                    line-before: content
                    {{`{{hub- $x := "test" hub}}`}}
                    line-after: content
                    === HUB CASE 8: var assign NO hub- trim ===
                    line-before: content
                    {{`{{hub $x := "test" hub}}`}}
                    line-after: content
                    === HUB CASE 9: if TRUE hub- on if only ===
                    line-before: content
                    {{`{{hub- if eq "true" "true" hub}}`}}
                    conditional: here
                    {{`{{hub end hub}}`}}
                    line-after: content
                    === HUB CASE 10: if TRUE hub- on end only ===
                    line-before: content
                    {{`{{hub if eq "true" "true" hub}}`}}
                    conditional: here
                    {{`{{hub- end hub}}`}}
                    line-after: content
                    === HUB CASE 11: comment both trim ===
                    line-before: content
                    {{`{{hub- /* comment */ -hub}}`}}
                    line-after: content
                    === HUB CASE 12: comment left trim only ===
                    line-before: content
                    {{`{{hub- /* comment */ hub}}`}}
                    line-after: content
                    === HUB CASE 13: comment no trim ===
                    line-before: content
                    {{`{{hub /* comment */ hub}}`}}
                    line-after: content
                    === HUB CASE 14: if-else TRUE with trim ===
                    line-before: content
                    {{`{{hub- if eq "true" "true" hub}}`}}
                    true-branch: here
                    {{`{{hub- else hub}}`}}
                    false-branch: here
                    {{`{{hub- end hub}}`}}
                    line-after: content
                    === HUB CASE 15: if-else FALSE with trim ===
                    line-before: content
                    {{`{{hub- if eq "true" "false" hub}}`}}
                    true-branch: here
                    {{`{{hub- else hub}}`}}
                    false-branch: here
                    {{`{{hub- end hub}}`}}
                    line-after: content
                    === HUB END ===
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ $placementName }}
  namespace: {{ $.Values.policy_namespace }}
spec:
  clusterSets:
  {{ range $cluster, $value := $.Values.hubClusterSets }}
    - {{ $cluster }}
  {{ end }}
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ $placementName }}
  namespace: {{ $.Values.policy_namespace }}
placementRef:
  name: {{ $placementName }}
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: {{ $policyName }}
    apiGroup: policy.open-cluster-management.io
    kind: Policy
{{ end }}
