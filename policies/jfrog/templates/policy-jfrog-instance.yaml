{{- $policyNamespace := $.Values.policy_namespace }}
{{- $policyName := "policy-jfrog-instance" }}
{{- $placementName := (printf "placement-%s" $policyName) }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
      name: policy-jfrog-operator-install
      namespace: '{{ $policyNamespace }}'
    - apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
      name: policy-crunchy-postgres-artifactory
      namespace: '{{ $policyNamespace }}'
    - apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
      name: policy-jfrog-keys
      namespace: '{{ $policyNamespace }}'
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: jfrog-scc
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: security.openshift.io/v1
                kind: SecurityContextConstraints
                metadata:
                  name: anyuid
                users:
                  - system:serviceaccount:openshift-operators:artifactory-ha-operator
                  - system:serviceaccount:{{ .Values.jfrog.namespace }}:openshiftartifactoryha-artifactory-ha
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: jfrog-artifactory-instance
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{-" }} $ingressDomain := (lookup "config.openshift.io/v1" "Ingress" "" "cluster").spec.domain {{ "}}" }}
            {{ "{{-" }} $dbSecret := (lookup "v1" "Secret" "{{ .Values.jfrog.namespace }}" "artifactory-db-pguser-artifactory") | default dict {{ "}}" }}
            {{ "{{-" }} $dbData := ($dbSecret.data | default dict) {{ "}}" }}
            {{ "{{-" }} $dbHost := (index $dbData "host" | default "" | base64dec) {{ "}}" }}
            {{ "{{-" }} $dbPort := (index $dbData "port" | default "" | base64dec) {{ "}}" }}
            {{ "{{-" }} $dbName := (index $dbData "dbname" | default "" | base64dec) {{ "}}" }}
            {{ "{{-" }} $dbUser := (index $dbData "user" | default "" | base64dec) {{ "}}" }}
            {{ "{{-" }} $dbPass := (index $dbData "password" | default "" | base64dec) {{ "}}" }}
            {{ "{{-" }} $keysSecret := (lookup "v1" "Secret" "{{ .Values.jfrog.namespace }}" "artifactory-keys") | default dict {{ "}}" }}
            {{ "{{-" }} $keysData := ($keysSecret.data | default dict) {{ "}}" }}
            {{ "{{-" }} $masterKey := (index $keysData "master-key" | default "" | base64dec) {{ "}}" }}
            {{ "{{-" }} $joinKey := (index $keysData "join-key" | default "" | base64dec) {{ "}}" }}
            {{ "{{-" }} if and (not (empty $dbHost)) (not (empty $dbPass)) (not (empty $masterKey)) {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: charts.helm.k8s.io/v1
                kind: OpenshiftArtifactoryHa
                metadata:
                  name: openshiftartifactoryha
                  namespace: {{ .Values.jfrog.namespace }}
                spec:
                  artifactory-ha:
                    artifactory:
                      masterKey: {{ "{{" }} $masterKey {{ "}}" }}
                      joinKey: {{ "{{" }} $joinKey {{ "}}" }}
                      node:
                        replicaCount: 1
                        waitForPrimaryStartup:
                          enabled: false
                      persistence:
                        enabled: true
                        size: 200Gi
                    databaseUpgradeReady: true
                    database:
                      type: postgresql
                      driver: org.postgresql.Driver
                      url: jdbc:postgresql://{{ "{{" }} $dbHost {{ "}}" }}:{{ "{{" }} $dbPort {{ "}}" }}/{{ "{{" }} $dbName {{ "}}" }}
                      user: {{ "{{" }} $dbUser {{ "}}" }}
                      password: {{ "{{" }} $dbPass {{ "}}" }}
                    postgresql:
                      enabled: false
                    nginx:
                      enabled: false
                    waitForDatabase: true
            {{ "{{-" }} end {{ "}}" }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: jfrog-artifactory-route
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{-" }} $ingressDomain := (lookup "config.openshift.io/v1" "Ingress" "" "cluster").spec.domain {{ "}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: route.openshift.io/v1
                kind: Route
                metadata:
                  name: artifactory
                  namespace: {{ .Values.jfrog.namespace }}
                spec:
                  host: artifactory.{{ "{{" }} $ingressDomain {{ "}}" }}
                  to:
                    kind: Service
                    name: openshiftartifactoryha-artifactory-ha
                    weight: 100
                  port:
                    targetPort: 8082
                  tls:
                    termination: edge
                    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ $placementName }}
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/jfrog'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ $placementName }}
  namespace: {{ $policyNamespace }}
placementRef:
  name: {{ $placementName }}
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: {{ $policyName }}
    apiGroup: policy.open-cluster-management.io
    kind: Policy
