# Default values for jfrog
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
jfrog:
  name: openshiftartifactoryha-operator
  namespace: jfrog-system
  channel: alpha
  source: certified-operators
  sourceNamespace: openshift-marketplace
  operatorGroupName: jfrog-operator-group
  targetNamespaces: # Target namespaces for namespace-scoped operators
    - jfrog-system
  
